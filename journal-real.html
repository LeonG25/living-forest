<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --leaf:#8fd6a0; --leaf-hi:#b6ecc4; --autotr:#9a8bbd;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center; gap:40px; padding:34px 20px 90px;
    background:radial-gradient(150% 100% at 50% -6%, #0f2430 0%, #0a1622 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; flex-wrap:wrap; position:relative; overflow-x:hidden; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .screen[dir="rtl"]{ direction:rtl; }
  .screen[dir="rtl"] .serif,.screen[dir="rtl"] .big,.screen[dir="rtl"] .act,.screen[dir="rtl"] .warm{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* ===== ALIVE : in-device atmosphere ===== */
  .atmo{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .aur{ position:absolute; border-radius:50%; filter:blur(48px); opacity:.55; mix-blend-mode:screen; }
  .aur.a1{ width:320px; height:320px; left:-80px; top:-50px; background:radial-gradient(circle, rgba(243,205,132,.8), transparent 68%); animation:canopyA 24s ease-in-out infinite; }
  .aur.a2{ width:300px; height:300px; right:-90px; top:150px; background:radial-gradient(circle, rgba(127,180,216,.78), transparent 66%); animation:canopyB 29s ease-in-out infinite; }
  .aur.a3{ width:300px; height:300px; left:-50px; bottom:-60px; background:radial-gradient(circle, rgba(201,162,255,.72), transparent 66%); animation:canopyA 33s ease-in-out infinite reverse; }
  .dapple{ position:absolute; inset:-20%; z-index:1; pointer-events:none; opacity:.5; mix-blend-mode:screen;
    background:
      radial-gradient(42px 30px at 20% 24%, rgba(255,230,173,.42), transparent 62%),
      radial-gradient(60px 40px at 74% 40%, rgba(169,210,238,.34), transparent 62%),
      radial-gradient(50px 34px at 40% 72%, rgba(201,162,255,.32), transparent 62%),
      radial-gradient(40px 28px at 86% 82%, rgba(182,236,196,.3), transparent 62%);
    background-size:340px 300px, 420px 360px; background-repeat:repeat;
    -webkit-mask:radial-gradient(120% 90% at 50% 30%, #000 40%, transparent 96%);
            mask:radial-gradient(120% 90% at 50% 30%, #000 40%, transparent 96%);
    animation:dappleDrift 34s linear infinite; }
  .stars{ position:absolute; inset:0; z-index:0; opacity:.55; animation:twinkle 8s ease-in-out infinite;
    background-image:radial-gradient(1px 1px at 18% 12%, #cfe0ff88, transparent), radial-gradient(1px 1px at 66% 7%, #cfe0ff66, transparent),
      radial-gradient(1px 1px at 84% 26%, #ffe6ad55, transparent), radial-gradient(1px 1px at 30% 40%, #cfe0ff44, transparent),
      radial-gradient(1px 1px at 10% 58%, #cfe0ff44, transparent), radial-gradient(1px 1px at 88% 62%, #cfe0ff44, transparent); }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 70% at 50% 6%, rgba(243,205,132,.05), transparent 42%), radial-gradient(120% 92% at 50% 42%, transparent 28%, rgba(4,7,14,.6) 100%); }
  @keyframes canopyA{ 0%{transform:translate(-4%,-2%) scale(1);} 50%{transform:translate(5%,4%) scale(1.16);} 100%{transform:translate(-4%,-2%) scale(1);} }
  @keyframes canopyB{ 0%{transform:translate(4%,2%) scale(1.06);} 50%{transform:translate(-6%,-4%) scale(1.24);} 100%{transform:translate(4%,2%) scale(1.06);} }
  @keyframes dappleDrift{ from{ background-position:0 0, 0 0; } to{ background-position:-340px 300px, 420px -360px; } }
  @keyframes twinkle{ 0%,100%{opacity:.4;} 50%{opacity:.72;} }

  /* ===== device ===== */
  .stagewrap{ display:flex; flex-direction:column; align-items:center; gap:0; width:100%; }
  .device{ position:relative; width:390px; height:820px; border-radius:42px; overflow:hidden; flex:0 0 auto;
    background:#04070e; box-shadow:0 40px 120px -50px #000, 0 0 0 9px #14141b, 0 0 0 10px #2b2b34; }

  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ padding:0 18px calc(40px + env(safe-area-inset-bottom)); }

  .topbar{ position:sticky; top:0; z-index:14; display:flex; align-items:center; gap:10px;
    padding:15px 16px 11px; background:linear-gradient(to bottom, rgba(5,11,17,.92), rgba(5,11,17,.5) 68%, transparent); backdrop-filter:blur(9px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer; border:1px solid var(--hair); background:rgba(10,22,30,.55); color:var(--cream); transition:border-color .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); } .ibtn svg{ width:18px; height:18px; }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .ttl{ flex:1; min-width:0; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }
  .langpill{ display:inline-flex; align-items:center; gap:6px; font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:8px 11px; border-radius:99px; cursor:pointer; border:1px solid var(--hair); background:rgba(10,22,30,.55); color:var(--muted); flex:0 0 auto; }
  .langpill:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }

  .warm{ font-family:'Newsreader',serif; font-size:22px; line-height:1.32; color:#f6efe0; margin:12px 2px 4px; }
  .warm em{ font-style:italic; color:var(--gold-hi); }
  .warmsub{ font-size:13px; color:var(--muted); line-height:1.5; margin:0 2px 16px; }
  .warmsub b{ color:var(--cream); font-weight:600; }

  /* season strip — a gentle, non-competitive glance, never a score */
  .season{ display:flex; gap:9px; margin:0 2px 6px; }
  .scard{ flex:1; padding:12px 13px; border-radius:15px; background:rgba(10,18,30,.55); border:1px solid var(--hair); backdrop-filter:blur(6px); }
  .scard .num{ font-family:'Newsreader',serif; font-size:26px; line-height:1; color:#fbf5e8; }
  .scard .lb{ font-size:10.5px; color:var(--muted); margin-top:6px; line-height:1.3; }
  .scard .num.g{ color:var(--gold-hi); } .scard .num.c{ color:var(--cool-hi); }

  .sec{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); margin:22px 2px 13px; display:flex; align-items:center; gap:9px; }
  .sec .line{ flex:1; height:1px; background:var(--hair); }

  /* ===== the timeline — the thread of your days ===== */
  .timeline{ position:relative; padding-inline-start:8px; }
  .spine{ position:absolute; inset-inline-start:23px; top:6px; bottom:26px; width:2px; border-radius:2px; overflow:visible;
    background:linear-gradient(180deg, rgba(243,205,132,0), rgba(243,205,132,.5) 10%, rgba(127,180,216,.46) 52%, rgba(201,162,255,.46) 84%, rgba(201,162,255,0)); }
  /* SIGNATURE MOTION : a firefly of light traces the thread, top to bottom */
  .spine .trace{ position:absolute; inset-inline-start:-3px; width:8px; height:70px; border-radius:8px;
    background:linear-gradient(180deg, transparent, #fff8e6 42%, #ffe6ad 58%, transparent);
    filter:blur(3px); opacity:.9; mix-blend-mode:screen; animation:thread 8s ease-in-out infinite; }
  @keyframes thread{ 0%{ top:-12%; opacity:0; } 10%{ opacity:.95; } 90%{ opacity:.95; } 100%{ top:104%; opacity:0; } }

  .day{ margin-bottom:6px; }
  .daylabel{ font-family:'Azeret Mono',monospace; font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:0 0 10px 44px; }
  .screen[dir="rtl"] .daylabel{ margin:0 44px 10px 0; }

  .entry{ position:relative; padding-inline-start:52px; padding-bottom:16px; }
  .node{ position:absolute; inset-inline-start:12px; top:2px; width:24px; height:24px; border-radius:50%; display:grid; place-items:center; z-index:2;
    background:#0a1420; border:1px solid var(--hair); }
  .node svg{ width:13px; height:13px; }
  .node.gold{ border-color:rgba(243,205,132,.5); color:var(--gold-hi); box-shadow:0 0 16px -3px rgba(243,205,132,.7); animation:beadG 4.6s ease-in-out infinite; }
  .node.cool{ border-color:rgba(127,180,216,.5); color:var(--cool-hi); box-shadow:0 0 16px -3px rgba(127,180,216,.6); animation:beadC 5.2s ease-in-out infinite; }
  .node.wait{ border-color:rgba(201,162,255,.5); color:var(--edit-hi); box-shadow:0 0 16px -3px rgba(201,162,255,.65); animation:beadV 4s ease-in-out infinite; }
  @keyframes beadG{ 0%,100%{ box-shadow:0 0 14px -4px rgba(243,205,132,.6);} 50%{ box-shadow:0 0 22px 0 rgba(243,205,132,.85);} }
  @keyframes beadC{ 0%,100%{ box-shadow:0 0 14px -4px rgba(127,180,216,.5);} 50%{ box-shadow:0 0 22px 0 rgba(127,180,216,.8);} }
  @keyframes beadV{ 0%,100%{ box-shadow:0 0 14px -4px rgba(201,162,255,.55);} 50%{ box-shadow:0 0 22px 0 rgba(201,162,255,.85);} }

  .ecard{ background:rgba(10,18,30,.52); border:1px solid var(--hair); border-radius:16px; padding:13px 14px; backdrop-filter:blur(6px); display:flex; gap:12px; align-items:flex-start; }
  .entry.fresh .ecard{ background:linear-gradient(120deg, rgba(243,205,132,.1), rgba(10,18,30,.5)); border-color:rgba(243,205,132,.28); }
  .ecard .obj{ width:42px; height:42px; border-radius:11px; overflow:hidden; flex:0 0 auto; border:1px solid rgba(255,244,214,.4); background:#0c1622; }
  .ecard .obj.round{ border-radius:50%; }
  .ecard .obj img,.ecard .obj canvas{ width:100%; height:100%; object-fit:cover; display:block; }
  .ecard .obj.glyph{ display:grid; place-items:center; color:var(--cool-hi); border-color:rgba(127,180,216,.34); background:rgba(127,180,216,.08); }
  .ecard .obj.glyph.gold{ color:var(--gold-hi); border-color:rgba(243,205,132,.34); background:rgba(243,205,132,.09); }
  .ecard .obj.glyph.wait{ color:var(--edit-hi); border-color:rgba(201,162,255,.34); background:rgba(201,162,255,.09); }
  .ecard .obj.glyph svg{ width:20px; height:20px; }
  .eb{ flex:1; min-width:0; }
  .when{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.08em; color:var(--dim); text-transform:uppercase; }
  .act{ font-family:'Newsreader',serif; font-size:16px; line-height:1.36; color:#f2ead9; margin-top:3px; }
  .act b{ font-weight:500; color:#fff6e4; }
  .act .nm{ color:var(--gold-hi); font-style:italic; }
  .prov{ display:inline-flex; align-items:center; gap:6px; margin-top:9px; padding:4px 10px; border-radius:99px; font-size:10.5px; font-weight:600; }
  .prov .d{ width:7px; height:7px; border-radius:50%; flex:0 0 auto; }
  .prov.gold{ color:var(--gold-hi); background:rgba(243,205,132,.1); border:1px solid rgba(243,205,132,.34); } .prov.gold .d{ background:var(--gold); }
  .prov.cool{ color:var(--cool-hi); background:rgba(127,180,216,.1); border:1px solid rgba(127,180,216,.32); } .prov.cool .d{ background:var(--cool); }
  .prov.wait{ color:var(--edit-hi); background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.34); } .prov.wait .d{ background:var(--edit); box-shadow:0 0 8px 1px var(--edit); animation:dotPulse 2.6s ease-in-out infinite; }
  @keyframes dotPulse{ 0%,100%{ transform:scale(1); opacity:.9;} 50%{ transform:scale(1.35); opacity:1;} }

  /* ===== empty state ===== */
  .empty{ position:relative; margin-top:26px; padding-inline-start:8px; }
  .empty .spine2{ position:absolute; inset-inline-start:23px; top:96px; bottom:0; width:2px; border-radius:2px;
    background:linear-gradient(180deg, rgba(243,205,132,.4), rgba(243,205,132,.05) 60%, transparent);

  .seed{ position:relative; z-index:2; width:64px; height:64px; margin-inline-start:2px; border-radius:50%; display:grid; place-items:center;
    background:radial-gradient(circle at 42% 34%, rgba(243,205,132,.28), transparent 68%); border:1px solid rgba(243,205,132,.42); color:var(--gold-hi); animation:seedGlow 4.4s ease-in-out infinite; }
  .seed svg{ width:30px; height:30px; }
  @keyframes seedGlow{ 0%,100%{ box-shadow:0 0 30px -10px rgba(243,205,132,.6);} 50%{ box-shadow:0 0 54px 0 rgba(243,205,132,.85);} }
  .empty .et{ font-family:'Newsreader',serif; font-size:24px; line-height:1.34; color:#f6efe0; margin:22px 2px 0; max-width:300px; }
  .empty .et em{ font-style:italic; color:var(--gold-hi); }
  .empty .es{ font-size:13px; color:var(--muted); line-height:1.55; margin:12px 2px 0; max-width:310px; }
  .empty .cta{ display:flex; align-items:center; gap:9px; margin:20px 2px 0; padding:14px 18px; border-radius:14px; cursor:pointer; width:fit-content;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold)); color:#231704; font-weight:700; font-size:14px; border:none; box-shadow:0 12px 34px -14px rgba(243,205,132,.85); text-decoration:none; }
  .empty .cta svg{ width:17px; height:17px; }
  .empty .hints{ display:flex; flex-direction:column; gap:11px; margin:26px 2px 0; }
  .hint{ display:flex; align-items:center; gap:11px; font-size:12.5px; color:var(--muted); }
  .hint .hi{ width:30px; height:30px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center; border:1px solid var(--hair); background:rgba(10,18,30,.55); color:var(--cool-hi); }
  .hint .hi svg{ width:15px; height:15px; }
  .hint b{ color:var(--cream); font-weight:600; }

  .foot{ margin-top:24px; text-align:center; }
  .foot .l{ font-family:'Newsreader',serif; font-style:italic; font-size:13px; color:rgba(243,205,132,.6); }

  /* ===== language sheet ===== */
  .scrim{ position:absolute; inset:0; z-index:30; background:rgba(4,7,14,.66); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; z-index:31; inset-inline:0; bottom:0; background:linear-gradient(180deg,#0f1e33,#081120);
    border:1px solid var(--hair); border-bottom:none; border-radius:22px 22px 0 0; padding:10px 20px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(103%); transition:transform .34s cubic-bezier(.16,.8,.28,1); box-shadow:0 -24px 70px -30px #000; max-height:90%; overflow-y:auto; scrollbar-width:none; }
  .sheet::-webkit-scrollbar{ display:none; }
  .sheet.show{ transform:translateY(0); }
  .grip{ width:40px; height:4px; border-radius:99px; background:rgba(255,255,255,.2); margin:6px auto 15px; }
  .sheet h3{ font-family:'Newsreader',serif; font-weight:400; font-size:21px; color:#fbf5e8; margin-bottom:4px; }
  .sheet .sub{ font-size:12.5px; color:var(--muted); margin-bottom:16px; line-height:1.45; }
  .lang-opt{ display:flex; align-items:center; gap:14px; width:100%; padding:14px 15px; border-radius:14px;
    background:var(--panel); border:1px solid var(--hair); color:var(--cream); cursor:pointer; margin-bottom:9px; text-align:start; }
  .lang-opt.on{ border-color:rgba(243,205,132,.55); background:rgba(243,205,132,.08); }
  .lang-opt .native{ font-family:'Newsreader',serif; font-size:18px; } .lang-opt .en{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .lang-opt .tick{ margin-inline-start:auto; color:var(--gold); opacity:0; } .lang-opt.on .tick{ opacity:1; } .lang-opt .tick svg{ width:18px; height:18px; }

  @media (prefers-reduced-motion: reduce){
    .aur,.dapple,.stars,.spine .trace,.node,.seed,.prov.wait .d{ animation:none !important; }
  }

  /* full-viewport page (drop the mock device frame) */
  html,body{ background:#04070e; margin:0; }
  body{ gap:0; padding:0; align-items:stretch; justify-content:flex-start; }
  .stagewrap{ width:100%; }
  .device{ width:100vw!important; height:100dvh!important; max-width:none!important; border-radius:0!important; border:none!important; box-shadow:none!important; }
</style>
</head>

      aWelcome:nm=>`Вы приняли <span class="nm">${esc(nm)}</span> в лес — новое имя на дереве.`,
      aFace:nm=>`Вы назвали лицо — это <span class="nm">${esc(nm)}</span>.`,
      aCalled:(nm,v)=>`Вы сказали, что <span class="nm">${esc(nm)}</span> зовут <span class="nm">${esc(v)}</span>.`,
      aName:(nm,v)=>`Вы дали <span class="nm">${esc(nm)}</span> имя — <span class="nm">${esc(v)}</span>.`,
      aDetail:nm=>`Вы добавили деталь о <span class="nm">${esc(nm)}</span>.`,
      aPlace:nm=>`Вы добавили место в жизнь <span class="nm">${esc(nm)}</span>.`,
      aGame:g=>`Вы сыграли в <span class="nm">${esc(g)}</span>.`,
      aSomeone:'кого-то', signin:'Войти', keeper:'Ничто не дойдёт до семьи, пока хранитель не одобрит.',
      eTitle:'Ваш журнал начинается с <em>первого воспоминания</em>.',
      eSub:'Добавьте фотографию, назовите лицо, примите кого-то — и эта нить начнёт светиться, день за днём. Догонять нечего. Есть только то, что вы сделаете дальше.',
      eCta:'Добавить первое воспоминание',
      eH1:'Каждое <b>добавленное воспоминание</b> появляется здесь в тот же день.',
      eH2:'И каждое <b>названное лицо</b>, и каждый принятый человек.',
      eH3:'И каждая <b>сыгранная игра</b> в памяти семьи.',
      eFoot:'Пустая страница не пуста — она ждёт.' },
    he:{ dir:'rtl', native:'עברית', label:'Hebrew',
      eyebrow:'הימים שלך ביער', title:'היומן שלך',
      langtitle:'שפה', langsub:'היומן, התוויות והמילים — לפי השפה שתבחרו.',
      warm:n=>`${n} ${n===1?'דבר קטן':'דברים קטנים'}, עד כה.`, warmsub:'שום דבר כאן אינו ניקוד. זהו רק תיעוד של הטיפול שנתת.',
      warmsubWait:'שום דבר כאן אינו ניקוד. זהו רק תיעוד של הטיפול שנתת — ודבר אחד עדיין <b>מחכה לשומר</b>.',
      cMem:'זכרונות נוספו', cPeople:'אנשים התקבלו', cGames:'משחקים שוחקו',
      thread:'חוט הימים שלך',
      today:'היום', yesterday:'אתמול', earlier:'מוקדם יותר השבוע', older:'מוקדם יותר',
      foot:'לא מה שצברת — אלא מה ששמרת בחיים.',
      provWords:'במילים שלך', provTold:'אתה סיפרת לנו', provBrought:'אתה הבאת',
      provForest:'היער הבין לבד', provWaiting:'מחכה לשומר',
      aPhoto:cap=>`הוספת צילום${cap?` — ${esc(cap)}`:''}.`,
      aWelcome:nm=>`קיבלת את <span class="nm">${esc(nm)}</span> אל היער — שם חדש על העץ.`,
      aFace:nm=>`זיהית פנים — זהו <span class="nm">${esc(nm)}</span>.`,
      aCalled:(nm,v)=>`אמרת ש<span class="nm">${esc(nm)}</span> נקרא <span class="nm">${esc(v)}</span>.`,
      aName:(nm,v)=>`נתת ל<span class="nm">${esc(nm)}</span> שם — <span class="nm">${esc(v)}</span>.`,
      aDetail:nm=>`הוספת פרט על <span class="nm">${esc(nm)}</span>.`,
      aPlace:nm=>`הוספת מקום לחייו של <span class="nm">${esc(nm)}</span>.`,
      aGame:g=>`שיחקת ב<span class="nm">${esc(g)}</span>.`,
      aSomeone:'מישהו', signin:'כניסה', keeper:'שום דבר לא יגיע למשפחה עד שהשומר יאשר.',
      eTitle:'היומן שלך מתחיל ב<em>זיכרון הראשון</em> שלך.',
      eSub:'הוסיפו צילום, זהו פנים, קבלו מישהו פנימה — והחוט הזה יתחיל להאיר, יום אחר יום. אין מה להשלים. יש רק את מה שתטפחו הבא.',
      eCta:'הוסיפו את הזיכרון הראשון',
      eH1:'כל <b>זיכרון שתוסיפו</b> נוחת כאן ביום שהוספתם אותו.',
      eH2:'גם כל <b>פנים שתזהו</b> וכל אדם שתקבלו.',
      eH3:'וכל <b>משחק שתשחקו</b> בזיכרון המשפחה.',
      eFoot:'דף ריק אינו ריק — הוא ממתין.' }
  };

  const I={
    back:'<path d="M15 18l-6-6 6-6"/>',
    chev:'<path d="M6 9l6 6 6-6"/>',
    check:'<path d="M20 6L9 17l-5-5"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    photo:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M3 17l5-4 4 3 3-2 6 5"/>',
    face:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/>',
    name:'<path d="M4 20h16M6 16l9-9a2.1 2.1 0 013 3l-9 9-4 1z"/>',
    heart:'<path d="M12 20s-7-4-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 6-7 10-7 10z"/>',
    place:'<path d="M12 21s-6-5.7-6-10a6 6 0 1112 0c0 4.3-6 10-6 10z"/><circle cx="12" cy="11" r="2"/>',
    order:'<path d="M4 7h16M4 12h16M4 17h10"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
    star:'<path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z"/>',
    book:'<path d="M9 7h6M9 11h6M9 15h4"/><rect x="5" y="3" width="14" height="18" rx="2"/>',
    seed:'<path d="M12 21c0-5 0-8 0-8m0 0c0-3-2-5-6-5 0 4 2 5 6 5zm0 0c0-3 2-6 6-6 0 4-2 6-6 6z"/>'
  };
  const sv=(p,w)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||1.6}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

  const state={ lang:'en' };
  let user=null, entries=[], counts={mem:0,people:0,games:0};
  const d=()=>T[state.lang];

  const NAMEFIELDS=['display','given','called','family','maiden','patronymic','honorific','nickname'];

  /* ---------- day bucketing (local time) ---------- */
  function startOfDay(ts){ const x=new Date(ts); x.setHours(0,0,0,0); return x.getTime(); }
  function dayKey(ts){
    const L=d(); const now=startOfDay(Date.now()); const day=startOfDay(ts);
    const diff=Math.round((now-day)/86400000);
    if(diff<=0) return {k:'today',label:L.today};
    if(diff===1) return {k:'yesterday',label:L.yesterday};
    if(diff<7) return {k:'earlier',label:L.earlier};
    let lbl; try{ lbl=new Date(ts).toLocaleDateString(state.lang==='he'?'he-IL':(state.lang==='ru'?'ru-RU':'en-GB'),{month:'long',year:'numeric'}); }catch(e){ lbl=L.older; }
    return {k:'m'+day, label:lbl};
  }
  function timeLabel(ts){
    const L=d(); const day=startOfDay(ts); const diff=Math.round((startOfDay(Date.now())-day)/86400000);
    if(diff<=1){ try{ return new Date(ts).toLocaleTimeString(state.lang==='he'?'he-IL':(state.lang==='ru'?'ru-RU':'en-GB'),{hour:'2-digit',minute:'2-digit'}); }catch(e){} }
    try{ return new Date(ts).toLocaleDateString(state.lang==='he'?'he-IL':(state.lang==='ru'?'ru-RU':'en-GB'),{day:'numeric',month:'short'}); }catch(e){ return ''; }
  }

  /* ---------- load : engine-driven from the DB, this user only ---------- */
  async function loadData(){
    entries=[]; counts={mem:0,people:0,games:0};
    const nameCache={};
    async function nameOf(pid){ if(!pid) return d().aSomeone; if(nameCache[pid]!==undefined) return nameCache[pid];
      try{ const {data}=await sb.from('people').select('display_name').eq('id',pid).maybeSingle(); nameCache[pid]=(data&&data.display_name)||d().aSomeone; }
      catch(e){ nameCache[pid]=d().aSomeone; } return nameCache[pid]; }

    // 1) journal_entries — the canonical log, if any rows exist for this user
    let jrows=[];
    for(const col of ['user_id','created_by','author','profile_id']){
      try{ const {data,error}=await sb.from('journal_entries').select('*').eq(col,user.id); if(error) continue; if(data){ jrows=data; break; } }catch(e){}
    }
    for(const j of jrows){
      const ts=j.created_at||j.inserted_at||j.at||Date.now();
      const kind=(j.kind||j.type||j.action||'').toString();
      const gameName=j.game||(j.meta&&j.meta.game)||j.title||'';
      let act, icon=I.book, prov='cool', label=d().provForest;
      if(/game|play/i.test(kind)||gameName){ act=d().aGame(gameName||kind||'—'); icon=I.star; prov='cool'; label=d().provForest; counts.games++; }
      else { act=esc(j.title||j.body||kind||'—'); icon=I.book; prov='cool'; label=d().provForest; }
      entries.push({ts:new Date(ts).getTime(), act, icon, prov, label});
    }

    // 2) fallback / complement : this user's own person_facts (what you contributed)
    try{
      const {data:facts,error}=await sb.from('person_facts')
        .select('id,person_id,field,lang,value,status,created_at,published_at').eq('created_by',user.id);
      if(!error && facts){
        for(const f of facts){
          if(f.field==='birth_prec'||f.field==='death_prec') continue;
          const ts=new Date(f.published_at||f.created_at||Date.now()).getTime();
          const pub=f.status==='published';
          const prov=pub?'gold':'wait'; const label=pub?d().provTold:d().provWaiting;
          const nm=await nameOf(f.person_id);
          let act, icon;
          if(f.field==='face'){ act=d().aFace(nm); icon=I.face; }
          else if(f.field==='called'){ act=d().aCalled(nm,f.value); icon=I.name; }
          else if(NAMEFIELDS.includes(f.field)){ act=d().aName(nm,f.value); icon=I.name; }
          else if(f.field==='lived'||f.field==='pbirth'){ act=d().aPlace(nm); icon=I.place; }
          else { act=d().aDetail(nm); icon=I.book; }
          entries.push({ts,act,icon,prov,label:pub?d().provWords:label});
        }
      }
    }catch(e){}

    // 3) memories you added : artefacts uploaded by this account (contributor_user, Rule 6)
    try{
      const {data:arts,error}=await sb.from('artefacts')
        .select('id,metadata,created_at,pub_status,contributor_user').eq('contributor_user',user.id);
      if(!error && arts){
        for(const a of arts){
          const ts=new Date(a.created_at||Date.now()).getTime();
          const m=a.metadata||{}; const cap=[m.when,m.where].filter(Boolean).join(' · ');
          const pub=a.pub_status==null||a.pub_status==='published'||a.pub_status==='approved';
          const prov=pub?'gold':'wait'; const label=pub?d().provWords:d().provWaiting;
          entries.push({ts, act:d().aPhoto(cap), icon:I.photo, prov, label}); counts.mem++;
        }
      }
    }catch(e){}

    // 4) people you welcomed : rows this account created (best-effort; skipped if no such column)
    try{
      const {data:ppl,error}=await sb.from('people')
        .select('id,display_name,created_at,created_by').eq('created_by',user.id);
      if(!error && ppl){
        for(const p of ppl){
          const ts=new Date(p.created_at||Date.now()).getTime();
          entries.push({ts, act:d().aWelcome(p.display_name||d().aSomeone), icon:I.face, prov:'gold', label:d().provBrought}); counts.people++;
        }
      }
    }catch(e){}

    entries.sort((a,b)=>b.ts-a.ts);
  }

  /* ---------- render ---------- */
  function topbar(){ const L=d();
    return `<button class="ibtn" data-back aria-label="Back">${sv(state.lang==='he'?'<path d="M9 18l6-6-6-6"/>':I.back,1.7)}</button>`
      +`<div class="ttl"><div class="k">${esc(L.eyebrow)}</div><div class="n serif">${esc(L.title)}</div></div>`
      +`<button class="langpill" data-lang-open>${state.lang.toUpperCase()} ${sv(I.chev,1.7)}</button>`;
  }

  function entryHTML(e, fresh){
    const objIcon = e.prov; // gold|cool|wait tint
    return `<div class="entry${fresh?' fresh':''}">`
      +`<div class="node ${e.prov}">${sv(e.icon,1.6)}</div>`
      +`<div class="ecard"><div class="obj glyph ${objIcon}">${sv(e.icon,1.5)}</div><div class="eb">`
      +`<div class="when">${esc(e.when)}</div>`
      +`<div class="act">${e.act}</div>`
      +`<span class="prov ${e.prov}"><span class="d"></span>${esc(e.label)}</span>`
      +`</div></div></div>`;
  }

  function renderEmpty(){ const L=d();
    return `<div class="empty"><div class="spine2"></div>`
      +`<div class="seed">${sv(I.seed,1.5)}</div>`
      +`<div class="et">${L.eTitle}</div>`
      +`<div class="es">${esc(L.eSub)}</div>`
      +`<a class="cta" href="contribute-add-real.html">${sv(I.plus,2)} ${esc(L.eCta)}</a>`
      +`<div class="hints">`
      +`<div class="hint"><span class="hi">${sv(I.photo,1.6)}</span><span>${L.eH1}</span></div>`
      +`<div class="hint"><span class="hi">${sv(I.face,1.6)}</span><span>${L.eH2}</span></div>`
      +`<div class="hint"><span class="hi">${sv(I.star,1.6)}</span><span>${L.eH3}</span></div>`
      +`</div>`
      +`<div class="foot"><div class="l">${esc(L.eFoot)}</div></div></div>`;
  }

  function renderLog(){ const L=d();
    const total=entries.length;
    const anyWait=entries.some(e=>e.prov==='wait');
    let groups=[]; let cur=null;
    entries.forEach(e=>{ const dk=dayKey(e.ts); e.when=timeLabel(e.ts);
      if(!cur||cur.key!==dk.k){ cur={key:dk.k,label:dk.label,items:[]}; groups.push(cur); } cur.items.push(e); });
    let firstDone=false;
    const tl=groups.map(g=>{
      const items=g.items.map(e=>{ const h=entryHTML(e,!firstDone); firstDone=true; return h; }).join('');
      return `<div class="day"><div class="daylabel">${esc(g.label)}</div>${items}</div>`;
    }).join('');
    return `<div class="warm">${esc(L.warm(total))}</div>`
      +`<div class="warmsub">${anyWait?L.warmsubWait:esc(L.warmsub)}</div>`
      +`<div class="season">`
      +`<div class="scard"><div class="num g">${counts.mem}</div><div class="lb">${esc(L.cMem)}</div></div>`
      +`<div class="scard"><div class="num">${counts.people}</div><div class="lb">${esc(L.cPeople)}</div></div>`
      +`<div class="scard"><div class="num c">${counts.games}</div><div class="lb">${esc(L.cGames)}</div></div>`
      +`</div>`
      +`<div class="sec">${esc(L.thread)} <span class="line"></span></div>`
      +`<div class="timeline"><div class="spine">${reduceMotion?'':'<span class="trace"></span>'}</div>${tl}</div>`
      +`<div class="foot"><div class="l">${esc(L.foot)}</div></div>`;
  }

  function langSheet(){ const L=d();
    return `<div class="grip"></div><h3>${esc(L.langtitle)}</h3><div class="sub">${esc(L.langsub)}</div>`
      +LANGS.map(l=>`<button class="lang-opt ${l===state.lang?'on':''}" data-lang="${l}"><div><div class="native">${esc(T[l].native)}</div><div class="en">${esc(T[l].label)}</div></div><span class="tick">${sv(I.check,2)}</span></button>`).join('');
  }

  function render(){ const L=d();
    document.documentElement.lang=state.lang; document.documentElement.dir=L.dir;
    $('.screen').setAttribute('dir',L.dir);
    $('.topbar').innerHTML=topbar();
    $('.pad').innerHTML = entries.length ? renderLog() : renderEmpty();
    $('.sheet[data-sheet="lang"]').innerHTML=langSheet();
    wire();
  }

  /* ---------- interactions ---------- */
  function openSheet(){ $('.scrim').classList.add('show'); $('.sheet[data-sheet="lang"]').classList.add('show'); }
  function closeSheet(){ $('.scrim').classList.remove('show'); $('.sheet[data-sheet="lang"]').classList.remove('show'); }
  window.__lfClose=function(){ if($('.sheet[data-sheet="lang"]').classList.contains('show')){ closeSheet(); return true; } return false; };

  function wire(){
    const back=$('[data-back]'); if(back) back.onclick=()=>{ if(window.__lfClose&&window.__lfClose())return; history.back(); };
    const lo=$('[data-lang-open]'); if(lo) lo.onclick=openSheet;
    $('.scrim').onclick=closeSheet;
    $$('.lang-opt').forEach(b=>b.onclick=async()=>{ state.lang=b.dataset.lang; closeSheet();
      try{ localStorage.setItem('lf_lang',state.lang); }catch(e){}
      if(user){ try{ await sb.from('profiles').update({preferred_lang:state.lang}).eq('id',user.id); }catch(e){} }
      render(); });
  }

  /* ---------- sign-in gate ---------- */
  function showGate(){ const L=d();
    const g=document.createElement('div'); g.id='gate';
    g.style.cssText='position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,7,14,.86);backdrop-filter:blur(6px)';
    g.innerHTML=`<div style="width:100%;max-width:320px;background:linear-gradient(180deg,#0f1e33,#081120);border:1px solid var(--hair);border-radius:20px;padding:22px">
      <div class="serif" style="font-size:22px;color:#fbf5e8;margin-bottom:4px">${esc(L.title)}</div>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 16px">${esc(L.keeper)}</div>
      <input id="gEmail" type="email" placeholder="you@example.com" style="width:100%;margin-bottom:10px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px">
      <input id="gPass" type="password" placeholder="••••••••" style="width:100%;margin-bottom:12px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px">
      <button id="gBtn" style="width:100%;padding:14px;border-radius:13px;border:none;cursor:pointer;font-weight:600;font-size:14px;background:linear-gradient(180deg,var(--edit-hi),var(--edit));color:#1a0f2e">${esc(L.signin)}</button>
      <div id="gErr" style="color:#ff9a8a;font-size:12px;min-height:16px;margin-top:8px"></div></div>`;
    $('#dev').appendChild(g);
    $('#gBtn').onclick=async()=>{ const {error}=await sb.auth.signInWithPassword({email:$('#gEmail').value.trim(),password:$('#gPass').value}); if(error){ $('#gErr').textContent=error.message; return; } g.remove(); boot(); };
  }

  async function boot(){
    const {data:{session}}=await sb.auth.getSession();
    const stored=localStorage.getItem('lf_lang'); if(stored&&T[stored]) state.lang=stored;
    else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    if(!session){ render(); showGate(); return; }
    user=session.user;
    try{ const {data:pr}=await sb.from('profiles').select('preferred_lang').eq('id',user.id).maybeSingle();
      if(pr&&pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; }catch(e){}
    await loadData(); render();
  }
  boot();
})();
</script>
