<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Living Forest — add a memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff; --leaf:#8fd6a0; --autotr:#9a8bbd; --coral:#ff8a80;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center; gap:0; padding:0;
    background:radial-gradient(150% 100% at 50% -6%, #191233 0%, #0b0e22 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; position:relative; overflow-x:hidden; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .screen[dir="rtl"]{ direction:rtl; }
  .screen[dir="rtl"] .serif,.screen[dir="rtl"] .warm,.screen[dir="rtl"] .dz .dzt,.screen[dir="rtl"] .telling textarea,.screen[dir="rtl"] .ttl .n{ font-family:'Frank Ruhl Libre','Newsreader',serif; }
  .screen[dir="rtl"] .ibtn.back svg,.screen[dir="rtl"] .ar,.screen[dir="rtl"] .voiceadd .arw{ transform:scaleX(-1); }

  /* ===== ALIVE : page-wide drifting colour behind the device ===== */
  .pageatmo{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .pageatmo span{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; mix-blend-mode:screen; }
  .pageatmo .p1{ width:46vw; height:46vw; left:-8vw; top:-10vh; background:radial-gradient(circle, rgba(201,162,255,.5), transparent 66%); animation:auraDrift 42s ease-in-out infinite; }
  .pageatmo .p2{ width:44vw; height:44vw; right:-10vw; top:8vh; background:radial-gradient(circle, rgba(127,180,216,.55), transparent 66%); animation:auraDrift2 50s ease-in-out infinite; }
  .pageatmo .p3{ width:52vw; height:52vw; left:24vw; bottom:-24vh; background:radial-gradient(circle, rgba(243,205,132,.42), transparent 66%); animation:auraDrift 58s ease-in-out infinite reverse; }

  .stagewrap{ display:flex; flex-direction:column; align-items:center; gap:0; width:100%; position:relative; z-index:2; }
  .device{ position:relative; width:100vw; height:100dvh; overflow:hidden; flex:0 0 auto; background:#04070e; }

  /* ===== ALIVE : in-device atmosphere — SIGNATURE = drifting photographic bokeh + soft aurora ===== */
  .atmo{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .aur{ position:absolute; border-radius:50%; filter:blur(46px); opacity:.55; mix-blend-mode:screen; }
  .aur.a1{ width:300px; height:300px; left:-70px; top:-46px; background:radial-gradient(circle, rgba(201,162,255,.82), transparent 68%); animation:auraDrift 24s ease-in-out infinite; }
  .aur.a2{ width:340px; height:340px; right:-96px; top:150px; background:radial-gradient(circle, rgba(127,180,216,.8), transparent 66%); animation:auraDrift2 29s ease-in-out infinite; }
  .aur.a3{ width:290px; height:290px; left:-44px; bottom:-56px; background:radial-gradient(circle, rgba(243,205,132,.72), transparent 66%); animation:auraDrift 33s ease-in-out infinite reverse; }
  .bokeh{ position:absolute; inset:-8%; z-index:1; pointer-events:none; }
  .bokeh b{ position:absolute; border-radius:50%; mix-blend-mode:screen; opacity:0; filter:blur(1.5px);
    box-shadow:inset 0 0 12px rgba(255,255,255,.28); animation:boFloat linear infinite; }
  .bokeh b::after{ content:""; position:absolute; inset:22%; border-radius:50%; background:rgba(255,255,255,.14); }
  .b1{ width:78px; height:78px; left:8%;  background:radial-gradient(circle at 38% 34%, rgba(255,230,173,.55), rgba(243,205,132,.16) 62%, transparent 72%); border:1px solid rgba(255,230,173,.22); animation-duration:26s; animation-delay:-3s; }
  .b2{ width:120px; height:120px; left:60%; background:radial-gradient(circle at 38% 34%, rgba(221,198,255,.5), rgba(201,162,255,.14) 62%, transparent 72%); border:1px solid rgba(221,198,255,.2); animation-duration:34s; animation-delay:-11s; }
  .b3{ width:54px; height:54px; left:32%; background:radial-gradient(circle at 38% 34%, rgba(169,210,238,.55), rgba(127,180,216,.15) 62%, transparent 72%); border:1px solid rgba(169,210,238,.22); animation-duration:22s; animation-delay:-7s; }
  .b4{ width:96px; height:96px; left:78%; background:radial-gradient(circle at 38% 34%, rgba(255,138,128,.4), rgba(255,138,128,.12) 62%, transparent 72%); border:1px solid rgba(255,138,128,.18); animation-duration:38s; animation-delay:-19s; }
  .b5{ width:40px; height:40px; left:16%; background:radial-gradient(circle at 38% 34%, rgba(255,230,173,.6), rgba(243,205,132,.16) 62%, transparent 72%); border:1px solid rgba(255,230,173,.24); animation-duration:19s; animation-delay:-2s; }
  .b6{ width:150px; height:150px; left:44%; background:radial-gradient(circle at 38% 34%, rgba(201,162,255,.36), rgba(201,162,255,.1) 62%, transparent 72%); border:1px solid rgba(221,198,255,.16); animation-duration:44s; animation-delay:-25s; }
  .b7{ width:64px; height:64px; left:88%; background:radial-gradient(circle at 38% 34%, rgba(169,210,238,.5), rgba(127,180,216,.14) 62%, transparent 72%); border:1px solid rgba(169,210,238,.2); animation-duration:30s; animation-delay:-14s; }
  .stars{ position:absolute; inset:0; z-index:0; opacity:.5; animation:twinkle 7s ease-in-out infinite;
    background-image:radial-gradient(1px 1px at 18% 12%, #cfe0ff88, transparent), radial-gradient(1px 1px at 66% 7%, #cfe0ff66, transparent),
      radial-gradient(1px 1px at 84% 26%, #ddc6ff55, transparent), radial-gradient(1px 1px at 30% 40%, #cfe0ff44, transparent),
      radial-gradient(1px 1px at 10% 58%, #cfe0ff44, transparent), radial-gradient(1px 1px at 88% 62%, #cfe0ff44, transparent); }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 70% at 50% 6%, rgba(201,162,255,.05), transparent 42%), radial-gradient(120% 92% at 50% 42%, transparent 26%, rgba(4,7,14,.6) 100%); }
  @keyframes auraDrift{ 0%{transform:translate(0,0) scale(1);} 50%{transform:translate(6%,-4%) scale(1.16);} 100%{transform:translate(0,0) scale(1);} }
  @keyframes auraDrift2{ 0%{transform:translate(0,0) scale(1.05);} 50%{transform:translate(-7%,5%) scale(1.24);} 100%{transform:translate(0,0) scale(1.05);} }
  @keyframes boFloat{ 0%{ transform:translate(0,108%) scale(.7); opacity:0; }
    12%{ opacity:.85; } 50%{ transform:translate(-8%,44%) scale(1.06); opacity:.7; }
    88%{ opacity:.65; } 100%{ transform:translate(6%,-24%) scale(1.14); opacity:0; } }
  @keyframes twinkle{ 0%,100%{opacity:.36;} 50%{opacity:.64;} }

  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; display:flex; flex-direction:column; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ padding:0 18px calc(46px + env(safe-area-inset-bottom)); max-width:460px; width:100%; margin:0 auto; }

  .topbar{ position:sticky; top:0; z-index:14; display:flex; align-items:center; gap:10px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 11px; background:linear-gradient(to bottom, rgba(7,9,22,.92), rgba(7,9,22,.5) 68%, transparent); backdrop-filter:blur(9px); max-width:460px; width:100%; margin:0 auto; }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--cream); transition:border-color .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); } .ibtn svg{ width:18px; height:18px; }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .ttl{ flex:1; min-width:0; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }
  .langwrap{ position:relative; flex:0 0 auto; }
  .langpill{ display:inline-flex; align-items:center; gap:6px; font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:8px 11px; border-radius:99px; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--muted); }
  .langpill svg{ width:12px; height:12px; }
  .langmenu{ position:absolute; inset-inline-end:0; top:calc(100% + 6px); z-index:40; background:linear-gradient(180deg,#0f1e33,#081120); border:1px solid var(--hair); border-radius:14px; padding:6px; box-shadow:0 24px 60px -24px #000; min-width:150px; display:none; }
  .langmenu.open{ display:block; }
  .langmenu button{ display:flex; align-items:center; gap:10px; width:100%; padding:10px 12px; border-radius:10px; background:transparent; border:none; color:var(--cream); cursor:pointer; text-align:start; font-family:'Hanken Grotesk',sans-serif; }
  .langmenu button:hover,.langmenu button.on{ background:rgba(243,205,132,.1); }
  .langmenu button .nv{ font-family:'Newsreader',serif; font-size:16px; } .langmenu button .en{ font-size:11px; color:var(--muted); margin-inline-start:auto; }

  /* progress dots — the flow's spine */
  .steps{ display:flex; align-items:center; gap:7px; padding:2px; margin:6px 2px 6px; }
  .steps .st{ height:4px; border-radius:99px; flex:1; background:rgba(255,255,255,.09); overflow:hidden; }
  .steps .st.on{ background:linear-gradient(90deg,var(--gold),var(--gold-hi)); box-shadow:0 0 12px -2px rgba(243,205,132,.7); }
  .steps .st.now{ background:rgba(243,205,132,.28); position:relative; }
  .steps .st.now::after{ content:""; position:absolute; inset:0; width:45%; background:linear-gradient(90deg,var(--gold),var(--gold-hi)); border-radius:99px; animation:stepPulse 2.4s ease-in-out infinite; }
  @keyframes stepPulse{ 0%,100%{ opacity:.6; transform:translateX(0);} 50%{ opacity:1; transform:translateX(120%);} }

  .keeper-note{ display:flex; align-items:center; gap:9px; margin:2px 0 12px; padding:10px 13px; border-radius:12px; background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.3); backdrop-filter:blur(4px); }
  .keeper-note svg{ width:16px; height:16px; color:var(--edit); flex:0 0 auto; }
  .keeper-note span{ font-size:11.5px; color:#cbbce6; line-height:1.35; }

  .warm{ font-family:'Newsreader',serif; font-size:23px; line-height:1.28; color:#f6efe0; margin:12px 2px 4px; }
  .warm em{ font-style:italic; color:var(--gold-hi); }
  .warmsub{ font-size:13px; color:var(--muted); line-height:1.5; margin:0 2px 18px; }

  /* ===== THE DROPZONE ===== */
  .dz{ position:relative; border-radius:22px; padding:38px 22px 34px; text-align:center; cursor:pointer; overflow:hidden;
    background:radial-gradient(120% 90% at 50% 8%, rgba(243,205,132,.1), rgba(11,15,32,.5) 62%);
    border:1.5px dashed rgba(243,205,132,.5); box-shadow:0 0 40px -20px rgba(243,205,132,.7); animation:dzGlow 5s ease-in-out infinite; }
  .dz.drag{ border-color:rgba(243,205,132,.9); box-shadow:0 0 54px -8px rgba(243,205,132,.9); }
  @keyframes dzGlow{ 0%,100%{ box-shadow:0 0 34px -22px rgba(243,205,132,.6); border-color:rgba(243,205,132,.42);} 50%{ box-shadow:0 0 54px -12px rgba(243,205,132,.85); border-color:rgba(243,205,132,.66);} }
  .dz .halo{ position:absolute; inset:0; pointer-events:none; background:radial-gradient(60% 44% at 50% 30%, rgba(243,205,132,.14), transparent 70%); }
  .dz .lens{ position:relative; width:92px; height:92px; margin:0 auto 18px; border-radius:26px; display:grid; place-items:center;
    background:linear-gradient(180deg, rgba(243,205,132,.16), rgba(243,205,132,.05)); border:1px solid rgba(243,205,132,.4); color:var(--gold-hi);
    animation:lensFloat 6s ease-in-out infinite; }
  .dz .lens svg{ width:42px; height:42px; }
  .dz .lens::before{ content:""; position:absolute; inset:-10px; border-radius:32px; border:1px solid rgba(243,205,132,.3); animation:lensRing 4.5s ease-out infinite; }
  @keyframes lensFloat{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
  @keyframes lensRing{ 0%{ transform:scale(.9); opacity:.7;} 100%{ transform:scale(1.28); opacity:0;} }
  .dz .dzt{ font-family:'Newsreader',serif; font-size:22px; color:#fbf5e8; line-height:1.2; }
  .dz .dzs{ font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.5; }
  .dz .dzbtns{ display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
  .dz .db{ display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; padding:10px 15px; border-radius:99px; border:1px solid rgba(243,205,132,.4); background:rgba(243,205,132,.1); color:var(--gold-hi); cursor:pointer; }
  .dz .db svg{ width:15px; height:15px; }
  .dz .db.ghost{ border-color:var(--hair); background:rgba(255,255,255,.03); color:var(--muted); }
  .altway{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px; font-size:12.5px; color:var(--muted); cursor:pointer; }
  .altway b{ color:var(--edit-hi); font-weight:600; }
  .altway svg{ width:14px; height:14px; color:var(--edit); }

  /* ===== THE DEVELOPED PHOTOGRAPH ===== */
  .photohero{ position:relative; border-radius:16px; overflow:hidden; margin:4px 0 2px;
    border:1px solid rgba(255,244,214,.85); box-shadow:0 0 22px -6px rgba(255,232,180,.6), 0 26px 70px -44px #000; }
  .photohero .ph{ display:block; width:100%; height:230px; overflow:hidden; animation:developIn 2.8s ease both; }
  .photohero .ph img{ width:100%; height:100%; object-fit:cover; display:block; }
  @keyframes developIn{ 0%{ filter:blur(16px) brightness(.4) saturate(.4) sepia(.4); transform:scale(1.06); opacity:.2; }
    55%{ filter:blur(5px) brightness(.8) saturate(.7) sepia(.15); opacity:.9; }
    100%{ filter:blur(0) brightness(1) saturate(1) sepia(0); transform:scale(1); opacity:1; } }
  .photohero .devsheen{ position:absolute; inset:0; pointer-events:none; background:linear-gradient(115deg, transparent 30%, rgba(255,246,224,.28) 48%, transparent 62%); transform:translateX(-120%); animation:sheen 2.8s ease-out 1; }
  @keyframes sheen{ 0%{ transform:translateX(-120%);} 70%{ transform:translateX(120%);} 100%{ transform:translateX(120%); opacity:0; } }
  .photohero .repl{ position:absolute; bottom:12px; inset-inline-end:12px; display:inline-flex; align-items:center; gap:7px; padding:8px 12px; border-radius:99px; cursor:pointer;
    background:rgba(6,10,22,.7); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.22); color:var(--cream); font-size:11.5px; font-weight:600; }
  .photohero .repl svg{ width:14px; height:14px; }

  .fieldlab{ display:flex; align-items:center; gap:8px; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:20px 2px 9px; }
  .fieldlab .lp{ width:6px; height:6px; border-radius:2px; transform:rotate(45deg); }
  .fieldlab .lp.g{ background:var(--gold); box-shadow:0 0 7px 1px var(--gold); }
  .fieldlab .lp.v{ background:var(--edit); box-shadow:0 0 7px 1px var(--edit); }
  .fieldlab .opt{ margin-inline-start:auto; letter-spacing:.1em; color:var(--dim); }

  .telling{ border-radius:16px; padding:15px 16px; background:rgba(10,12,28,.66); border:1px solid rgba(243,205,132,.42); box-shadow:0 0 26px -16px rgba(243,205,132,.6); }
  .telling textarea{ width:100%; min-height:92px; resize:none; background:none; border:none; outline:none; color:#f7edda; font-family:'Newsreader',serif; font-size:19px; line-height:1.45; -webkit-user-select:text; user-select:text; }
  .telling textarea::placeholder{ color:#66788f; font-style:italic; }
  .telling .quill{ display:flex; align-items:center; gap:8px; margin-top:6px; font-size:11px; color:var(--gold); }
  .telling .quill .flame{ width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 9px 2px rgba(243,205,132,.8); animation:flick 3.4s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{opacity:.7; transform:scale(.9);} 45%{opacity:1; transform:scale(1.14);} }

  .softgrid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .softchip{ display:flex; align-items:center; gap:11px; padding:13px 14px; border-radius:14px; cursor:pointer; text-align:start; width:100%;
    background:rgba(11,15,32,.55); border:1px solid var(--hair); transition:border-color .2s; }
  .softchip:hover{ border-color:rgba(243,205,132,.4); }
  .softchip.filled{ border-color:rgba(243,205,132,.4); background:rgba(243,205,132,.06); }
  .softchip .si{ width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center; background:rgba(243,205,132,.1); border:1px solid rgba(243,205,132,.28); color:var(--gold-hi); }
  .softchip.empty .si{ background:rgba(255,255,255,.04); border-color:var(--hair); color:var(--dim); }
  .softchip .si svg{ width:16px; height:16px; }
  .softchip .sk{ font-family:'Azeret Mono',monospace; font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); display:block; }
  .softchip .sv{ font-family:'Newsreader',serif; font-size:16px; color:#f3e7cd; margin-top:2px; display:block; }
  .softchip.empty .sv{ color:var(--dim); font-style:italic; }
  .softedit{ margin-top:11px; display:none; gap:9px; }
  .softedit.open{ display:grid; grid-template-columns:1fr 1fr; }
  .softedit input{ background:rgba(8,16,28,.66); border:1px solid var(--hair); border-radius:12px; padding:11px 12px; color:var(--cream); font-family:'Newsreader',serif; font-size:15px; width:100%; }
  .softedit input:focus{ outline:none; border-color:rgba(243,205,132,.5); }

  /* ===== WHO IS IN IT ===== */
  .tagstrip{ position:relative; border-radius:14px; overflow:hidden; height:150px; margin-bottom:12px; border:1px solid rgba(255,244,214,.7); }
  .tagstrip img{ width:100%; height:100%; object-fit:cover; display:block; }
  .search{ display:flex; align-items:center; gap:10px; padding:13px 15px; border-radius:14px; background:rgba(10,12,28,.7); border:1px solid rgba(243,205,132,.42); }
  .search svg{ width:17px; height:17px; color:var(--gold-hi); flex:0 0 auto; }
  .search input{ flex:1; min-width:0; background:none; border:none; outline:none; color:var(--cream); font-family:'Newsreader',serif; font-size:17px; -webkit-user-select:text; user-select:text; }
  .search input::placeholder{ color:#5f7089; }
  .picked{ display:flex; flex-wrap:wrap; gap:9px; margin-top:13px; }
  .pchip{ display:inline-flex; align-items:center; gap:8px; padding:7px 12px 7px 10px; border-radius:99px; background:rgba(243,205,132,.1); border:1px solid rgba(243,205,132,.42); }
  .pchip .av{ width:24px; height:24px; border-radius:50%; overflow:hidden; flex:0 0 auto; display:grid; place-items:center; font-family:'Azeret Mono',monospace; font-size:11px; color:#1a1206; }
  .pchip .nm{ font-family:'Newsreader',serif; font-size:14.5px; color:#fbf5e8; }
  .pchip .x{ color:var(--gold); display:grid; place-items:center; cursor:pointer; } .pchip .x svg{ width:13px; height:13px; }
  .pchip.newp{ background:rgba(201,162,255,.1); border-color:rgba(201,162,255,.42); }
  .pchip.newp .nm{ color:var(--edit-hi); } .pchip.newp .x{ color:var(--edit); }
  .suglab{ font-family:'Azeret Mono',monospace; font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:18px 2px 10px; }
  .sugrow{ display:flex; flex-direction:column; gap:8px; }
  .sug{ display:flex; align-items:center; gap:11px; width:100%; padding:9px 12px; border-radius:12px; cursor:pointer; text-align:start;
    background:transparent; border:1px solid var(--hair); color:var(--cream); transition:border-color .2s; }
  .sug:hover{ border-color:rgba(243,205,132,.4); }
  .sug .av{ width:36px; height:36px; border-radius:50%; overflow:hidden; flex:0 0 auto; border:1px solid var(--hair); display:grid; place-items:center; font-family:'Azeret Mono',monospace; font-size:14px; color:#1a1206; }
  .sug .sn{ flex:1; font-family:'Newsreader',serif; font-size:16px; color:#f3e7cd; }
  .sug .plus{ color:var(--gold-hi); } .sug .plus svg{ width:17px; height:17px; }
  .sug.newp .av{ background:rgba(201,162,255,.12); border-color:rgba(201,162,255,.36); color:var(--edit-hi); }
  .sug.newp .sn{ color:var(--edit-hi); } .sug.newp .plus{ color:var(--edit-hi); }
  .connect{ display:flex; align-items:flex-start; gap:9px; margin-top:14px; padding:11px 13px; border-radius:12px; background:rgba(243,205,132,.05); border:1px solid rgba(243,205,132,.24); }
  .connect svg{ width:15px; height:15px; color:var(--gold-hi); flex:0 0 auto; margin-top:1px; }
  .connect span{ font-size:11.5px; color:#e2d3ae; line-height:1.45; } .connect b{ color:var(--gold-hi); }

    const c=cols[h%cols.length]; return 'linear-gradient(180deg,'+c[0]+','+c[1]+')';
  }
  const initial=name=>{ const s=(name||'?').trim(); return s?s[0].toUpperCase():'?'; };

  /* ---------- language ---------- */
  function buildLangMenu(){
    const m=$('#langMenu'); m.innerHTML=LANGS.map(l=>'<button data-l="'+l+'" class="'+(l===M.lang?'on':'')+'"><span class="nv">'+T[l].native+'</span><span class="en">'+T[l].enLabel+'</span></button>').join('');
    m.querySelectorAll('button').forEach(b=>b.onclick=()=>{ setLang(b.dataset.l); m.classList.remove('open'); });
  }
  async function setLang(l){
    if(!T[l]) return; M.lang=l; L=T[l];
    try{ localStorage.setItem('lf_lang',l); }catch(e){}
    document.documentElement.lang=l; document.documentElement.dir=T[l].dir;
    $('#screen').setAttribute('dir',T[l].dir);
    $('#langPill').firstChild.nodeValue=l.toUpperCase()+' ';
    buildLangMenu(); render();
    if(M.user){ try{ await sb.from('profiles').update({preferred_lang:l}).eq('id',M.user.id); }catch(e){} }
  }

  /* ---------- data ---------- */
  async function loadPeople(){
    try{
      const {data}=await sb.from('people').select('id,display_name').eq('status','published').order('display_name');
      M.people=(data||[]).filter(p=>p.display_name);
    }catch(e){ M.people=[]; }
  }

  /* ---------- step navigation ---------- */
  const ORDER=['invite','develop','who','teller'];

  function goBack(){
    if(M.step==='develop') return go('invite');
    if(M.step==='who') return go('develop');
    if(M.step==='teller') return go('who');
    if(M.step==='voice') return go(M.fromReturn);
    if(M.step==='receipt'){ resetAll(); return go('invite'); }
    // invite → leave to hub
    location.href='contribute-real.html';
  }

  /* ---------- render dispatcher ---------- */
  function stepDots(active){

  }

    else if(M.step==='who') renderWho();

    else if(M.step==='receipt') renderReceipt();
  }

  /* ---------- 1. INVITE ---------- */
  function renderInvite(){
    $('#pad').innerHTML=

      '</div>'+
      '<div class="altway" id="altVoice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 003-3V7a3 3 0 00-6 0v5a3 3 0 003 3z"/><path d="M6 11a6 6 0 0012 0M12 18v3"/></svg><span>'+L.altway+'</span></div>'+
      '<div class="foot"><div class="l">'+L.footInvite+'</div></div>';

    const fileIn=$('#fileIn');
    $('#dz').onclick=()=>{ fileIn.removeAttribute('capture'); fileIn.click(); };
    $('#dbTake').onclick=e=>{ e.stopPropagation(); fileIn.setAttribute('capture','environment'); fileIn.click(); };
    $('#dbChoose').onclick=e=>{ e.stopPropagation(); fileIn.removeAttribute('capture'); fileIn.click(); };
    $('#altVoice').onclick=()=>{ M.hasPhoto=false; M.fromReturn='develop'; go('develop'); };

    const dz=$('#dz');
    dz.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
    dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag'); const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f&&/^image\//.test(f.type)) acceptPhoto(f); });

  function acceptPhoto(file){
    if(M.photoURL) try{ URL.revokeObjectURL(M.photoURL); }catch(e){}
    M.photoFile=file; M.photoURL=URL.createObjectURL(file); M.hasPhoto=true;
    go('develop');
  }

  /* ---------- 2. DEVELOP ---------- */
  function renderDevelop(){
    const photo = M.hasPhoto&&M.photoURL ?
      '<div class="photohero"><div class="ph"><img src="'+M.photoURL+'" alt=""></div><div class="devsheen"></div>'+

    const tell=$('#tellIn'); tell.oninput=()=>{ M.telling=tell.value; };

    $('#toWho').onclick=()=>go('who');

  function softChip(k,label,val,empty){

  function renderPicked(){

  function renderSug(){

      '<button class="sug" data-id="'+p.id+'" data-nm="'+esc(p.display_name)+'"><span class="av" style="background:'+avatarBG(p.display_name)+'">'+esc(initial(p.display_name))+'</span><span class="sn">'+esc(p.display_name)+'</span><span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></button>'

    const exists=q && M.people.some(p=>p.display_name.toLowerCase()===q);
    const proposeName=(M.searchQ||'').trim();
    h+= '<button class="sug newp" id="proposeNew"><span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M19 4v4M17 6h4"/></svg></span><span class="sn">'+(proposeName&&!exists?esc(L.proposeAs)+' “'+esc(proposeName)+'”':esc(L.proposeNew))+'</span><span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></button>';
    row.innerHTML=h;

      let nm=(M.searchQ||'').trim();

      if(!nm) return;
      addSubject(nm,null,true);
    };
  }
  function addSubject(name,id,isNew){
    name=(name||'').trim(); if(!name) return;
    if(id && M.subjects.some(s=>s.id===id)) return;
    if(isNew && M.subjects.some(s=>!s.id && s.name.toLowerCase()===name.toLowerCase())) return;
    M.subjects.push({ key:'k'+(addSubject._n=(addSubject._n||0)+1), name, id:id||null, isNew:!!isNew });
    M.searchQ=''; const si=$('#searchIn'); if(si) si.value='';
    renderPicked(); renderSug();
  }

  /* ---------- 4. WHO IS TELLING IT ---------- */
  function renderTeller(){
    const ts=tellerSubject();
    const av = ts
      ? '<span class="av" style="background:'+avatarBG(ts.name)+'">'+esc(initial(ts.name))+'</span>'
      : '<span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/><circle cx="12" cy="8" r="3.6"/></svg></span>';
    const name = ts?esc(ts.name):esc(L.noTeller);
    const sub = ts?esc(L.toldWords):esc(L.noTellerSub);
    const vdone=!!M.voiceBlob;
    const vN = ts?fmt(L.voiceNScoped,esc(ts.name)):L.voiceN;
    $('#pad').innerHTML=
      stepDots('teller')+
      '<div class="tellcard"><div class="th">'+L.tellTitle+'</div><div class="ts">'+L.tellSub+'</div>'+
        '<div class="tellpick '+(ts?'':'none')+'">'+av+'<span class="tn"><span class="a">'+name+'</span><span class="b">'+sub+'</span></span><span class="chg" id="chgTeller">'+L.change+'</span></div>'+
        '<div class="tellerlist" id="tellerList"></div>'+
      '</div>'+
      '<div class="identity"><span class="ii"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/><circle cx="12" cy="8" r="3.6"/></svg></span><span class="it"><span class="ik">'+L.identK+'</span><span class="iv">'+fmt(L.identV,esc(M.accountName||'—'))+'</span></span></div>'+
      '<div class="fieldlab"><span class="lp v"></span> '+L.addVoiceLab+' <span class="opt">'+L.addVoiceOpt+'</span></div>'+
      '<div class="voiceadd '+(vdone?'done':'')+'" id="voiceAdd"><span class="vi">'+(vdone?
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 003-3V7a3 3 0 00-6 0v5a3 3 0 003 3z"/><path d="M6 11a6 6 0 0012 0M12 18v3"/></svg>')+'</span>'+
        '<span class="vt"><span class="vn">'+(vdone?L.voiceDone:vN)+'</span><span class="vs">'+(vdone?fmt(L.voiceDoneS,fmtDur(M.voiceDur)):L.voiceS)+'</span></span>'+
        '<span class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>'+
      '<button class="primary" id="sendBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l16-7-7 16-2-7z"/></svg> '+L.send+'</button>'+
      (vdone?'':'<button class="ghostbtn" id="skipVoice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg> '+L.skipVoice+'</button>');

    $('#chgTeller').onclick=()=>{ const el=$('#tellerList'); el.classList.toggle('open'); renderTellerList(); };
    $('#voiceAdd').onclick=()=>{ M.fromReturn='teller'; go('voice'); };
    if($('#skipVoice')) $('#skipVoice').onclick=()=>submit();
    $('#sendBtn').onclick=()=>submit();
  }
  function renderTellerList(){
    const el=$('#tellerList'); if(!el) return;
    let h=M.subjects.map(s=>
      '<button class="sug" data-k="'+s.key+'"><span class="av" style="background:'+avatarBG(s.name)+'">'+esc(initial(s.name))+'</span><span class="sn">'+esc(s.name)+'</span>'+(s.key===M.tellerKey?'<span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>':'')+'</button>'
    ).join('');
    h+='<button class="sug" data-k="__none"><span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/><circle cx="12" cy="8" r="3.6"/></svg></span><span class="sn">'+esc(L.noTeller)+'</span></button>';
    el.innerHTML=h;
    el.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{ const k=b.getAttribute('data-k'); M.tellerKey=(k==='__none')?null:k; render(); });
  }
  const fmtDur=s=>{ s=Math.round(s||0); const m=Math.floor(s/60), r=s%60; return m+':'+(r<10?'0':'')+r; };

  /* ---------- 5. RECORD A VOICE ---------- */
  let rec=null, recChunks=[], recTimer=null, recStart=0;
  function renderVoice(){
    const ts=tellerSubject();
    const about = ts?'<div class="aboutchip"><span class="av" style="background:'+avatarBG(ts.name)+'">'+esc(initial(ts.name))+'</span><span class="txt">'+fmt(L.aboutV,esc(ts.name))+'</span></div>'
                    :'<div class="aboutchip"><span class="txt">'+L.aboutVno+'</span></div>';
    const q = ts?fmt(L.promptQnamed,esc(ts.name)):L.promptQ;
    const has=!!M.voiceBlob;
    $('#pad').innerHTML=
      about+
      '<div class="prompt"><div class="pk">'+L.promptK+'</div><div class="pq">'+q+'</div><div class="pn">'+L.promptAnother+'</div></div>'+
      '<div class="recwrap">'+
        '<div class="recbtn" id="recBtn" role="button" aria-label="Record"><div class="core"></div></div>'+
        '<div class="rectimer" id="recTimer" style="'+(has?'':'display:none')+'">'+fmtDur(M.voiceDur)+'</div>'+
        '<div class="rl" id="recLabel">'+L.recStart+'</div>'+
        (has?'<div class="recplay"><audio controls src="'+M.voiceURL+'"></audio></div>':'')+
      '</div>'+
      (has?'<button class="primary violetbtn" id="useRec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> '+L.useRec+'</button>'+
           '<button class="ghostbtn" id="againRec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9M3 3v6h6"/></svg> '+L.recAgain+'</button>' : '')+
      '<div class="reassure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8V6z"/></svg><span>'+L.reassure+'</span></div>'+
      '<div class="foot"><div class="l">'+L.footVoice+'</div></div>';

    $('#recBtn').onclick=toggleRec;
    if($('#useRec')) $('#useRec').onclick=()=>go(M.fromReturn==='invite'?'develop':M.fromReturn);
    if($('#againRec')) $('#againRec').onclick=()=>{ discardVoice(); renderVoice(); };
  }
  function discardVoice(){ if(M.voiceURL) try{ URL.revokeObjectURL(M.voiceURL); }catch(e){} M.voiceBlob=null; M.voiceURL=''; M.voiceDur=0; }
  async function toggleRec(){
    const btn=$('#recBtn');
    if(rec && rec.state==='recording'){ rec.stop(); return; }
    if(!navigator.mediaDevices||!window.MediaRecorder){ toast(L.micErr); return; }
    let stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ toast(L.micErr); return; }
    discardVoice();
    recChunks=[];
    try{ rec=new MediaRecorder(stream); }catch(e){ toast(L.micErr); stream.getTracks().forEach(t=>t.stop()); return; }
    rec.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    rec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(recTimer); recTimer=null;
      const blob=new Blob(recChunks,{type:(rec.mimeType||'audio/webm')});
      M.voiceBlob=blob; M.voiceURL=URL.createObjectURL(blob);
      M.voiceDur=Math.max(1,Math.round((Date.now()-recStart)/1000));
      renderVoice();
    };
    rec.start(); recStart=Date.now();
    btn.classList.add('on');
    $('#recLabel').innerHTML=L.recStop;
    const tm=$('#recTimer'); tm.style.display='';
    recTimer=setInterval(()=>{ tm.textContent=fmtDur((Date.now()-recStart)/1000); },250);
  }

  /* ---------- upload + submit ---------- */
  async function uploadBlob(fileOrBlob,ext){
    const path=M.user.id+'/'+(crypto.randomUUID?crypto.randomUUID():('x'+Date.now()+Math.random().toString(36).slice(2)))+'.'+ext;
    const up=await sb.storage.from('family').upload(path,fileOrBlob,{contentType:(fileOrBlob.type||undefined)});
    if(up.error) throw up.error; return path;
  }
  async function ensurePersonId(sub){
    if(sub.id) return sub.id;
    const found=M.people.find(p=>p.display_name.toLowerCase()===sub.name.toLowerCase());
    if(found){ sub.id=found.id; return found.id; }
    // proposed newcomer → pending (Rule 3); fall back to published if the status enum rejects it
    let ins=await sb.from('people').insert({display_name:sub.name,created_by:M.user.id,status:'in_review'}).select('id,display_name').single();
    if(ins.error){ ins=await sb.from('people').insert({display_name:sub.name,created_by:M.user.id,status:'published'}).select('id,display_name').single(); }
    if(ins.error) throw ins.error;
    M.people.push(ins.data); sub.id=ins.data.id; return ins.data.id;
  }
  let submitting=false;
  async function submit(){
    if(submitting) return;
    const hasContent = M.hasPhoto || (M.telling&&M.telling.trim()) || M.voiceBlob;
    if(!hasContent){ toast(L.needSomething); return; }
    submitting=true;
    const btn=$('#sendBtn'); let old='';
    if(btn){ old=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span> '+L.sending; }
    try{
      // resolve people (creates pending rows for proposed newcomers + teller)
      const teller=tellerSubject();
      let tellerId=null;
      if(teller) tellerId=await ensurePersonId(teller);
      const subjIds=[];
      for(const s of M.subjects){ const id=await ensurePersonId(s); if(subjIds.indexOf(id)<0) subjIds.push(id); }

      const meta={};
      if(M.when&&M.when.trim()) meta.when=M.when.trim();
      if(M.where&&M.where.trim()) meta.where=M.where.trim();

      let photoPath=null;
      if(M.hasPhoto&&M.photoFile){ const ext=(M.photoFile.name.split('.').pop()||'jpg').toLowerCase(); photoPath=await uploadBlob(M.photoFile,ext); }

      const primaryKind = M.hasPhoto?'photo':'text';
      const primary=await sb.from('artefacts').insert({
        kind:primaryKind, storage_path:photoPath, body:(M.telling&&M.telling.trim())||null,
        contributor_id:tellerId, contributor_user:M.user.id, certainty:'remembered',
        status:'in_review', metadata:meta
      }).select('id').single();
      if(primary.error) throw primary.error;
      const artId=primary.data.id;

      // voice as a sibling artefact, independently keeper-gated (violet)
      if(M.voiceBlob){
        const vPath=await uploadBlob(M.voiceBlob,'webm');
        const vmeta=Object.assign({},meta,{voice_dur:M.voiceDur, of:artId});
        await sb.from('artefacts').insert({
          kind:'voice', storage_path:vPath, body:null,
          contributor_id:tellerId, contributor_user:M.user.id, certainty:'remembered',
          status:'in_review', metadata:vmeta
        }).select('id').single().then(r=>{ if(r.error) throw r.error; return r; })
          .then(async r=>{ if(subjIds.length){ const rows=subjIds.map(pid=>({artefact_id:r.data.id,person_id:pid,detail:null})); const s=await sb.from('artefact_subjects').insert(rows); if(s.error) throw s.error; } });
      }

      if(subjIds.length){
        const rows=subjIds.map(pid=>({artefact_id:artId,person_id:pid,detail:null}));
        const s=await sb.from('artefact_subjects').insert(rows);
        if(s.error) throw s.error;
      }
      submitting=false;
      go('receipt');
    }catch(err){
      submitting=false;
      if(btn){ btn.disabled=false; btn.innerHTML=old; }
      toast((err&&err.message)?err.message:L.sendFail);
    }
  }

  /* ---------- 6. RECEIPT ---------- */
  function renderReceipt(){
    const ts=tellerSubject();
    const names=M.subjects.map(s=>s.name);
    const rows=[];
    if(M.hasPhoto) rows.push(gaverow('img',L.glPhoto,L.gvPhoto+(M.when?(' · '+esc(M.when)):'')));
    if(M.telling&&M.telling.trim()) rows.push(gaverow('quote',L.glTelling, ts?fmt(L.gvTellingBy,esc(ts.name)):L.gvTelling));
    if(names.length) rows.push(gaverow('people',L.glWho, names.map(esc).join(' · ')));
    if(M.voiceBlob) rows.push(gaverow('mic',L.glVoice, (ts?esc(ts.name)+' · ':'')+fmtDur(M.voiceDur)));
    $('#pad').innerHTML=
      '<div class="receipt"><div class="rc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l16-7-7 16-2-7z"/></svg></div>'+
        '<div class="rt">'+L.recTitle+'</div><div class="rsub">'+L.recSub+'</div>'+
        '<div class="waitrow"><span class="sp"></span><span>'+L.waiting+'</span></div>'+
      '</div>'+
      '<div class="gavelist">'+rows.join('')+'</div>'+
      '<button class="primary violetbtn" id="addAnother" style="margin-top:20px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> '+L.addAnother+'</button>'+
      '<button class="ghostbtn" id="toHub"><svg class="ar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> '+L.backToHub+'</button>'+
      '<div class="foot"><div class="l">'+L.footReceipt+'</div></div>';
    $('#addAnother').onclick=()=>{ resetAll(); go('invite'); };
    $('#toHub').onclick=()=>{ location.href='contribute-real.html'; };
  }
  function gaverow(ic,label,val){
    const icons={
      img:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M5 17l4-3 3 2 3-3 4 4"/>',
      quote:'<path d="M4 5h16v11H8l-4 4z"/>',
      people:'<circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M3 20c0-3 2.7-5 6-5s6 2 6 5M15 18c.2-1.8 1.6-3 3.4-3"/>',
      mic:'<path d="M12 15a3 3 0 003-3V7a3 3 0 00-6 0v5a3 3 0 003 3z"/><path d="M6 11a6 6 0 0012 0M12 18v3"/>'
    };
    return '<div class="gaverow"><span class="gi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+icons[ic]+'</svg></span>'+
      '<span class="gt"><span class="gl">'+label+'</span><span class="gv">'+val+'</span></span>'+
      '<span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span></div>';
  }

  function resetAll(){
    if(M.photoURL) try{ URL.revokeObjectURL(M.photoURL); }catch(e){}
    discardVoice();
    M.photoFile=null; M.photoURL=''; M.hasPhoto=false;
    M.telling=''; M.when=''; M.where=''; M.whenOpen=false;
    M.subjects=[]; M.tellerKey=null; M.searchQ=''; M.fromReturn='develop';
  }

  /* ---------- wire once ---------- */
  function wireOnce(){
    $('#backBtn').onclick=goBack;
    $('#fileIn').addEventListener('change',e=>{ const f=e.target.files&&e.target.files[0]; e.target.value=''; if(f) acceptPhoto(f); });
    $('#langPill').onclick=e=>{ e.stopPropagation(); $('#langMenu').classList.toggle('open'); };
    document.addEventListener('click',e=>{ if(!e.target.closest('.langwrap')) $('#langMenu').classList.remove('open'); });
  }

  /* ---------- boot ---------- */
  async function boot(){
    const stored=(function(){ try{ return localStorage.getItem('lf_lang'); }catch(e){ return null; } })();
    if(stored&&T[stored]) M.lang=stored;
    else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) M.lang=dl; }
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.replace('index.html'); return; }
    M.user=session.user;
    M.accountName=(session.user.user_metadata&&(session.user.user_metadata.name||session.user.user_metadata.full_name))||
      (session.user.email?session.user.email.split('@')[0]:'')||'—';
    try{
      const {data:pr}=await sb.from('profiles').select('display_name,preferred_lang').eq('id',M.user.id).maybeSingle();
      if(pr){ if(pr.display_name) M.accountName=pr.display_name; if(!stored&&pr.preferred_lang&&T[pr.preferred_lang]) M.lang=pr.preferred_lang; }
    }catch(e){}
    L=T[M.lang];
    document.documentElement.lang=M.lang; document.documentElement.dir=T[M.lang].dir; $('#screen').setAttribute('dir',T[M.lang].dir);
    $('#langPill').firstChild.nodeValue=M.lang.toUpperCase()+' ';
    buildLangMenu();
    await loadPeople();
    render();
  }
  wireOnce(); boot();
})();
</script>
<script src="lf-nav.js" data-here="add" data-parent="contribute-real.html"></script>
