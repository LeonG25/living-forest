<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#140f2b" />
<title>The Living Forest</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"The Living Forest","short_name":"Forest","start_url":".","display":"standalone","background_color":"#140f2b","theme_color":"#140f2b","icons":[]}' />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Nunito:wght@400;500;600;700;800&display=swap');
  :root{
    --night-1:#140f2b; --night-2:#241a46; --panel:#ffffff0d; --panel-line:#ffffff1f;
    --gold:#ffce72; --gold-soft:#ffe6ad; --cream:#f4ecdd; --muted:#a79edl; --muted:#a79ed6;
    --violet:#b58fd8; --good:#7fd9a6; --bad:#ff9a8f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--cream);
    background:radial-gradient(130% 90% at 50% -10%,#2c2152 0%,var(--night-2) 42%,var(--night-1) 82%) fixed;
    min-height:100dvh;
  }
  .disp{font-family:'Fraunces',Georgia,serif;}
  a{color:var(--gold-soft);}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,textarea,select{font-family:inherit;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 120px;}

  /* stars backdrop */
  .stars{position:fixed;inset:0;z-index:-1;overflow:hidden;}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;animation:tw 4s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.18}50%{opacity:.7}}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 2px 16px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .stardot{width:26px;height:26px;flex:none;}
  .brand h1{font-size:19px;margin:0;font-weight:900;letter-spacing:.2px;}
  .who{font-size:12px;color:var(--muted);}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--panel-line);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;}

  .card{background:var(--panel);border:1px solid var(--panel-line);border-radius:20px;padding:18px;margin:14px 0;}
  .eyebrow{text-transform:uppercase;letter-spacing:1.4px;font-size:11px;color:var(--gold);font-weight:800;}
  h2.disp{font-size:24px;margin:6px 0 4px;font-weight:900;}
  .lede{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 8px;}

  label.field{display:block;margin:14px 0 0;}
  label.field > span{display:block;font-size:13px;font-weight:700;color:var(--gold-soft);margin-bottom:6px;}
  input[type=text],input[type=email],input[type=password],textarea,select{
    width:100%;background:#0e0a22;border:1px solid var(--panel-line);border-radius:12px;
    color:var(--cream);padding:12px 13px;font-size:15px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px #ffce7233;}
  textarea{min-height:84px;resize:vertical;line-height:1.5;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2a05;
    font-weight:800;font-size:15px;padding:14px 16px;border-radius:14px;margin-top:18px;}
  .btn:disabled{opacity:.5;}
  .btn.secondary{background:transparent;color:var(--gold-soft);border:1px solid var(--gold);}

  .msg{margin-top:12px;font-size:13.5px;line-height:1.5;padding:10px 12px;border-radius:12px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:#7fd9a615;border:1px solid #7fd9a653;color:var(--good);}
  .msg.err{background:#ff9a8f12;border:1px solid #ff9a8f44;color:var(--bad);}
  .msg.info{background:#b58fd815;border:1px solid #b58fd844;color:var(--violet);}

  /* tabs */
  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:6px;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:#0e0a22e8;
    border-top:1px solid var(--panel-line);backdrop-filter:blur(8px);z-index:5;}
  .tabs button{background:transparent;color:var(--muted);font-weight:800;font-size:12.5px;
    padding:9px 14px;border-radius:999px;}
  .tabs button.active{color:#3a2a05;background:linear-gradient(180deg,var(--gold-soft),var(--gold));}

  /* photo tagging */
  .stage{position:relative;margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid var(--panel-line);touch-action:none;user-select:none;}
  .stage img{display:block;width:100%;pointer-events:none;-webkit-user-drag:none;user-select:none;}
  .stage .box .del{position:absolute;top:-10px;right:-10px;width:22px;height:22px;border-radius:50%;background:#ff9a8f;color:#3a0a05;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;cursor:pointer;box-shadow:0 1px 4px #0007;}
  .stage .box.live{pointer-events:none;}
  .stage .box{position:absolute;border:2px solid var(--gold);border-radius:8px;box-shadow:0 0 0 9999px #14102b00;background:#ffce7218;}
  .stage .box b{position:absolute;top:-9px;left:-2px;transform:translateY(-100%);background:var(--gold);color:#3a2a05;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;white-space:nowrap;}
  .hint{font-size:12.5px;color:var(--muted);margin-top:8px;}
  .taglist{margin-top:6px;}
  .tagrow{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .tagrow .num{width:22px;height:22px;flex:none;border-radius:50%;background:#ffce7222;color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .tagrow input{flex:1;}
  .tagrow .x{flex:none;background:transparent;color:var(--bad);border:1px solid #ff9a8f44;border-radius:10px;padding:8px 10px;font-weight:800;}

  .item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--panel-line);}
  .item:last-child{border-bottom:none;}
  .thumb{width:64px;height:64px;flex:none;border-radius:12px;object-fit:cover;background:#0e0a22;border:1px solid var(--panel-line);}
  .item .meta{font-size:13px;color:var(--muted);line-height:1.4;}
  .item .meta b{color:var(--cream);}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
  .chip{font-size:11px;background:#b58fd81f;border:1px solid #b58fd83a;color:var(--cream);padding:2px 8px;border-radius:999px;}
  .approve{background:var(--good);color:#06351f;font-weight:800;border-radius:10px;padding:8px 12px;font-size:12.5px;margin-top:8px;}
  .empty{color:var(--muted);font-size:14px;line-height:1.5;text-align:center;padding:24px 8px;}
  .pill{display:inline-block;font-size:11px;font-weight:800;color:var(--gold);background:#ffce7218;border:1px solid #ffce7240;border-radius:999px;padding:2px 9px;margin-left:8px;}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #3a2a0566;border-top-color:#3a2a05;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .center{min-height:70dvh;display:flex;flex-direction:column;justify-content:center;}
  .footnote{text-align:center;color:var(--muted);font-size:12px;margin-top:18px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap" id="app"></div>

<datalist id="people-list"></datalist>

<script>
const SUPABASE_URL = 'https://oabcdrktuikifbormjip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MnuwKTP5JaUy-P8-bKWsgA_f98esOXC';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- tiny helpers ----------
const $ = (s, r=document) => r.querySelector(s);
const el = (html) => { const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; };
const esc = (s) => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const star = (sz=26,lit=true)=>`<svg class="stardot" width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none"><path d="M12 2.6l2.5 5.6 6.1.6-4.6 4 1.4 6-5.4-3.2L6.6 18.8l1.4-6-4.6-4 6.1-.6z" fill="${lit?'#ffce72':'#3a2f55'}" stroke="#ffe6ad" stroke-width="${lit?0:1}" opacity="${lit?1:.7}"/></svg>`;

let STATE = { user:null, isKeeper:false, people:[], tab:'contribute' };

// twinkling backdrop
(function(){ const s=$('#stars'); let h=''; for(let i=0;i<46;i++){h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s"></i>`;} s.innerHTML=h; })();

// ---------- auth ----------
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  STATE.user = session?.user || null;
  if(STATE.user){ await afterLogin(); } else { renderAuth(); }
  sb.auth.onAuthStateChange(async (_e, s)=>{
    const u = s?.user||null;
    if(u && (!STATE.user || u.id!==STATE.user.id)){ STATE.user=u; await afterLogin(); }
    if(!u && STATE.user){ STATE.user=null; renderAuth(); }
  });
}

async function afterLogin(){
  // make sure a profile row exists for provenance
  await sb.from('profiles').upsert({ id:STATE.user.id, display_name:STATE.user.email }).select();
  const { data:prof } = await sb.from('profiles').select('is_keeper').eq('id',STATE.user.id).single();
  STATE.isKeeper = !!prof?.is_keeper;
  await loadPeople();
  render();
}

function renderAuth(){
  const app=$('#app'); app.innerHTML='';
  app.append(el(`<div class="center">
    <div style="text-align:center;margin-bottom:6px">${star(40)}</div>
    <h2 class="disp" style="text-align:center;font-size:30px;margin:6px 0 2px">The Living Forest</h2>
    <p class="lede" style="text-align:center">A place where the family becomes stars — lit, one memory at a time.</p>
    <div class="card">
      <label class="field"><span>Your email</span><input id="email" type="email" autocomplete="email" placeholder="you@example.com"/></label>
      <label class="field"><span>Password</span><input id="pw" type="password" autocomplete="current-password" placeholder="at least 6 characters"/></label>
      <button class="btn" id="signin">Sign in</button>
      <button class="btn secondary" id="signup">Create account</button>
      <div class="msg" id="authmsg"></div>
    </div>
    <p class="footnote">Your first sign-in makes you the keeper of the forest.</p>
  </div>`));
  $('#signin').onclick = ()=>auth('in');
  $('#signup').onclick = ()=>auth('up');
}

async function auth(mode){
  const email=$('#email').value.trim(), password=$('#pw').value;
  const m=$('#authmsg');
  if(!email||password.length<6){ return showMsg(m,'err','Enter an email and a password of at least 6 characters.'); }
  showMsg(m,'info','Working…');
  const fn = mode==='up' ? sb.auth.signUp({email,password}) : sb.auth.signInWithPassword({email,password});
  const { data, error } = await fn;
  if(error){
    if(/not confirmed|confirm/i.test(error.message)) showMsg(m,'info','Your account needs confirming. Ask the keeper to confirm it, then tap Sign in.');
    else showMsg(m,'err',error.message);
  } else if(mode==='up' && !data.session){
    showMsg(m,'info','Account created. Now tap Sign in with the same email and password.');
  } else {
    showMsg(m,'info','Signed in\u2026');
  }
}

// ---------- data ----------
async function loadPeople(){
  const { data } = await sb.from('people').select('id,display_name').order('display_name');
  STATE.people = data||[];
  $('#people-list').innerHTML = STATE.people.map(p=>`<option value="${esc(p.display_name)}">`).join('');
}
async function ensurePerson(name){
  name=name.trim();
  const found = STATE.people.find(p=>p.display_name.toLowerCase()===name.toLowerCase());
  if(found) return found.id;
  const { data, error } = await sb.from('people')
    .insert({ display_name:name, created_by:STATE.user.id, status:'published' }).select('id,display_name').single();
  if(error) throw error;
  STATE.people.push(data); return data.id;
}

// ---------- app shell ----------
function render(){
  const app=$('#app'); app.innerHTML='';
  app.append(el(`<header class="top">
    <div class="brand">${star(26)}<h1 class="disp">The Living Forest</h1></div>
    <div style="text-align:right"><div class="who">${esc(STATE.user.email)}</div><button class="ghost" id="out">Sign out</button></div>
  </header>`));
  const body=el('<div id="body"></div>'); app.append(body);
  const tabs=el(`<nav class="tabs">
    <button data-t="contribute">Add a memory</button>
    ${STATE.isKeeper?'<button data-t="review">Review</button>':''}
    <button data-t="forest">The forest</button>
  </nav>`); app.append(tabs);
  tabs.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{STATE.tab=b.dataset.t; paint();}; });
  $('#out').onclick = ()=>sb.auth.signOut();
  paint();
}
function paint(){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.t===STATE.tab));
  const body=$('#body'); body.innerHTML='';
  if(STATE.tab==='contribute') viewContribute(body);
  if(STATE.tab==='review') viewReview(body);
  if(STATE.tab==='forest') viewForest(body);
}

// ---------- CONTRIBUTE ----------
let TAGS=[]; // {box:{x,y,w,h}, name}
function viewContribute(root){
  TAGS=[];
  root.append(el(`<div class="card">
    <div class="eyebrow">Tend the forest</div>
    <h2 class="disp">Add a memory</h2>
    <p class="lede">Choose a photo, mark who's in it, and tell its story. It waits in the queue until you approve it.</p>
    <label class="field"><span>The photo</span><input id="file" type="file" accept="image/*"/></label>
    <div id="stagewrap"></div>
    <div class="taglist" id="taglist"></div>

    <label class="field"><span>Its story — in whose words?</span>
      <textarea id="story" placeholder="What's happening here, who they are, what you remember…"></textarea></label>
    <div class="row">
      <label class="field"><span>Roughly when</span><input id="when" type="text" placeholder="e.g. 1962, or “the 60s”"/></label>
      <label class="field"><span>Where</span><input id="where" type="text" placeholder="e.g. Casablanca"/></label>
    </div>
    <label class="field"><span>How sure are we?</span>
      <select id="certainty">
        <option value="remembered">Remembered — from memory</option>
        <option value="documented">Documented — there's a record</option>
        <option value="uncertain">Uncertain — a guess worth keeping</option>
      </select></label>

    <button class="btn" id="submit">Send to the queue</button>
    <div class="msg" id="cmsg"></div>
  </div>`));

  $('#file').onchange = onFile;
  $('#submit').onclick = submitMemory;
}

function onFile(e){
  const f=e.target.files[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  const wrap=$('#stagewrap'); wrap.innerHTML='';
  const stage=el(`<div class="stage" id="stage"><img id="ph" src="${url}" alt="" draggable="false"/></div>`);
  wrap.append(stage);
  wrap.append(el(`<p class="hint">Drag across each face to mark a person. Each box adds a line below to name them.</p>`));
  enableTagging(stage);
}

function enableTagging(stage){
  let start=null, preview=null;
  const pt=(ev)=>{ const r=stage.getBoundingClientRect(); return { x:(ev.clientX-r.left)/r.width, y:(ev.clientY-r.top)/r.height }; };
  const finish=()=>{
    if(!preview) return;
    const b=preview._box; preview.remove(); preview=null;
    if(b && b.w>0.03 && b.h>0.03){ TAGS.push({box:b,name:''}); }
    renderAll();
  };
  stage.addEventListener('pointerdown',(ev)=>{
    if(ev.target.closest('.box')) return;
    ev.preventDefault();
    start=pt(ev); preview=el('<div class="box live"></div>'); stage.append(preview);
    try{ stage.setPointerCapture(ev.pointerId); }catch(e){}
  });
  stage.addEventListener('pointermove',(ev)=>{
    if(!preview) return;
    const p=pt(ev);
    const x=Math.min(p.x,start.x), y=Math.min(p.y,start.y), w=Math.abs(p.x-start.x), h=Math.abs(p.y-start.y);
    Object.assign(preview.style,{left:x*100+'%',top:y*100+'%',width:w*100+'%',height:h*100+'%'});
    preview._box={x,y,w,h};
  });
  stage.addEventListener('pointerup',finish);
  stage.addEventListener('pointercancel',finish);
  stage.addEventListener('lostpointercapture',finish);
}
function renderAll(){
  const stage=$('#stage');
  if(stage){
    stage.querySelectorAll('.box').forEach(b=>b.remove());
    TAGS.forEach((t,i)=>{
      const b=el(`<div class="box"><b>${i+1}</b><span class="del">\u00d7</span></div>`);
      Object.assign(b.style,{left:t.box.x*100+'%',top:t.box.y*100+'%',width:t.box.w*100+'%',height:t.box.h*100+'%'});
      b.querySelector('.del').onclick=(e)=>{ e.stopPropagation(); TAGS.splice(i,1); renderAll(); };
      stage.append(b);
    });
  }
  const list=$('#taglist'); if(!list) return;
  list.innerHTML = TAGS.length?'<div class="eyebrow" style="margin-bottom:2px">Who is in this photo?</div>':'';
  TAGS.forEach((t,i)=>{
    const row=el(`<div class="tagrow">
      <div class="num">${i+1}</div>
      <input type="text" list="people-list" placeholder="Name this person" value="${esc(t.name)}"/>
      <button class="x">remove</button>
    </div>`);
    row.querySelector('input').oninput=(e)=>{ TAGS[i].name=e.target.value; };
    row.querySelector('.x').onclick=()=>{ TAGS.splice(i,1); renderAll(); };
    list.append(row);
  });
}

async function submitMemory(){
  const m=$('#cmsg');
  const file=$('#file').files[0];
  if(!file) return showMsg(m,'err','Choose a photo first.');
  const named = TAGS.filter(t=>t.name.trim());
  const btn=$('#submit'); btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spin"></span> Sending…';
  try{
    // 1) upload to the private bucket
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${STATE.user.id}/${crypto.randomUUID()}.${ext}`;
    const up=await sb.storage.from('family').upload(path,file,{contentType:file.type});
    if(up.error) throw up.error;
    // 2) the artefact, with provenance + certainty, waiting for review
    const meta={}; const w=$('#when').value.trim(), p=$('#where').value.trim();
    if(w) meta.when=w; if(p) meta.where=p;
    const art=await sb.from('artefacts').insert({
      kind:'photo', storage_path:path, body:$('#story').value.trim()||null,
      contributor_user:STATE.user.id, certainty:$('#certainty').value,
      status:'in_review', metadata:meta
    }).select('id').single();
    if(art.error) throw art.error;
    // 3) the people in it
    if(named.length){
      const rows=[];
      for(const t of named){ const pid=await ensurePerson(t.name); rows.push({artefact_id:art.data.id, person_id:pid, detail:t.box}); }
      const subj=await sb.from('artefact_subjects').insert(rows);
      if(subj.error) throw subj.error;
    }
    showMsg(m,'ok','Sent to the queue. '+(STATE.isKeeper?'Open Review to light it up.':'A keeper will review it soon.'));
    $('#story').value=''; $('#when').value=''; $('#where').value=''; $('#file').value=''; $('#stagewrap').innerHTML=''; TAGS=[]; renderAll();
    await loadPeople();
  }catch(err){ showMsg(m,'err', err.message||'Something went wrong. Nothing was published.'); }
  finally{ btn.disabled=false; btn.textContent=old; }
}

// ---------- REVIEW (keeper) ----------
async function viewReview(root){
  root.append(el(`<div class="card"><div class="eyebrow">Keeper</div><h2 class="disp">Waiting for you</h2>
    <p class="lede">Nothing reaches the children's forest until you approve it.</p><div id="queue"><div class="empty">Looking…</div></div></div>`));
  const { data, error } = await sb.from('artefacts')
    .select('id,body,metadata,certainty,storage_path,created_at, artefact_subjects(detail, people(display_name))')
    .eq('status','in_review').order('created_at',{ascending:false});
  const q=$('#queue');
  if(error){ q.innerHTML=`<div class="empty">${esc(error.message)}</div>`; return; }
  if(!data.length){ q.innerHTML='<div class="empty">The queue is empty. Add a memory and it will appear here.</div>'; return; }
  q.innerHTML='';
  for(const a of data){ q.append(await itemCard(a,true)); }
}

// ---------- FOREST ----------
async function viewForest(root){
  root.append(el(`<div class="card"><div class="eyebrow">What's been lit</div><h2 class="disp">The forest so far</h2>
    <p class="lede">Every published memory, and the people it lit up.</p><div id="list"><div class="empty">Looking…</div></div></div>`));
  const { data, error } = await sb.from('artefacts')
    .select('id,body,metadata,certainty,storage_path,published_at, artefact_subjects(detail, people(display_name))')
    .eq('status','published').order('published_at',{ascending:false});
  const l=$('#list');
  if(error){ l.innerHTML=`<div class="empty">${esc(error.message)}</div>`; return; }
  if(!data.length){ l.innerHTML='<div class="empty">No stars lit yet. The first memory you approve will appear here.</div>'; return; }
  l.innerHTML='';
  for(const a of data){ l.append(await itemCard(a,false)); }
}

async function itemCard(a, keeper){
  let src='';
  try{ const s=await sb.storage.from('family').createSignedUrl(a.storage_path,3600); src=s.data?.signedUrl||''; }catch(e){}
  const names=(a.artefact_subjects||[]).map(s=>s.people?.display_name).filter(Boolean);
  const when=a.metadata?.when, where=a.metadata?.where;
  const sub=[when,where].filter(Boolean).join(' · ');
  const card=el(`<div class="item">
    <img class="thumb" src="${src}" alt=""/>
    <div style="flex:1">
      <div class="meta">${a.body?`<b>${esc(a.body.slice(0,90))}${a.body.length>90?'…':''}</b><br>`:''}${sub?esc(sub)+' · ':''}<span style="opacity:.8">${esc(a.certainty)}</span></div>
      <div class="chips">${names.map(n=>`<span class="chip">${esc(n)}</span>`).join('')||'<span class="chip" style="opacity:.6">no one tagged</span>'}</div>
      ${keeper?'<button class="approve">Light it up ✦</button>':''}
    </div>
  </div>`);
  if(keeper){
    card.querySelector('.approve').onclick=async(ev)=>{
      ev.target.disabled=true; ev.target.innerHTML='<span class="spin"></span>';
      const { error } = await sb.from('artefacts').update({status:'published',published_at:new Date().toISOString()}).eq('id',a.id);
      if(error){ ev.target.textContent=error.message; }
      else { card.style.transition='.4s'; card.style.opacity='0'; setTimeout(()=>card.remove(),400); }
    };
  }
  return card;
}

function showMsg(node,kind,text){ node.className='msg show '+kind; node.textContent=text; }

init();
</script>
</body>
</html>
