<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#140f2b" />
<title>The Living Forest</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"The Living Forest","short_name":"Forest","start_url":".","display":"standalone","background_color":"#140f2b","theme_color":"#140f2b","icons":[]}' />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Nunito:wght@400;500;600;700;800&display=swap');
  :root{
    --night-1:#140f2b; --night-2:#241a46; --panel:#ffffff0d; --panel-line:#ffffff1f;
    --gold:#ffce72; --gold-soft:#ffe6ad; --cream:#f4ecdd; --muted:#a79ed6;
    --violet:#b58fd8; --good:#7fd9a6; --bad:#ff9a8f; --sky:#8fb6d8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Nunito',system-ui,sans-serif;color:var(--cream);
    background:radial-gradient(130% 90% at 50% -10%,#2c2152 0%,var(--night-2) 42%,var(--night-1) 82%) fixed;min-height:100dvh;}
  .disp{font-family:'Fraunces',Georgia,serif;}
  a{color:var(--gold-soft);}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,textarea,select{font-family:inherit;}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 96px;}

  .stars{position:fixed;inset:0;z-index:-1;overflow:hidden;}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;animation:tw 4s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.16}50%{opacity:.66}}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 2px 12px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand h1{font-size:18px;margin:0;font-weight:900;}
  .who{font-size:11px;color:var(--muted);}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--panel-line);border-radius:999px;padding:6px 11px;font-size:12px;font-weight:700;}

  .card{background:var(--panel);border:1px solid var(--panel-line);border-radius:18px;padding:16px;margin:12px 0;}
  .eyebrow{text-transform:uppercase;letter-spacing:1.3px;font-size:11px;color:var(--gold);font-weight:800;}
  h2.disp{font-size:22px;margin:6px 0 4px;font-weight:900;}
  .lede{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0 0 8px;}

  label.field{display:block;margin:12px 0 0;}
  label.field > span{display:block;font-size:12.5px;font-weight:700;color:var(--gold-soft);margin-bottom:5px;}
  input[type=text],input[type=email],input[type=password],input[type=date],input[type=number],textarea,select{
    width:100%;background:#0e0a22;border:1px solid var(--panel-line);border-radius:11px;color:var(--cream);padding:11px 12px;font-size:15px;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px #ffce7233;}
  textarea{min-height:76px;resize:vertical;line-height:1.5;}
  .row{display:flex;gap:9px;}.row>*{flex:1;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2a05;font-weight:800;font-size:15px;padding:13px 15px;border-radius:13px;margin-top:16px;}
  .btn:disabled{opacity:.5;}
  .btn.secondary{background:transparent;color:var(--gold-soft);border:1px solid var(--gold);}
  .btn.danger{background:transparent;color:var(--bad);border:1px solid #ff9a8f66;}
  .btn.sm{width:auto;padding:9px 13px;font-size:13px;margin-top:0;border-radius:11px;}

  .msg{margin-top:11px;font-size:13px;line-height:1.5;padding:9px 11px;border-radius:11px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:#7fd9a615;border:1px solid #7fd9a653;color:var(--good);}
  .msg.err{background:#ff9a8f12;border:1px solid #ff9a8f44;color:var(--bad);}
  .msg.info{background:#b58fd815;border:1px solid #b58fd844;color:var(--violet);}

  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:5px;
    padding:9px 8px calc(9px + env(safe-area-inset-bottom));background:#0e0a22e8;border-top:1px solid var(--panel-line);backdrop-filter:blur(8px);z-index:20;}
  .tabs button{background:transparent;color:var(--muted);font-weight:800;font-size:12px;padding:8px 12px;border-radius:999px;}
  .tabs button.active{color:#3a2a05;background:linear-gradient(180deg,var(--gold-soft),var(--gold));}

  /* forest */
  .forestbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:2px 0 8px;}
  .forestbar .zoom{display:flex;gap:6px;}
  .forestbar .zoom button,.forestbar .tool{background:#0e0a22;border:1px solid var(--panel-line);color:var(--cream);font-weight:800;border-radius:10px;padding:8px 11px;font-size:13px;}
  .forestbar .tool.on{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2a05;border-color:transparent;}
  .viewport{position:relative;overflow:auto;border:1px solid var(--panel-line);border-radius:16px;background:
    radial-gradient(120% 90% at 50% 0%,#211a40 0%,#160f30 70%);height:66dvh;-webkit-overflow-scrolling:touch;}
  .canvas{position:relative;transform-origin:0 0;}
  .canvas svg.edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  .pnode{position:absolute;transform:translate(-50%,-50%);width:120px;cursor:pointer;user-select:none;z-index:2;}
  .pnode .card2{background:#221b42;border:1px solid #40376b;border-radius:13px;padding:8px 6px 7px;box-shadow:0 2px 8px #00000040;height:96px;display:flex;flex-direction:column;align-items:center;}
  .pnode.lit .card2{border-color:#ffd98a;background:linear-gradient(180deg,#2c2450,#221b42);box-shadow:0 0 16px #ffce7233,0 2px 8px #00000040;}
  .pnode.sel .card2{border-color:var(--sky);box-shadow:0 0 0 3px #8fb6d855;}
  .pnode .disc{width:48px;height:48px;flex:none;border-radius:50%;background:#2a2150;border:2px solid #4a3f74;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted);font-size:15px;}
  .pnode .disc img{position:absolute;}
  .pnode.lit .disc{border-color:#fff2cf;color:#3a2a05;}
  .pnode.lit .disc.noimg{background:radial-gradient(circle at 50% 35%,#ffe6ad,#ffce72);}
  .pnode .nm{font-size:11.5px;font-weight:700;line-height:1.14;color:var(--cream);margin-top:5px;max-width:112px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pnode .dt{font-size:10px;color:var(--muted);margin-top:1px;}
  .phimg{border-radius:9px;background:#0e0a22 center/cover no-repeat;border:1px solid var(--panel-line);flex:none;}
  .emptyforest{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px;}

  /* overlay sheet */
  .scrim{position:fixed;inset:0;background:#0a0720b0;backdrop-filter:blur(2px);z-index:30;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{background:#181235;border:1px solid var(--panel-line);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:88dvh;overflow:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom));}
  .sheet .grab{width:38px;height:4px;border-radius:2px;background:#ffffff33;margin:0 auto 10px;}
  .sheet h3{font-family:'Fraunces';font-size:22px;margin:2px 0 2px;font-weight:900;}
  .sheet .sub{color:var(--muted);font-size:13px;margin-bottom:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{font-size:11px;background:#b58fd81f;border:1px solid #b58fd83a;color:var(--cream);padding:3px 9px;border-radius:999px;cursor:pointer;}
  .chip.rm{background:#ff9a8f18;border-color:#ff9a8f44;}
  .act{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
  .act button{background:#0e0a22;border:1px solid var(--panel-line);color:var(--cream);font-weight:800;font-size:12.5px;border-radius:11px;padding:9px 12px;}
  .act button.gold{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2a05;border-color:transparent;}
  .act button.danger{color:var(--bad);border-color:#ff9a8f44;}
  .rel{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--panel-line);font-size:14px;}
  .rel:last-child{border-bottom:none;}
  .rel .k{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:800;min-width:74px;}
  .rel .nm{flex:1;color:var(--cream);cursor:pointer;}
  .rel .x{background:transparent;color:var(--bad);border:1px solid #ff9a8f33;border-radius:9px;padding:5px 8px;font-weight:800;font-size:11px;}
  .mem{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--panel-line);}
  .mem:last-child{border-bottom:none;}
  .mem .th{width:54px;height:54px;flex:none;border-radius:10px;object-fit:cover;background:#0e0a22;border:1px solid var(--panel-line);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);text-transform:uppercase;}
  .mem .mt{font-size:13px;color:var(--muted);line-height:1.4;}
  .mem .mt b{color:var(--cream);}
  .status{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:999px;}
  .status.rev{background:#b58fd81f;color:var(--violet);border:1px solid #b58fd83a;}
  .status.pub{background:#7fd9a61f;color:var(--good);border:1px solid #7fd9a63a;}

  /* tagging (photo content) */
  .stage{position:relative;margin-top:12px;border-radius:12px;overflow:hidden;border:1px solid var(--panel-line);touch-action:none;user-select:none;}
  .stage img{display:block;width:100%;pointer-events:none;-webkit-user-drag:none;}
  .stage .box{position:absolute;border:2px solid var(--gold);border-radius:7px;background:#ffce7218;}
  .stage .box b{position:absolute;top:-9px;left:-2px;transform:translateY(-100%);background:var(--gold);color:#3a2a05;font-size:10px;font-weight:800;padding:1px 5px;border-radius:5px;}
  .stage .box .del{position:absolute;top:-9px;right:-9px;width:20px;height:20px;border-radius:50%;background:#ff9a8f;color:#3a0a05;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;}
  .tagrow{display:flex;gap:7px;align-items:center;margin-top:7px;}
  .tagrow .num{width:20px;height:20px;flex:none;border-radius:50%;background:#ffce7222;color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
  .tagrow input{flex:1;}.tagrow .x{background:transparent;color:var(--bad);border:1px solid #ff9a8f44;border-radius:9px;padding:7px 9px;font-weight:800;}
  .addppl{background:transparent;color:var(--gold-soft);border:1px dashed var(--gold);border-radius:10px;padding:8px 11px;font-weight:800;font-size:12px;margin-top:9px;}

  .listrow{padding:11px 0;border-bottom:1px solid var(--panel-line);}
  .listrow:last-child{border-bottom:none;}
  .listrow b{color:var(--cream);} .listrow .s{color:var(--muted);font-size:12.5px;}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:22px 8px;line-height:1.5;}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #3a2a0566;border-top-color:#3a2a05;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .center{min-height:70dvh;display:flex;flex-direction:column;justify-content:center;}
  .footnote{text-align:center;color:var(--muted);font-size:12px;margin-top:16px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:16px;height:0;border-top:2px solid;display:inline-block;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap" id="app"></div>
<datalist id="people-list"></datalist>

<script>
const SUPABASE_URL='https://oabcdrktuikifbormjip.supabase.co';
const SUPABASE_KEY='sb_publishable_MnuwKTP5JaUy-P8-bKWsgA_f98esOXC';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=(s,r=document)=>r.querySelector(s);
const el=(h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const esc=(s)=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=(n)=>(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const yr=(d)=>d?String(d).slice(0,4):'';

const KINDS={
  photo:{label:'Photo',file:true,accept:'image/*',boxes:true,story:"Its story — in whose words?"},
  voice:{label:'Voice',file:true,accept:'audio/*',boxes:false,story:"About this recording"},
  text:{label:'Story',file:false,accept:null,boxes:false,story:"The memory — in their words"},
  video:{label:'Video',file:true,accept:'video/*',boxes:false,story:"About this video"},
  object:{label:'Object',file:true,accept:'image/*',boxes:false,story:"What is it, and what does it mean?"},
};
const REL_KINDS=['parent','spouse','sibling','friend','mentor','neighbour','other'];

let S={user:null,isKeeper:false,tab:'forest',
  people:[],rels:[],artefacts:[],litSet:new Set(),faceOf:new Map(),
  zoom:1, selecting:false, selected:new Set(), addCtx:[], addKind:'photo'};

(function(){const s=$('#stars');let h='';for(let i=0;i<44;i++)h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s"></i>`;s.innerHTML=h;})();

// ---------- auth ----------
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  S.user=session?.user||null;
  if(S.user)await afterLogin(); else renderAuth();
  sb.auth.onAuthStateChange(async(_e,s)=>{
    const u=s?.user||null;
    if(u&&(!S.user||u.id!==S.user.id)){S.user=u;await afterLogin();}
    if(!u&&S.user){S.user=null;renderAuth();}
  });
}
async function afterLogin(){
  await sb.from('profiles').upsert({id:S.user.id,display_name:S.user.email}).select();
  const {data:prof}=await sb.from('profiles').select('is_keeper').eq('id',S.user.id).single();
  S.isKeeper=!!prof?.is_keeper;
  await loadAll(); render();
}
function renderAuth(){
  const app=$('#app');app.innerHTML='';
  app.append(el(`<div class="center">
    <div style="text-align:center;font-size:34px">✦</div>
    <h2 class="disp" style="text-align:center;font-size:30px;margin:6px 0 2px">The Living Forest</h2>
    <p class="lede" style="text-align:center">A place where the family becomes stars — lit, one memory at a time.</p>
    <div class="card">
      <label class="field"><span>Your email</span><input id="email" type="email" autocomplete="email" placeholder="you@example.com"/></label>
      <label class="field"><span>Password</span><input id="pw" type="password" autocomplete="current-password" placeholder="at least 6 characters"/></label>
      <button class="btn" id="signin">Sign in</button>
      <button class="btn secondary" id="signup">Create account</button>
      <div class="msg" id="authmsg"></div>
    </div>
    <p class="footnote">Your first sign-in makes you the keeper of the forest.</p></div>`));
  $('#signin').onclick=()=>auth('in');$('#signup').onclick=()=>auth('up');
}
async function auth(mode){
  const email=$('#email').value.trim(),password=$('#pw').value,m=$('#authmsg');
  if(!email||password.length<6)return showMsg(m,'err','Enter an email and a password of at least 6 characters.');
  showMsg(m,'info','Working…');
  const fn=mode==='up'?sb.auth.signUp({email,password}):sb.auth.signInWithPassword({email,password});
  const {data,error}=await fn;
  if(error){ if(/confirm/i.test(error.message))showMsg(m,'info','Your account needs confirming. Ask the keeper, then sign in.');else showMsg(m,'err',error.message);}
  else if(mode==='up'&&!data.session)showMsg(m,'info','Account created. Now tap Sign in.');
  else showMsg(m,'info','Signed in…');
}

// ---------- data ----------
async function loadAll(){
  const [pp,rr,art]=await Promise.all([
    sb.from('people').select('id,display_name,called_name,birth_date,death_date,is_living,is_friend,branch,primary_asset,metadata').order('display_name'),
    sb.from('relationships').select('id,from_person,to_person,kind'),
    sb.from('artefacts').select('id,kind,body,metadata,certainty,storage_path,published_at, artefact_subjects(person_id, detail, people(display_name))').eq('status','published').order('published_at',{ascending:false}),
  ]);
  S.people=pp.data||[]; S.rels=rr.data||[]; S.artefacts=art.data||[];
  S.litSet=new Set(); S.faceOf=new Map();
  S.artefacts.forEach(a=>{
    const photo=(a.kind==='photo'||a.kind==='object')&&a.storage_path;
    (a.artefact_subjects||[]).forEach(s=>{ if(!s.person_id)return; S.litSet.add(s.person_id);
      if(photo){ const box=(s.detail&&typeof s.detail==='object'&&s.detail.w)?s.detail:null;
        const cur=S.faceOf.get(s.person_id);
        if(!cur||(!cur.box&&box)) S.faceOf.set(s.person_id,{path:a.storage_path,box}); } });
  });
  $('#people-list').innerHTML=S.people.map(p=>`<option value="${esc(p.display_name)}">`).join('');
}
const personById=(id)=>S.people.find(p=>p.id===id);
async function ensurePerson(name){
  name=name.trim();
  const f=S.people.find(p=>p.display_name.toLowerCase()===name.toLowerCase());
  if(f)return f.id;
  const {data,error}=await sb.from('people').insert({display_name:name,created_by:S.user.id,status:'published'}).select().single();
  if(error)throw error; S.people.push(data); return data.id;
}
async function addRel(fromId,toId,kind){
  const {error}=await sb.from('relationships').insert({from_person:fromId,to_person:toId,kind});
  if(error)throw error;
  if(kind==='friend'){try{await sb.from('people').update({is_friend:true}).in('id',[fromId,toId]);}catch(e){}}
}
async function uploadFile(file){
  const ext=(file.name.split('.').pop()||'bin').toLowerCase();
  const path=`${S.user.id}/${crypto.randomUUID()}.${ext}`;
  const up=await sb.storage.from('family').upload(path,file,{contentType:file.type||undefined});
  if(up.error)throw up.error; return path;
}
async function signed(path){ if(!path)return''; try{const s=await sb.storage.from('family').createSignedUrl(path,3600);return s.data?.signedUrl||'';}catch(e){return'';} }
async function mountFace(disc,path,box,fallback){
  if(!disc)return;
  const url=await signed(path);
  if(!url){disc.classList.add('noimg');disc.textContent=fallback;return;}
  const img=new Image();
  img.onload=()=>{
    disc.textContent='';
    const D=disc.clientWidth||48, natW=img.naturalWidth||1, natH=img.naturalHeight||1, ar=natH/natW;
    if(box&&box.w>0.02&&box.h>0.02){
      const pad=0.5;
      const bw=Math.min(1,box.w*(1+pad)), bh=Math.min(1,box.h*(1+pad));
      const bx=Math.max(0,Math.min(1-bw,box.x-box.w*pad/2)), by=Math.max(0,Math.min(1-bh,box.y-box.h*pad/2));
      const Wd=Math.max(D/bw, D/(bh*ar)), Hd=Wd*ar;
      img.style.width=Wd+'px'; img.style.height=Hd+'px';
      img.style.left=(D/2-(bx+bw/2)*Wd)+'px'; img.style.top=(D/2-(by+bh/2)*Hd)+'px';
    } else { img.style.width='100%'; img.style.height='100%'; img.style.left='0'; img.style.top='0'; img.style.objectFit='cover'; }
    disc.appendChild(img);
  };
  img.onerror=()=>{disc.classList.add('noimg');disc.textContent=fallback;};
  img.src=url;
}

// ---------- shell ----------
function render(){
  const app=$('#app');app.innerHTML='';
  app.append(el(`<header class="top">
    <div class="brand"><span style="font-size:20px">✦</span><h1 class="disp">The Living Forest</h1></div>
    <div style="text-align:right"><div class="who">${esc(S.user.email)}</div><button class="ghost" id="out">Sign out</button></div>
  </header>`));
  app.append(el('<div id="body"></div>'));
  const tabs=el(`<nav class="tabs">
    <button data-t="forest">Forest</button>
    <button data-t="places">Places</button>
    <button data-t="timeline">Timeline</button>
    <button data-t="add">Add</button>
    ${S.isKeeper?'<button data-t="review">Review</button>':''}
  </nav>`);
  app.append(tabs);
  tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{S.addCtx=[];S.tab=b.dataset.t;paint();});
  $('#out').onclick=()=>sb.auth.signOut();
  paint();
}
function paint(){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.t===S.tab));
  const body=$('#body');body.innerHTML='';
  if(S.tab==='forest')viewForest(body);
  if(S.tab==='places')viewPlaces(body);
  if(S.tab==='timeline')viewTimeline(body);
  if(S.tab==='add')viewAdd(body);
  if(S.tab==='review')viewReview(body);
}

// ---------- layout ----------
const NODE_W=120, NODE_H=96, ROW_H=166, COUPLE_GAP=14, SIB_GAP=30, FAM_GAP=80;
function computeLayout(){
  const people=S.people, rels=S.rels;
  const has=new Set(people.map(p=>p.id));
  const childrenOf=new Map(), parentsOf=new Map();
  people.forEach(p=>{childrenOf.set(p.id,[]);parentsOf.set(p.id,[]);});
  rels.forEach(r=>{ if(!has.has(r.from_person)||!has.has(r.to_person))return;
    if(r.kind==='parent'){ childrenOf.get(r.from_person).push(r.to_person); parentsOf.get(r.to_person).push(r.from_person); }});
  const byBirth=(id)=>{const p=people.find(x=>x.id===id);const y=p&&p.birth_date?parseInt(String(p.birth_date).slice(0,4)):9999;return isNaN(y)?9999:y;};
  const nameOf=(id)=>{const p=people.find(x=>x.id===id);return p?p.display_name:'';};
  // --- build home units (couples first, then singletons) ---
  const homeUnit=new Map(), unitList=[]; const seen=new Set();
  rels.forEach(r=>{ if(r.kind!=='spouse')return; if(!has.has(r.from_person)||!has.has(r.to_person))return;
    if(homeUnit.has(r.from_person)||homeUnit.has(r.to_person))return;
    const key=[r.from_person,r.to_person].sort().join('|'); if(seen.has(key))return; seen.add(key);
    const u={members:[r.from_person,r.to_person],childUnits:[]}; unitList.push(u);
    homeUnit.set(r.from_person,u); homeUnit.set(r.to_person,u); });
  people.forEach(p=>{ if(!homeUnit.has(p.id)){ const u={members:[p.id],childUnits:[]}; unitList.push(u); homeUnit.set(p.id,u); }});
  // root member = one with parents (blood line), else first
  unitList.forEach(u=>{ u.root = u.members.find(m=>parentsOf.get(m).length>0) ?? u.members[0]; });
  // strict parent-unit (one per unit) → childUnits
  unitList.forEach(u=>{ const par=parentsOf.get(u.root)[0]; u.parentUnit=(par!=null)?homeUnit.get(par):null; });
  unitList.forEach(u=>{ if(u.parentUnit && u.parentUnit!==u) u.parentUnit.childUnits.push(u); });
  unitList.forEach(u=>u.childUnits.sort((a,b)=>(byBirth(a.root)-byBirth(b.root))||nameOf(a.root).localeCompare(nameOf(b.root))));
  const baseW=(u)=> u.members.length>1 ? (2*NODE_W+COUPLE_GAP) : NODE_W;
  const M=new Set();
  function measure(u){ if(M.has(u)){u.sub=baseW(u);return u.sub;} M.add(u);
    const k=u.childUnits; if(!k.length){u.sub=baseW(u);return u.sub;}
    let w=0; k.forEach((c,i)=>{w+=measure(c); if(i<k.length-1)w+=SIB_GAP;}); u.sub=Math.max(baseW(u),w); return u.sub; }
  const P=new Set();
  function place(u,left,depth){ if(P.has(u))return; P.add(u); u.depth=depth;
    const k=u.childUnits;
    if(!k.length){ u.cx=left+u.sub/2; return; }
    const cw=k.reduce((a,c,i)=>a+c.sub+(i<k.length-1?SIB_GAP:0),0);
    let cur=left+(u.sub-cw)/2; k.forEach(c=>{place(c,cur,depth+1);cur+=c.sub+SIB_GAP;});
    u.cx=(k[0].cx+k[k.length-1].cx)/2; }
  const roots=unitList.filter(u=>!u.parentUnit || u.parentUnit===u);
  roots.sort((a,b)=>(byBirth(a.root)-byBirth(b.root)));
  let xLeft=20, maxDepth=0;
  roots.forEach(r=>{ measure(r); place(r,xLeft,0); xLeft+=r.sub+FAM_GAP; });
  const pos=new Map(); let maxX=0;
  unitList.forEach(u=>{ if(u.depth==null)return; maxDepth=Math.max(maxDepth,u.depth);
    const y=u.depth*ROW_H+NODE_H/2+24;
    if(u.members.length>1){ const off=(NODE_W+COUPLE_GAP)/2;
      pos.set(u.members[0],{x:u.cx-off,y}); pos.set(u.members[1],{x:u.cx+off,y}); }
    else pos.set(u.members[0],{x:u.cx,y});
    maxX=Math.max(maxX,u.cx+baseW(u)/2); });
  // any stranded people (shouldn't happen) → a bottom row
  let sx=20; const strandY=(maxDepth+1)*ROW_H+NODE_H/2+24;
  people.forEach(p=>{ if(!pos.has(p.id)){ pos.set(p.id,{x:sx+NODE_W/2,y:strandY}); sx+=NODE_W+SIB_GAP; maxDepth=Math.max(maxDepth,maxDepth+1);} });
  return {pos,unitList,homeUnit,rels,width:maxX+40,height:(maxDepth+1)*ROW_H+60};
}

function viewForest(root){
  root.append(el(`<div class="forestbar">
    <button class="tool" id="addroot">＋ Person</button>
    <button class="tool" id="seltoggle">Select</button>
    <div class="zoom"><button id="zout">−</button><button id="zin">＋</button><button id="zfit">Fit</button></div>
    <span id="selinfo" style="font-size:12px;color:var(--muted)"></span>
  </div>`));
  const vp=el('<div class="viewport" id="vp"><div class="canvas" id="canvas"></div></div>');
  root.append(vp);
  root.append(el(`<div class="legend">
    <span><i style="border-color:#6f6597"></i>parent–child</span>
    <span><i style="border-color:var(--gold)"></i>marriage</span>
    <span><i style="border-color:var(--violet);border-top-style:dashed"></i>friendship</span>
    <span>✦ lit = has a memory</span></div>`));
  root.append(el(`<p class="footnote">Tap anyone to open them — add family, connect people, or attach a memory. Pinch or use ＋/− to zoom, drag to pan.</p>`));
  $('#addroot').onclick=()=>openAddPerson(null,null);
  $('#seltoggle').onclick=()=>{S.selecting=!S.selecting;S.selected=new Set();paint();};
  $('#zin').onclick=()=>{S.zoom=Math.min(1.8,S.zoom+0.15);applyZoom();};
  $('#zout').onclick=()=>{S.zoom=Math.max(0.4,S.zoom-0.15);applyZoom();};
  $('#zfit').onclick=fitForest;
  drawForest();
  if(S.selecting){$('#seltoggle').classList.add('on');updateSelInfo();}
}
function applyZoom(){const c=$('#canvas');if(c)c.style.transform=`scale(${S.zoom})`;}
function fitForest(){
  const vp=$('#vp'),c=$('#canvas');if(!vp||!c)return;
  const w=c._w||1;S.zoom=Math.max(0.4,Math.min(1.2,(vp.clientWidth-20)/w));applyZoom();vp.scrollTo({left:0,top:0});
}
function drawForest(){
  const canvas=$('#canvas');canvas.innerHTML='';
  if(!S.people.length){canvas.append(el(`<div class="emptyforest"><div style="font-size:30px">✦</div><p>The forest is empty.<br>Tap “＋ Person” to plant the first one.</p></div>`));canvas.style.width='100%';canvas.style.height='100%';return;}
  const L=computeLayout();
  canvas.style.width=L.width+'px';canvas.style.height=L.height+'px';canvas._w=L.width;
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('class','edges');svg.setAttribute('width',L.width);svg.setAttribute('height',L.height);
  const addLine=(x1,y1,x2,y2,col,w,dash)=>{const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
    ln.setAttribute('stroke',col);ln.setAttribute('stroke-width',w||2);ln.setAttribute('stroke-linecap','round');
    if(dash)ln.setAttribute('stroke-dasharray',dash);svg.appendChild(ln);};
  const rep=new Set();
  // marriage bars + orthogonal child connectors
  L.unitList.forEach(u=>{ if(u.depth==null)return;
    const y=L.pos.get(u.members[0]).y;
    if(u.members.length>1){ const a=L.pos.get(u.members[0]),b=L.pos.get(u.members[1]);
      addLine(a.x+NODE_W/2,a.y,b.x-NODE_W/2,b.y,'#ffce72',2.5); }
    if(u.childUnits.length){
      const busY=y+NODE_H/2+(ROW_H-NODE_H)/2-8;
      addLine(u.cx,y+NODE_H/2,u.cx,busY,'#6f6597',2);
      const cxs=u.childUnits.map(c=>L.pos.get(c.root).x);
      addLine(Math.min(u.cx,...cxs),busY,Math.max(u.cx,...cxs),busY,'#6f6597',2);
      u.childUnits.forEach(c=>{const cp=L.pos.get(c.root);addLine(cp.x,busY,cp.x,cp.y-NODE_H/2,'#6f6597',2);
        u.members.forEach(m=>rep.add(m+'>'+c.root));});
    }
  });
  // shared-parent lookup, so redundant sibling lines aren't drawn
  const parentsOf=new Map();
  S.rels.forEach(r=>{ if(r.kind==='parent'){ if(!parentsOf.has(r.to_person))parentsOf.set(r.to_person,new Set()); parentsOf.get(r.to_person).add(r.from_person); }});
  const shareParent=(x,y)=>{ const px=parentsOf.get(x),py=parentsOf.get(y); if(!px||!py)return false; for(const v of px)if(py.has(v))return true; return false; };
  // remaining links: friendship, extra marriages, married-in parents
  L.rels.forEach(r=>{ const a=L.pos.get(r.from_person),b=L.pos.get(r.to_person);if(!a||!b)return;
    if(r.kind==='friend') addLine(a.x,a.y,b.x,b.y,'#b58fd8',2,'5 5');
    else if(r.kind==='spouse'){ if(L.homeUnit.get(r.from_person)!==L.homeUnit.get(r.to_person)) addLine(a.x,a.y,b.x,b.y,'#ffce72',2,'2 5'); }
    else if(r.kind==='parent'){ if(!rep.has(r.from_person+'>'+r.to_person)) addLine(a.x,a.y+NODE_H/2,b.x,b.y-NODE_H/2,'#6f6597',1.6,'2 5'); }
    else if(r.kind==='sibling'){ if(!shareParent(r.from_person,r.to_person)) addLine(a.x,a.y,b.x,b.y,'#8fb6d8',1.6,'3 4'); }
    else addLine(a.x,a.y,b.x,b.y,'#8fb6d8',1.6,'3 4');
  });
  canvas.appendChild(svg);
  S.people.forEach(p=>{
    const pt=L.pos.get(p.id);if(!pt)return;
    const lit=S.litSet.has(p.id);
    const face=S.faceOf.get(p.id);
    const node=el(`<div class="pnode${lit?' lit':''}${S.selected.has(p.id)?' sel':''}" style="left:${pt.x}px;top:${pt.y}px">
      <div class="card2"><div class="disc${face?'':' noimg'}">${face?'':esc(initials(p.display_name))}</div>
      <div class="nm">${esc(p.called_name||p.display_name)}</div>
      <div class="dt">${[yr(p.birth_date),yr(p.death_date)].filter(Boolean).join('–')||'&nbsp;'}</div></div></div>`);
    node.onclick=(e)=>{e.stopPropagation();
      if(S.selecting){ if(S.selected.has(p.id))S.selected.delete(p.id);else S.selected.add(p.id);
        node.classList.toggle('sel');updateSelInfo(); }
      else openPerson(p.id);
    };
    canvas.appendChild(node);
    if(face) mountFace(node.querySelector('.disc'), face.path, face.box, initials(p.display_name));
  });
  setTimeout(fitForest,30);
}
function updateSelInfo(){
  const info=$('#selinfo');if(!info)return;
  if(!S.selecting){info.textContent='';return;}
  const n=S.selected.size;
  info.innerHTML=n?`${n} selected — <b style="color:var(--gold-soft);cursor:pointer" id="addtosel">add a memory ›</b>`:'tap people to select';
  const a=$('#addtosel');if(a)a.onclick=()=>{S.addCtx=[...S.selected];S.selecting=false;S.tab='add';paint();};
}

// ---------- overlay helpers ----------
function overlay(inner){
  closeOverlay();
  const scrim=el('<div class="scrim" id="scrim"></div>');
  const sheet=el('<div class="sheet"><div class="grab"></div></div>');
  sheet.append(inner);scrim.append(sheet);
  scrim.addEventListener('click',(e)=>{if(e.target===scrim)closeOverlay();});
  document.body.append(scrim);
}
function closeOverlay(){const s=$('#scrim');if(s)s.remove();}

// ---------- PERSON ----------
async function openPerson(id){
  const p=personById(id);if(!p)return;
  const box=el(`<div><h3 class="disp">${esc(p.display_name)}</h3>
    <div class="sub">${[p.called_name?'“'+esc(p.called_name)+'”':'',
      p.is_living===true?'living':(p.is_living===false?'remembered':''),
      [yr(p.birth_date),yr(p.death_date)].filter(Boolean).join('–'),
      p.branch?esc(p.branch)+' branch':''].filter(Boolean).join(' · ')}</div>
    ${p.metadata&&p.metadata.note?`<p class="lede">${esc(p.metadata.note)}</p>`:''}
    <div class="act">
      <button class="gold" id="pa-content">Add a memory</button>
      <button data-r="parent">+ Parent</button>
      <button data-r="child">+ Child</button>
      <button data-r="spouse">+ Spouse</button>
      <button data-r="sibling">+ Sibling</button>
      <button data-r="friend">+ Friend</button>
      <button id="pa-edit">Edit</button>
      <button class="danger" id="pa-del">Delete</button>
    </div>
    <div class="eyebrow" style="margin-top:16px">Connections</div>
    <div id="pconn"><div class="empty">—</div></div>
    <div class="eyebrow" style="margin-top:14px">Memories</div>
    <div id="pmem"><div class="empty">Looking…</div></div>
  </div>`);
  overlay(box);
  box.querySelector('#pa-content').onclick=()=>{closeOverlay();S.addCtx=[id];S.tab='add';paint();};
  box.querySelector('#pa-edit').onclick=()=>openEditPerson(id);
  box.querySelector('#pa-del').onclick=()=>deletePerson(id);
  box.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>openAddPerson(id,b.dataset.r));
  // connections
  const conns=S.rels.filter(r=>r.from_person===id||r.to_person===id);
  const cbox=box.querySelector('#pconn');
  if(!conns.length)cbox.innerHTML='<div class="empty">No connections yet — add family above.</div>';
  else{ cbox.innerHTML='';
    conns.forEach(r=>{
      const otherId=r.from_person===id?r.to_person:r.from_person;
      const other=personById(otherId);if(!other)return;
      let label=r.kind;
      if(r.kind==='parent')label=r.from_person===id?'parent of':'child of';
      const row=el(`<div class="rel"><span class="k"${S.isKeeper?' style="cursor:pointer;text-decoration:underline dotted"':''}>${esc(label)}</span><span class="nm">${esc(other.display_name)}</span>${S.isKeeper?'<button class="x">remove</button>':''}</div>`);
      row.querySelector('.nm').onclick=()=>openPerson(otherId);
      if(S.isKeeper)row.querySelector('.k').onclick=()=>openEdge(r);
      const x=row.querySelector('.x');if(x)x.onclick=async()=>{ if(!confirm('Remove this connection?'))return;
        await sb.from('relationships').delete().eq('id',r.id); await loadAll(); openPerson(id); if(S.tab==='forest')drawForest(); };
      cbox.append(row);
    });
  }
  // memories
  const mbox=box.querySelector('#pmem');
  const {data:subs}=await sb.from('artefact_subjects')
    .select('artefacts(id,kind,body,storage_path,status,metadata,certainty)').eq('person_id',id);
  const arts=(subs||[]).map(s=>s.artefacts).filter(Boolean);
  if(!arts.length)mbox.innerHTML='<div class="empty">No memories yet. Add one above to light this star.</div>';
  else{ mbox.innerHTML='';
    for(const a of arts){
      const url=a.storage_path?await signed(a.storage_path):'';
      const isImg=(a.kind==='photo'||a.kind==='object');
      const th=isImg&&url?`<img class="th" src="${url}"/>`:`<div class="th">${esc(a.kind)}</div>`;
      const st=a.status==='published'?'<span class="status pub">lit</span>':'<span class="status rev">in review</span>';
      const row=el(`<div class="mem" style="cursor:pointer">${th}<div class="mt">${a.body?'<b>'+esc(a.body.slice(0,90))+(a.body.length>90?'…':'')+'</b><br>':''}${st} ${esc(a.metadata?.when||'')}${a.metadata?.where?' · '+esc(a.metadata.where):''} <span style="color:var(--gold-soft)">· edit ›</span></div></div>`);
      row.onclick=()=>openEditArtefact(a.id);
      mbox.append(row);
    }
  }
}
async function openEditArtefact(id){

    .eq('id',id).single();

        a.artefact_subjects=a.artefact_subjects.filter(x=>x.id!==s.id); renderSubs(); await loadAll(); if(S.tab==='forest')drawForest(); };
      c.append(row);

    try{ const pid=await ensurePerson(nm);
      const {data:ns,error:e2}=await sb.from('artefact_subjects').insert({artefact_id:a.id,person_id:pid,detail:null}).select('id,person_id,people(display_name)').single();
      if(e2)throw e2; a.artefact_subjects.push(ns); $('#ea-add').value=''; renderSubs(); await loadAll(); if(S.tab==='forest')drawForest();
    }catch(err){showMsg($('#ea-msg'),'err',err.message);} };
  $('#ea-save').onclick=async()=>{ const m=$('#ea-msg'); const btn=$('#ea-save'); btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spin"></span>';
    const meta={...(a.metadata||{})}; const w=$('#ea-when').value.trim(),p=$('#ea-where').value.trim();
    if(w)meta.when=w; else delete meta.when; if(p)meta.where=p; else delete meta.where;
    const patch={body:$('#ea-body').value.trim()||null,certainty:$('#ea-cert').value,metadata:meta};
    if(!S.isKeeper && a.status==='published') patch.status='in_review';
    try{ const f=$('#ea-file')?.files?.[0]; if(f){patch.storage_path=await uploadFile(f);}
      const {error:e3}=await sb.from('artefacts').update(patch).eq('id',a.id); if(e3)throw e3;
      await loadAll(); closeOverlay(); if(S.tab==='forest')drawForest(); else paint();
    }catch(err){btn.disabled=false;btn.textContent=old;showMsg(m,'err',err.message||'Could not save.');} };

    try{ await sb.from('artefact_subjects').delete().eq('artefact_id',a.id);
      const {error:e4}=await sb.from('artefacts').delete().eq('id',a.id); if(e4)throw e4;
      if(a.storage_path)try{await sb.storage.from('family').remove([a.storage_path]);}catch(e){}
      await loadAll(); closeOverlay(); if(S.tab==='forest')drawForest(); else paint();
    }catch(err){showMsg($('#ea-msg'),'err',err.message);} };
}
function openAddPerson(anchorId,relKind){
  const anchor=anchorId?personById(anchorId):null;
  const title=anchor?`Add a ${relKind} of ${esc(anchor.display_name)}`:'Add a person';
  const box=el(`<div><h3 class="disp">${title}</h3>
    <div class="sub">Type a new name, or an existing one to link them into the tree.</div>
    <label class="field"><span>Name</span><input id="np-name" type="text" list="people-list" placeholder="Full name"/></label>
    <div class="row">
      <label class="field"><span>Called (optional)</span><input id="np-called" type="text"/></label>
      <label class="field"><span>Branch (optional)</span><input id="np-branch" type="text"/></label>
    </div>
    <div class="row">
      <label class="field"><span>Born</span><input id="np-born" type="date"/></label>
      <label class="field"><span>Died</span><input id="np-died" type="date"/></label>
    </div>
    <button class="btn" id="np-save">${anchor?'Add & connect':'Add to the forest'}</button>
    <div class="msg" id="np-msg"></div></div>`);
  overlay(box);
  box.querySelector('#np-save').onclick=async()=>{
    const m=$('#np-msg'),name=$('#np-name').value.trim();
    if(!name)return showMsg(m,'err','A name is needed.');
    const btn=$('#np-save');btn.disabled=true;const old=btn.textContent;btn.innerHTML='<span class="spin"></span>';
    try{
      const exists=S.people.find(p=>p.display_name.toLowerCase()===name.toLowerCase());
      let pid;
      if(exists){pid=exists.id;}
      else{ const {data,error}=await sb.from('people').insert({display_name:name,created_by:S.user.id,status:'published',
        called_name:$('#np-called').value.trim()||null,branch:$('#np-branch').value.trim()||null,
        birth_date:$('#np-born').value||null,death_date:$('#np-died').value||null}).select().single();
        if(error)throw error; pid=data.id; }
      if(anchor){
        if(relKind==='parent')await addRel(pid,anchor.id,'parent');
        else if(relKind==='child'){ await addRel(anchor.id,pid,'parent');
          const sp=S.rels.filter(r=>r.kind==='spouse'&&(r.from_person===anchor.id||r.to_person===anchor.id))
            .map(r=>r.from_person===anchor.id?r.to_person:r.from_person);
          if(sp.length===1)await addRel(sp[0],pid,'parent'); }
        else if(relKind==='spouse')await addRel(anchor.id,pid,'spouse');
        else if(relKind==='friend')await addRel(anchor.id,pid,'friend');
        else if(relKind==='sibling'){ const par=S.rels.filter(r=>r.kind==='parent'&&r.to_person===anchor.id).map(r=>r.from_person);
          if(par.length){for(const pr of par)await addRel(pr,pid,'parent');} else await addRel(anchor.id,pid,'sibling'); }
      }
      await loadAll(); closeOverlay(); if(S.tab==='forest')drawForest(); if(anchor)openPerson(anchor.id);
    }catch(err){showMsg(m,'err',err.message||'Could not add.');btn.disabled=false;btn.textContent=old;}
  };
}
function openEditPerson(id){
  const p=personById(id);if(!p)return;
  const box=el(`<div><h3 class="disp">Edit ${esc(p.display_name)}</h3>
    <label class="field"><span>Name</span><input id="e-name" type="text" value="${esc(p.display_name)}"/></label>
    <div class="row"><label class="field"><span>Called</span><input id="e-called" type="text" value="${esc(p.called_name||'')}"/></label>
      <label class="field"><span>Branch</span><input id="e-branch" type="text" value="${esc(p.branch||'')}"/></label></div>
    <div class="row"><label class="field"><span>Born</span><input id="e-born" type="date" value="${esc(p.birth_date||'')}"/></label>
      <label class="field"><span>Died</span><input id="e-died" type="date" value="${esc(p.death_date||'')}"/></label></div>
    <label class="field"><span>Living?</span><select id="e-living"><option value="">Unknown</option><option value="yes">Living</option><option value="no">Remembered</option></select></label>
    <label class="field"><span>Note</span><textarea id="e-note">${esc(p.metadata?.note||'')}</textarea></label>
    <button class="btn" id="e-save">Save</button><button class="btn secondary" id="e-cancel">Back</button>
    <div class="msg" id="e-msg"></div></div>`);
  overlay(box);
  $('#e-living').value=p.is_living===true?'yes':(p.is_living===false?'no':'');
  $('#e-cancel').onclick=()=>openPerson(id);
  $('#e-save').onclick=async()=>{
    const m=$('#e-msg'),name=$('#e-name').value.trim();if(!name)return showMsg(m,'err','A name is needed.');
    const lv=$('#e-living').value;
    try{
      const {error}=await sb.from('people').update({display_name:name,called_name:$('#e-called').value.trim()||null,
        branch:$('#e-branch').value.trim()||null,birth_date:$('#e-born').value||null,death_date:$('#e-died').value||null,
        is_living:lv===''?null:(lv==='yes'),metadata:{...(p.metadata||{}),note:$('#e-note').value.trim()||undefined}}).eq('id',id);
      if(error)throw error; await loadAll(); if(S.tab==='forest')drawForest(); openPerson(id);
    }catch(err){showMsg(m,'err',err.message||'Could not save.');}
  };
}
async function deletePerson(id){
  const p=personById(id);if(!p)return;
  if(!confirm(`Delete ${p.display_name}? This removes them and their connections. Memories they were tagged in stay, minus the tag.`))return;
  try{
    await sb.from('relationships').delete().or(`from_person.eq.${id},to_person.eq.${id}`);
    await sb.from('event_participants').delete().eq('person_id',id);
    await sb.from('artefact_subjects').delete().eq('person_id',id);
    const {error}=await sb.from('people').delete().eq('id',id);
    if(error)throw error;
    await loadAll(); closeOverlay(); if(S.tab==='forest')drawForest();
  }catch(err){alert(err.message||'Could not delete.');}
}
function openEdge(r){
  if(!S.isKeeper){const a=personById(r.from_person),b=personById(r.to_person);
    return overlay(el(`<div><h3 class="disp">Connection</h3><p class="lede">${esc(a?.display_name||'?')} — ${esc(r.kind)} — ${esc(b?.display_name||'?')}</p><p class="sub">Only the keeper can change connections.</p></div>`));}
  const a=personById(r.from_person),b=personById(r.to_person);
  const box=el(`<div><h3 class="disp">Connection</h3>
    <p class="lede">${esc(a?.display_name||'?')} → ${esc(b?.display_name||'?')}</p>
    <label class="field"><span>Type</span><select id="ek">${REL_KINDS.map(k=>`<option value="${k}">${k}</option>`).join('')}</select></label>
    <p class="sub" style="margin-top:8px">For parent, the arrow means the first person is the parent of the second.</p>
    <button class="btn" id="ek-save">Save</button>
    <button class="btn danger" id="ek-del">Delete connection</button></div>`);
  overlay(box); $('#ek').value=r.kind;
  $('#ek-save').onclick=async()=>{ await sb.from('relationships').update({kind:$('#ek').value}).eq('id',r.id); await loadAll(); closeOverlay(); drawForest(); };
  $('#ek-del').onclick=async()=>{ if(!confirm('Delete this connection?'))return; await sb.from('relationships').delete().eq('id',r.id); await loadAll(); closeOverlay(); drawForest(); };
}

// ---------- ADD CONTENT ----------
let TAGS=[],NEWFILE=null;
function viewAdd(root){
  TAGS=[];NEWFILE=null;
  if(!S.addCtx.length){
    S.addCtx=[''];
    root.append(el(`<div class="card"><div class="eyebrow">Add a memory</div><h2 class="disp">Who is it about?</h2>
      <p class="lede">Pick the people this memory belongs to, then continue. You can also start from anyone in the forest.</p>
      <div id="ctxlist"></div>
      <button class="addppl" id="ctxadd">+ add a person</button>
      <button class="btn" id="ctxgo">Continue</button></div>`));
    drawCtx();
    $('#ctxadd').onclick=()=>{S.addCtx.push('');drawCtx();};
    $('#ctxgo').onclick=()=>{const named=S.addCtx.map(x=>typeof x==='string'?x.trim():x).filter(Boolean);if(!named.length)return;S.addCtx=named;paint();};
    return;
  }
  const chips=S.addCtx.map(x=>personById(x)?.display_name||(typeof x==='string'?x:'')).filter(Boolean);
  root.append(el(`<div class="card">
    <div class="eyebrow">Add a memory</div><h2 class="disp">A memory for ${chips.length===1?esc(chips[0]):'these people'}</h2>
    <div class="chips" id="ctxchips"></div>
    <div class="forestbar" style="margin-top:12px" id="kindsel">
      ${Object.entries(KINDS).map(([k,v])=>`<button class="tool ${k===S.addKind?'on':''}" data-k="${k}">${v.label}</button>`).join('')}
    </div>
    <div id="filewrap"></div><div id="stagewrap"></div><div id="taglist"></div>
    <label class="field"><span id="storylbl">${esc(KINDS[S.addKind].story)}</span><textarea id="story"></textarea></label>
    <div class="row"><label class="field"><span>Roughly when</span><input id="when" type="text" placeholder="e.g. 1962"/></label>
      <label class="field"><span>Where</span><input id="where" type="text" placeholder="e.g. Casablanca"/></label></div>
    <label class="field"><span>How sure?</span><select id="certainty"><option value="remembered">Remembered</option><option value="documented">Documented</option><option value="uncertain">Uncertain</option></select></label>
    <button class="btn" id="csave">Send to the queue</button>
    <button class="btn secondary" id="cclear">Change people</button>
    <div class="msg" id="cmsg"></div></div>`));
  const chipbox=$('#ctxchips');
  S.addCtx.forEach(x=>{const nm=personById(x)?.display_name||(typeof x==='string'?x:'');if(nm)chipbox.append(el(`<span class="chip">${esc(nm)}</span>`));});
  $('#kindsel').querySelectorAll('button').forEach(b=>b.onclick=()=>{S.addKind=b.dataset.k;paint();});
  $('#cclear').onclick=()=>{S.addCtx=[];paint();};
  renderFileArea();
  $('#csave').onclick=submitContent;
}
function drawCtx(){
  const l=$('#ctxlist');if(!l)return;l.innerHTML='';
  S.addCtx.forEach((nm,i)=>{
    const row=el(`<div class="tagrow"><div class="num">${i+1}</div><input type="text" list="people-list" placeholder="Name" value="${esc(typeof nm==='string'?nm:'')}"/><button class="x">remove</button></div>`);
    row.querySelector('input').oninput=(e)=>{S.addCtx[i]=e.target.value;};
    row.querySelector('.x').onclick=()=>{S.addCtx.splice(i,1);if(!S.addCtx.length)S.addCtx=[''];drawCtx();};
    l.append(row);
  });
}
function renderFileArea(){
  const K=KINDS[S.addKind],fw=$('#filewrap');fw.innerHTML='';$('#stagewrap').innerHTML='';$('#taglist').innerHTML='';
  $('#storylbl').textContent=K.story;
  if(!K.file)return;
  const verb=K.label==='Object'?'A photo of the object':K.label==='Voice'?'The recording':K.label==='Video'?'The video':'The photo';
  fw.append(el(`<label class="field"><span>${verb}</span><input id="file" type="file" accept="${K.accept}"/></label>`));
  $('#file').onchange=onFile;
}
function onFile(e){
  const f=e.target.files[0];if(!f)return;NEWFILE=f;const url=URL.createObjectURL(f);
  if(KINDS[S.addKind].boxes){TAGS=[];mountStage(url);}
  else{const fw=$('#filewrap');let pv=fw.querySelector('.curmedia');if(pv)pv.remove();
    if(S.addKind==='video')fw.append(el(`<div class="curmedia" style="margin-top:10px"><video controls src="${url}" style="width:100%;border-radius:10px"></video></div>`));
    else if(S.addKind==='voice')fw.append(el(`<div class="curmedia" style="margin-top:10px"><audio controls src="${url}" style="width:100%"></audio></div>`));
    else fw.append(el(`<div class="curmedia" style="margin-top:10px"><img src="${url}" style="width:100%;border-radius:10px"/></div>`));}
}
function mountStage(url){
  const wrap=$('#stagewrap');wrap.innerHTML='';
  const stage=el(`<div class="stage" id="stage"><img src="${url}" draggable="false"/></div>`);
  wrap.append(stage);wrap.append(el('<p class="footnote" style="text-align:left;margin-top:6px">Drag across each face to mark who’s there.</p>'));
  enableTagging(stage);renderTags();
}
function enableTagging(stage){
  let start=null,preview=null;
  const pt=(ev)=>{const r=stage.getBoundingClientRect();return{x:(ev.clientX-r.left)/r.width,y:(ev.clientY-r.top)/r.height};};
  const finish=()=>{if(!preview)return;const b=preview._box;preview.remove();preview=null;if(b&&b.w>0.03&&b.h>0.03)TAGS.push({box:b,name:''});renderTags();};
  stage.addEventListener('pointerdown',(ev)=>{if(ev.target.closest('.box'))return;ev.preventDefault();start=pt(ev);preview=el('<div class="box"></div>');stage.append(preview);try{stage.setPointerCapture(ev.pointerId);}catch(e){}});
  stage.addEventListener('pointermove',(ev)=>{if(!preview)return;const p=pt(ev);const x=Math.min(p.x,start.x),y=Math.min(p.y,start.y),w=Math.abs(p.x-start.x),h=Math.abs(p.y-start.y);Object.assign(preview.style,{left:x*100+'%',top:y*100+'%',width:w*100+'%',height:h*100+'%'});preview._box={x,y,w,h};});
  stage.addEventListener('pointerup',finish);stage.addEventListener('pointercancel',finish);stage.addEventListener('lostpointercapture',finish);
}
function renderTags(){
  const stage=$('#stage');
  if(stage){stage.querySelectorAll('.box').forEach(b=>b.remove());
    TAGS.forEach((t,i)=>{const b=el(`<div class="box"><b>${i+1}</b><span class="del">×</span></div>`);
      Object.assign(b.style,{left:t.box.x*100+'%',top:t.box.y*100+'%',width:t.box.w*100+'%',height:t.box.h*100+'%'});
      b.querySelector('.del').onclick=(e)=>{e.stopPropagation();TAGS.splice(i,1);renderTags();};stage.append(b);});}
  const list=$('#taglist');if(!list)return;
  list.innerHTML=TAGS.length?'<div class="eyebrow" style="margin:8px 0 2px">Faces (optional names)</div>':'';
  TAGS.forEach((t,i)=>{const row=el(`<div class="tagrow"><div class="num">${i+1}</div><input type="text" list="people-list" placeholder="Name this face" value="${esc(t.name)}"/><button class="x">remove</button></div>`);
    row.querySelector('input').oninput=(e)=>{TAGS[i].name=e.target.value;};
    row.querySelector('.x').onclick=()=>{TAGS.splice(i,1);renderTags();};list.append(row);});
}
async function submitContent(){
  const m=$('#cmsg'),K=KINDS[S.addKind];
  if(K.file&&!NEWFILE)return showMsg(m,'err','Choose a file first.');
  if(!K.file&&!$('#story').value.trim())return showMsg(m,'err','Write the memory first.');
  const btn=$('#csave');btn.disabled=true;const old=btn.textContent;btn.innerHTML='<span class="spin"></span> Sending…';
  try{
    let path=null;if(K.file&&NEWFILE)path=await uploadFile(NEWFILE);
    const meta={};const w=$('#when').value.trim(),p=$('#where').value.trim();if(w)meta.when=w;if(p)meta.where=p;
    const art=await sb.from('artefacts').insert({kind:S.addKind,storage_path:path,body:$('#story').value.trim()||null,
      contributor_user:S.user.id,certainty:$('#certainty').value,status:'in_review',metadata:meta}).select('id').single();
    if(art.error)throw art.error;
    const subj=new Map();
    for(const x of S.addCtx){let pid=null;const known=personById(x);if(known)pid=known.id;else{const nm=typeof x==='string'?x.trim():'';if(nm)pid=await ensurePerson(nm);}if(pid)subj.set(pid,{artefact_id:art.data.id,person_id:pid,detail:null});}
    for(const t of TAGS){if(t.name.trim()){const pid=await ensurePerson(t.name);subj.set(pid,{artefact_id:art.data.id,person_id:pid,detail:t.box});}}
    if(subj.size){const s=await sb.from('artefact_subjects').insert([...subj.values()]);if(s.error)throw s.error;}
    await loadAll();
    showMsg(m,'ok','Sent to the queue. '+(S.isKeeper?'Open Review to light it up.':'A keeper will review it soon.'));
    setTimeout(()=>{S.addCtx=[];S.tab=S.isKeeper?'review':'forest';paint();},1000);
  }catch(err){showMsg(m,'err',err.message||'Something went wrong.');btn.disabled=false;btn.textContent=old;}
}

// ---------- REVIEW ----------
async function viewReview(root){
  root.append(el(`<div class="card"><div class="eyebrow">Keeper</div><h2 class="disp">Waiting for you</h2>
    <p class="lede">Nothing reaches the children’s forest until you approve it.</p><div id="queue"><div class="empty">Looking…</div></div></div>`));
  const {data,error}=await sb.from('artefacts')
    .select('id,kind,body,metadata,certainty,storage_path,contributor_user,created_at, artefact_subjects(people(display_name))')
    .eq('status','in_review').order('created_at',{ascending:false});
  const q=$('#queue');
  if(error){q.innerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  if(!data.length){q.innerHTML='<div class="empty">The queue is empty.</div>';return;}
  q.innerHTML='';
  for(const a of data){
    const url=a.storage_path?await signed(a.storage_path):'';
    const isImg=(a.kind==='photo'||a.kind==='object');
    const names=(a.artefact_subjects||[]).map(s=>s.people?.display_name).filter(Boolean);
    const card=el(`<div class="mem">${isImg&&url?`<img class="th" src="${url}"/>`:`<div class="th">${esc(a.kind)}</div>`}
      <div class="mt" style="flex:1">${a.body?'<b>'+esc(a.body.slice(0,90))+'</b><br>':''}${esc([a.metadata?.when,a.metadata?.where].filter(Boolean).join(' · '))}
      <div class="chips">${names.map(n=>'<span class="chip">'+esc(n)+'</span>').join('')||'<span class="chip" style="opacity:.6">no one tagged</span>'}</div>
      <div class="act"><button class="gold" data-go="1">Light it up ✦</button><button data-edit="1">Edit</button><button class="danger" data-del="1">Delete</button></div></div></div>`);
    card.querySelector('[data-edit]').onclick=()=>openEditArtefact(a.id);
    card.querySelector('[data-go]').onclick=async(e)=>{e.target.disabled=true;e.target.innerHTML='<span class="spin"></span>';
      const {error}=await sb.from('artefacts').update({status:'published',published_at:new Date().toISOString()}).eq('id',a.id);
      if(error)e.target.textContent=error.message;else{await loadAll();card.style.transition='.4s';card.style.opacity='0';setTimeout(()=>card.remove(),400);}};
    card.querySelector('[data-del]').onclick=async()=>{if(!confirm('Delete this submission?'))return;
      await sb.from('artefact_subjects').delete().eq('artefact_id',a.id);await sb.from('artefacts').delete().eq('id',a.id);
      if(a.storage_path)try{await sb.storage.from('family').remove([a.storage_path]);}catch(e){}
      card.style.opacity='0';setTimeout(()=>card.remove(),300);};
    q.append(card);
  }
}

// ---------- PLACES ----------
const parseYear=(t)=>{const m=String(t||'').match(/\d{4}/);return m?parseInt(m[0]):NaN;};
function artPeople(a){return (a.artefact_subjects||[]).map(s=>s.people&&s.people.display_name).filter(Boolean);}
function artTitle(a){return a.body?a.body.replace(/\s+/g,' ').slice(0,70)+(a.body.length>70?'…':''):('A '+(a.kind||'memory'));}

function bgThumb(node,path){ signed(path).then(u=>{ if(u){ node.style.backgroundImage=`url(${u})`; node.textContent=''; } }); }
function peopleChips(ppl){ return ppl.length?'<div class="chips">'+ppl.slice(0,10).map(n=>`<span class="chip" data-n="${esc(n)}">${esc(n)}</span>`).join('')+'</div>':''; }
function wireChips(row){ row.querySelectorAll('[data-n]').forEach(c=>{const p=S.people.find(x=>x.display_name===c.dataset.n);if(p)c.onclick=()=>openPerson(p.id);}); }

function viewPlaces(root){
  const card=el(`<div class="card"><div class="eyebrow">Where · the “where” door</div><h2 class="disp">Places</h2>
    <p class="lede">Every place your photos and stories name, and who was there. Built straight from what you upload.</p><div id="pl"></div></div>`);
  root.append(card);const l=$('#pl',card);
  const map=new Map();
  S.artefacts.forEach(a=>{ const w=((a.metadata&&a.metadata.where)||'').trim(); if(!w)return; const k=w.toLowerCase();
    if(!map.has(k))map.set(k,{name:w,arts:[],people:new Set()}); const o=map.get(k);
    o.arts.push(a); artPeople(a).forEach(n=>o.people.add(n)); });
  const list=[...map.values()].sort((a,b)=>b.arts.length-a.arts.length||a.name.localeCompare(b.name));
  if(!list.length){l.innerHTML='<div class="empty">No places yet. Add a photo or story with a “where”, and it appears here.</div>';return;}
  list.forEach(pl=>{
    const thumbs=pl.arts.filter(a=>(a.kind==='photo'||a.kind==='object')&&a.storage_path).slice(0,5);
    const row=el(`<div class="listrow"><b>${esc(pl.name)}</b> <span class="s">· ${pl.arts.length} ${pl.arts.length===1?'memory':'memories'}</span>
      <div class="thumbs" style="display:flex;gap:6px;margin:7px 0"></div>${peopleChips([...pl.people])}</div>`);
    const tw=row.querySelector('.thumbs');
    thumbs.forEach(a=>{const t=el('<div class="phimg" style="width:46px;height:46px;cursor:pointer"></div>');t.onclick=()=>openEditArtefact(a.id);tw.append(t);bgThumb(t,a.storage_path);});
    if(!thumbs.length)tw.remove();
    wireChips(row); l.append(row);
  });
}
// ---------- TIMELINE ----------
function viewTimeline(root){
  const card=el(`<div class="card"><div class="eyebrow">When · the “when” door</div><h2 class="disp">Timeline</h2>
    <p class="lede">Every photo and story with a rough date, in order. Built straight from what you upload.</p><div id="tl"></div></div>`);
  root.append(card);const l=$('#tl',card);
  const items=S.artefacts.filter(a=>a.metadata&&a.metadata.when).map(a=>({a,year:parseYear(a.metadata.when)}));
  items.sort((x,y)=>(isNaN(x.year)?9999:x.year)-(isNaN(y.year)?9999:y.year));
  if(!items.length){l.innerHTML='<div class="empty">No dated memories yet. Add a photo or story with a rough “when”, and it appears here.</div>';return;}
  items.forEach(({a})=>{
    const isImg=(a.kind==='photo'||a.kind==='object')&&a.storage_path;
    const row=el(`<div class="mem">
      ${isImg?`<div class="phimg" style="width:54px;height:54px"></div>`:`<div class="th">${esc(a.kind)}</div>`}
      <div class="mt" style="flex:1"><b>${esc(a.metadata.when)}</b>${a.metadata.where?' · '+esc(a.metadata.where):''}<br>${esc(artTitle(a))}${peopleChips(artPeople(a))}</div></div>`);
    if(isImg)bgThumb(row.querySelector('.phimg'),a.storage_path);
    row.style.cursor='pointer'; row.addEventListener('click',(e)=>{ if(!e.target.closest('[data-n]'))openEditArtefact(a.id); });
    wireChips(row); l.append(row);
  });
}

function showMsg(node,kind,text){node.className='msg show '+kind;node.textContent=text;}
init();
</script>
