<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Edit details — The Living Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#05080f; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff;
    --leaf:#8fd6a0;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center; gap:34px; padding:30px 16px 70px;
    background:radial-gradient(140% 100% at 50% 0%, #12233c 0%, #0a1526 44%, #05080f 100%);
    -webkit-user-select:none; user-select:none; flex-wrap:wrap; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .mono{ font-family:'Azeret Mono',monospace; }
  [dir="rtl"] .serif, [dir="rtl"] .name-input, [dir="rtl"] .disp{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* device viewport control */
  .stagewrap{ display:flex; flex-direction:column; align-items:center; gap:12px; }
  .stagewrap .lbl{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:#6f83a3; }
  .device{ position:relative; width:390px; height:800px; border-radius:40px; overflow:hidden; flex:0 0 auto;
    background:#05080f; box-shadow:0 40px 110px -50px #000, 0 0 0 9px #14141b, 0 0 0 10px #2b2b34;
    transition:width .4s cubic-bezier(.16,.8,.28,1); }
  .device.tablet{ width:720px; height:800px; }

  /* ===== growing-vine atmosphere ===== */
  .atmo{ position:absolute; inset:0; z-index:0; width:100%; height:100%; }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 75% at 50% 8%, rgba(143,214,160,.08), transparent 42%),
      radial-gradient(120% 90% at 50% 40%, transparent 34%, rgba(5,8,15,.62) 100%); }

  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ padding:0 20px calc(40px + env(safe-area-inset-bottom)); }

  /* ===== top bar ===== */
  .topbar{ position:sticky; top:0; z-index:8; display:flex; align-items:center; gap:10px;
    padding:16px 20px 12px; background:linear-gradient(to bottom, rgba(6,11,20,.86), rgba(6,11,20,.4) 70%, transparent);
    backdrop-filter:blur(6px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer;
    border:1px solid var(--hair); background:rgba(10,20,34,.55); color:var(--cream); transition:border-color .2s,background .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .ibtn svg{ width:18px; height:18px; }
  .ttl{ flex:1; min-width:0; text-align:center; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:16px; color:#fbf5e8; margin-top:1px; }

  /* keeper reassurance ribbon */
  .keeper-note{ display:flex; align-items:center; gap:9px; margin:2px 20px 0; padding:9px 13px; border-radius:11px;
    background:rgba(201,162,255,.09); border:1px solid rgba(201,162,255,.28); }
  .keeper-note svg{ width:15px; height:15px; color:var(--edit); flex:0 0 auto; }
  .keeper-note span{ font-size:11.5px; color:#cbbce6; line-height:1.35; }

  /* ===== HERO: face + light ring of categories ===== */
  .hero{ position:relative; margin:40px auto 0; width:300px; height:300px; }
  .ring-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; z-index:1; }
  .facewrap{ position:absolute; inset:78px; z-index:3; border-radius:50%; }
  .face{ width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative;
    border:1px solid rgba(255,244,214,.9);
    box-shadow:0 0 26px -2px rgba(255,232,180,.6), 0 0 70px -12px rgba(243,205,132,.45), inset 0 0 0 4px rgba(5,8,15,.6); }
  .face svg, .face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .face .changef{ position:absolute; inset-inline-end:6px; inset-block-end:6px; z-index:4; width:36px; height:36px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer; color:#1a0f2e; border:2px solid #05080f;
    background:linear-gradient(180deg,var(--edit-hi),var(--edit)); box-shadow:0 4px 12px -2px #000; }
  .face .changef svg{ width:17px; height:17px; }
  .hero .who{ position:absolute; z-index:4; inset-inline:0; bottom:-8px; text-align:center; pointer-events:none; }

  /* category points around the ring */
  .cat{ position:absolute; z-index:5; width:52px; transform:translate(-50%,-50%); text-align:center; cursor:pointer;
    background:none; border:none; color:inherit; }
  .cat .bead{ width:46px; height:46px; margin:0 auto; border-radius:50%; display:grid; place-items:center; position:relative;
    background:rgba(12,22,38,.72); border:1px solid var(--hair); backdrop-filter:blur(4px);
    transition:transform .22s cubic-bezier(.16,.8,.28,1), border-color .22s, box-shadow .22s; }
  .cat .bead svg{ width:20px; height:20px; color:var(--gold-hi); }
  .cat .bead::after{ content:""; position:absolute; inset:-3px; border-radius:50%; opacity:0;
    box-shadow:0 0 16px 2px rgba(243,205,132,.6); transition:opacity .22s; }
  .cat .lab{ font-family:'Azeret Mono',monospace; font-size:8px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin-top:6px; line-height:1.1; }
  .cat:hover .bead, .cat.on .bead{ transform:scale(1.09); border-color:rgba(243,205,132,.6); }
  .cat.on .bead{ background:rgba(243,205,132,.16); }
  .cat:hover .bead::after, .cat.on .bead::after{ opacity:1; }
  .cat:focus-visible .bead{ outline:2px solid var(--gold-hi); outline-offset:3px; }
  .cat.cool .bead svg{ color:var(--cool-hi); }
  .cat.cool:hover .bead, .cat.cool.on .bead{ border-color:rgba(127,180,216,.6); }
  .cat.cool.on .bead{ background:rgba(127,180,216,.16); }
  .cat.cool .bead::after{ box-shadow:0 0 16px 2px rgba(127,180,216,.6); }
  /* pending dot on a category */
  .cat .pin{ position:absolute; top:-1px; inset-inline-end:2px; width:13px; height:13px; border-radius:50%;
    background:var(--edit); border:2px solid #05080f; display:none; }
  .cat.has-pending .pin{ display:block; }

  /* ===== the open editor panel ===== */
  .editor{ margin-top:26px; }
  .ed-head{ display:flex; align-items:center; gap:11px; margin-bottom:14px; }
  .ed-head .ic{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; flex:0 0 auto;
    background:rgba(243,205,132,.12); border:1px solid rgba(243,205,132,.3); }
  .ed-head .ic svg{ width:17px; height:17px; color:var(--gold-hi); }
  .ed-head.cool .ic{ background:rgba(127,180,216,.12); border-color:rgba(127,180,216,.3); }
  .ed-head.cool .ic svg{ color:var(--cool-hi); }
  .ed-head .tt{ flex:1; }
  .ed-head .tt .h{ font-family:'Newsreader',serif; font-size:20px; color:#fbf5e8; }
  .ed-head .tt .s{ font-size:11.5px; color:var(--muted); margin-top:1px; }

  /* a field block */
  .field{ margin-bottom:14px; }
  .field > label{ display:block; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:7px; }
  .inp{ width:100%; background:rgba(8,16,28,.66); border:1px solid var(--hair); border-radius:12px; padding:13px 14px;
    color:var(--cream); font-family:'Newsreader',serif; font-size:17px; transition:border-color .2s; }
  .inp:focus{ outline:none; border-color:rgba(243,205,132,.55); }
  .inp::placeholder{ color:#5f7089; }
  textarea.inp{ resize:vertical; line-height:1.5; min-height:84px; }

  /* multilingual reveal */
  .mlrow{ display:flex; align-items:center; gap:8px; }
  .mlrow .inp{ flex:1; }
  .mladd{ flex:0 0 auto; height:44px; padding:0 11px; border-radius:11px; cursor:pointer; display:flex; align-items:center; gap:6px;
    background:rgba(243,205,132,.1); border:1px solid rgba(243,205,132,.32); color:var(--gold-hi);
    font-family:'Azeret Mono',monospace; font-size:11px; }
  .mladd svg{ width:15px; height:15px; }
  .mlvars{ margin-top:9px; display:none; flex-direction:column; gap:8px; padding-inline-start:12px;
    border-inline-start:2px solid rgba(243,205,132,.25); }
  .mlvars.open{ display:flex; }
  .mlvar{ display:flex; align-items:center; gap:9px; }
  .mlvar .tag{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--gold);
    width:26px; flex:0 0 auto; text-transform:uppercase; }
  .mlvar .inp{ font-size:15px; padding:10px 12px; }
  .mlvar.rtl .inp{ direction:rtl; text-align:right; }

  /* chip lists (nicknames, places, custom) */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:99px;
    background:rgba(243,205,132,.09); border:1px solid rgba(243,205,132,.3); font-size:13.5px; color:var(--cream);
    font-family:'Newsreader',serif; }
  .chip .x{ width:15px; height:15px; color:var(--muted); cursor:pointer; }
  .chip.add{ background:transparent; border-style:dashed; border-color:var(--hair); color:var(--muted); cursor:pointer; font-family:'Hanken Grotesk',sans-serif; font-size:12.5px; }
  .chip.add:hover{ border-color:rgba(243,205,132,.5); color:var(--gold-hi); }
  .chip.cool{ background:rgba(127,180,216,.09); border-color:rgba(127,180,216,.3); }
  .chip .ord{ font-family:'Azeret Mono',monospace; font-size:9px; color:var(--cool); }

  /* dates row */
  .row2{ display:flex; gap:10px; } .row2 > *{ flex:1; }
  .seg{ display:flex; gap:5px; background:rgba(8,16,28,.6); border:1px solid var(--hair); border-radius:11px; padding:4px; }
  .seg button{ flex:1; border:none; background:transparent; color:var(--muted); cursor:pointer; padding:8px 4px; border-radius:8px;
    font-family:'Hanken Grotesk',sans-serif; font-size:11px; }
  .seg button.on{ background:rgba(127,180,216,.18); color:var(--cool-hi); }
  .toggle{ display:flex; align-items:center; gap:10px; }
  .sw{ width:42px; height:24px; border-radius:99px; background:rgba(255,255,255,.12); position:relative; cursor:pointer; transition:background .2s; flex:0 0 auto; }
  .sw::after{ content:""; position:absolute; top:2px; inset-inline-start:2px; width:20px; height:20px; border-radius:50%; background:#dfe7f2; transition:transform .2s; }
  .sw.on{ background:rgba(127,180,216,.5); } .sw.on::after{ transform:translateX(18px); }
  [dir="rtl"] .sw.on::after{ transform:translateX(-18px); }

  /* pending chip */
  .pending{ display:none; align-items:center; gap:8px; margin-top:12px; padding:9px 12px; border-radius:11px;
    background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.34); font-size:12px; color:var(--edit-hi); }
  .pending.show{ display:inline-flex; }
  .pending .sp{ width:12px; height:12px; border-radius:50%; border:2px solid rgba(201,162,255,.35); border-top-color:var(--edit); animation:spin 1s linear infinite; flex:0 0 auto; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  /* keeper inline approve/decline (shown when viewer is keeper) */
  .keeperbar{ display:none; align-items:center; gap:8px; margin-top:10px; }
  body.is-keeper .pending.show + .keeperbar{ display:flex; }
  .kbtn{ display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:9px; cursor:pointer; font-size:12px; font-weight:600;
    font-family:'Hanken Grotesk',sans-serif; border:1px solid transparent; }
  .kbtn.ok{ background:rgba(143,214,160,.16); border-color:rgba(143,214,160,.4); color:#a9e6ba; }
  .kbtn.no{ background:transparent; border-color:var(--hair); color:var(--muted); }
  .kbtn svg{ width:13px; height:13px; }
  .was{ font-size:11px; color:var(--muted); margin-inline-start:auto; }
  .was b{ color:var(--edit-hi); font-weight:500; }

  .savebar{ margin-top:20px; display:flex; gap:10px; }
  .btn{ flex:1; padding:14px; border-radius:13px; font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .btn.ghost{ background:transparent; border-color:var(--hair); color:var(--cream); }
  .btn.primary{ background:linear-gradient(180deg,var(--edit-hi),var(--edit)); color:#1a0f2e; }
  .btn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }

  /* add-a-detail picker */
  .adddetail{ margin-top:24px; }
  .adddetail .plus{ width:100%; display:flex; align-items:center; justify-content:center; gap:9px; padding:14px; border-radius:14px;
    background:rgba(201,162,255,.07); border:1px dashed rgba(201,162,255,.4); color:var(--edit-hi); cursor:pointer;
    font-family:'Newsreader',serif; font-size:16px; }
  .adddetail .plus svg{ width:18px; height:18px; }

  .foot{ margin-top:26px; text-align:center; }
  .foot .l{ font-family:'Newsreader',serif; font-style:italic; font-size:13.5px; color:rgba(143,214,160,.6); }

  /* ===== overlays ===== */
  .scrim{ position:absolute; inset:0; z-index:30; background:rgba(4,7,14,.66); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; z-index:31; inset-inline:0; bottom:0; background:linear-gradient(180deg,#0f1e33,#081120);
    border:1px solid var(--hair); border-bottom:none; border-radius:22px 22px 0 0; padding:10px 20px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(103%); transition:transform .34s cubic-bezier(.16,.8,.28,1); box-shadow:0 -24px 70px -30px #000; max-height:88%; overflow-y:auto; scrollbar-width:none; }
  .sheet::-webkit-scrollbar{ display:none; }
  .sheet.show{ transform:translateY(0); }
  .grip{ width:40px; height:4px; border-radius:99px; background:rgba(255,255,255,.2); margin:6px auto 15px; }
  .sheet h3{ font-family:'Newsreader',serif; font-weight:400; font-size:21px; color:#fbf5e8; margin-bottom:4px; }
  .sheet .sub{ font-size:12.5px; color:var(--muted); margin-bottom:16px; line-height:1.45; }

  .lang-opt{ display:flex; align-items:center; gap:14px; width:100%; padding:14px 15px; border-radius:14px;
    background:var(--panel); border:1px solid var(--hair); color:var(--cream); cursor:pointer; margin-bottom:9px; text-align:start; }
  .lang-opt.on{ border-color:rgba(243,205,132,.55); background:rgba(243,205,132,.08); }
  .lang-opt .native{ font-family:'Newsreader',serif; font-size:18px; } .lang-opt .en{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .lang-opt .tick{ margin-inline-start:auto; color:var(--gold); opacity:0; } .lang-opt.on .tick{ opacity:1; } .lang-opt .tick svg{ width:18px; height:18px; }

  /* change-face gallery + crop */
  .gal{ display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:16px; }
  .gal .g{ position:relative; aspect-ratio:1; border-radius:11px; overflow:hidden; cursor:pointer; border:2px solid transparent; }
  .gal .g svg{ width:100%; height:100%; }
  .gal .g.on{ border-color:var(--edit); }
  .gal .g .tagbox{ position:absolute; border:2px solid var(--gold-hi); border-radius:4px; box-shadow:0 0 0 400px rgba(5,8,15,.4); }
  .cropstage{ position:relative; width:100%; aspect-ratio:1; max-width:260px; margin:0 auto 8px; border-radius:16px; overflow:hidden;
    background:#0a1120; touch-action:none; }
  .cropstage .cimg{ position:absolute; inset:0; }
  .cropstage .cimg svg{ width:100%; height:100%; }
  .cropstage .cmask{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at center, transparent 46%, rgba(5,8,15,.72) 47%);
    box-shadow:none; }
  .cropstage .cring{ position:absolute; inset:0; pointer-events:none; }
  .cropstage .cring::after{ content:""; position:absolute; inset:calc(50% - 46%); border-radius:50%; border:1.5px solid rgba(255,244,214,.9); box-shadow:0 0 18px rgba(255,232,180,.5); }
  .zoomrow{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .zoomrow svg{ width:16px; height:16px; color:var(--muted); flex:0 0 auto; }
  input[type=range]{ -webkit-appearance:none; appearance:none; flex:1; height:4px; border-radius:99px; background:rgba(255,255,255,.16); }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--edit-hi); cursor:pointer; box-shadow:0 0 10px rgba(201,162,255,.6); }
  input[type=range]::-moz-range-thumb{ width:18px; height:18px; border:none; border-radius:50%; background:var(--edit-hi); cursor:pointer; }

  .add-opt{ display:flex; align-items:center; gap:12px; width:100%; padding:13px 14px; border-radius:13px;
    background:var(--panel); border:1px solid var(--hair); color:var(--cream); cursor:pointer; margin-bottom:8px; text-align:start; }
  .add-opt:hover{ border-color:rgba(201,162,255,.45); }
  .add-opt .ic{ width:32px; height:32px; border-radius:9px; background:rgba(201,162,255,.12); display:grid; place-items:center; flex:0 0 auto; }
  .add-opt .ic svg{ width:16px; height:16px; color:var(--edit-hi); }
  .add-opt .nm{ font-family:'Newsreader',serif; font-size:16px; } .add-opt .ds{ font-size:11.5px; color:var(--muted); margin-top:1px; }

  /* toast */
  .toast{ position:absolute; z-index:40; left:50%; transform:translate(-50%,20px); bottom:24px; display:flex; align-items:center; gap:10px;
    padding:12px 17px; border-radius:99px; background:rgba(28,18,46,.92); backdrop-filter:blur(12px); border:1px solid rgba(201,162,255,.45);
    color:var(--edit-soft); font-size:13px; opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; box-shadow:0 18px 44px -18px #000; max-width:88%; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .fl{ width:8px; height:8px; border-radius:50%; background:var(--edit); box-shadow:0 0 10px 2px var(--edit); flex:0 0 auto; }

  @media (prefers-reduced-motion: reduce){ .pending .sp{ animation:none; } }
</style>
</head>
<body class="is-keeper">
  <!-- MOBILE -->
  <div class="stagewrap">
    <div class="lbl" id="lblM">Mobile · 390</div>
    <div class="device" id="device">
      <canvas class="atmo" aria-hidden="true"></canvas>
      <div class="atmo-veil"></div>
      <div class="screen">
        <div class="topbar" id="topbar"></div>
        <div class="keeper-note" id="keeperNote"></div>
        <div class="pad" id="pad"></div>
      </div>
      <div class="scrim" id="scrim"></div>
      <section class="sheet" id="langSheet" role="dialog" aria-modal="true" aria-label="Language"></section>
      <section class="sheet" id="faceSheet" role="dialog" aria-modal="true" aria-label="Change the face"></section>
      <section class="sheet" id="addSheet" role="dialog" aria-modal="true" aria-label="Add a detail"></section>
      <div class="toast" id="toast"><span class="fl"></span><span id="toastMsg"></span></div>
    </div>
    <div class="lbl" style="cursor:pointer" id="toTablet">↔ preview tablet width</div>
  </div>

  <script>
  (function(){
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

    /* ---------- per-language UI strings ---------- */
    const T={
      en:{ dir:'ltr', native:'English', label:'English',
        eyebrow:'Edit details', title:'Rita Golnick',
        keeper:'Nothing reaches the family until the keeper approves it.',
        cats:{ names:'Names', dates:'Dates', places:'Places', kin:'Relations', life:'Life', gender:'Gender', custom:'Details', sources:'Sources' },
        display:'Display name', addlang:'other languages', given:'Given', family:'Family', patronymic:'Patronymic',
        nicks:'Nicknames & pet names', addnick:'add a nickname',
        birth:'Born', death:'Died', living:'Still living', precise:'Precision',
        prec:['exact','month','year','approx','unknown'],
        pbirth:'Place of birth', lived:'Places lived', addplace:'add a home',
        addkin:'Add a connection', kinsub:'Feeds the family graph — kept light.',
        about:'About', occupation:'Occupation', langspoken:'Languages spoken',
        genderq:'Gender', gendersub:'Helps translate names correctly.',
        gopts:['She','He','They','Prefer not to say'],
        adddetail:'Add a detail', adddetailsub:'Record anything — a saying, a recipe, a medal.',
        source:'Add a source or note',
        send:'Send to the keeper', cancel:'Cancel', waiting:'Waiting for the keeper', sent:'Sent to the keeper',
        changeface:'Change the face', facesub:'Pick a photo they\u2019re tagged in, then fine-tune the round crop.',
        zoom:'Zoom', preview:'Preview', save:'Save', suggesting:'You\u2019re suggesting an edit',

    /* editor bodies per category (representative open states) */

    /* ---------- ring geometry ---------- */
    function ringHTML(){
      const cx=150, cy=150, R=130;
      const beads = CATS.map((c,i)=>{
        const a = -Math.PI/2 + i*(Math.PI*2/CATS.length);
        const x = cx + R*Math.cos(a), y = cy + R*Math.sin(a);
        return `<button class="cat ${c.kind==='cool'?'cool':''} ${c.id===openCat?'on':''} ${c.pending?'has-pending':''}" data-cat="${c.id}" style="left:${x}px;top:${y}px" aria-label="${d().cats[c.id]}">
          <span class="bead">${sv(I[c.id])}<span class="pin"></span></span><span class="lab">${d().cats[c.id]}</span></button>`;

      // faint connecting ring arc
      return `<svg class="ring-svg" viewBox="0 0 300 300"><circle cx="150" cy="150" r="130" fill="none" stroke="rgba(243,205,132,.14)" stroke-width="1"/>

    function openFace(){ const L=d();

      $('#faceSheet').innerHTML=`<div class="grip"></div><h3>${L.changeface}</h3><div class="sub">${L.facesub}</div>
        <div class="gal">${gals}</div>
        <div class="cropstage" id="cropStage"><div class="cimg" id="cimg">${galSVG(2)}</div><div class="cmask"></div><div class="cring"></div></div>

      // crop interactions
      let z=140,px=50,py=44,drag=false,sx,sy,bx,by; const img=$('#cimg'); const st=$('#cropStage');
      function apply(){ img.style.transform=`translate(-50%,-50%) scale(${z/100})`; img.style.left=px+'%'; img.style.top=py+'%'; img.style.position='absolute'; img.style.width='100%'; img.style.height='100%'; }
      img.style.transformOrigin='center'; apply();
      $('#zoom').oninput=e=>{ z=+e.target.value; apply(); };
      st.addEventListener('pointerdown',e=>{ drag=true; sx=e.clientX; sy=e.clientY; bx=px; by=py; st.setPointerCapture(e.pointerId); });
      st.addEventListener('pointermove',e=>{ if(!drag)return; px=bx+(e.clientX-sx)/st.clientWidth*100; py=by+(e.clientY-sy)/st.clientHeight*100; apply(); });
      st.addEventListener('pointerup',()=>drag=false);

      $('#faceSheet [data-close]').onclick=hide;

    }
    function openAdd(){ const L=d();

          <label>${L.detailLabel}</label><input class="inp" placeholder="${L.detailLabel}" style="margin-bottom:10px">
          <label>${L.detailValue}</label><input class="inp" placeholder="${L.detailValue}">
          <div class="savebar"><button class="btn ghost" data-close>${L.cancel}</button><button class="btn primary" data-addsend>${L.send}</button></div>
        </div>`;
      $$('#addSheet [data-addopt]').forEach(b=>b.onclick=()=>{ $('#customFields').style.display='block'; b.style.borderColor='rgba(201,162,255,.5)'; });
      const cl=$('#addSheet [data-close]'); if(cl) cl.onclick=hide;
      const as=$('#addSheet [data-addsend]'); if(as) as.onclick=()=>{ hide(); markPending('custom'); toast(L.sent); };
      show($('#addSheet'));
    }

    function markPending(catId){ const c=CATS.find(x=>x.id===catId); if(c) c.pending=true; if(openCat===catId){ const p=$('#pend'); if(p) p.classList.add('show'); } render(); }

    /* ---------- wire ---------- */
    function wire(){
      $('#langBtn').onclick=openLang;
      const cf=$('#changeFace'); if(cf) cf.onclick=openFace;
      $$('.cat').forEach(c=>c.onclick=()=>{ openCat=c.dataset.cat; render(); });
      $$('.mladd').forEach(b=>b.onclick=()=>{ const v=document.getElementById(b.dataset.ml); if(v) v.classList.toggle('open'); });
      $$('[data-sw]').forEach(s=>s.onclick=()=>s.classList.toggle('on'));
      $$('.seg button').forEach(b=>b.onclick=()=>{ [...b.parentElement.children].forEach(x=>x.classList.remove('on')); b.classList.add('on'); });
      const add=$('[data-add]'); if(add) add.onclick=openAdd;
      const send=$('#send'); if(send) send.onclick=()=>{ markPending(openCat); toast(d().sent); };
      const rev=$('#revert'); if(rev) rev.onclick=()=>toast(d().cancel);
      $$('.kbtn.ok').forEach(b=>b.onclick=()=>{ const c=CATS.find(x=>x.id===openCat); if(c) c.pending=false; toast(d().approve+' ✓'); render(); });
      $$('.kbtn.no').forEach(b=>b.onclick=()=>{ const c=CATS.find(x=>x.id===openCat); if(c) c.pending=false; toast(d().decline); render(); });
    }

    /* ---------- tablet toggle ---------- */
    let tablet=false;
    $('#toTablet').onclick=()=>{ tablet=!tablet; $('#device').classList.toggle('tablet',tablet);
      $('#lblM').textContent=tablet?'Tablet · 720':'Mobile · 390'; $('#toTablet').textContent=tablet?'↔ preview mobile width':'↔ preview tablet width'; };

    /* ========== GROWING-VINE ATMOSPHERE ========== */
    (function vines(){
      const cv=$('.atmo'), ctx=cv.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
      function resize(){ W=cv.clientWidth; H=cv.clientHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); build(); }
      new ResizeObserver(resize).observe(cv);
      // build a set of vines: each a path of points growing upward with side branches + glowing nodes
      let vines=[];
      const COL=[[143,214,160],[243,205,132],[127,180,216],[201,162,255]];
      function makeVine(x0){ const pts=[]; let x=x0,y=1.05, ang=-Math.PI/2+(Math.random()-.5)*.4;
        const n=Math.floor(Math.random()*5)+7;
        for(let i=0;i<n;i++){ pts.push({x,y}); ang+=(Math.random()-.5)*.6; const step=0.07+Math.random()*0.05; x+=Math.cos(ang)*step*0.5; y+=Math.sin(ang)*step; }
        return { pts, c:COL[(Math.random()*COL.length)|0], grow:0, gspd:0.0009+Math.random()*0.0008, sway:Math.random()*6.28, buds:pts.map(()=>Math.random()>.55) };
      }
      function build(){ vines=[]; const k=Math.max(3,Math.round(W/120)); for(let i=0;i<k;i++) vines.push(makeVine((i+0.5)/k + (Math.random()-.5)*0.12)); }
      resize();
      function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
        vines.forEach(v=>{ if(!reduce && v.grow<1) v.grow+=v.gspd;
          const g=reduce?1:v.grow, seg=(v.pts.length-1)*g, last=Math.floor(seg), frac=seg-last;
          const sway=reduce?0:Math.sin(t*0.25+v.sway)*0.012;
          const P=k=> ({ x:(v.pts[k].x+ (reduce?0:Math.sin(t*0.2+k*0.5+v.sway)*0.006*(k/ v.pts.length)))*W, y:v.pts[k].y*H });
          // stem
          ctx.strokeStyle=`rgba(${v.c[0]},${v.c[1]},${v.c[2]},0.16)`; ctx.lineWidth=1.4; ctx.beginPath();
          for(let i=0;i<=last;i++){ const p=P(i); i?ctx.lineTo(p.x,p.y+sway*H):ctx.moveTo(p.x,p.y); }
          if(last<v.pts.length-1){ const a=P(last), b=P(last+1); ctx.lineTo(a.x+(b.x-a.x)*frac, a.y+(b.y-a.y)*frac); } ctx.stroke();
          // glowing buds along grown part
          for(let i=0;i<=last;i++){ if(!v.buds[i]) continue; const p=P(i); const tw=reduce?0.7:(0.4+0.6*(0.5+0.5*Math.sin(t*1.2+i+v.sway)));
            const R=6+ (i===v.pts.length-1?4:0); const gr=ctx.createRadialGradient(p.x,p.y+sway*H,0,p.x,p.y+sway*H,R);
            gr.addColorStop(0,`rgba(${v.c[0]},${v.c[1]},${v.c[2]},${0.5*tw})`); gr.addColorStop(1,`rgba(${v.c[0]},${v.c[1]},${v.c[2]},0)`);
            ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(p.x,p.y+sway*H,R,0,6.2832); ctx.fill();
            ctx.fillStyle=`rgba(255,250,236,${0.7*tw})`; ctx.beginPath(); ctx.arc(p.x,p.y+sway*H,1.3,0,6.2832); ctx.fill(); }
        });
        ctx.globalCompositeOperation='source-over';
        if(!reduce) requestAnimationFrame(frame);
      }
      if(!reduce) requestAnimationFrame(frame); else frame(0);
    })();

    render();
  })();
  </script>
</body>
