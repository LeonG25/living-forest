      photos:n=>`${n} ${n===1?'photograph':'photographs'}`,
      kindleL:'How lit up are they', kindleR:(n)=>`${wordNum(n,'en')} of eight kindled`,
      another:'Another face', reel:'Go to their Reel',
      reelnote:'One more face, remembered.',
      lockK:'The game is sleeping', lockH:'No faces to name — yet',
      lockBody:'This game needs a memory that is tied to a <em>person</em>. Add someone to a photo or a story, and a face appears here to name.',
      needL:'It’s waiting for', invite:'Add a memory & tag who is in it',
      lockFoot:'The moment a memory names someone,<br>this game wakes on its own.',
      errK:'Something’s tangled', errH:'The faces are out of reach', errB:'The game couldn’t gather the memories just now. Give it another moment.', retry:'Try again',
      langtitle:'Language', langsub:'Titles, prompts and the whole game follow the language you choose.' },
    ru:{ dir:'ltr', native:'Русский', label:'Russian',
      tk:'Лицо · игра', tn:'Кто есть кто?',
      cluesEye:'Подсказка',
      clueK:'История · рассказал человек',
      qQ:'Итак — кто это?', qS:'Нажмите имя, в котором уверены.',
      hint:'Лицо остаётся скрытым, пока вы не назовёте его.',
      nqB:'Не он.', nqRest:'Прочтите воспоминание ещё раз — детали указывают на одного человека.',
      revEye:'Да — это он', revKindled:'Вы зажгли его Лицо',
      whyH:'Что его выдало',
      chipMemory:'В этом воспоминании',
      photos:n=>`${n} фото`,
      kindleL:'Насколько он озарён', kindleR:(n)=>`${wordNum(n,'ru')} из восьми зажжено`,
      another:'Ещё лицо', reel:'К его Плёнке',
      reelnote:'Ещё одно лицо — узнано.',
      lockK:'Игра спит', lockH:'Пока некого называть',
      lockBody:'Этой игре нужно воспоминание, связанное с <em>человеком</em>. Отметьте кого-то на фото или в истории — и здесь появится лицо, чтобы его назвать.',
      needL:'Ждёт', invite:'Добавить воспоминание и отметить, кто на нём',
      lockFoot:'Как только воспоминание кого-то назовёт,<br>игра проснётся сама.',
      errK:'Что-то запуталось', errH:'Лица недоступны', errB:'Игра не смогла собрать воспоминания сейчас. Попробуйте ещё раз.', retry:'Ещё раз',
      langtitle:'Язык', langsub:'Заголовки, вопросы и вся игра — на выбранном языке.' },
    he:{ dir:'rtl', native:'עברית', label:'Hebrew',
      tk:'פנים · משחק', tn:'מי זה מי?',
      cluesEye:'הרמז',
      clueK:'סיפור · מישהו סיפר לנו',
      qQ:'אז — מי זה?', qS:'הקישו על השם שאתם בטוחים בו.',
      hint:'הפנים נשארות מוסתרות עד שתנקבו בשם.',
      nqB:'לא הם.', nqRest:'קראו את הזיכרון שוב — הפרטים מצביעים על אדם אחד.',
      revEye:'כן — זה הם', revKindled:'הארתם את הפנים שלהם',
      whyH:'מה הסגיר אותם',
      chipMemory:'בזיכרון הזה',
      photos:n=>`${n} תצלומים`,
      kindleL:'כמה הם מוארים', kindleR:(n)=>`${wordNum(n,'he')} מתוך שמונה`,
      another:'פנים נוספות', reel:'אל הסרט שלהם',
      reelnote:'עוד פנים — נזכרו.',
      lockK:'המשחק ישן', lockH:'עדיין אין פנים לנקוב בשמן',
      lockBody:'המשחק הזה צריך זיכרון שקשור ל<em>אדם</em>. תייגו מישהו בתצלום או בסיפור, ופנים יופיעו כאן כדי לנקוב בשמן.',
      needL:'ממתין ל', invite:'הוסיפו זיכרון ותייגו מי בו',
      lockFoot:'ברגע שזיכרון נוקב בשם של מישהו,<br>המשחק יתעורר מעצמו.',
      errK:'משהו הסתבך', errH:'הפנים מחוץ להישג', errB:'המשחק לא הצליח לאסוף את הזיכרונות כרגע. נסו שוב בעוד רגע.', retry:'נסו שוב',
      langtitle:'שפה', langsub:'הכותרות, השאלות וכל המשחק — לפי השפה שתבחרו.' }
  };
  // small number words for the kindle line (1..8); falls back to the digit
  const NUMW={
    en:['zero','one','two','three','four','five','six','seven','eight'],
    ru:['ноль','один','два','три','четыре','пять','шесть','семь','восемь'],
    he:['אפס','אחד','שניים','שלושה','ארבעה','חמישה','שישה','שבעה','שמונה']
  };
  function wordNum(n,lang){ const a=NUMW[lang]||NUMW.en; return (n>=0&&n<a.length)?a[n]:String(n); }
  const d=()=>T[state.lang];

  const I={
    back:'M15 18l-6-6 6-6', backR:'M9 18l6-6-6-6',
    book:'<path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/><path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20"/>',
    quote:'<path d="M7 7h4v6H7zM13 7h4v6h-4z"/><path d="M7 13c0 3-1 4-3 4M13 13c0 3-1 4-3 4"/>',
    cam:'<path d="M4 8h3l2-2h6l2 2h3v11H4z"/><circle cx="12" cy="13" r="3.2"/>',
    check:'<path d="M20 6L9 17l-5-5"/>', x:'<path d="M6 6l12 12M18 6L6 18"/>',
    info:'<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>',
    reel:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/>',
    warn:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 4.3 2.5 18a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/>'
  };
  const sv=(p,w)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||1.6}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

  /* ---------- state ---------- */
  const state={ lang:'en', seed:null, round:null, subjects:{}, streak:0, done:false, firstTry:true, streakShown:false };

  /* ---------- data-driven census: how many memories each person is a subject of ---------- */
  async function loadSubjects(){
    try{
      const {data,error}=await sb.from('artefact_subjects').select('person_id');
      if(error||!data) return {};
      const t={}; data.forEach(s=>{ if(s.person_id) t[s.person_id]=(t[s.person_id]||0)+1; });
      return t;
    }catch(e){ return {}; }
  }
  function subjectCount(id){ return (id&&state.subjects[id])||0; }

  /* ---------- real "how lit up are they" for the revealed person (person-axis) ---------- */
  async function kindleOf(pid){
    if(!pid) return null;
    try{
      const {data:pf}=await sb.from('person_facts').select('field').eq('person_id',pid);
      const fields=new Set((pf||[]).map(r=>r.field));
      const has=arr=>arr.some(f=>fields.has(f));
      let rels=0;
      try{ const r=await sb.from('relationships').select('id',{count:'exact',head:true}).or('from_person.eq.'+pid+',to_person.eq.'+pid); rels=r.count||0; }catch(e){}
      const subs=subjectCount(pid);
      const facets=[
        has(['given','family','called','patronymic','maiden','honorific','nickname']),   // Name
        subs>0,                                                                            // Face
        has(['birth','birth_prec','death','living','gender','occupation','about','langspoken']), // Life
        fields.has('lived'),                                                               // Places
        subs>0,                                                                            // Story
        rels>0,                                                                            // Kin
        subs>0,                                                                            // Reel (assembled once they appear)
        has(['custom_label','custom_value','source'])                                      // More
      ];
      return { n:facets.filter(Boolean).length, total:8 };
    }catch(e){ return null; }
  }

  /* ---------- seed ---------- */
  function freshSeed(){ try{ if(window.crypto&&crypto.getRandomValues){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0]>>>0; } }catch(e){} return (Math.floor(Math.random()*0x7fffffff))>>>0; }

  /* ---------- state switching ---------- */
  function show(which){ ['play','locked','error'].forEach(s=>{ $('#'+s).style.display = s===which?'block':'none'; }); }

  /* ---------- chrome (topbar + dir) ---------- */
  function paintChrome(){ const L=d();
    document.documentElement.lang=state.lang; document.documentElement.dir=L.dir;
    $('#screen').setAttribute('dir',L.dir); $('#screen').setAttribute('lang',state.lang);
    $$('[data-t]').forEach(el=>{ el.textContent=L[el.getAttribute('data-t')]; });
    $('.backarrow').setAttribute('d', L.dir==='rtl'?I.backR:I.back);
    const st=$('#streak'); st.hidden=!state.streakShown; $('#streakN').textContent='×'+Math.max(1,state.streak);
  }

  /* ---------- PLAY ---------- */
  function renderPlay(round){
    const L=d();
    const memory=(round.prompt&&round.prompt.memory_text)||'';
    // one clue: the memory a person told (gold = human voice). Rule 8 — only engine output rendered.
    const clue=`
      <div class="clue">
        <div class="ci">${sv(I.book)}</div>
        <div class="ct"><div class="ck"><span class="sd"></span>${esc(L.clueK)}</div><div class="cv">${esc(memory)}</div></div>
      </div>`;
    const optCards=round.options.map((o,i)=>`
      <button class="opt" type="button" data-i="${i}" data-id="${esc(o.id)}">
        <div class="av ${AV[i%AV.length]}"><i></i></div>
        <div class="nm serif">${esc(o.label||'—')}</div>
        <div class="mk" data-right>${sv(I.check,2.4)}</div>
        <div class="mk" data-wrong>${sv(I.x,2.2)}</div>
      </button>`).join('');
    $('#play').innerHTML=`
      <div class="eye mono">${esc(L.cluesEye)}</div>
      <div class="clues">${clue}</div>
      <div class="qhead"><div class="q serif">${esc(L.qQ)}</div><div class="qs">${esc(L.qS)}</div></div>
      <div class="opts" id="opts">${optCards}</div>
      <div class="notquite" id="notquite">${sv(I.info,1.7)}<p><b>${esc(L.nqB)}</b> ${esc(L.nqRest)}</p></div>
      <div class="hintbar">${esc(L.hint)}</div>
      <div class="reveal" id="reveal"></div>`;
  }

  async function renderReveal(round){
    const L=d();
    const correct=round.options[round.answer_index]||{};
    const nPhotos=subjectCount(round.answer_id);
    const chips=[`<span class="pchip"><span class="d"></span><span class="tx">${esc(L.chipMemory)}</span></span>`];
    if(nPhotos>0) chips.push(`<span class="pchip cool"><span class="d"></span><span class="tx">${esc(L.photos(nPhotos))}</span></span>`);
    const rev=$('#reveal');
    rev.innerHTML=`
      <div class="eye serif" style="margin-top:24px">${esc(L.revEye)}</div>
      <div class="revface"><i></i></div>
      <div class="revname">
        <div class="rk">${esc(L.revKindled)}</div>
        <div class="rn serif">${esc(correct.label||'—')}</div>
      </div>
      <div class="kindle" id="kindle" style="margin-top:20px;display:none">
        <div class="lab"><span class="l">${esc(L.kindleL)}</span><span class="r" id="kindleR"></span></div>
        <div class="bar"><i id="kindleBar" style="width:0%"></i></div>
      </div>
      <div class="revwhy">
        <div class="h">${esc(L.whyH)}</div>
        <div class="prov">${chips.join('')}</div>
      </div>
      <div class="btnrow">
        <button class="btn ghost" type="button" data-act="next">${esc(L.another)}</button>
        <button class="btn primary" type="button" data-act="reel">${esc(L.reel)}</button>
      </div>
      <div class="reelnote">${sv(I.reel,1.7)}${esc(L.reelnote)}</div>`;
    rev.classList.add('show');
    rev.scrollIntoView({behavior:reduceMotion?'auto':'smooth', block:'nearest'});
    // fill the kindle bar with the person's REAL lit-facet count (no fabricated numbers)
    const k=await kindleOf(round.answer_id);
    if(k){ const box=$('#kindle'); if(box){ box.style.display='block';
      $('#kindleR').textContent=d().kindleR(k.n);
      requestAnimationFrame(()=>{ const b=$('#kindleBar'); if(b) b.style.width=Math.round(k.n/k.total*100)+'%'; });
    } }
  }

  function onGuess(btn){
    if(state.done) return; const round=state.round; if(!round) return;
    const i=+btn.getAttribute('data-i');
    const nq=$('#notquite');
    if(i===round.answer_index){
      state.done=true;
      if(nq) nq.classList.remove('show');
      $$('#opts .opt').forEach(el=>{ if(el!==btn) el.classList.add('dim'); });
      btn.classList.remove('wrong'); btn.classList.add('right');
      if(state.firstTry){ state.streak++; } state.streakShown=true; paintChrome();
      setTimeout(()=>renderReveal(round), 480);
    } else {
      state.firstTry=false;
      btn.classList.add('wrong');
      if(nq) nq.classList.add('show');
      setTimeout(()=>{ btn.classList.remove('wrong'); }, 900);
    }
  }

  /* ---------- LOCKED (not_enough_data) ---------- */
  function renderLocked(res){
    const L=d();
    const dots=[[26,20,30],[70,58,24],[40,120,38],[120,90,28],[86,26,20]]
      .map((p,i)=>`<div class="fdot" style="width:${p[2]}px;height:${p[2]}px;left:${p[0]}%;top:${p[1]}px;animation-delay:${(i*0.5).toFixed(2)}s"></div>`).join('');
    const need=(res&&res.need)?`<div class="need-chip"><span class="d"></span><span class="tx">${esc(L.needL)}: ${esc(res.need)}</span></div>`:'';
    $('#locked').innerHTML=`
      <div class="locked-hero">
        <div class="tone"></div>
        <div class="faces">${dots}</div>
        <div class="glyph">${sv(I.cam,1.4)}</div>
      </div>
      <div class="locked-title"><div class="k">${esc(L.lockK)}</div><div class="h serif">${esc(L.lockH)}</div></div>
      <div class="locked-body serif">${L.lockBody}</div>
      ${need}
      <a class="invite-cta serif" href="contribute-real.html">${sv(I.cam,1.6)}${esc(L.invite)}</a>
      <div class="locked-foot serif">${L.lockFoot}</div>`;
  }

  /* ---------- ERROR ---------- */
  function renderError(){
    const L=d();
    $('#error').innerHTML=`
      <div class="fail">
        <div class="glyph">${sv(I.warn,1.6)}</div>
        <div class="k">${esc(L.errK)}</div>
        <div class="h serif">${esc(L.errH)}</div>
        <div class="b">${esc(L.errB)}</div>
        <button class="btn ghost" type="button" data-act="retry">${esc(L.retry)}</button>
      </div>`;
  }

  /* ---------- load a round (ENGINE) ---------- */
  async function loadRound(seed){
    state.seed=seed; state.done=false; state.firstTry=true; state.round=null;
    let res;
    try{ res=await window.LFGames.whoseMemory(sb,{ id:PERSON_ID, seed:seed }); }
    catch(e){ res={status:'error', message:(e&&e.message)||String(e)}; }
    if(res && res.status==='ok'){
      state.round=res; renderPlay(res); show('play');
    } else if(res && res.status==='not_enough_data'){
      renderLocked(res); show('locked');
    } else {
      renderError(); show('error');
    }
    paintChrome();
  }

  /* ---------- language sheet ---------- */
  const showSheet=()=>{ $('.scrim').classList.add('show'); $('.sheet[data-sheet="lang"]').classList.add('show'); };
  const hideSheets=()=>{ $('.scrim').classList.remove('show'); $$('.sheet').forEach(s=>s.classList.remove('show')); };
  window.__lfClose=()=>{ if($('.sheet.show')){ hideSheets(); return true; } return false; };
  function openLang(){ const L=d(); const sh=$('.sheet[data-sheet="lang"]');
    sh.innerHTML=`<div class="grip"></div><h3>${esc(L.langtitle)}</h3><div class="sub">${esc(L.langsub)}</div>
      ${LANGS.map(k=>`<button class="lang-opt ${k===state.lang?'on':''}" data-lang="${k}"><span><span class="native">${esc(T[k].native)}</span><span class="en" style="display:block">${esc(T[k].label)}</span></span><span class="tick">${sv(I.check,2)}</span></button>`).join('')}`;
    sh.querySelectorAll('[data-lang]').forEach(b=>b.onclick=async()=>{ await setLang(b.dataset.lang); hideSheets(); });
    showSheet(); }
  async function setLang(lang){ if(!T[lang]||lang===state.lang) return; state.lang=lang;
    try{ localStorage.setItem('lf_lang',lang); }catch(e){}
    try{ const {data:{session}}=await sb.auth.getSession(); if(session&&session.user){ await sb.from('profiles').update({preferred_lang:lang}).eq('id',session.user.id); } }catch(e){}
    paintChrome();
    // rebuild in the new language — same seed reproduces the same round (Rule 8, deterministic)
    await loadRound(state.seed!=null?state.seed:freshSeed());
  }

  /* ---------- click wiring ---------- */
  function wire(){
    $('#dev').addEventListener('click', e=>{
      const op=e.target.closest('.opt'); if(op){ onGuess(op); return; }
      const a=e.target.closest('[data-act]'); if(!a) return; const act=a.dataset.act;
      if(act==='back'){ if(history.length>1) history.back(); else location.href='person-real.html'; return; }
      if(act==='lang'){ openLang(); return; }
      if(act==='next'){ loadRound(freshSeed()); return; }
      if(act==='reel'){ const id=state.round&&state.round.answer_id; location.href = id?('person-real.html?id='+encodeURIComponent(id)):'person-real.html'; return; }
      if(act==='retry'){ loadRound(state.seed||freshSeed()); return; }
    });
    $('.scrim').addEventListener('click', hideSheets);
  }

  /* ---------- signature ambient motion: soft portrait bokeh (Face facet) ---------- */
  function atmosphere(canvas){ if(!canvas) return; const ctx=canvas.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
    const COL=[[243,205,132],[127,180,216],[201,162,255],[143,214,160]]; let discs=[];
    function build(){ discs=[]; const k=Math.max(9,Math.round(W/44));
      for(let i=0;i<k;i++){ discs.push({ x:Math.random(), y:Math.random(), r:22+Math.random()*54, c:COL[Math.random()*COL.length|0],
        dx:(Math.random()-.5)*.02, dy:(Math.random()-.5)*.018, tw:Math.random()*6.28, tsp:.3+Math.random()*.7, a:.09+Math.random()*.14 }); } }
    function resize(){ W=canvas.clientWidth; H=canvas.clientHeight; canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); build(); }
    new ResizeObserver(resize).observe(canvas); resize();
    function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
      discs.forEach(m=>{ if(!reduceMotion){ m.x+=m.dx/60; m.y+=m.dy/60;
          if(m.x<-.1) m.x=1.1; if(m.x>1.1) m.x=-.1; if(m.y<-.1) m.y=1.1; if(m.y>1.1) m.y=-.1; }
        const tw=reduceMotion?.7:.5+.5*(.5+.5*Math.sin(t*m.tsp+m.tw));
        const px=m.x*W, py=m.y*H, R=m.r*(reduceMotion?1:(.9+.2*tw));
        const gr=ctx.createRadialGradient(px,py,0,px,py,R); gr.addColorStop(0,`rgba(${m.c[0]},${m.c[1]},${m.c[2]},${m.a*tw})`); gr.addColorStop(1,`rgba(${m.c[0]},${m.c[1]},${m.c[2]},0)`);
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(px,py,R,0,6.283); ctx.fill(); });
      ctx.globalCompositeOperation='source-over'; if(!reduceMotion) requestAnimationFrame(frame); }
    if(!reduceMotion) requestAnimationFrame(frame); else frame(0);
  }

  /* ---------- boot: session gate → load round ---------- */
  async function boot(){
    const stored=(function(){ try{ return localStorage.getItem('lf_lang'); }catch(e){ return null; } })();
    if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    paintChrome();
    let session=null;
    try{ const r=await sb.auth.getSession(); session=r.data&&r.data.session; }catch(e){ session=null; }
    if(!session){ location.replace('index.html'); return; }
    try{ const {data:pr}=await sb.from('profiles').select('preferred_lang').eq('id',session.user.id).maybeSingle(); if(pr&&pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; }catch(e){}
    state.subjects=await loadSubjects();
    paintChrome();
    await loadRound(START_SEED!=null?START_SEED:freshSeed());
  }

  atmosphere($('#dev .atmo')); wire(); boot();
})();
</script>
