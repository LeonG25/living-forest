<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>A Moment — The Living Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --hair:#ffffff1c; --panel:#ffffff0d;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff;                          /* suggestion / pending accent */
  }
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream);
    min-height:100dvh; overflow-x:hidden;
    background:radial-gradient(130% 100% at 50% 0%, #0d1a2f 0%, #081120 48%, #04070e 100%);
    -webkit-user-select:none; user-select:none;
  }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .mono{ font-family:'Azeret Mono',ui-monospace,monospace; }
  [dir="rtl"] .serif, [dir="rtl"] .story-words{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* ===== the moving colour: aurora + bokeh field ===== */
  #atmo{ position:fixed; inset:0; z-index:0; width:100%; height:100%; display:block; }
  .atmo-veil{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(115% 80% at 50% 34%, transparent 30%, rgba(4,7,14,.55) 100%),
              linear-gradient(to bottom, rgba(4,7,14,.28), transparent 26%, transparent 62%, rgba(4,7,14,.82)); }

  .wrap{ position:relative; z-index:2; width:100%; max-width:440px; margin:0 auto;
    padding:0 22px calc(60px + env(safe-area-inset-bottom)); }

  /* ===== top bar ===== */
  .topbar{ display:flex; align-items:center; gap:10px; padding:max(14px,env(safe-area-inset-top)) 0 8px; }
  .icon-btn{ width:42px; height:42px; border-radius:13px; border:1px solid var(--hair);
    background:rgba(8,17,30,.5); backdrop-filter:blur(10px); color:var(--cream);
    display:grid; place-items:center; cursor:pointer; flex:0 0 auto; transition:border-color .2s,background .2s; }
  .icon-btn:hover{ border-color:rgba(255,255,255,.32); }
  .icon-btn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .icon-btn svg{ width:19px; height:19px; }
  .crumb{ flex:1; min-width:0; text-align:center; }
  .crumb .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); }

  /* ===== HERO: the held, surfacing photograph ===== */
  .stage{ margin-top:12px; position:relative; }
  .frame{ position:relative; border-radius:13px; padding:0;
    background:none;
    border:1px solid rgba(255,244,214,.92);
    box-shadow:0 0 22px -2px rgba(255,232,180,.65), 0 0 60px -8px rgba(243,205,132,.5), 0 30px 90px -46px #000; }
  /* candlelight pooling from behind the frame */
  .frame::before{ content:""; position:absolute; inset:-14% -8% -20% -8%; z-index:-1; border-radius:40px;
    background:radial-gradient(60% 55% at 50% 44%, rgba(243,205,132,.5), rgba(243,205,132,.12) 45%, transparent 72%);
    filter:blur(26px); opacity:.9; animation:breathe 7s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{opacity:.62; transform:scale(1);} 50%{opacity:1; transform:scale(1.05);} }
  .photo{ position:relative; border-radius:12px; overflow:hidden; background:#0a1120;
    /* natural shape: never crop a portrait — height led by the image, capped to viewport */
    display:block; }
  .photo image-slot{ display:block; width:100%; }
  .yearstamp{ position:absolute; top:20px; z-index:4; inset-inline-end:20px;
    display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border-radius:9px;
    background:rgba(6,16,28,.62); backdrop-filter:blur(8px); border:1px solid rgba(127,180,216,.4); }
  .yearstamp .d{ width:5px; height:5px; border-radius:50%; background:var(--cool); box-shadow:0 0 8px 1px var(--cool); }
  .yearstamp .y{ font-family:'Azeret Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--cool-hi); }

  /* the surfacing reveal — image resolves out of the dark, like remembering */
  .surface{ opacity:0; filter:blur(16px) brightness(.5) saturate(.6); transform:scale(1.04);
    transition:opacity 1.5s ease, filter 1.9s ease, transform 2.1s cubic-bezier(.16,.8,.28,1); }
  .surface.up{ opacity:1; filter:blur(0) brightness(1) saturate(1); transform:scale(1); }
  .reveal{ opacity:0; transform:translateY(14px); transition:opacity .9s ease, transform 1s cubic-bezier(.16,.8,.28,1); }
  .reveal.up{ opacity:1; transform:none; }

  /* ===== section rhythm ===== */
  .sec{ margin-top:34px; }
  .sec-h{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .sec-h .lp{ width:7px; height:7px; border-radius:2px; transform:rotate(45deg); flex:0 0 auto; }
  .sec-h .t{ font-family:'Azeret Mono',monospace; font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }

  /* ===== IN THIS MOMENT — faces (gold, human) ===== */
  .faces{ display:flex; gap:15px; overflow-x:auto; padding-bottom:6px; margin-inline:-22px; padding-inline:22px; scrollbar-width:none; }
  .faces::-webkit-scrollbar{ display:none; }
  .face{ flex:0 0 auto; width:74px; text-align:center; cursor:pointer; background:none; border:none; color:inherit; }
  .face .node{ position:relative; width:66px; height:66px; margin:0 auto; }
  .face .crop{ position:absolute; inset:4px; border-radius:50%; overflow:hidden;
    border:1.5px solid rgba(243,205,132,.6); box-shadow:0 0 16px -2px rgba(243,205,132,.5); }
  .face .crop svg{ width:100%; height:100%; display:block; }
  .face .fn{ font-family:'Newsreader',serif; font-size:13.5px; margin-top:8px; color:var(--cream); line-height:1.12; }
  .face:focus-visible .crop{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .face.unnamed .crop{ border-style:dashed; border-color:rgba(243,205,132,.5); box-shadow:none; }
  .face.unnamed .fn{ color:var(--gold); font-style:italic; font-family:'Newsreader',serif; }
  .face .editdot{ position:absolute; inset-block-start:-2px; inset-inline-end:-2px; width:20px; height:20px; border-radius:50%;
    background:var(--edit); color:#1a0f2e; display:none; place-items:center; box-shadow:0 0 0 3px #081120; }
  .face .editdot svg{ width:11px; height:11px; }
  body.editing .face .editdot{ display:grid; }
  body.editing .face .crop{ border-color:var(--edit); }

  /* ===== THE STORY — the heart (gold, human) ===== */
  .story{ position:relative; }
  .quotemark{ font-family:'Newsreader',serif; font-size:70px; line-height:.6; color:rgba(243,205,132,.4);
    display:block; height:34px; }
  .story-words{ font-family:'Newsreader',serif; font-weight:300; font-style:italic; font-size:24px; line-height:1.42;
    color:#f7edda; text-wrap:pretty; }
  .story-words .word{ display:inline; opacity:0; filter:blur(6px); transition:opacity .5s ease, filter .6s ease; }
  .story-words.lit .word{ opacity:1; filter:blur(0); }
  .told{ margin-top:18px; display:flex; align-items:center; gap:9px; }
  .told .flame{ width:8px; height:8px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 10px 2px rgba(243,205,132,.8); flex:0 0 auto; animation:flick 3.4s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{opacity:.7; transform:scale(.9);} 45%{opacity:1; transform:scale(1.12);} 70%{opacity:.85;} }
  .told .txt{ font-size:13px; color:var(--gold); }
  .told .txt b{ font-weight:600; color:var(--gold-hi); }

  /* machine-translation banner — visually distinct, never dressed as a human voice */
  .autobar{ margin-top:16px; border-radius:13px; padding:13px 15px;
    background:repeating-linear-gradient(135deg, rgba(127,180,216,.10) 0 10px, rgba(127,180,216,.05) 10px 20px);
    border:1px dashed rgba(127,180,216,.5); }
  .autobar .h{ display:flex; align-items:center; gap:8px; font-family:'Azeret Mono',monospace; font-size:9.5px;
    letter-spacing:.18em; text-transform:uppercase; color:var(--cool-hi); }
  .autobar .h svg{ width:13px; height:13px; }
  .autobar .m{ margin-top:9px; font-family:'Hanken Grotesk',sans-serif; font-style:normal; font-weight:400;
    font-size:16px; line-height:1.5; color:#cfe0f2; }
  [dir="rtl"] .autobar .m{ font-family:'Hanken Grotesk',sans-serif; }
  .autobar .cta{ margin-top:11px; display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--gold); font-weight:600; cursor:pointer; }

  /* ===== THE FACTS (cool blue, app-assembled) ===== */
  .facts{ display:flex; flex-direction:column; gap:10px; }
  .fact{ display:flex; align-items:center; gap:13px; padding:14px 15px; border-radius:14px;
    background:rgba(10,20,34,.5); border:1px solid var(--hair); text-align:start; width:100%;
    color:inherit; cursor:default; }
  .fact.link{ cursor:pointer; }
  .fact .fi{ width:34px; height:34px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center;
    background:rgba(127,180,216,.12); border:1px solid rgba(127,180,216,.3); }
  .fact .fi svg{ width:16px; height:16px; color:var(--cool); }
  .fact .fk{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(127,180,216,.7); }
  .fact .fv{ font-family:'Newsreader',serif; font-size:18px; color:#e7f0fa; margin-top:2px; }
  .fact .chev{ margin-inline-start:auto; color:rgba(127,180,216,.6); }
  .fact .chev svg{ width:16px; height:16px; }
  [dir="rtl"] .fact .chev svg{ transform:scaleX(-1); }
  .facts-src{ margin-top:10px; display:flex; align-items:center; gap:7px; font-family:'Azeret Mono',monospace;
    font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:rgba(127,180,216,.45); }
  .facts-src::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--cool); box-shadow:0 0 7px 1px var(--cool); }
  body.editing .fact{ border-color:var(--edit); cursor:pointer; }
  body.editing .fact .chev{ color:var(--edit); }
  body.editing .fact.link .chev svg,
  body.editing .fact:not(.link) .chev{ }

  /* pending "waiting for the keeper" chip */
  .pending{ margin-top:9px; display:none; align-items:center; gap:8px; font-size:12px; color:var(--edit);
    padding:7px 11px; border-radius:9px; background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.32); }
  .pending.show{ display:inline-flex; }
  .pending .sp{ width:12px; height:12px; border-radius:50%; border:2px solid rgba(201,162,255,.35); border-top-color:var(--edit); animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== "suggest an edit" ribbon in edit mode ===== */
  .editbanner{ position:sticky; top:8px; z-index:6; margin-top:8px; display:none; align-items:center; gap:11px;
    padding:12px 15px; border-radius:14px; background:rgba(28,18,46,.72); backdrop-filter:blur(12px);
    border:1px solid rgba(201,162,255,.4); box-shadow:0 16px 40px -20px #000; }
  body.editing .editbanner{ display:flex; }
  .editbanner .ei{ width:30px; height:30px; border-radius:8px; background:rgba(201,162,255,.16); display:grid; place-items:center; flex:0 0 auto; }
  .editbanner .ei svg{ width:16px; height:16px; color:var(--edit); }
  .editbanner .et{ flex:1; min-width:0; }
  .editbanner .et .a{ font-family:'Newsreader',serif; font-size:15px; color:#efe6ff; }
  .editbanner .et .b{ font-size:11.5px; color:#b6a8cf; margin-top:1px; }
  .editbanner .done{ font-family:'Hanken Grotesk',sans-serif; font-size:12px; font-weight:600; color:#1a0f2e;
    background:linear-gradient(180deg,#ddc6ff,var(--edit)); border:none; border-radius:99px; padding:9px 15px; cursor:pointer; }

  .foot{ margin-top:40px; text-align:center; }
  .foot .leaf{ font-family:'Newsreader',serif; font-style:italic; font-size:14px; color:rgba(127,180,216,.6); }

  /* ===== overlays (language menu, editor sheet) ===== */
  .scrim{ position:fixed; inset:0; z-index:30; background:rgba(4,7,14,.62); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:fixed; z-index:31; inset-inline:0; bottom:0; margin:0 auto; width:100%; max-width:440px;
    background:linear-gradient(180deg, #0e1c31, #081120); border:1px solid var(--hair); border-bottom:none;
    border-radius:22px 22px 0 0; padding:10px 20px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(102%); transition:transform .34s cubic-bezier(.16,.8,.28,1);
    box-shadow:0 -24px 70px -30px #000; }
  .sheet.show{ transform:translateY(0); }
  .sheet .grip{ width:40px; height:4px; border-radius:99px; background:rgba(255,255,255,.2); margin:6px auto 16px; }
  .sheet h3{ font-family:'Newsreader',serif; font-weight:400; font-size:21px; color:#fbf5e8; margin-bottom:4px; }
  .sheet .sub{ font-size:12.5px; color:var(--muted); margin-bottom:16px; line-height:1.45; }

  .lang-opt{ display:flex; align-items:center; gap:14px; width:100%; padding:14px 15px; border-radius:14px;
    background:var(--panel); border:1px solid var(--hair); color:var(--cream); cursor:pointer; margin-bottom:9px; text-align:start; }
  .lang-opt:hover{ border-color:rgba(255,255,255,.3); }
  .lang-opt.on{ border-color:rgba(243,205,132,.55); background:rgba(243,205,132,.08); }
  .lang-opt .native{ font-family:'Newsreader',serif; font-size:18px; }
  .lang-opt .en{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .lang-opt .tick{ margin-inline-start:auto; color:var(--gold); opacity:0; }
  .lang-opt.on .tick{ opacity:1; }
  .lang-opt .tick svg{ width:18px; height:18px; }

  /* editor sheet fields */
  .ed-field label{ display:block; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .ed-field textarea, .ed-field input{ width:100%; background:rgba(6,14,26,.7); border:1px solid var(--hair);
    border-radius:13px; padding:14px; color:var(--cream); font-family:'Newsreader',serif; font-size:17px; line-height:1.45;
    resize:vertical; }
  .ed-field textarea:focus, .ed-field input:focus{ outline:none; border-color:rgba(201,162,255,.6); }
  .ed-langtag{ display:inline-flex; align-items:center; gap:7px; font-family:'Azeret Mono',monospace; font-size:9px;
    letter-spacing:.16em; text-transform:uppercase; color:var(--edit); margin-bottom:14px;
    padding:5px 9px; border-radius:8px; background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.3); }
  .ed-note{ margin-top:14px; font-size:12px; color:var(--muted); line-height:1.5; display:flex; gap:9px; }
  .ed-note svg{ width:15px; height:15px; color:var(--edit); flex:0 0 auto; margin-top:1px; }
  .ed-actions{ margin-top:18px; display:flex; gap:10px; }
  .btn{ flex:1; padding:14px; border-radius:13px; font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .btn.ghost{ background:transparent; border-color:var(--hair); color:var(--cream); }
  .btn.primary{ background:linear-gradient(180deg,#ddc6ff,var(--edit)); color:#1a0f2e; }
  .btn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }

  /* toast */
  .toast{ position:fixed; z-index:40; left:50%; transform:translate(-50%,20px); bottom:calc(22px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:10px; padding:13px 18px; border-radius:99px;
    background:rgba(28,18,46,.9); backdrop-filter:blur(12px); border:1px solid rgba(201,162,255,.45);
    color:#efe6ff; font-size:13.5px; opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease;
    box-shadow:0 18px 44px -18px #000; max-width:calc(100% - 36px); }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .flame{ width:8px; height:8px; border-radius:50%; background:var(--edit); box-shadow:0 0 10px 2px var(--edit); flex:0 0 auto; }

  @media (prefers-reduced-motion: reduce){
    .frame::before,.told .flame{ animation:none !important; }
    .surface{ transition:opacity .01s; filter:none !important; transform:none !important; }
    .story-words .word{ transition:none; }
  }
</style>
</head>

    });
  }

  function runReveal(){ const photo=$('#photoWrap'), words=$('#storyWords'); const revs=[...document.querySelectorAll('.reveal')];
    if(reduce){ photo&&photo.classList.add('up'); revs.forEach(r=>r.classList.add('up')); words&&words.classList.add('lit'); return; }
    requestAnimationFrame(()=>{ setTimeout(()=>photo&&photo.classList.add('up'),120); });
    revs.forEach((r,i)=> setTimeout(()=>r.classList.add('up'), 260+i*150));
    if(words) setTimeout(()=>words.classList.add('lit'),900); }

  /* ---------- overlays ---------- */
  const scrim=$('#scrim'), langSheet=$('#langSheet'), editSheet=$('#editSheet');
  function show(sheet){ scrim.classList.add('show'); sheet.classList.add('show'); }
  function hide(){ scrim.classList.remove('show'); langSheet.classList.remove('show'); editSheet.classList.remove('show'); }
  scrim.addEventListener('click', hide);
  function toast(msg){ $('#toastMsg').textContent=msg; const el=$('#toast'); el.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),2600); }

  /* ---------- pending memory (which fields are awaiting the keeper) ---------- */
  let pend={};
  function restorePending(){ Object.keys(pend).forEach(k=>{ const c=document.querySelector(`[data-pending="${k}"]`); if(c&&pend[k]) c.classList.add('show'); }); }

  /* ---------- edit / keeper submit ---------- */
  function openEditor(target){ const d=t(); let label,value='',multiline=false,note=d.keeperNote,photo=false,tag=null,person=null;
    if(target==='story'){ label=d.edStory; const s=storyForLang(lang); value=s.kind==='human'?s.text:''; multiline=true; tag=`${d.langTitle}: ${langNative(lang)}`; }
    else if(target==='where'){ label=d.edWhere; value=d.where; }
    else if(target==='when'){ label=d.edWhen; value=d.when; }
    else if(target==='photo'){ label=d.edPhotoT; note=d.edPhotoN; photo=true; }
    else if(target.indexOf('person:')===0){ person=target.split(':')[1]; label=d.edName; value=(PEOPLE.find(x=>x.id===person)||{})[lang]||''; tag=`${d.langTitle}: ${langNative(lang)}`; }
    const inputHTML = photo ? '' : (multiline
      ? `<div class="ed-field"><label>${esc(label)}</label>${tag?`<div class="ed-langtag">${sv(ICON.info,1.7)} ${esc(tag)}</div>`:''}<textarea rows="5" id="edInput">${esc(value)}</textarea></div>`
      : `<div class="ed-field"><label>${esc(label)}</label>${tag?`<div class="ed-langtag">${sv(ICON.info,1.7)} ${esc(tag)}</div>`:''}<input id="edInput" value="${esc(value)}"></div>`);
    editSheet.innerHTML=`<div class="grip"></div><h3>${esc(photo?d.edPhotoT:label)}</h3>${inputHTML}
      <div class="ed-note">${sv(ICON.info,1.7)} <span>${esc(note)}</span></div>
      <div class="ed-actions"><button class="btn ghost" id="edCancel">${esc(d.cancel)}</button>
      ${photo?'':`<button class="btn primary" id="edSend">${esc(d.sendKeeper)}</button>`}</div>`;
    show(editSheet);
    const inp=editSheet.querySelector('#edInput'); if(inp) setTimeout(()=>inp.focus(),340);
    editSheet.querySelector('#edCancel').onclick=hide;
    const sendBtn=editSheet.querySelector('#edSend');
    if(sendBtn) sendBtn.onclick=async()=>{ const val=(editSheet.querySelector('#edInput')||{}).value; hide(); await submitEdit(target,person,val); };
  }

  async function submitEdit(target, person, val){ const d=t(); if(!user){ toast(d.signIn); return; }
    val=(val==null?'':String(val)).trim(); let key=target, ok=true;
    try{
      if(target==='story'){ if(val){ await sb.from('artefact_translations').insert({artefact_id:art.id,lang,body:val,status:'in_review',created_by:user.id}); } key='story'; }
      else if(target==='where'){ await sb.from('artefact_edits').insert({artefact_id:art.id,field:'where',new_value:val,old_value:d.where,status:'in_review',created_by:user.id}); key='where'; }
      else if(target==='when'){ await sb.from('artefact_edits').insert({artefact_id:art.id,field:'when',new_value:val,old_value:d.when,status:'in_review',created_by:user.id}); key='when'; }
      else if(person){ const parts=val.split(/\s+/); const given=parts.shift()||''; const family=parts.join(' ')||null;
        if(given) await sb.from('name_variants').insert({person_id:person,lang,given,family,status:'in_review',created_by:user.id}); key='people'; }
    }catch(e){ ok=false; }
    if(ok){ pend[key]=true; const c=document.querySelector(`[data-pending="${key}"]`); if(c) c.classList.add('show'); toast(d.sent); }
  }

  /* ---------- keeper review sheet ---------- */
  async function loadQueue(){ if(!isKeeper){ edits=[]; return; }
    const a=await sb.from('artefact_translations').select('id,lang,body,created_at').eq('artefact_id',MOMENT_ID).eq('status','in_review');
    const b=await sb.from('artefact_edits').select('id,field,lang,new_value,ref_id,old_value,created_at').eq('artefact_id',MOMENT_ID).eq('status','in_review');
    edits=[...(a.data||[]).map(x=>({...x,kind:'story'})), ...(b.data||[]).map(x=>({...x,kind:'edit'}))]; }
  function labelFor(item){ const d=t(); if(item.kind==='story') return d.story+' \u00b7 '+langNative(item.lang);
    return ({where:d.whereK,when:d.whenK,tag_add:d.inMoment,tag_remove:d.inMoment,photo:d.edPhotoT}[item.field])||item.field; }
  function openReview(){ const d=t();
    const rows = edits.length ? edits.map((item,i)=>{ const isStory=item.kind==='story';
      const oldv=isStory?'':(item.old_value||''); const newv=isStory?item.body:(item.new_value||item.old_value||'');
      return `<div class="ed-field" style="margin-bottom:16px;border:1px solid var(--hair);border-radius:14px;padding:14px" data-i="${i}">
        <div class="ed-langtag">${sv(ICON.info,1.7)} ${esc(labelFor(item))}</div>
        ${oldv?`<div style="font-family:'Newsreader',serif;font-style:italic;color:var(--muted);text-decoration:line-through;margin-bottom:7px">${esc(oldv)}</div>`:''}
        <div style="font-family:'Newsreader',serif;font-style:italic;color:var(--gold);margin-bottom:13px">${esc(newv||'\u2014')}</div>
        <div class="ed-actions"><button class="btn ghost" data-no="${i}">${esc(d.decline)}</button><button class="btn primary" data-ok="${i}">${esc(d.approve)}</button></div>
      </div>`; }).join('') : `<div class="sub">${esc(d.reviewSub)}</div>`;
    editSheet.innerHTML=`<div class="grip"></div><h3>${esc(d.reviewT)}</h3><div class="sub">${esc(d.reviewSub)}</div>${rows}`;
    show(editSheet);
    editSheet.querySelectorAll('[data-ok]').forEach(b=>b.onclick=async()=>{ await approve(edits[+b.getAttribute('data-ok')]); afterReview(); });
    editSheet.querySelectorAll('[data-no]').forEach(b=>b.onclick=async()=>{ await decline(edits[+b.getAttribute('data-no')]); afterReview(); });
  }
  async function afterReview(){ await loadQueue(); pend={}; if(edits.length) openReview(); else { hide(); } buildModel(); render(); toast(t().published); }
  async function approve(item){ try{
      if(item.kind==='story'){ await sb.from('artefact_translations').update({status:'published',reviewed_by:user.id,published_at:new Date().toISOString()}).eq('id',item.id);
        translations=translations.filter(x=>x.lang!==item.lang); translations.push({lang:item.lang,body:item.body,status:'published'}); }
      else { const f=item.field;
        if(f==='where'||f==='when'){ const md=Object.assign({},art.metadata||{}); md[f]=item.new_value; await sb.from('artefacts').update({metadata:md}).eq('id',art.id); art.metadata=md; }
        await sb.from('artefact_edits').update({status:'published',reviewed_by:user.id,reviewed_at:new Date().toISOString()}).eq('id',item.id); }
    }catch(e){} }
  async function decline(item){ try{ if(item.kind==='story') await sb.from('artefact_translations').delete().eq('id',item.id); else await sb.from('artefact_edits').delete().eq('id',item.id);}catch(e){} }

  /* ---------- wire interactions (design) ---------- */
  function wire(){ const d=t();
    $('#backBtn').onclick=()=>{ if(history.length>1) history.back(); else location.href='globe-real.html'; };
    $('#langBtn').onclick=()=>show(langSheet);
    $('#editBtn').onclick=()=>document.body.classList.toggle('editing');
    const done=$('#doneBtn'); if(done) done.onclick=()=>document.body.classList.remove('editing');
    const ks=$('#keeperStrip'); if(ks) ks.onclick=openReview;
    langSheet.querySelectorAll('[data-lang]').forEach(b=> b.onclick=async()=>{ lang=b.dataset.lang; hide(); try{localStorage.setItem('lf_lang',lang);}catch(e){} if(user){try{await sb.from('profiles').update({preferred_lang:lang}).eq('id',user.id);}catch(e){}} buildModel(); render(); ensureLangAssets(); });
    document.querySelectorAll('[data-edit-open="story"]').forEach(el=> el.onclick=e=>{ e.stopPropagation(); openEditor('story'); });
    document.querySelectorAll('[data-edit]').forEach(el=>{ el.addEventListener('click', e=>{
      if(el.getAttribute('data-go')==='place' && !document.body.classList.contains('editing')){ const w=d.where; if(w){ location.href='place-real.html?place='+encodeURIComponent(w); return; } }
      if(!document.body.classList.contains('editing')) return; if(e.target.closest('[data-edit-open]')) return;
      e.preventDefault(); openEditor(el.getAttribute('data-edit')); }); });
    document.querySelectorAll('.face').forEach(f=>{ f.addEventListener('click', e=>{
      if(document.body.classList.contains('editing')){ e.preventDefault(); openEditor('person:'+f.dataset.person); }
      else { location.href='person-real.html?id='+encodeURIComponent(f.dataset.person); } }); });
  }

  /* ---------- language assets: transliterate names, machine-translate story ---------- */
  async function callTranslate(items){ try{const {data,error}=await sb.functions.invoke('translate',{body:{target_lang:lang,items}}); if(error||!data) return null; return data.results||null;}catch(e){return null;} }
  async function ensureLangAssets(){ if(lang==='en') return;
    const need=subjects.map(s=>s.person_id).filter(pid=>{const p=peopleById[pid]; const hasV=(vars[pid]||[]).some(x=>x.lang===lang); const hasA=autoName[lang]&&autoName[lang][pid]; return p&&p.display_name&&!hasV&&!hasA;});
    if(need.length){ autoName[lang]=autoName[lang]||{}; const items=need.map(pid=>({kind:'name_full',ref:pid,text:peopleById[pid].display_name,gender:peopleById[pid].sex||''}));
      const res=await callTranslate(items); if(res){res.forEach(r=>{if(r&&r.ref&&r.text)autoName[lang][r.ref]=r.text;}); buildModel(); render();} }
    const s=storyForLang(lang);
    if(s.kind==='machine' && art.body && autoStory[lang]==null){ autoStory[lang]=''; const res=await callTranslate([{kind:'artefact_body',ref:art.id,text:art.body}]); autoStory[lang]=(res&&res[0]&&res[0].text)||''; buildModel(); render(); } }

  /* ---------- atmosphere (verbatim from the Claude Design) ---------- */
  (function atmosphere(){
    const cv=$('#atmo'), ctx=cv.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
    function resize(){ W=cv.clientWidth; H=cv.clientHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
    window.addEventListener('resize', resize); resize();
    const HUES=[[86,214,196],[150,120,236],[236,110,200],[255,214,120],[95,200,236],[255,140,170],[255,176,90],[130,236,180]];
    const N=15, blobs=[]; for(let i=0;i<N;i++){ const c=HUES[i%HUES.length];
      blobs.push({ x:Math.random(), y:Math.random(), r:Math.random()*130+90, c, vx:(Math.random()-.5)*0.00013, vy:(Math.random()-.5)*0.00010, ph:Math.random()*6.28, sp:Math.random()*0.5+0.3 }); }
    const bands=[ {y:0.30,c:[86,214,196],amp:60,ph:0}, {y:0.5,c:[150,120,236],amp:80,ph:2}, {y:0.68,c:[236,110,200],amp:70,ph:4} ];
    const COOL=[103,199,216], GOLD=[255,207,126]; const ARCS=reduce?6:9, arcs=[];
    function seedArc(a){ a.x0=Math.random(); a.y0=Math.random(); const ang=Math.random()*6.28, len=Math.random()*0.5+0.35;
      a.x1=a.x0+Math.cos(ang)*len; a.y1=a.y0+Math.sin(ang)*len; const mx=(a.x0+a.x1)/2, my=(a.y0+a.y1)/2, nx=-(a.y1-a.y0), ny=(a.x1-a.x0);
      const lift=(Math.random()*0.3+0.12)*(Math.random()>.5?1:-1); a.cx=mx+nx*lift; a.cy=my+ny*lift;
      a.c=Math.random()<0.3?GOLD:COOL; a.t=Math.random(); a.spd=Math.random()*0.0011+0.0006; return a; }
    for(let i=0;i<ARCS;i++) arcs.push(seedArc({}));
    const bez=(p0,p1,p2,t)=>{ const u=1-t; return u*u*p0 + 2*u*t*p1 + t*t*p2; }; const INT=0.85;
    function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
      bands.forEach(b=>{ const yy=b.y*H + (reduce?0:Math.sin(t*0.2+b.ph)*18); const g=ctx.createLinearGradient(0,yy-b.amp,0,yy+b.amp);
        g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`); g.addColorStop(.5,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${0.14*INT})`); g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);
        ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,yy); for(let x=0;x<=W;x+=24){ const yo=Math.sin(x*0.006 + t*(reduce?0:0.3)+b.ph)*b.amp*0.5; ctx.lineTo(x, yy+yo); } ctx.lineTo(W,yy+b.amp*2); ctx.lineTo(0,yy+b.amp*2); ctx.closePath(); ctx.fill(); });
      blobs.forEach(bl=>{ if(!reduce){ bl.x+=bl.vx; bl.y+=bl.vy; if(bl.x<-.2)bl.x=1.2; if(bl.x>1.2)bl.x=-.2; if(bl.y<-.2)bl.y=1.2; if(bl.y>1.2)bl.y=-.2; }
        const px=bl.x*W, py=bl.y*H, pulse=reduce?1:(0.75+0.25*Math.sin(t*bl.sp+bl.ph)); const r=bl.r*pulse, g=ctx.createRadialGradient(px,py,0,px,py,r); const a=0.18*INT*pulse;
        g.addColorStop(0,`rgba(${bl.c[0]},${bl.c[1]},${bl.c[2]},${a})`); g.addColorStop(1,`rgba(${bl.c[0]},${bl.c[1]},${bl.c[2]},0)`); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r,0,6.2832); ctx.fill(); });
      arcs.forEach(a=>{ if(!reduce){ a.t+=a.spd; if(a.t>1){ seedArc(a); a.t=0; } } const [r,g2,b2]=a.c;
        const x0=a.x0*W,y0=a.y0*H, x1=a.x1*W,y1=a.y1*H, cx=a.cx*W,cy=a.cy*H;
        ctx.strokeStyle=`rgba(${r},${g2},${b2},0.13)`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(cx,cy,x1,y1); ctx.stroke();
        [[x0,y0],[x1,y1]].forEach(([nx,ny])=>{ const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,7); ng.addColorStop(0,`rgba(${r},${g2},${b2},0.5)`); ng.addColorStop(1,`rgba(${r},${g2},${b2},0)`); ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx,ny,7,0,6.2832); ctx.fill(); });
        const px=bez(x0,cx,x1,a.t), py=bez(y0,cy,y1,a.t); const fade=Math.sin(a.t*Math.PI); const R=5.5, gr=ctx.createRadialGradient(px,py,0,px,py,R);
        gr.addColorStop(0,`rgba(255,248,232,${0.95*fade})`); gr.addColorStop(0.45,`rgba(${r},${g2},${b2},${0.6*fade})`); gr.addColorStop(1,`rgba(${r},${g2},${b2},0)`);
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(px,py,R,0,6.2832); ctx.fill(); ctx.fillStyle=`rgba(255,252,244,${0.9*fade})`; ctx.beginPath(); ctx.arc(px,py,1.4,0,6.2832); ctx.fill(); });
      ctx.globalCompositeOperation='source-over'; if(!reduce) requestAnimationFrame(frame); }
    if(!reduce) requestAnimationFrame(frame); else frame(0);
  })();

  /* ---------- gate + boot ---------- */
  function showGate(){ const d=UI[lang];
    let g=$('#gate'); if(!g){ g=document.createElement('div'); g.id='gate'; document.body.appendChild(g); }
    g.setAttribute('style','position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,7,14,.82);backdrop-filter:blur(6px)');
    g.innerHTML=`<div style="width:100%;max-width:320px;background:linear-gradient(180deg,#0e1c31,#081120);border:1px solid var(--hair);border-radius:20px;padding:24px;text-align:center">
      <h3 style="font-family:'Newsreader',serif;font-weight:400;font-size:22px;color:#fbf5e8">${esc(d.signIn)}</h3>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 16px">${esc(d.signInSub)}</div>
      <input id="gEmail" type="email" placeholder="${esc(d.email)}" style="width:100%;margin-bottom:10px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px"/>
      <input id="gPass" type="password" placeholder="${esc(d.pass)}" style="width:100%;margin-bottom:12px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px"/>
      <button id="gBtn" class="btn primary" style="width:100%">${esc(d.signInBtn)}</button>
      <div id="gErr" style="color:#ff9a8a;font-size:12px;min-height:16px;margin-top:8px"></div></div>`;
    $('#gBtn').onclick=async()=>{ const em=$('#gEmail').value.trim(), pw=$('#gPass').value; $('#gErr').textContent='';
      const {error}=await sb.auth.signInWithPassword({email:em,password:pw}); if(error){$('#gErr').textContent=error.message;return;} g.remove(); boot(); };
  }

  async function boot(){
    const {data:{session}}=await sb.auth.getSession();
    const stored=localStorage.getItem('lf_lang'); if(stored&&UI[stored]) lang=stored;
    if(!session){ showGate(); return; }
    user=session.user;
    try{const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang').eq('id',user.id).maybeSingle();
      if(pr){ isKeeper=!!pr.is_keeper; if(pr.preferred_lang&&!stored&&UI[pr.preferred_lang]) lang=pr.preferred_lang; }}catch(e){}
    await loadMoment();
  }
  async function loadMoment(){
    const {data:a}=await sb.from('artefacts').select('id,storage_path,body,original_language,metadata,contributor_user,kind').eq('id',MOMENT_ID).maybeSingle();
    if(!a){ $('#wrap').innerHTML='<div style="padding:60px 0;text-align:center;color:var(--muted);font-family:\'Newsreader\',serif;font-style:italic">'+esc(UI[lang].notFound)+'</div>'; return; }
    art=a;
    const subs=await sb.from('artefact_subjects').select('person_id,detail').eq('artefact_id',MOMENT_ID);
    subjects=(subs.data||[]).filter(s=>s.person_id);
    const ids=subjects.map(s=>s.person_id);
    if(ids.length){ const {data:pp}=await sb.from('people').select('id,display_name,called_name,primary_asset,sex').in('id',ids); (pp||[]).forEach(p=>peopleById[p.id]=p);
      const {data:nv}=await sb.from('name_variants').select('person_id,lang,given,family,status').in('person_id',ids).eq('status','published'); (nv||[]).forEach(v=>{(vars[v.person_id]=vars[v.person_id]||[]).push(v);}); }
    if(art.contributor_user){ const {data:cp}=await sb.from('profiles').select('display_name').eq('id',art.contributor_user).maybeSingle(); tellerName=(cp&&cp.display_name)||''; }
    const {data:tr}=await sb.from('artefact_translations').select('lang,body,status').eq('artefact_id',MOMENT_ID).eq('status','published'); translations=tr||[];
    await loadQueue();
    buildModel(); render(); ensureLangAssets();
  }

  boot();
})();

</script>
</body></html>
