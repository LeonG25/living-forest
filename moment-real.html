<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>A Moment — The Living Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --hair:#ffffff1c; --panel:#ffffff0d;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff;
  }
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream);
    min-height:100dvh; overflow-x:hidden;
    background:radial-gradient(130% 100% at 50% 0%, #0d1a2f 0%, #081120 48%, #04070e 100%);
    -webkit-user-select:none; user-select:none;
  }
  a{ color:var(--cool-hi); text-decoration:none; } a:hover{ color:var(--gold-hi); }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .mono{ font-family:'Azeret Mono',ui-monospace,monospace; }
  [dir="rtl"] .serif, [dir="rtl"] .story-words, [dir="rtl"] .autobar .m{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  #atmo{ position:fixed; inset:0; z-index:0; width:100%; height:100%; display:block; }
  .atmo-veil{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(115% 80% at 50% 34%, transparent 30%, rgba(4,7,14,.55) 100%),
              linear-gradient(to bottom, rgba(4,7,14,.28), transparent 26%, transparent 62%, rgba(4,7,14,.82)); }

  .wrap{ position:relative; z-index:2; width:100%; max-width:440px; margin:0 auto;
    padding:0 22px calc(60px + env(safe-area-inset-bottom)); }

  .topbar{ display:flex; align-items:center; gap:10px; padding:max(14px,env(safe-area-inset-top)) 0 8px; }
  .icon-btn{ width:42px; height:42px; border-radius:13px; border:1px solid var(--hair);
    background:rgba(8,17,30,.5); backdrop-filter:blur(10px); color:var(--cream);
    display:grid; place-items:center; cursor:pointer; flex:0 0 auto; transition:border-color .2s,background .2s; }
  .icon-btn:hover{ border-color:rgba(255,255,255,.32); }
  .icon-btn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .icon-btn svg{ width:19px; height:19px; }
  .icon-btn.on{ border-color:rgba(201,162,255,.6); background:rgba(201,162,255,.14); color:#efe6ff; }
  .crumb{ flex:1; min-width:0; text-align:center; }
  .crumb .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); }

  /* ===== HERO ===== */
  .stage{ margin-top:12px; position:relative; }
  .frame{ position:relative; border-radius:13px; padding:0; background:none;
    border:1px solid rgba(255,244,214,.92);
    box-shadow:0 0 22px -2px rgba(255,232,180,.65), 0 0 60px -8px rgba(243,205,132,.5), 0 30px 90px -46px #000; }
  .frame::before{ content:""; position:absolute; inset:-14% -8% -20% -8%; z-index:-1; border-radius:40px;
    background:radial-gradient(60% 55% at 50% 44%, rgba(243,205,132,.5), rgba(243,205,132,.12) 45%, transparent 72%);
    filter:blur(26px); opacity:.9; animation:breathe 7s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{opacity:.62; transform:scale(1);} 50%{opacity:1; transform:scale(1.05);} }

  .photostage{ position:relative; border-radius:12px; overflow:hidden; background:#0a1120; min-height:120px; }
  .rotor{ position:relative; width:100%; transform-origin:50% 50%; }
  .photoart{ position:relative; display:block; width:100%; }
  .photoart img{ display:block; width:100%; height:auto;
    opacity:0; filter:blur(14px) brightness(.6); transition:opacity 1.2s ease, filter 1.6s ease; }
  .photoart img.up{ opacity:1; filter:blur(0) brightness(1); }
  .photoart .ph-empty{ display:grid; place-items:center; width:100%; aspect-ratio:4/3; color:var(--muted);
    font-family:'Newsreader',serif; font-style:italic; font-size:16px; text-align:center; padding:20px; }
  .taglayer{ position:absolute; inset:0; touch-action:none; z-index:4; }
  .zoomwrap{ position:relative; transform-origin:0 0; will-change:transform; }
  .zoomctl{ position:absolute; top:12px; inset-inline-start:12px; z-index:6; display:flex; flex-direction:column; gap:6px; }
  .zoomctl .zbtn{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; padding:0;
    font-family:'Azeret Mono',monospace; font-size:17px; line-height:1; cursor:pointer;
    color:var(--gold-hi); background:rgba(6,16,28,.5); backdrop-filter:blur(7px);
    border:1px solid rgba(243,205,132,.26); box-shadow:0 2px 8px -4px #000; }
  .zoomctl .zbtn:active{ background:rgba(243,205,132,.14); }
  .zoomctl .zreset{ opacity:.45; font-size:14px; }
  .zoomctl.on .zreset{ opacity:1; }
  body.tagging .photostage{ cursor:crosshair; }
  .stage-dim{ position:absolute; inset:0; background:rgba(4,7,14,.34); opacity:0; pointer-events:none; transition:opacity .3s; z-index:3; }
  body.tagging .stage-dim{ opacity:1; }

  .yearstamp{ position:absolute; top:14px; z-index:5; inset-inline-end:14px;
    display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border-radius:9px;
    background:rgba(6,16,28,.62); backdrop-filter:blur(8px); border:1px solid rgba(127,180,216,.4); }
  .yearstamp .d{ width:5px; height:5px; border-radius:50%; background:var(--cool); box-shadow:0 0 8px 1px var(--cool); }
  .yearstamp .y{ font-family:'Azeret Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--cool-hi); }

  /* ===== tag boxes on the photo ===== */
  .tagbox{ position:absolute; border:1px solid rgba(243,205,132,.7); border-radius:6px; z-index:4;
    box-shadow:0 0 0 1px rgba(4,7,14,.5); cursor:pointer; }
  .tagbox.pending{ border-color:rgba(201,162,255,.72); border-style:dashed; box-shadow:0 0 0 1px rgba(4,7,14,.5); }
  .tagbox.unnamed{ border-color:rgba(243,205,132,.62); border-style:dashed; box-shadow:0 0 0 1px rgba(4,7,14,.5); }
  .tagbox.sel{ border-width:1.5px; border-color:var(--gold-hi); box-shadow:0 0 0 1px rgba(4,7,14,.6), 0 0 10px -4px rgba(255,232,180,.65); }
  .tagbox.draft{ border-color:var(--gold-hi); border-style:solid; background:rgba(243,205,132,.06); }
  /* numbered marker pinned to the box corner — small, never covers the face inside the box */
  .tagbox{ transform-origin:center; }
  .tagbox .tagno{ position:absolute; inset-block-start:-8px; inset-inline-start:-8px; z-index:6;
    min-width:16px; height:16px; padding:0 4px; border-radius:9px; cursor:pointer;
    transform:scale(calc(1 / var(--z,1))); transform-origin:top left;
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Azeret Mono',monospace; font-size:9.5px; font-weight:500; line-height:1;
    background:rgba(6,16,28,.8); color:var(--gold-hi); border:1px solid rgba(243,205,132,.78);
    box-shadow:0 1px 3px rgba(0,0,0,.5); }
  .tagbox .tagno:focus-visible{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .tagbox.pending .tagno{ color:#efe6ff; border-color:var(--edit); box-shadow:0 0 10px -2px rgba(201,162,255,.7), 0 1px 5px rgba(0,0,0,.55); }
  .tagbox.unnamed .tagno{ color:var(--gold); border-style:dashed; }
  /* the name — shown OUTSIDE the box only while selected/flashed, so one active box never obscures a face */
  .tagbox .tagname{ position:absolute; left:50%; transform:translateX(-50%); bottom:calc(100% + 8px);
    display:none; align-items:center; gap:6px; white-space:nowrap; max-width:62vw;
    padding:4px 10px; border-radius:8px; background:rgba(6,16,28,.92); backdrop-filter:blur(6px);
    font-family:'Newsreader',serif; font-size:13px; color:var(--gold-hi); line-height:1.15;
    border:1px solid rgba(243,205,132,.45); box-shadow:0 8px 22px -10px #000; z-index:7; pointer-events:none; }
  .tagbox.below .tagname{ bottom:auto; top:calc(100% + 8px); }
  .tagbox.sel .tagname, .tagbox.flash .tagname{ display:inline-flex; }
  .tagbox.draft .tagname{ display:none; }
  .tagbox.pending .tagname{ color:#efe6ff; border-color:rgba(201,162,255,.45); }
  .tagbox.unnamed .tagname{ color:var(--gold); font-style:italic; }
  .tagbox .tagname .fdot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 7px 1px var(--gold); flex:0 0 auto; }
  .tagbox.pending .tagname .fdot{ background:var(--edit); box-shadow:0 0 7px 1px var(--edit); }
  .tagbox.flash{ animation:tagpulse .85s ease-in-out 2; }
  @keyframes tagpulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
  .tagbox .handle{ position:absolute; width:11px; height:11px; border-radius:50%;
    background:#fff7e6; border:1.5px solid var(--gold); display:none; z-index:6;
    transform:scale(calc(1 / var(--z,1)));
    box-shadow:0 1px 4px rgba(0,0,0,.5); }
  .tagbox .handle::after{ content:""; position:absolute; inset:-9px; }
  .tagbox.sel .handle{ display:block; }
  .tagbox .handle.nw{ inset-block-start:-7px; inset-inline-start:-7px; cursor:nwse-resize; }
  .tagbox .handle.ne{ inset-block-start:-7px; inset-inline-end:-7px; cursor:nesw-resize; }
  .tagbox .handle.sw{ inset-block-end:-7px; inset-inline-start:-7px; cursor:nesw-resize; }
  .tagbox .handle.se{ inset-block-end:-7px; inset-inline-end:-7px; cursor:nwse-resize; }

  .phototools{ position:absolute; left:0; right:0; bottom:0; z-index:6;
    display:flex; align-items:center; gap:8px; padding:12px;
    background:linear-gradient(to top, rgba(4,7,14,.82), transparent); }
  .ptool{ display:inline-flex; align-items:center; gap:7px; height:38px; padding:0 13px; border-radius:11px;
    background:rgba(8,17,30,.66); backdrop-filter:blur(10px); border:1px solid var(--hair);
    color:var(--cream); font-family:'Hanken Grotesk',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; }
  .ptool svg{ width:16px; height:16px; }
  .ptool.tag{ border-color:rgba(243,205,132,.45); color:var(--gold-hi); background:rgba(243,205,132,.10); }
  .ptool.tag.on{ border-color:var(--edit); color:#efe6ff; background:rgba(201,162,255,.16); }
  .ptool.round{ width:38px; padding:0; justify-content:center; }
  .ptool.spacer{ margin-inline-start:auto; background:none; border:none; }
  .taghint{ position:absolute; left:12px; right:12px; top:12px; z-index:6; display:none;
    align-items:center; gap:9px; padding:9px 12px; border-radius:11px;
    background:rgba(28,18,46,.8); backdrop-filter:blur(10px); border:1px solid rgba(201,162,255,.4);
    font-size:12.5px; color:#efe6ff; }
  body.tagging .taghint{ display:flex; }
  .taghint svg{ width:15px; height:15px; color:var(--edit); flex:0 0 auto; }

  .selbar{ position:absolute; left:12px; right:12px; z-index:7; display:none;
    align-items:center; gap:7px; padding:8px; border-radius:12px;
    background:rgba(6,16,28,.9); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.14);
    box-shadow:0 14px 40px -20px #000; }
  .selbar.show{ display:flex; }
  .selbar .sname{ font-family:'Newsreader',serif; font-size:14px; color:var(--gold-hi); margin-inline-end:auto; padding-inline-start:5px; }
  .selbar.pending .sname{ color:#efe6ff; }
  .sbtn{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 11px; border-radius:9px;
    background:var(--panel); border:1px solid var(--hair); color:var(--cream); font-size:12px; font-weight:600; cursor:pointer; }
  .sbtn svg{ width:14px; height:14px; }
  .sbtn.danger{ color:#ff9d9d; border-color:rgba(255,120,120,.3); }

  .photo-legend{ display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; padding-inline:4px; }
  .lg{ display:inline-flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
  .lg i{ width:14px; height:10px; border-radius:3px; border:1.5px solid var(--gold); flex:0 0 auto; }
  .lg i.pend{ border-color:var(--edit); border-style:dashed; }
  .lg i.unk{ border-style:dashed; }
  .lg i.num{ width:15px; height:15px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    font-family:'Azeret Mono',monospace; font-size:8px; font-weight:500; color:var(--gold-hi); background:rgba(6,16,28,.9); }

  /* ===== section rhythm ===== */
  .sec{ margin-top:32px; }
  .sec-h{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .sec-h .lp{ width:7px; height:7px; border-radius:2px; transform:rotate(45deg); flex:0 0 auto; }
  .sec-h .t{ font-family:'Azeret Mono',monospace; font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .sec-h .add{ margin-inline-start:auto; display:none; align-items:center; gap:6px; cursor:pointer;
    font-family:'Hanken Grotesk',sans-serif; font-size:11.5px; font-weight:600; color:var(--edit);
    padding:5px 9px; border-radius:8px; border:1px solid rgba(201,162,255,.3); background:rgba(201,162,255,.08); }
  .sec-h .add svg{ width:13px; height:13px; }
  body.editing .sec-h .add{ display:inline-flex; }

  /* faces strip */
  .faces{ display:flex; gap:15px; overflow-x:auto; padding-bottom:6px; margin-inline:-22px; padding-inline:22px; scrollbar-width:none; }
  .faces::-webkit-scrollbar{ display:none; }
  .face{ flex:0 0 auto; width:74px; text-align:center; cursor:pointer; background:none; border:none; color:inherit; }
  .face .node{ position:relative; width:66px; height:66px; margin:0 auto; }
  .face .crop{ position:absolute; inset:4px; border-radius:50%; overflow:hidden;
    border:1.5px solid rgba(243,205,132,.6); box-shadow:0 0 16px -2px rgba(243,205,132,.5); }
  .face .crop svg{ width:100%; height:100%; display:block; }
  /* Leon fix (a): name and status label must never touch — both are their own line */
  .face .fn{ display:block; font-family:'Newsreader',serif; font-size:13.5px; margin-top:8px; color:var(--cream); line-height:1.12; }
  .face .st{ display:block; font-family:'Azeret Mono',monospace; font-size:8px; letter-spacing:.12em; text-transform:uppercase; margin-top:5px; color:rgba(243,205,132,.7); }
  .face:focus-visible .crop{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .face.pending .crop{ border-color:var(--edit); border-style:dashed; box-shadow:0 0 14px -2px rgba(201,162,255,.5); }
  .face.pending .st{ color:var(--edit); }
  .face.unplaced .crop{ border-style:dashed; border-color:rgba(157,176,204,.5); box-shadow:none; filter:grayscale(.5) opacity(.7); }
  .face.unplaced .st{ color:var(--muted); }
  /* the number that ties a listed name to its marker on the photo */
  .face .fnum{ display:inline-flex; align-items:center; justify-content:center; vertical-align:baseline;
    min-width:17px; height:17px; padding:0 4px; margin-inline-end:5px; border-radius:9px; cursor:pointer;
    font-family:'Azeret Mono',monospace; font-size:9.5px; font-weight:500; line-height:1;
    background:rgba(243,205,132,.16); border:1px solid rgba(243,205,132,.5); color:var(--gold-hi); }
  .face .fnum:focus-visible{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .face.pending .fnum{ background:rgba(201,162,255,.16); border-color:rgba(201,162,255,.5); color:#efe6ff; }
  .face.hi .crop{ border-color:var(--gold-hi) !important; box-shadow:0 0 0 3px rgba(243,205,132,.28), 0 0 22px -2px rgba(243,205,132,.8) !important; }
  .face.hi{ animation:facepulse .85s ease-in-out 2; }
  @keyframes facepulse{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }

  /* ===== the story ===== */
  .story{ position:relative; }
  .quotemark{ font-family:'Newsreader',serif; font-size:70px; line-height:.6; color:rgba(243,205,132,.4); display:block; height:34px; }
  .story-words{ font-family:'Newsreader',serif; font-weight:300; font-style:italic; font-size:24px; line-height:1.42; color:#f7edda; text-wrap:pretty; }
  .story-words .word{ display:inline; opacity:0; filter:blur(6px); transition:opacity .5s ease, filter .6s ease; }
  .story-words.lit .word{ opacity:1; filter:blur(0); }
  .told{ margin-top:18px; display:flex; align-items:center; gap:9px; }
  .told .flame{ width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px 2px rgba(243,205,132,.8); flex:0 0 auto; animation:flick 3.4s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{opacity:.7; transform:scale(.9);} 45%{opacity:1; transform:scale(1.12);} 70%{opacity:.85;} }
  .told .txt{ font-size:13px; color:var(--gold); }
  .told .txt b{ font-weight:600; color:var(--gold-hi); }
  .told .rmtell{ margin-inline-start:auto; display:none; align-items:center; gap:5px; font-size:11px; color:#ff9d9d;
    padding:4px 8px; border-radius:8px; border:1px solid rgba(255,120,120,.3); background:rgba(255,120,120,.08); cursor:pointer; }
  .told .rmtell svg{ width:12px; height:12px; }
  body.editing .told .rmtell{ display:inline-flex; }
  body.editing .story-editable{ cursor:pointer; border-radius:12px; box-shadow:0 0 0 1px rgba(201,162,255,.3); padding:12px; margin:-12px; }

  /* empty-state invitations */
  .invite{ border-radius:15px; padding:20px 18px; text-align:center;
    background:radial-gradient(120% 100% at 50% 0%, rgba(243,205,132,.08), transparent 70%);
    border:1px dashed rgba(243,205,132,.4); cursor:pointer; }
  .invite.cool{ background:radial-gradient(120% 100% at 50% 0%, rgba(127,180,216,.08), transparent 70%); border-color:rgba(127,180,216,.4); }
  .invite .em{ font-family:'Newsreader',serif; font-style:italic; font-size:17px; color:var(--cream); }
  .invite .cta{ margin-top:10px; display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--gold); }
  .invite.cool .cta{ color:var(--cool-hi); }
  .invite .cta svg{ width:15px; height:15px; }

  /* machine-translation banner */
  .autobar{ margin-top:16px; border-radius:13px; padding:13px 15px;
    background:repeating-linear-gradient(135deg, rgba(127,180,216,.10) 0 10px, rgba(127,180,216,.05) 10px 20px);
    border:1px dashed rgba(127,180,216,.5); }
  .autobar .h{ display:flex; align-items:center; gap:8px; font-family:'Azeret Mono',monospace; font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--cool-hi); }
  .autobar .h svg{ width:13px; height:13px; }
  .autobar .m{ margin-top:9px; font-family:'Hanken Grotesk',sans-serif; font-style:normal; font-weight:400; font-size:16px; line-height:1.5; color:#cfe0f2; }
  .autobar .cta{ margin-top:11px; display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--gold); font-weight:600; cursor:pointer; }

  /* ===== facts ===== */
  .facts{ display:flex; flex-direction:column; gap:10px; }
  .fact{ display:flex; align-items:center; gap:13px; padding:14px 15px; border-radius:14px;
    background:rgba(10,20,34,.5); border:1px solid var(--hair); text-align:start; width:100%; color:inherit; cursor:default; position:relative; }
  .fact.link{ cursor:pointer; }
  .fact .fi{ width:34px; height:34px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center; background:rgba(127,180,216,.12); border:1px solid rgba(127,180,216,.3); }
  .fact .fi svg{ width:16px; height:16px; color:var(--cool); }
  .fact.human .fi{ background:rgba(243,205,132,.12); border-color:rgba(243,205,132,.3); }
  .fact.human .fi svg{ color:var(--gold); }
  .fact .ftext{ min-width:0; }
  /* Leon fix (b): field label and its value must never touch — each on its own line */
  .fact .fk{ display:block; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(127,180,216,.7); }
  .fact.human .fk{ color:rgba(243,205,132,.75); }
  .fact .fv{ display:block; font-family:'Newsreader',serif; font-size:18px; color:#e7f0fa; margin-top:3px; }
  .fact.human .fv{ color:#f7edda; }
  .fact .chev{ margin-inline-start:auto; color:rgba(127,180,216,.6); flex:0 0 auto; }
  .fact .chev svg{ width:16px; height:16px; }
  [dir="rtl"] .fact .chev svg{ transform:scaleX(-1); }
  .fact .rm{ margin-inline-start:auto; width:30px; height:30px; border-radius:8px; display:none; place-items:center;
    background:rgba(255,120,120,.1); border:1px solid rgba(255,120,120,.3); color:#ff9d9d; cursor:pointer; flex:0 0 auto; }
  .fact .rm svg{ width:14px; height:14px; }
  body.editing .fact.removable .chev{ display:none; }
  body.editing .fact.removable .rm{ display:grid; }

  const langNative=c=>UI[c].native;

  /* ---------- state ---------- */
  let lang='en', user=null, isKeeper=false;
  let art=null, subjects=[], peopleById={}, vars={}, autoName={}, autoStory={}, translations=[], edits=[], tellerName='', allPeople=null, places=null;

  /* ---------- procedural face + real crop ---------- */
  const SKIN=['#e6c49b','#d9b083','#e0b98d','#eac6a0','#dcb58c'];

    return `<svg viewBox="0 0 100 100"><rect width="100" height="100" fill="${bg}"/><ellipse cx="50" cy="47" rx="23" ry="26" fill="${sk}"/><path d="M50 96 Q50 70 27 66 Q31 42 50 42 Q69 42 73 66 Q50 70 50 96Z" fill="${hr}"/><path d="M27 44 Q31 23 50 23 Q69 23 73 44 Q61 33 50 33 Q39 33 27 44Z" fill="${g?'#cfc7bb':hr}"/></svg>`; }

  const sv=(p,w)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||1.6}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

  async function signedUrl(path){ try{const s=await sb.storage.from('family').createSignedUrl(path,3600); return (s.data&&s.data.signedUrl)||'';}catch(e){return '';} }
  async function faceInto(el, path, box){ if(!el||!path) return;
    try{ const u=await signedUrl(path); if(!u) return; const img=new Image(); img.crossOrigin='anonymous';
      img.onload=()=>{ const c=document.createElement('canvas'); c.width=c.height=200; const g=c.getContext('2d');
        if(box&&box.w>0&&box.h>0){ const pad=0.35, side=Math.max(box.w*(1+2*pad),box.h*(1+2*pad)); const ss=side*Math.max(img.naturalWidth,img.naturalHeight);
          let sx=(box.x+box.w/2)*img.naturalWidth-ss/2, sy=(box.y+box.h/2)*img.naturalHeight-ss/2;
          sx=Math.max(0,Math.min(img.naturalWidth-ss,sx)); sy=Math.max(0,Math.min(img.naturalHeight-ss,sy)); g.drawImage(img,sx,sy,ss,ss,0,0,200,200);
        } else { const side=Math.min(img.naturalWidth,img.naturalHeight); g.drawImage(img,(img.naturalWidth-side)/2,(img.naturalHeight-side)/2,side,side,0,0,200,200); }

  /* ---------- storage / rotation (ported from the proven prototype) ---------- */
  // Downscale images before storing so a 1.6MB phone photo isn't shipped just to show a 50px face.
  // Image-only (audio/other blobs pass through untouched), kept only if genuinely smaller, and never breaks an upload.
  async function lfDownscaleImage(blob, maxDim, q){ maxDim=maxDim||1600; q=q||0.85;
    try{
      if(!blob || !/^image\//.test(blob.type||'')) return blob;
      let W,H,src,bmp=null;
      try{ bmp=await createImageBitmap(blob); W=bmp.width; H=bmp.height; src=bmp; }
      catch(_){ src=await new Promise((res,rej)=>{ const u=URL.createObjectURL(blob),i=new Image();
        i.onload=()=>{URL.revokeObjectURL(u);res(i);}; i.onerror=()=>{URL.revokeObjectURL(u);rej(0);}; i.src=u; });
        W=src.naturalWidth; H=src.naturalHeight; }
      if(!W||!H){ if(bmp&&bmp.close)bmp.close(); return blob; }
      const scale=Math.min(1, maxDim/Math.max(W,H));
      if(scale===1 && blob.size<=512000){ if(bmp&&bmp.close)bmp.close(); return blob; }
      const cw=Math.max(1,Math.round(W*scale)), ch=Math.max(1,Math.round(H*scale));
      const c=document.createElement('canvas'); c.width=cw; c.height=ch; c.getContext('2d').drawImage(src,0,0,cw,ch);
      if(bmp&&bmp.close)bmp.close();
      const out=await new Promise(r=>c.toBlob(r,'image/jpeg',q));
      if(!out || out.size<20480) return blob;
      return out.size < blob.size ? out : blob;
    }catch(e){ return blob; }

  async function uploadFile(file){ file=await lfDownscaleImage(file);
    const tp=(file.type||''); const ext = tp==='image/jpeg'?'jpg' : tp==='image/png'?'png' : tp==='image/webp'?'webp' : ((file.name&&file.name.split('.').pop())||'bin').toLowerCase();
    const path=`${user.id}/${crypto.randomUUID()}.${ext}`;
    const up=await sb.storage.from('family').upload(path,file,{contentType:file.type||undefined});
    if(up.error) throw up.error; return path; }
  function rotate90(src){ return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(src), img=new Image();
    img.onload=()=>{ try{ const w=img.naturalWidth,h=img.naturalHeight;
      const c=document.createElement('canvas'); c.width=h; c.height=w;
      const ctx=c.getContext('2d'); ctx.translate(h,0); ctx.rotate(Math.PI/2); ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url); const type=(src.type&&src.type.startsWith('image/'))?src.type:'image/jpeg';
      c.toBlob(b=>b?resolve(b):reject(new Error('Could not rotate')), type, 0.92);
    }catch(e){URL.revokeObjectURL(url);reject(e);} };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Could not load image'));}; img.src=url; }); }
  // a normalised face box rotated to match a 90 deg CW image rotation
  const box90=b=> (b&&typeof b==='object'&&b.w)?{x:1-b.y-b.h,y:b.x,w:b.h,h:b.w}:b;
  // perform a real 90 deg CW rotate: rewrite the stored image + every subject box
  async function doRotate(){
    const {data:blob,error}=await sb.storage.from('family').download(art.storage_path); if(error) throw error;
    const rb=await rotate90(blob); const ext=(art.storage_path.split('.').pop()||'jpg');

    for(const s of subjects){ if(s.detail&&s.detail.w){ const nb=box90(s.detail);
      await sb.from('artefact_subjects').update({detail:nb}).eq('artefact_id',art.id).eq('person_id',s.person_id); s.detail=nb; } }
    const {error:ue}=await sb.from('artefacts').update({storage_path:np}).eq('id',art.id); if(ue) throw ue;

  }

  /* ---------- names / story / details per language ---------- */

  /* ---------- build the view model from real data ---------- */
  function buildModel(){
    // faces come from real subjects, plus my own pending tag_add proposals

  // Number the boxes in reading order: top-to-bottom, then left-to-right

  function computeTagNumbers(){ tagNum={};
    const rtl=document.body.classList.contains('rtl');

  /* ---------- tag boxes ---------- */
  function clientToLocal(cx,cy){ const r=$('#rotor').getBoundingClientRect();
    return { x:Math.min(1,Math.max(0,(cx-r.left)/r.width)), y:Math.min(1,Math.max(0,(cy-r.top)/r.height)) }; }
  function clientDeltaLocal(dx,dy){ const r=$('#rotor').getBoundingClientRect(); return { x:dx/r.width, y:dy/r.height }; }

  function renderBoxes(){ const layer=$('#taglayer'); if(!layer) return;
    computeTagNumbers();
    layer.innerHTML = TAGS.map(tg=>{ const nm = tg.status==='unnamed' ? t().unknownFace : (tg.name||t().unknownFace);
      const num = tagNum[tg.id];
      const below = tg.y<0.14; // no room above the box → drop the name label below it
      const cls='tagbox '+(tg.status==='pending'?'pending ':'')+(tg.status==='unnamed'?'unnamed ':'')+(below?'below ':'')+(tg.id===selId?'sel':'');
      const handles = tg.id===selId ? `<span class="handle nw" data-h="nw"></span><span class="handle ne" data-h="ne"></span><span class="handle sw" data-h="sw"></span><span class="handle se" data-h="se"></span>` : '';
      const marker = (tg.kind!=='draft' && num) ? `<span class="tagno" role="button" tabindex="0" aria-label="${esc(num+' '+nm)}">${num}</span>` : '';
      return `<div class="${cls}" data-tag="${esc(tg.id)}" style="left:${tg.x*100}%;top:${tg.y*100}%;width:${tg.w*100}%;height:${tg.h*100}%">
        ${marker}<span class="tagname"><span class="fdot"></span>${esc(nm)}</span>${handles}</div>`; }).join('');
    renderSelbar();
  }
  // brief visual link between a photo marker and its list entry (auto-dismissing)
  function flashBoxLabel(id){ const el=boxEl(id); if(!el) return; el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
    clearTimeout(el._ft); el._ft=setTimeout(()=>{ const e2=boxEl(id); if(e2) e2.classList.remove('flash'); },1700); }
  function highlightFaceByTag(id){ const f=document.querySelector('.face[data-tagid="'+CSS.escape(id)+'"]'); if(!f) return;
    f.classList.remove('hi'); void f.offsetWidth; f.classList.add('hi');
    try{ f.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }catch(e){}
    clearTimeout(f._ht); f._ht=setTimeout(()=>f.classList.remove('hi'),1700); }
  function onTagNoTap(id){ flashBoxLabel(id); highlightFaceByTag(id); }   // photo marker → highlight the list
  function pulseBox(id){ const ps=$('#photostage'); if(ps){ try{ps.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){} } flashBoxLabel(id); } // list → pulse the box
  function renderSelbar(){ const bar=$('#selbar'); if(!bar) return;
    const tg=TAGS.find(x=>x.id===selId);
    if(!tg || !document.body.classList.contains('tagging')){ bar.classList.remove('show'); return; }
    const d=t(); const nm=tg.status==='unnamed'?d.unknownFace:(tg.name||d.unknownFace);
    bar.className='selbar show'+(tg.status==='pending'?' pending':''); bar.style.bottom='58px';
    bar.innerHTML = `<span class="sname">${esc(nm)}</span>
      <button class="sbtn" data-act="change">${sv(ICON.pencil,1.7)} ${esc(tg.status==='unnamed'?d.addName:d.tagChange)}</button>
      <button class="sbtn danger" data-act="remove">${sv(ICON.trash,1.7)} ${esc(d.tagRemove)}</button>`;
    bar.querySelector('[data-act="change"]').onclick=()=>openNameSheet(tg.id);
    bar.querySelector('[data-act="remove"]').onclick=()=>removeTag(tg.id);
  }
  function boxEl(id){ return document.querySelector(`.tagbox[data-tag="${CSS.escape(id)}"]`); }
  function positionBox(tg){ const el=boxEl(tg.id); if(!el) return; el.style.left=tg.x*100+'%'; el.style.top=tg.y*100+'%'; el.style.width=tg.w*100+'%'; el.style.height=tg.h*100+'%'; }
  function drawLive(tg){ let el=boxEl(tg.id); if(!el){ renderBoxes(); el=boxEl(tg.id);} if(el){ el.classList.add('draft'); positionBox(tg);} }

  // ---- pinch / button zoom on the photo stage (precise face tagging) ----
  let zoom={s:1,tx:0,ty:0}; const zP=new Map(); let zPinch=null, zPan=null;
  function stageRect(){ const st=document.getElementById('photostage'); return st?st.getBoundingClientRect():{left:0,top:0,width:1,height:1}; }
  function zClampPan(){ const st=stageRect(); const minX=st.width-st.width*zoom.s, minY=st.height-st.height*zoom.s;
    zoom.tx=Math.min(0,Math.max(minX,zoom.tx)); zoom.ty=Math.min(0,Math.max(minY,zoom.ty)); if(zoom.s<=1.0001){ zoom.tx=0; zoom.ty=0; } }
  function applyZoom(){ const w=document.getElementById('zoomwrap'); if(!w) return; zClampPan();
    w.style.transform=`translate(${zoom.tx}px,${zoom.ty}px) scale(${zoom.s})`; w.style.setProperty('--z', zoom.s);
    const ps=document.getElementById('photostage'); if(ps) ps.classList.toggle('zoomed', zoom.s>1.0001);
    const zc=document.getElementById('zoomctl'); if(zc) zc.classList.toggle('on', zoom.s>1.0001); }
  function zoomAt(ns,cx,cy){ ns=Math.min(4,Math.max(1,ns)); const st=stageRect();
    const px=(cx-st.left-zoom.tx)/zoom.s, py=(cy-st.top-zoom.ty)/zoom.s;
    zoom.s=ns; zoom.tx=(cx-st.left)-px*ns; zoom.ty=(cy-st.top)-py*ns; applyZoom(); }
  function zoomReset(){ zoom={s:1,tx:0,ty:0}; applyZoom(); }
  function zAbortDraw(){ if(gesture){ if(gesture.mode==='draw'){ TAGS=TAGS.filter(x=>x.id!==gesture.id); } gesture=null; renderBoxes(); } }
  function bindZoom(){ const ps=document.getElementById('photostage'); if(!ps || ps.__zoomBound) return; ps.__zoomBound=true;
    const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
    ps.addEventListener('pointerdown', e=>{ if(e.target.closest('.zoomctl')) return; zP.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(zP.size===2){ zAbortDraw(); const p=[...zP.values()];
        zPinch={d:dist(p[0],p[1]), mx:(p[0].x+p[1].x)/2, my:(p[0].y+p[1].y)/2, s0:zoom.s, tx0:zoom.tx, ty0:zoom.ty};
        e.preventDefault(); e.stopPropagation();
      } else if(zP.size===1 && zoom.s>1.0001 && !document.body.classList.contains('tagging') && !e.target.closest('.tagno')){
        zPan={x:e.clientX,y:e.clientY,tx0:zoom.tx,ty0:zoom.ty}; }
    }, true);
    ps.addEventListener('pointermove', e=>{ if(!zP.has(e.pointerId)) return; zP.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(zPinch && zP.size>=2){ const p=[...zP.values()]; const nd=dist(p[0],p[1]); const nmx=(p[0].x+p[1].x)/2, nmy=(p[0].y+p[1].y)/2;
        const st=stageRect(); const ns=Math.min(4,Math.max(1, zPinch.s0*(nd/(zPinch.d||1))));
        const px=(zPinch.mx-st.left-zPinch.tx0)/zPinch.s0, py=(zPinch.my-st.top-zPinch.ty0)/zPinch.s0;
        zoom.s=ns; zoom.tx=(nmx-st.left)-px*ns; zoom.ty=(nmy-st.top)-py*ns; applyZoom(); e.preventDefault(); e.stopPropagation();
      } else if(zPan && zP.size===1){ zoom.tx=zPan.tx0+(e.clientX-zPan.x); zoom.ty=zPan.ty0+(e.clientY-zPan.y); applyZoom(); e.preventDefault(); e.stopPropagation(); }
    }, true);
    const up=e=>{ zP.delete(e.pointerId); if(zP.size<2) zPinch=null; if(zP.size===0) zPan=null; };
    ps.addEventListener('pointerup', up, true); ps.addEventListener('pointercancel', up, true);
    const zc=document.getElementById('zoomctl');
    if(zc){ zc.querySelectorAll('[data-z]').forEach(b=>b.onclick=ev=>{ ev.preventDefault(); const st=stageRect(); const cx=st.left+st.width/2, cy=st.top+st.height/2;
      const z=b.dataset.z; if(z==='in') zoomAt(zoom.s*1.5,cx,cy); else if(z==='out') zoomAt(zoom.s/1.5,cx,cy); else zoomReset(); }); }
  }
  function bindTagLayer(){ const layer=$('#taglayer'); if(!layer) return;
    // tapping the number marker links to the list — it must never start a draw/move gesture
    layer.addEventListener('click', e=>{ const no=e.target.closest('.tagno'); if(!no) return;
      const box=no.closest('.tagbox'); if(box) onTagNoTap(box.dataset.tag); });
    layer.addEventListener('keydown', e=>{ const no=e.target.closest('.tagno'); if(!no) return;
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); const box=no.closest('.tagbox'); if(box) onTagNoTap(box.dataset.tag); } });
    layer.addEventListener('pointerdown', e=>{
      if(zPinch || zP.size>=2) return; // two fingers = pinch/pan, never a draw
      if(e.target.closest('.tagno')) return; // let the click handler above take it (highlight, no gesture)
      const box=e.target.closest('.tagbox'); const handle=e.target.closest('.handle');
      if(!box && document.body.classList.contains('tagging')){
        e.preventDefault(); try{layer.setPointerCapture(e.pointerId);}catch(_){}
        const s=clientToLocal(e.clientX,e.clientY); const id='draft';
        gesture={mode:'draw', id, sx:s.x, sy:s.y};
        TAGS.push({id, kind:'draft', person:null, name:'', x:s.x, y:s.y, w:0, h:0, status:'unnamed'});
        renderBoxes(); return;
      }
      if(box){ e.preventDefault(); const id=box.dataset.tag; selId=id; renderBoxes();
        try{layer.setPointerCapture(e.pointerId);}catch(_){}
        const tg=TAGS.find(x=>x.id===id); if(!tg) return;
        if(handle) gesture={mode:'resize', id, corner:handle.dataset.h, px:e.clientX, py:e.clientY, o:{...tg}};
        else gesture={mode:'move', id, px:e.clientX, py:e.clientY, o:{...tg}}; }
    });
    layer.addEventListener('pointermove', e=>{ if(!gesture) return; e.preventDefault();
      const tg=TAGS.find(x=>x.id===gesture.id); if(!tg) return;
      if(gesture.mode==='draw'){ const c=clientToLocal(e.clientX,e.clientY);
        tg.x=Math.min(gesture.sx,c.x); tg.y=Math.min(gesture.sy,c.y); tg.w=Math.abs(c.x-gesture.sx); tg.h=Math.abs(c.y-gesture.sy); drawLive(tg);
      } else if(gesture.mode==='move'){ const dl=clientDeltaLocal(e.clientX-gesture.px, e.clientY-gesture.py); const o=gesture.o;
        tg.x=Math.min(1-o.w,Math.max(0,o.x+dl.x)); tg.y=Math.min(1-o.h,Math.max(0,o.y+dl.y)); positionBox(tg);
      } else if(gesture.mode==='resize'){ const dl=clientDeltaLocal(e.clientX-gesture.px, e.clientY-gesture.py); const o=gesture.o, c=gesture.corner;
        let x=o.x,y=o.y,w=o.w,h=o.h;
        if(c.includes('w')){ x=o.x+dl.x; w=o.w-dl.x; } if(c.includes('e')){ w=o.w+dl.x; }
        if(c.includes('n')){ y=o.y+dl.y; h=o.h-dl.y; } if(c.includes('s')){ h=o.h+dl.y; }
        if(w<0.05) w=0.05; if(h<0.05) h=0.05; tg.x=Math.max(0,x); tg.y=Math.max(0,y); tg.w=w; tg.h=h; positionBox(tg); }
    });
    const endGesture=async e=>{ if(!gesture) return; const g=gesture; gesture=null; try{layer.releasePointerCapture(e.pointerId);}catch(_){}
      const tg=TAGS.find(x=>x.id===g.id);
      if(g.mode==='draw'){ if(!tg) return;
        if(tg.w<0.05||tg.h<0.05){ TAGS=TAGS.filter(x=>x.id!==g.id); renderBoxes(); return; }
        const nid='t'+Date.now(); tg.id=nid; tg.kind='draft'; selId=nid; renderBoxes(); openNameSheet(nid, true);
      } else if(g.mode==='move'||g.mode==='resize'){ if(!tg) return;
        // commit the new box position (only for real, named tags)
        await commitBox(tg);
      }
    };
    layer.addEventListener('pointerup', endGesture);
    layer.addEventListener('pointercancel', endGesture);
  }

  async function commitBox(tg){ const box={x:tg.x,y:tg.y,w:tg.w,h:tg.h};
    if(tg.kind==='subject'){ if(isKeeper){ const ok=await sbWrite(()=>sb.from('artefact_subjects').update({detail:box}).eq('artefact_id',art.id).eq('person_id',tg.person)); if(ok){ toast(t().saved); await reload(); } }
      else { await proposeEdit('tag_move',{ref_id:tg.person, new_value:JSON.stringify({box}), old_value:tg.name, pendKey:'people'}); await reload(); } }
    else if(tg.kind==='edit'){ /* my own pending proposal: update its stored box */
      let m={}; try{m=JSON.parse((edits.find(x=>x.id===tg.editId)||{}).new_value||'{}');}catch(_){}
      m.box=box; const ok=await sbWrite(()=>sb.from('artefact_edits').update({new_value:JSON.stringify(m)}).eq('id',tg.editId)); if(ok){ await reload(); } }
  }

  /* ---------- name picker ---------- */
  async function loadAllPeople(){ if(allPeople) return; try{ const {data}=await sb.from('people').select('id,display_name,called_name,sex').order('display_name'); allPeople=data||[]; }catch(e){ allPeople=[]; } }
  async function openNameSheet(tagId, isNew){ nameTargetId=tagId; await loadAllPeople(); renderNameList(''); show($('#nameSheet')); }
  function renderNameList(q){ const d=t(); const sheet=$('#nameSheet'); const ql=q.trim().toLowerCase();
    const list=(allPeople||[]).filter(p=>{ if(!ql) return true; return String(p.display_name||'').toLowerCase().includes(ql) || String(p.called_name||'').toLowerCase().includes(ql); }).slice(0,40);
    sheet.innerHTML = `<div class="grip"></div><h3>${esc(d.whoTitle)}</h3><div class="sub">${esc(d.whoSub)}</div>
      <div class="searchbox">${sv(ICON.search,1.7)}<input id="pSearch" placeholder="${esc(d.searchFamily)}" value="${esc(q)}"></div>
      <div class="plist">
        ${list.map(p=>`<button class="popt" data-pick="${esc(p.id)}">
          <span class="pc">${faceSVG(p.display_name)}</span>
          <span><span class="pn">${esc(nameFor(p.id,lang)||p.display_name)}</span>${p.called_name?`<span class="pr">${esc(p.called_name)}</span>`:''}</span></button>`).join('')}
        <button class="popt newp" data-pick="__new">
          <span class="pc">${sv(ICON.plus,2)}</span>
          <span><span class="pn">${q?esc(q):esc(d.someoneNew)}</span><span class="pr">${esc(d.someoneNew)}</span></span></button>
      </div>`;
    const inp=sheet.querySelector('#pSearch'); inp.oninput=()=>renderNameList(inp.value);
    sheet.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>pickPerson(b.dataset.pick, sheet.querySelector('#pSearch').value.trim()));
  }
  async function ensurePerson(name){ name=String(name||'').trim();
    const f=(allPeople||[]).find(p=>String(p.display_name||'').toLowerCase()===name.toLowerCase());
    if(f) return f.id;
    const {data,error}=await sb.from('people').insert({display_name:name,created_by:user.id,status:'published'}).select('id,display_name,called_name,sex').single();
    if(error) throw error; (allPeople=allPeople||[]).push(data); peopleById[data.id]=data; return data.id; }

  async function pickPerson(pid, q){ const tg=TAGS.find(x=>x.id===nameTargetId); if(!tg){ hide(); return; }
    const box={x:tg.x,y:tg.y,w:tg.w,h:tg.h};
    let personId = (pid==='__new') ? null : pid;
    let name = (pid==='__new') ? (q||t().someoneNew) : (nameFor(pid,lang) || (allPeople.find(p=>p.id===pid)||{}).display_name || '');
    hide();
    if(isKeeper){
      const ok=await sbWrite(async()=>{
        if(!personId) personId=await ensurePerson(name);
        // retagging an existing subject to a different person: drop the old row
        if(tg.kind==='subject' && tg.person && tg.person!==personId){ await sb.from('artefact_subjects').delete().eq('artefact_id',art.id).eq('person_id',tg.person); }
        return sb.from('artefact_subjects').upsert({artefact_id:art.id, person_id:personId, detail:box});
      });
      if(ok){ toast(t().saved); await reload(); }
    } else {
      // contributor proposal → artefact_edits (never a published insert)
      const ok = (tg.kind==='edit')
        ? await sbWrite(()=>sb.from('artefact_edits').update({ref_id:personId, new_value:JSON.stringify({box,name}), old_value:name}).eq('id',tg.editId))
        : await proposeEdit('tag_add',{ref_id:personId, new_value:JSON.stringify({box,name}), old_value:name, pendKey:'people'});
      if(ok){ await reload(); }
    }
  }

  async function removeTag(id){ const tg=TAGS.find(x=>x.id===id); if(!tg){ return; }
    if(tg.kind==='draft'){ TAGS=TAGS.filter(x=>x.id!==id); selId=null; renderBoxes(); return; }
    if(tg.kind==='edit'){ // withdraw my own pending proposal
      const ok=await sbWrite(()=>sb.from('artefact_edits').delete().eq('id',tg.editId)); if(ok){ selId=null; await reload(); } return; }
    // published subject
    if(isKeeper){ const ok=await sbWrite(()=>sb.from('artefact_subjects').delete().eq('artefact_id',art.id).eq('person_id',tg.person)); if(ok){ toast(t().saved); selId=null; await reload(); } }
    else { const ok=await proposeEdit('tag_remove',{ref_id:tg.person, old_value:tg.name, pendKey:'people'}); if(ok){ selId=null; await reload(); } }
  }

  /* ---------- calendar (when) ---------- */
  let calY=1992, calM=6, calD=null, calPrec='year', calSeason=1;
  function openCal(){ const y=parseInt(yearOf()); if(!isNaN(y)) calY=y; show($('#calSheet')); renderCal(); }
  function calText(){ const d=t();
    if(calPrec==='day' && calD) return `${calD} ${d.months[calM]} ${calY}`;
    if(calPrec==='month') return `${d.months[calM]} ${calY}`;
    if(calPrec==='season') return `${d.seasons[calSeason]} ${calY}`;
    return `${calY}`; }
  function renderCal(){ const d=t(); const sheet=$('#calSheet');
    const first=new Date(calY,calM,1); let wd=(first.getDay()+6)%7; const days=new Date(calY,calM+1,0).getDate();
    let cells=''; for(let i=0;i<wd;i++) cells+='<span class="cal-day empty"></span>';
    for(let dd=1;dd<=days;dd++) cells+=`<button class="cal-day ${calPrec==='day'&&calD===dd?'on':''}" data-day="${dd}">${dd}</button>`;
    const wdRow=d.weekdays.map(w=>`<span class="wd">${esc(w)}</span>`).join('');
    const gridBlock=(calPrec==='day'||calPrec==='month')
      ? `<div class="cal-head"><button class="cal-nav" data-mv="-1">${sv(ICON.chev,2)}</button><span class="my">${esc(d.months[calM])} ${calY}</span><button class="cal-nav" data-mv="1" style="transform:scaleX(-1)">${sv(ICON.chev,2)}</button></div>
         ${calPrec==='day'?`<div class="cal-grid">${wdRow}${cells}</div>`:''}` : '';
    const seasonBlock=calPrec==='season'
      ? `<div class="cal-head"><button class="cal-nav" data-yr="-1">${sv(ICON.chev,2)}</button><span class="my">${calY}</span><button class="cal-nav" data-yr="1" style="transform:scaleX(-1)">${sv(ICON.chev,2)}</button></div>
         <div class="season-row">${d.seasons.map((s,i)=>`<button class="${calSeason===i?'on':''}" data-season="${i}">${esc(s)}</button>`).join('')}</div>` : '';
    const yearBlock=calPrec==='year'
      ? `<div class="cal-head"><button class="cal-nav" data-yr="-1">${sv(ICON.chev,2)}</button><span class="my" style="font-size:26px">${calY}</span><button class="cal-nav" data-yr="1" style="transform:scaleX(-1)">${sv(ICON.chev,2)}</button></div>` : '';
    sheet.innerHTML=`<div class="grip"></div><h3>${esc(d.calTitle)}</h3><div class="sub">${esc(d.calSub)}</div>
      <div class="prec">
        <button class="${calPrec==='day'?'on':''}" data-prec="day">${esc(d.precDay)}</button>
        <button class="${calPrec==='month'?'on':''}" data-prec="month">${esc(d.precMonth)}</button>
        <button class="${calPrec==='season'?'on':''}" data-prec="season">${esc(d.precSeason)}</button>
        <button class="${calPrec==='year'?'on':''}" data-prec="year">${esc(d.precYear)}</button></div>
      ${gridBlock}${seasonBlock}${yearBlock}
      <div class="cal-result">${esc(d.calResult)}: <b>${esc(calText())}</b></div>
      <div class="ed-note">${sv(ICON.info,1.7)} <span>${esc(d.keeperNote)}</span></div>
      <div class="ed-actions"><button class="btn ghost" id="calCancel">${esc(d.cancel)}</button><button class="btn primary" id="calSend">${esc(isKeeper?d.done:d.sendKeeper)}</button></div>`;
    sheet.querySelectorAll('[data-prec]').forEach(b=>b.onclick=()=>{calPrec=b.dataset.prec;renderCal();});
    sheet.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{calD=+b.dataset.day;renderCal();});
    sheet.querySelectorAll('[data-mv]').forEach(b=>b.onclick=()=>{calM+=+b.dataset.mv;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();});
    sheet.querySelectorAll('[data-yr]').forEach(b=>b.onclick=()=>{calY+=+b.dataset.yr;renderCal();});
    sheet.querySelectorAll('[data-season]').forEach(b=>b.onclick=()=>{calSeason=+b.dataset.season;renderCal();});
    sheet.querySelector('#calCancel').onclick=hide;
    sheet.querySelector('#calSend').onclick=async()=>{ const val=calText(); hide(); await saveMeta('when', val, whenText(), 'when'); };
  }

  /* ---------- place (where) ---------- */
  async function loadPlaces(){ if(places) return;
    try{ const {data}=await sb.from('places').select('name').order('name'); places=(data||[]).map(p=>p.name).filter(Boolean); }catch(e){ places=[]; }
    // fold in places already named on moments
    try{ const {data:aa}=await sb.from('artefacts').select('metadata').eq('kind','photo'); (aa||[]).forEach(a=>{ const w=a.metadata&&a.metadata.where; if(w&&!places.includes(w)) places.push(w); }); }catch(e){}
  }
  async function openPlace(){ await loadPlaces(); show($('#placeSheet')); renderPlace(''); }
  function renderPlace(q){ const d=t(); const sheet=$('#placeSheet'); const ql=q.trim().toLowerCase();
    const list=(places||[]).filter(p=>!ql || String(p).toLowerCase().includes(ql)).slice(0,30);
    const hist=n=>/,\s*(ussr|ссср|ברה״מ)/i.test(n);
    sheet.innerHTML=`<div class="grip"></div><h3>${esc(d.placeTitle)}</h3><div class="sub">${esc(d.placeSub)}</div>
      <div class="searchbox">${sv(ICON.pin,1.7)}<input id="plSearch" placeholder="${esc(d.placeP)}" value="${esc(q)}"></div>
      <div class="ta-list">
        ${list.map(p=>`<button class="ta-opt" data-place="${esc(p)}">${sv(ICON.pin,1.7)}<span class="pn">${esc(p)}</span>${hist(p)?`<span class="histpill">${esc(d.histTag)}</span>`:''}</button>`).join('')}
        ${q && !list.some(p=>String(p).toLowerCase()===ql)?`<button class="ta-opt" data-place="${esc(q)}" style="border-color:rgba(201,162,255,.4)">${sv(ICON.plus,1.8)}<span class="pn" style="color:var(--edit)">${esc(d.addPlace)}: “${esc(q)}”</span></button>`:''}
      </div>
      <div class="ed-note">${sv(ICON.info,1.7)} <span>${esc(d.keeperNote)}</span></div>`;
    const inp=sheet.querySelector('#plSearch'); inp.oninput=()=>renderPlace(inp.value); setTimeout(()=>inp.focus(),340);
    sheet.querySelectorAll('[data-place]').forEach(b=>b.onclick=async()=>{ const val=b.dataset.place; hide(); await saveMeta('where', val, whereText(), 'where'); });
  }

  /* ---------- editor sheet (story / photo / details) ---------- */

    if(target==='photo-delete'){
      $('#editSheet').innerHTML=`<div class="grip"></div><h3>${esc(d.confirmDelT)}</h3>

        <div class="ed-actions"><button class="btn ghost" id="edCancel">${esc(d.cancel)}</button><button class="btn danger" id="edSend">${esc(d.deletePhoto)}</button></div>`;
      show($('#editSheet')); $('#editSheet #edCancel').onclick=hide;
      $('#editSheet #edSend').onclick=async()=>{ hide(); await deletePhoto(); }; return;
    }

      $('#editSheet').innerHTML=`<div class="grip"></div><h3>${esc(d.replacePhoto)}</h3>
        <div class="ed-field"><label>${esc(d.replacePhoto)}</label><input id="edFile" type="file" accept="image/*" style="font-family:inherit;font-size:14px"></div>
        <div class="ed-note">${sv(ICON.info,1.7)} <span>${esc(isKeeper?d.replacePhoto:d.photoReplaceN)}</span></div>
        <div class="ed-actions"><button class="btn ghost" id="edCancel">${esc(d.cancel)}</button><button class="btn primary" id="edSend">${esc(isKeeper?d.done:d.sendKeeper)}</button></div>`;
      show($('#editSheet')); $('#editSheet #edCancel').onclick=hide;
      $('#editSheet #edSend').onclick=async()=>{ const f=$('#editSheet #edFile').files&&$('#editSheet #edFile').files[0]; if(!f){ hide(); return; } hide(); await replacePhoto(f); }; return;
    }
    let title='', html='', onsend=null;
    if(target==='story'){ title=d.edStory; const s=storyForLang(lang); const val=s.kind==='human'?s.text:'';
      html=`<div class="ed-langtag">${sv(ICON.info,1.7)} ${esc(d.langTitle)}: ${esc(langNative(lang))}</div>
        <div class="ed-field"><label>${esc(d.edStory)}</label><textarea rows="5" id="edInput">${esc(val)}</textarea></div>`;
      onsend=async()=>{ const val=($('#editSheet #edInput')||{}).value; await submitStory(val); };
    } else if(target==='detail-new'){ title=d.addDetail;
      html=`<div class="ed-field"><label>${esc(d.detailLabelL)}</label><input id="edLabel" placeholder="${esc(d.detailLabelP)}"></div>
        <div class="ed-field"><label>${esc(d.detailValueL)}</label><input id="edInput" placeholder="${esc(d.detailValueP)}"></div>`;
      onsend=async()=>{ const L=($('#editSheet #edLabel')||{}).value||d.detailLabelP; const V=($('#editSheet #edInput')||{}).value||'—'; await saveDetail(null,{label:L,value:V}); };
    } else if(target.indexOf('detail:')===0){ const i=+target.split(':')[1]; const f=detailsList()[i]||{}; title=f.label||d.detailLabelL;
      html=`<div class="ed-field"><label>${esc(d.detailLabelL)}</label><input id="edLabel" value="${esc(f.label||'')}"></div>
        <div class="ed-field"><label>${esc(d.detailValueL)}</label><input id="edInput" value="${esc(f.value||'')}"></div>`;
      onsend=async()=>{ const L=($('#editSheet #edLabel')||{}).value; const V=($('#editSheet #edInput')||{}).value; await saveDetail(i,{label:L,value:V}); };
    }
    $('#editSheet').innerHTML=`<div class="grip"></div><h3>${esc(title)}</h3>${html}
      <div class="ed-note">${sv(ICON.info,1.7)} <span>${esc(d.keeperNote)}</span></div>
      <div class="ed-actions"><button class="btn ghost" id="edCancel">${esc(d.cancel)}</button><button class="btn primary" id="edSend">${esc(isKeeper?d.done:d.sendKeeper)}</button></div>`;
    show($('#editSheet'));
    const inp=$('#editSheet #edInput'); if(inp) setTimeout(()=>inp.focus(),340);
    $('#editSheet #edCancel').onclick=hide;
    $('#editSheet #edSend').onclick=async()=>{ hide(); if(onsend) await onsend(); };
