  /* ---------- gate helpers ---------- */
  async function sbWrite(fn){ try{ const r=await fn(); if(r&&r.error) throw r.error; return true; }catch(e){ toast((e&&e.message)||'Could not save.', true); return false; } }
  // contributor proposal → artefact_edits (in_review), never a published insert
  async function proposeEdit(field, opts){ if(!user){ toast(t().signIn,true); return false; }
    const row={artefact_id:art.id, field, status:'in_review', created_by:user.id};
    if(opts.new_value!=null) row.new_value=opts.new_value;
    if(opts.old_value!=null) row.old_value=opts.old_value;
    if(opts.ref_id) row.ref_id=opts.ref_id;
    if(opts.lang) row.lang=opts.lang;
    const ok=await sbWrite(()=>sb.from('artefact_edits').insert(row));
    if(ok){ const k=opts.pendKey||field; pend[k]=true; const c=document.querySelector(`[data-pending="${k}"]`); if(c) c.classList.add('show'); toast(t().sent); }
    return ok; }

  async function saveMeta(field, val, oldVal, pendKey){ val=String(val==null?'':val).trim();
    if(isKeeper){ const md=Object.assign({}, art.metadata||{}); if(val) md[field]=val; else delete md[field];
      const ok=await sbWrite(()=>sb.from('artefacts').update({metadata:md}).eq('id',art.id)); if(ok){ art.metadata=md; toast(t().saved); buildModel(); render(); } }
    else { await proposeEdit(field,{new_value:val, old_value:oldVal||'', pendKey:pendKey||field}); }
  }
  async function saveDetail(idx, obj){
    if(isKeeper){ const md=Object.assign({}, art.metadata||{}); const arr=Array.isArray(md.details)?md.details.slice():[];
      if(idx==null) arr.push(obj); else arr[idx]=obj; md.details=arr;
      const ok=await sbWrite(()=>sb.from('artefacts').update({metadata:md}).eq('id',art.id)); if(ok){ art.metadata=md; toast(t().saved); buildModel(); render(); } }
    else { await proposeEdit(idx==null?'detail_add':'detail_edit',{new_value:JSON.stringify(Object.assign({idx},obj)), old_value:(detailsList()[idx]||{}).value||'', pendKey:'detail'}); }
  }
  async function removeDetail(idx){ const d=t(); if(!confirm(d.removeDetail)) return;
    if(isKeeper){ const md=Object.assign({}, art.metadata||{}); const arr=(md.details||[]).slice(); arr.splice(idx,1); md.details=arr;
      const ok=await sbWrite(()=>sb.from('artefacts').update({metadata:md}).eq('id',art.id)); if(ok){ art.metadata=md; toast(t().saved); buildModel(); render(); } }
    else { await proposeEdit('detail_remove',{new_value:JSON.stringify({idx}), old_value:(detailsList()[idx]||{}).value||'', pendKey:'detail'}); }
  }
  async function submitStory(val){ const d=t(); if(!user){ toast(d.signIn,true); return; } val=String(val==null?'':val).trim(); if(!val){ return; }
    if(isKeeper){ // publish directly as the story in this language
      const orig=(art&&art.original_language)||'en';
      let ok;
      if(lang===orig){ ok=await sbWrite(()=>sb.from('artefacts').update({body:val}).eq('id',art.id)); if(ok) art.body=val; }
      else { ok=await sbWrite(()=>sb.from('artefact_translations').upsert({artefact_id:art.id,lang,body:val,status:'published',reviewed_by:user.id,published_at:new Date().toISOString()},{onConflict:'artefact_id,lang'}));
        if(ok){ translations=translations.filter(x=>x.lang!==lang); translations.push({lang,body:val,status:'published'}); } }
      if(ok){ toast(d.saved); buildModel(); render(); }
    } else { const ok=await sbWrite(()=>sb.from('artefact_translations').insert({artefact_id:art.id,lang,body:val,status:'in_review',created_by:user.id}));
      if(ok){ pend.story=true; const c=document.querySelector('[data-pending="story"]'); if(c) c.classList.add('show'); toast(d.sent); } }
  }
  async function removeTelling(){ const d=t();
    if(isKeeper){ const orig=(art&&art.original_language)||'en'; let ok;
      if(lang===orig){ ok=await sbWrite(()=>sb.from('artefacts').update({body:null}).eq('id',art.id)); if(ok) art.body=null; }
      else { ok=await sbWrite(()=>sb.from('artefact_translations').delete().eq('artefact_id',art.id).eq('lang',lang)); if(ok) translations=translations.filter(x=>x.lang!==lang); }
      if(ok){ toast(d.saved); buildModel(); render(); } }
    else { await proposeEdit('story_remove',{lang, old_value:d.story.text||'', pendKey:'story'}); }
  }

  /* ---------- photo replace / delete / rotate ---------- */
  async function rotatePhoto(){ const d=t();
    if(isKeeper){ const ok=await sbWrite(async()=>{ await doRotate(); return {}; }); if(ok){ toast(d.saved); await reload(); } }
    else { await proposeEdit('photo_rotate',{new_value:'90', pendKey:'photo'}); }
  }
  async function replacePhoto(file){ const d=t(); if(!file){ return; }
    if(isKeeper){ const ok=await sbWrite(async()=>{ const np=await uploadFile(file); const r=await sb.from('artefacts').update({storage_path:np}).eq('id',art.id); if(r.error) throw r.error; const old=art.storage_path; art.storage_path=np; try{await sb.storage.from('family').remove([old]);}catch(e){} return {}; }); if(ok){ toast(d.saved); await reload(); } }
    else { // upload candidate, propose swap
      const ok=await sbWrite(async()=>{ const np=await uploadFile(file); const r=await sb.from('artefact_edits').insert({artefact_id:art.id,field:'photo_replace',new_value:np,status:'in_review',created_by:user.id}); if(r.error) throw r.error; return {}; });
      if(ok){ pend.photo=true; const c=document.querySelector('[data-pending="photo"]'); if(c) c.classList.add('show'); toast(d.sent); await reload(); } }
  }
  async function deletePhoto(){ const d=t();
    if(isKeeper){ const ok=await sbWrite(()=>sb.from('artefacts').update({storage_path:null}).eq('id',art.id)); if(ok){ const old=art.storage_path; art.storage_path=null; try{await sb.storage.from('family').remove([old]);}catch(e){} toast(d.saved); await reload(); } }
    else { await proposeEdit('photo_delete',{old_value:art.storage_path||'', pendKey:'photo'}); }
  }

  /* ---------- keeper review queue ---------- */
  async function loadQueue(){ edits=[];
    // artefact_edits visible to me (RLS: keeper sees all in_review, contributor sees own)
    try{ const {data:b}=await sb.from('artefact_edits').select('id,field,lang,new_value,ref_id,old_value,created_at,created_by').eq('artefact_id',MOMENT_ID).eq('status','in_review');
      (b||[]).forEach(x=>edits.push(Object.assign({kind:'edit'},x))); }catch(e){}
    if(isKeeper){ try{ const {data:a}=await sb.from('artefact_translations').select('id,lang,body,created_at').eq('artefact_id',MOMENT_ID).eq('status','in_review');
      (a||[]).forEach(x=>edits.push(Object.assign({kind:'story'},x))); }catch(e){} }
  }
  function labelFor(item){ const d=t(); if(item.kind==='story') return d.story+' · '+langNative(item.lang);
    const map={where:d.whereK,when:d.whenK,tag_add:d.inMoment,tag_remove:d.inMoment,tag_move:d.inMoment,
      detail_add:d.addDetail,detail_edit:d.addDetail,detail_remove:d.addDetail,story_remove:d.story,
      photo_rotate:d.rotate,photo_replace:d.replacePhoto,photo_delete:d.deletePhoto};
    return map[item.field]||item.field; }
  function reviewValue(item){ // human-readable "new value" for the card
    if(item.kind==='story') return item.body||'';
    if(item.field==='tag_add'){ try{return (JSON.parse(item.new_value||'{}').name)||item.old_value||'';}catch(_){return item.old_value||'';} }
    if(item.field==='tag_remove') return t().tagRemove+' · '+(item.old_value||'');
    if(item.field==='tag_move') return t().tagChange;
    if(item.field==='detail_add'||item.field==='detail_edit'){ try{const m=JSON.parse(item.new_value||'{}');return (m.label?m.label+': ':'')+(m.value||'');}catch(_){return item.new_value||'';} }
    if(item.field==='detail_remove') return t().removeDetail;
    if(item.field==='photo_rotate') return t().rotate+' 90°';
    if(item.field==='photo_replace') return t().replacePhoto;
    if(item.field==='photo_delete') return t().deletePhoto;
    if(item.field==='story_remove') return t().removeTelling;
    return item.new_value||item.old_value||'—'; }
  function openReview(){ const d=t();
    const rows = edits.length ? edits.map((item,i)=>{ const oldv=item.kind==='story'?'':(item.old_value||'');
      const newv=reviewValue(item);
      return `<div class="ed-field" style="margin-bottom:16px;border:1px solid var(--hair);border-radius:14px;padding:14px" data-i="${i}">
        <div class="ed-langtag">${sv(ICON.info,1.7)} ${esc(labelFor(item))}</div>
        ${oldv?`<div style="font-family:'Newsreader',serif;font-style:italic;color:var(--muted);text-decoration:line-through;margin-bottom:7px">${esc(oldv)}</div>`:''}
        <div style="font-family:'Newsreader',serif;font-style:italic;color:var(--gold);margin-bottom:13px">${esc(newv||'—')}</div>
        <div class="ed-actions"><button class="btn ghost" data-no="${i}">${esc(d.decline)}</button><button class="btn primary" data-ok="${i}">${esc(d.approve)}</button></div>
      </div>`; }).join('') : `<div class="sub">${esc(d.reviewSub)}</div>`;
    $('#editSheet').innerHTML=`<div class="grip"></div><h3>${esc(d.reviewT)}</h3><div class="sub">${esc(d.reviewSub)}</div>${rows}`;
    show($('#editSheet'));
    $('#editSheet').querySelectorAll('[data-ok]').forEach(b=>b.onclick=async()=>{ b.disabled=true; await approve(edits[+b.getAttribute('data-ok')]); await afterReview(); });
    $('#editSheet').querySelectorAll('[data-no]').forEach(b=>b.onclick=async()=>{ b.disabled=true; await decline(edits[+b.getAttribute('data-no')]); await afterReview(); });
  }
  async function afterReview(){ await loadQueue(); if(edits.length && isKeeper) openReview(); else hide();
    await reload(); toast(t().published); }
  async function approve(item){ try{
      if(item.kind==='story'){ await sb.from('artefact_translations').update({status:'published',reviewed_by:user.id,published_at:new Date().toISOString()}).eq('id',item.id);
        translations=translations.filter(x=>x.lang!==item.lang); translations.push({lang:item.lang,body:item.body,status:'published'}); return; }
      const f=item.field;
      if(f==='where'||f==='when'){ const md=Object.assign({},art.metadata||{}); md[f]=item.new_value; await sb.from('artefacts').update({metadata:md}).eq('id',art.id); art.metadata=md; }
      else if(f==='detail_add'){ const m=JSON.parse(item.new_value||'{}'); const md=Object.assign({},art.metadata||{}); const arr=Array.isArray(md.details)?md.details.slice():[]; arr.push({label:m.label,value:m.value}); md.details=arr; await sb.from('artefacts').update({metadata:md}).eq('id',art.id); art.metadata=md; }
      else if(f==='detail_edit'){ const m=JSON.parse(item.new_value||'{}'); const md=Object.assign({},art.metadata||{}); const arr=Array.isArray(md.details)?md.details.slice():[]; if(m.idx!=null&&arr[m.idx]) arr[m.idx]={label:m.label,value:m.value}; md.details=arr; await sb.from('artefacts').update({metadata:md}).eq('id',art.id); art.metadata=md; }
      else if(f==='detail_remove'){ const m=JSON.parse(item.new_value||'{}'); const md=Object.assign({},art.metadata||{}); const arr=(md.details||[]).slice(); if(m.idx!=null) arr.splice(m.idx,1); md.details=arr; await sb.from('artefacts').update({metadata:md}).eq('id',art.id); art.metadata=md; }
      else if(f==='tag_add'){ const m=JSON.parse(item.new_value||'{}'); let pid=item.ref_id; if(!pid){ await loadAllPeople(); pid=await ensurePerson(m.name); } await sb.from('artefact_subjects').upsert({artefact_id:art.id,person_id:pid,detail:m.box||null}); }
      else if(f==='tag_remove'){ await sb.from('artefact_subjects').delete().eq('artefact_id',art.id).eq('person_id',item.ref_id); }
      else if(f==='tag_move'){ const m=JSON.parse(item.new_value||'{}'); await sb.from('artefact_subjects').update({detail:m.box||null}).eq('artefact_id',art.id).eq('person_id',item.ref_id); }
      else if(f==='photo_rotate'){ await doRotate(); }
      else if(f==='photo_replace'){ const old=art.storage_path; await sb.from('artefacts').update({storage_path:item.new_value}).eq('id',art.id); art.storage_path=item.new_value; if(old&&old!==item.new_value){try{await sb.storage.from('family').remove([old]);}catch(e){}} }
      else if(f==='photo_delete'){ const old=art.storage_path; await sb.from('artefacts').update({storage_path:null}).eq('id',art.id); art.storage_path=null; if(old){try{await sb.storage.from('family').remove([old]);}catch(e){}} }
      else if(f==='story_remove'){ const orig=(art&&art.original_language)||'en'; if(item.lang===orig){ await sb.from('artefacts').update({body:null}).eq('id',art.id); art.body=null; } else { await sb.from('artefact_translations').delete().eq('artefact_id',art.id).eq('lang',item.lang); translations=translations.filter(x=>x.lang!==item.lang); } }
      await sb.from('artefact_edits').update({status:'published',reviewed_by:user.id,reviewed_at:new Date().toISOString()}).eq('id',item.id);
    }catch(e){ toast((e&&e.message)||'Could not apply.', true); } }
  async function decline(item){ try{ if(item.kind==='story') await sb.from('artefact_translations').delete().eq('id',item.id);
    else { if(item.field==='photo_replace'&&item.new_value){ try{await sb.storage.from('family').remove([item.new_value]);}catch(e){} } await sb.from('artefact_edits').delete().eq('id',item.id); } }catch(e){} }

  /* ---------- wire ---------- */
  function setTagging(on){ document.body.classList.toggle('tagging', on); if(!on){ try{ zoomReset(); }catch(_){} }
    const b=$('#tagBtn'); if(b){ b.classList.toggle('on',on); const l=$('#tagBtnLabel'); if(l) l.textContent= on?t().tagDone:t().tagFace; }
    if(!on){ selId=null; } renderBoxes(); }
  function wire(){ const d=t();
    $('#backBtn').onclick=()=>{ if(history.length>1) history.back(); else location.href='index.html'; };
    $('#langBtn').onclick=()=>show($('#langSheet'));
    $('#editBtn').onclick=()=>{ const on=!document.body.classList.contains('editing'); document.body.classList.toggle('editing',on); $('#editBtn').classList.toggle('on',on); };
    const done=$('#doneBtn'); if(done) done.onclick=()=>{ document.body.classList.remove('editing'); $('#editBtn').classList.remove('on'); };
    const ks=$('#keeperStrip'); if(ks) ks.onclick=openReview;
    $('#langSheet').querySelectorAll('[data-lang]').forEach(b=> b.onclick=async()=>{ lang=b.dataset.lang; hide(); try{localStorage.setItem('lf_lang',lang);}catch(e){} if(user){try{await sb.from('profiles').update({preferred_lang:lang}).eq('id',user.id);}catch(e){}} buildModel(); render(); ensureLangAssets(); });

    const tagBtn=$('#tagBtn'); if(tagBtn) tagBtn.onclick=()=>setTagging(!document.body.classList.contains('tagging'));
    const addFace=$('#addFaceBtn'); if(addFace) addFace.onclick=()=>{ setTagging(true); const ps=$('#photostage'); if(ps) ps.scrollIntoView({behavior:'smooth',block:'center'}); };
    const rotBtn=$('#rotBtn'); if(rotBtn) rotBtn.onclick=rotatePhoto;
    const replBtn=$('#replBtn'); if(replBtn) replBtn.onclick=()=>openEditor('photo');
    const delBtn=$('#delBtn'); if(delBtn) delBtn.onclick=()=>openEditor('photo-delete');
    const addDetail=$('#addDetailBtn'); if(addDetail) addDetail.onclick=()=>openEditor('detail-new');

    bindTagLayer(); bindZoom();

    $$('.face').forEach(f=>f.addEventListener('click', e=>{
      const id=f.dataset.face, kind=f.dataset.kind, tagId=f.dataset.tagid;
      if(document.body.classList.contains('tagging') || document.body.classList.contains('editing')){
        e.preventDefault();
        const tag=tagId?TAGS.find(x=>x.id===tagId):null;
        setTagging(true);
        if(tag){ selId=tag.id; renderBoxes(); } else { toast(t().tagHint); }
        const ps=$('#photostage'); if(ps) ps.scrollIntoView({behavior:'smooth',block:'center'});
      } else if(kind==='subject'){ location.href='person-real.html?id='+encodeURIComponent(id); }
    }));
    // list number → pulse the matching box on the photo (keyboard accessible; never navigates)
    $$('.fnum').forEach(el=>{ const act=e=>{ e.preventDefault(); e.stopPropagation(); const tid=el.getAttribute('data-tagid'); if(tid) pulseBox(tid); };
      el.addEventListener('click', act);
      el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') act(e); }); });
    const tf=$('[data-open="tagface"]'); if(tf) tf.onclick=()=>{ setTagging(true); const ps=$('#photostage'); if(ps) ps.scrollIntoView({behavior:'smooth',block:'center'}); };

    $$('[data-open="story"]').forEach(el=>el.onclick=e=>{ e.stopPropagation(); openEditor('story'); });
    const rmt=$('[data-rmtell]'); if(rmt) rmt.onclick=e=>{ e.stopPropagation(); removeTelling(); };

    $$('[data-edit]').forEach(el=>{ el.addEventListener('click', e=>{
      const key=el.getAttribute('data-edit');
      if(e.target.closest('[data-open]')) return;
      if(e.target.closest('.rm')) return;
      if(e.target.closest('#photostage')) return;
      if(key==='story') return; // story handled by data-open / editable click below
      if(key==='where'){ if(document.body.classList.contains('editing')){ e.preventDefault(); openPlace(); } else if(whereText()){ location.href='place-real.html?place='+encodeURIComponent(whereText()); } return; }
      if(key==='when'){ if(document.body.classList.contains('editing')){ e.preventDefault(); openCal(); } return; }
      if(!document.body.classList.contains('editing')) return;
      e.preventDefault(); openEditor(key);
    }); });
    // story block: in editing mode, tapping the words opens the editor
    const se=$('.story-editable'); if(se) se.addEventListener('click', e=>{ if(e.target.closest('[data-rmtell]')) return; if(document.body.classList.contains('editing')){ e.preventDefault(); openEditor('story'); } });
    $$('[data-remove]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const key=b.dataset.remove;
      if(key.indexOf('detail:')===0){ removeDetail(+key.split(':')[1]); } });
  }

  /* ---------- pending chips ---------- */
  function restorePending(){ Object.keys(pend).forEach(k=>{ if(pend[k]){ const c=document.querySelector(`[data-pending="${k}"]`); if(c) c.classList.add('show'); } }); }

  /* ---------- overlays ---------- */
  const scrim=$('#scrim');
  const SHEETS=['#langSheet','#editSheet','#nameSheet','#calSheet','#placeSheet'];
  function show(sheet){ scrim.classList.add('show'); sheet.classList.add('show'); }
  function hide(){ scrim.classList.remove('show'); SHEETS.forEach(s=>$(s).classList.remove('show')); }
  scrim.addEventListener('click', hide);
  window.__lfClose=()=>{ if(document.querySelector('.sheet.show')){ hide(); return true; }
    if(document.body.classList.contains('tagging')){ setTagging(false); return true; }
    if(document.body.classList.contains('editing')){ document.body.classList.remove('editing'); const eb=$('#editBtn'); if(eb) eb.classList.remove('on'); return true; }
    return false; };
  function toast(msg, err){ $('#toastMsg').textContent=msg; const el=$('#toast'); el.classList.toggle('err',!!err); el.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),2800); }

  /* ---------- language assets ---------- */
  async function callTranslate(items){ try{const {data,error}=await sb.functions.invoke('translate',{body:{target_lang:lang,items}}); if(error||!data) return null; return data.results||null;}catch(e){return null;} }
  async function ensureLangAssets(){ if(lang==='en') return;
    const need=subjects.map(s=>s.person_id).filter(pid=>{const p=peopleById[pid]; const hasV=(vars[pid]||[]).some(x=>x.lang===lang); const hasA=autoName[lang]&&autoName[lang][pid]; return p&&p.display_name&&!hasV&&!hasA;});
    if(need.length){ autoName[lang]=autoName[lang]||{}; const items=need.map(pid=>({kind:'name_full',ref:pid,text:peopleById[pid].display_name,gender:peopleById[pid].sex||''}));
      const res=await callTranslate(items); if(res){res.forEach(r=>{if(r&&r.ref&&r.text)autoName[lang][r.ref]=r.text;}); buildModel(); render();} }
    const s=storyForLang(lang);
    if(s.kind==='machine' && art.body && autoStory[lang]==null){ autoStory[lang]=''; const res=await callTranslate([{kind:'artefact_body',ref:art.id,text:art.body}]); autoStory[lang]=(res&&res[0]&&res[0].text)||''; buildModel(); render(); } }

  /* ---------- atmosphere (verbatim) ---------- */
  (function atmosphere(){
    const cv=$('#atmo'), ctx=cv.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
    function resize(){ W=cv.clientWidth; H=cv.clientHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
    window.addEventListener('resize', resize); resize();
    const HUES=[[86,214,196],[150,120,236],[236,110,200],[255,214,120],[95,200,236],[255,140,170],[255,176,90],[130,236,180]];
    const N=15, blobs=[]; for(let i=0;i<N;i++){ const c=HUES[i%HUES.length];
      blobs.push({ x:Math.random(), y:Math.random(), r:Math.random()*130+90, c, vx:(Math.random()-.5)*0.00013, vy:(Math.random()-.5)*0.00010, ph:Math.random()*6.28, sp:Math.random()*0.5+0.3 }); }
    const bands=[ {y:0.30,c:[86,214,196],amp:60,ph:0}, {y:0.5,c:[150,120,236],amp:80,ph:2}, {y:0.68,c:[236,110,200],amp:70,ph:4} ];
    const COOL=[103,199,216], GOLD=[255,207,126]; const ARCS=reduce?6:9, arcs=[];
    function seedArc(a){ a.x0=Math.random(); a.y0=Math.random(); const ang=Math.random()*6.28, len=Math.random()*0.5+0.35;
      a.x1=a.x0+Math.cos(ang)*len; a.y1=a.y0+Math.sin(ang)*len; const mx=(a.x0+a.x1)/2, my=(a.y0+a.y1)/2, nx=-(a.y1-a.y0), ny=(a.x1-a.x0);
      const lift=(Math.random()*0.3+0.12)*(Math.random()>.5?1:-1); a.cx=mx+nx*lift; a.cy=my+ny*lift;
      a.c=Math.random()<0.3?GOLD:COOL; a.t=Math.random(); a.spd=Math.random()*0.0011+0.0006; return a; }
    for(let i=0;i<ARCS;i++) arcs.push(seedArc({}));
    const bez=(p0,p1,p2,t)=>{ const u=1-t; return u*u*p0 + 2*u*t*p1 + t*t*p2; }; const INT=0.85;
    function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
      bands.forEach(b=>{ const yy=b.y*H + (reduce?0:Math.sin(t*0.2+b.ph)*18); const g=ctx.createLinearGradient(0,yy-b.amp,0,yy+b.amp);
        g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`); g.addColorStop(.5,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${0.14*INT})`); g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);
        ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,yy); for(let x=0;x<=W;x+=24){ const yo=Math.sin(x*0.006 + t*(reduce?0:0.3)+b.ph)*b.amp*0.5; ctx.lineTo(x, yy+yo); } ctx.lineTo(W,yy+b.amp*2); ctx.lineTo(0,yy+b.amp*2); ctx.closePath(); ctx.fill(); });
      blobs.forEach(bl=>{ if(!reduce){ bl.x+=bl.vx; bl.y+=bl.vy; if(bl.x<-.2)bl.x=1.2; if(bl.x>1.2)bl.x=-.2; if(bl.y<-.2)bl.y=1.2; if(bl.y>1.2)bl.y=-.2; }
        const px=bl.x*W, py=bl.y*H, pulse=reduce?1:(0.75+0.25*Math.sin(t*bl.sp+bl.ph)); const r=bl.r*pulse, g=ctx.createRadialGradient(px,py,0,px,py,r); const a=0.18*INT*pulse;
        g.addColorStop(0,`rgba(${bl.c[0]},${bl.c[1]},${bl.c[2]},${a})`); g.addColorStop(1,`rgba(${bl.c[0]},${bl.c[1]},${bl.c[2]},0)`); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r,0,6.2832); ctx.fill(); });
      arcs.forEach(a=>{ if(!reduce){ a.t+=a.spd; if(a.t>1){ seedArc(a); a.t=0; } } const [r,g2,b2]=a.c;
        const x0=a.x0*W,y0=a.y0*H, x1=a.x1*W,y1=a.y1*H, cx=a.cx*W,cy=a.cy*H;
        ctx.strokeStyle=`rgba(${r},${g2},${b2},0.13)`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(cx,cy,x1,y1); ctx.stroke();
        [[x0,y0],[x1,y1]].forEach(([nx,ny])=>{ const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,7); ng.addColorStop(0,`rgba(${r},${g2},${b2},0.5)`); ng.addColorStop(1,`rgba(${r},${g2},${b2},0)`); ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx,ny,7,0,6.2832); ctx.fill(); });
        const px=bez(x0,cx,x1,a.t), py=bez(y0,cy,y1,a.t); const fade=Math.sin(a.t*Math.PI); const R=5.5, gr=ctx.createRadialGradient(px,py,0,px,py,R);
        gr.addColorStop(0,`rgba(255,248,232,${0.95*fade})`); gr.addColorStop(0.45,`rgba(${r},${g2},${b2},${0.6*fade})`); gr.addColorStop(1,`rgba(${r},${g2},${b2},0)`);
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(px,py,R,0,6.2832); ctx.fill(); ctx.fillStyle=`rgba(255,252,244,${0.9*fade})`; ctx.beginPath(); ctx.arc(px,py,1.4,0,6.2832); ctx.fill(); });
      ctx.globalCompositeOperation='source-over'; if(!reduce) requestAnimationFrame(frame); }
    if(!reduce) requestAnimationFrame(frame); else frame(0);
  })();

  /* ---------- gate + boot ---------- */
  function showGate(){ const d=UI[lang];
    let g=$('#gate'); if(!g){ g=document.createElement('div'); g.id='gate'; document.body.appendChild(g); }
    g.setAttribute('style','position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,7,14,.82);backdrop-filter:blur(6px)');
    g.innerHTML=`<div style="width:100%;max-width:320px;background:linear-gradient(180deg,#0e1c31,#081120);border:1px solid var(--hair);border-radius:20px;padding:24px;text-align:center">
      <h3 style="font-family:'Newsreader',serif;font-weight:400;font-size:22px;color:#fbf5e8">${esc(d.signIn)}</h3>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 16px">${esc(d.signInSub)}</div>
      <input id="gEmail" type="email" placeholder="${esc(d.email)}" style="width:100%;margin-bottom:10px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px"/>
      <input id="gPass" type="password" placeholder="${esc(d.pass)}" style="width:100%;margin-bottom:12px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px"/>
      <button id="gBtn" class="btn primary" style="width:100%">${esc(d.signInBtn)}</button>
      <div id="gErr" style="color:#ff9a8a;font-size:12px;min-height:16px;margin-top:8px"></div></div>`;
    $('#gBtn').onclick=async()=>{ const em=$('#gEmail').value.trim(), pw=$('#gPass').value; $('#gErr').textContent='';
      const {error}=await sb.auth.signInWithPassword({email:em,password:pw}); if(error){$('#gErr').textContent=error.message;return;} g.remove(); boot(); };
  }

  async function boot(){
    const {data:{session}}=await sb.auth.getSession();
    const stored=localStorage.getItem('lf_lang'); if(stored&&UI[stored]) lang=stored;
    if(!session){ showGate(); return; }
    user=session.user;
    try{const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang').eq('id',user.id).maybeSingle();
      if(pr){ isKeeper=!!pr.is_keeper; if(isKeeper){ window.__lfKeeper=true; try{document.dispatchEvent(new Event('lf-keeper-ready'));}catch(e){} } if(pr.preferred_lang&&!stored&&UI[pr.preferred_lang]) lang=pr.preferred_lang; }}catch(e){}
    await loadMoment();
  }
  async function loadMoment(){
    const {data:a}=await sb.from('artefacts').select('id,storage_path,body,original_language,metadata,contributor_id,kind').eq('id',MOMENT_ID).maybeSingle();
    if(!a){ $('#wrap').innerHTML='<div style="padding:60px 0;text-align:center;color:var(--muted);font-family:\'Newsreader\',serif;font-style:italic">'+esc(UI[lang].notFound)+'</div>'; return; }
    art=a;
    const subs=await sb.from('artefact_subjects').select('person_id,detail').eq('artefact_id',MOMENT_ID);
    subjects=(subs.data||[]).filter(s=>s.person_id);
    peopleById={}; vars={};
    const ids=subjects.map(s=>s.person_id);
    if(ids.length){ const {data:pp}=await sb.from('people').select('id,display_name,called_name,primary_asset,sex').in('id',ids); (pp||[]).forEach(p=>peopleById[p.id]=p);
      const {data:nv}=await sb.from('name_variants').select('person_id,lang,given,family,status').in('person_id',ids).eq('status','published'); (nv||[]).forEach(v=>{(vars[v.person_id]=vars[v.person_id]||[]).push(v);}); }
    tellerName='';
    if(art.contributor_id){ const {data:cp}=await sb.from('people').select('display_name').eq('id',art.contributor_id).maybeSingle(); tellerName=(cp&&cp.display_name)||''; }
    const {data:tr}=await sb.from('artefact_translations').select('lang,body,status').eq('artefact_id',MOMENT_ID).eq('status','published'); translations=tr||[];
    await loadQueue();
    buildModel(); render(); ensureLangAssets();
  }
  // light refresh after a write: re-pull subjects/edits/translations, keep scroll
  async function reload(){ const y=window.scrollY;
    const subs=await sb.from('artefact_subjects').select('person_id,detail').eq('artefact_id',MOMENT_ID);
    subjects=(subs.data||[]).filter(s=>s.person_id);
    const ids=subjects.map(s=>s.person_id);
    if(ids.length){ const {data:pp}=await sb.from('people').select('id,display_name,called_name,primary_asset,sex').in('id',ids); (pp||[]).forEach(p=>peopleById[p.id]=p); }
    const {data:tr}=await sb.from('artefact_translations').select('lang,body,status').eq('artefact_id',MOMENT_ID).eq('status','published'); translations=tr||[];
    await loadQueue(); buildModel(); render(); window.scrollTo(0,y); }

  boot();
})();
</script>
