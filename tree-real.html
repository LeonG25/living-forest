  function fmt(s,o){ o=o||{}; return String(s).replace(/\{(\w+)\}/g,(m,k)=>o[k]!=null?o[k]:''); }

  /* ---------- state + data ---------- */
  let state={ lang:'en', keeper:false };
  let user=null, viewerPersonId=null;
  let people={};          // id -> {id,display_name,sex,primary_asset,birth_year,metadata}
  let nameLoc={};         // id -> {lang -> {given,family,called,display}}
  let edges=[];           // {id, from(parent), to(child)}
  let subjects=[];        // {artefact_id, person_id}
  let pendingKin=[];      // {id, person_id, value, created_by, creatorName}
  let relStatusCol=true;  // whether relationships has a status column
  let focusId=null;       // current tree focus
  let nodePos={};         // rendered id -> {x,y} in % of treewrap

  function L(){ return T[state.lang]||T.en; }

  /* ---------- face rendering ---------- */
  const FCOL=['#c9a878','#8fa6b8','#b58a5c','#9fb0a0','#c08a70','#8a92b0','#a88f6e','#7f97ab'];
  function hash(s){ let h=0; s=String(s||''); for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
  function faceSVG(seed){ const s=FCOL[seed%FCOL.length];
    return '<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice"><rect width="100" height="100" fill="'+s+'"/><rect y="60" width="100" height="40" fill="rgba(0,0,0,.16)"/><circle cx="50" cy="42" r="15" fill="#e6c49b"/><path d="M50 92 Q50 66 31 63 Q34 51 50 51 Q66 51 69 63 Q50 66 50 92Z" fill="#5a4636"/></svg>'; }
  function placeholderFor(id){ return faceSVG(hash(id)); }
  async function signedUrl(path){ if(!path) return ''; try{ const r=await sb.storage.from('family').createSignedUrl(path,3600); return (r.data&&r.data.signedUrl)||''; }catch(e){ return ''; } }
  async function faceInto(el, path, box){ if(!el||!path) return; const u=await signedUrl(path); if(!u) return;
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ const c=document.createElement('canvas'); c.width=c.height=160; const g=c.getContext('2d');
      if(box&&box.w>0&&box.h>0){ const pad=0.35, side=Math.max(box.w*(1+2*pad),box.h*(1+2*pad))*Math.max(img.naturalWidth,img.naturalHeight);
        let sx=(box.x+box.w/2)*img.naturalWidth-side/2, sy=(box.y+box.h/2)*img.naturalHeight-side/2;
        sx=Math.max(0,Math.min(img.naturalWidth-side,sx)); sy=Math.max(0,Math.min(img.naturalHeight-side,sy)); g.drawImage(img,sx,sy,side,side,0,0,160,160);
      } else { const s=Math.min(img.naturalWidth,img.naturalHeight); g.drawImage(img,(img.naturalWidth-s)/2,(img.naturalHeight-s)/2,s,s,0,0,160,160); }
      el.innerHTML=''; el.appendChild(c); }; img.src=u; }

  /* ---------- names ---------- */
  function nm(id){ const p=people[id]; if(!p) return '—';
    const loc=nameLoc[id]&&nameLoc[id][state.lang];
    if(loc){ const g=(loc.called||loc.given||'').trim(); const f=(loc.family||'').trim(); const full=(g+' '+f).trim(); if(full) return full; if((loc.display||'').trim()) return loc.display.trim(); }
    return p.display_name||'—'; }
  function firstName(id){ const full=nm(id); return full.split(/\s+/)[0]||full; }
  function sexOf(id){ const p=people[id]; return ((p&&p.sex)||'').toString().toLowerCase().charAt(0); } // 'f' | 'm' | ''

  /* ---------- graph helpers ---------- */
  function parentsOf(x){ return edges.filter(e=>e.to===x).map(e=>e.from); }
  function childrenOf(x){ return edges.filter(e=>e.from===x).map(e=>e.to); }
  function coParentsOf(x){ const out=new Set(); childrenOf(x).forEach(c=>parentsOf(c).forEach(p=>{ if(p!==x) out.add(p); })); return [...out]; }
  function siblingsOf(x){ const out=new Set(); parentsOf(x).forEach(p=>childrenOf(p).forEach(c=>{ if(c!==x) out.add(c); })); return [...out]; }
  function descendantCount(x){ const seen=new Set(); const stk=[x]; while(stk.length){ const n=stk.pop(); childrenOf(n).forEach(c=>{ if(!seen.has(c)){ seen.add(c); stk.push(c); } }); } return seen.size; }
  function rootTrunk(){ let best=null,bc=-1; Object.keys(people).forEach(id=>{ const c=descendantCount(id); if(c>bc){ bc=c; best=id; } }); return best; }

  // undirected shortest path over kin edges; returns array of ids [from..to] or null
  function kinPath(a,b){ if(!a||!b) return null; if(a===b) return [a];
    const adj={}; edges.forEach(e=>{ (adj[e.from]=adj[e.from]||[]).push(e.to); (adj[e.to]=adj[e.to]||[]).push(e.from); });
    const q=[a], prev={}; prev[a]=null; const seen=new Set([a]);
    while(q.length){ const n=q.shift(); if(n===b){ const path=[]; let c=b; while(c!=null){ path.unshift(c); c=prev[c]; } return path; }
      (adj[n]||[]).forEach(m=>{ if(!seen.has(m)){ seen.add(m); prev[m]=n; q.push(m); } }); }
    return null; }
  function dirBetween(u,v){ // from u to v: 'down' if u is parent of v, 'up' if v is parent of u
    if(edges.some(e=>e.from===u&&e.to===v)) return 'down';
    if(edges.some(e=>e.from===v&&e.to===u)) return 'up'; return '?'; }
  // relationship term of `target` relative to `viewer`, from path viewer..target
  function relTerm(path,targetId){ const l=L(); const sx=sexOf(targetId);
    const dirs=[]; for(let i=0;i<path.length-1;i++) dirs.push(dirBetween(path[i],path[i+1]));
    const key=dirs.join(',');
    const pick=(f,m,n)=>sx==='f'?l[f]:sx==='m'?l[m]:l[n];
    const map={
      '':l.you, 'up':pick('mother','father','parent'), 'down':pick('daughter','son','child'),
      'up,up':pick('grandmother','grandfather','grandparent'), 'down,down':pick('granddaughter','grandson','grandchild'),
      'up,down':pick('sister','brother','sibling'), 'up,up,down':pick('aunt','uncle','auntuncle'),
      'up,down,down':pick('niece','nephew','niecenephew'), 'up,up,down,down':l.cousin };
    return map[key]||l.relative; }

  /* ---------- load ---------- */
  async function loadData(){
    try{ const {data:pp}=await sb.from('people').select('id,display_name,sex,primary_asset,birth_date,metadata'); (pp||[]).forEach(p=>{
      people[p.id]={ id:p.id, display_name:p.display_name, sex:p.sex, primary_asset:p.primary_asset,
        birth_year:(p.birth_date?String(p.birth_date).slice(0,4):''), metadata:p.metadata||{} }; });
    }catch(e){ people={}; }
    // localized names via the person_names view (published, pivoted) — best effort
    try{ const {data:nv}=await sb.from('person_names').select('*'); (nv||[]).forEach(r=>{ const id=r.person_id; const lg=r.lang||'und';
      if(!id) return; (nameLoc[id]=nameLoc[id]||{})[lg]={ given:r.given, family:r.family, called:r.called, display:r.display||r.display_name }; });
    }catch(e){ nameLoc={}; }
    // relationships (confirmed kin graph) — respect a status column if present
    try{ const {data:rp}=await sb.from('relationships').select('id,from_person,to_person,status');
      edges=(rp||[]).filter(r=>r.status==null||r.status==='published').map(r=>({id:r.id,from:r.from_person,to:r.to_person}));
    }catch(e){ relStatusCol=false;
      try{ const {data:rp2}=await sb.from('relationships').select('id,from_person,to_person'); edges=(rp2||[]).map(r=>({id:r.id,from:r.from_person,to:r.to_person})); }catch(e2){ edges=[]; } }
    // photo co-appearance
    try{ const {data:sj}=await sb.from('artefact_subjects').select('artefact_id,person_id'); subjects=sj||[]; }catch(e){ subjects=[]; }
    // pending kin suggestions (waiting for the keeper) — empty-structure until family adds them
    try{ const {data:pk}=await sb.from('person_facts').select('id,person_id,value,created_by,status').eq('field','kin').neq('status','published');
      pendingKin=pk||[]; const cids=[...new Set(pendingKin.map(k=>k.created_by).filter(Boolean))];
      if(cids.length){ try{ const {data:cp}=await sb.from('people').select('id,display_name').in('id',cids); const bn={}; (cp||[]).forEach(x=>bn[x.id]=x.display_name); pendingKin.forEach(k=>k.creatorName=bn[k.created_by]||''); }catch(e){} }
    }catch(e){ pendingKin=[]; }
  }

  /* ---------- photo co-appearance counts for a person ---------- */
  function coPhotoBonds(x){
    const myArts=new Set(subjects.filter(s=>s.person_id===x).map(s=>s.artefact_id));
    if(!myArts.size) return [];
    const counts={};
    subjects.forEach(s=>{ if(s.person_id!==x && myArts.has(s.artefact_id)){ counts[s.person_id]=(counts[s.person_id]||0)+1; } });
    return Object.keys(counts).map(id=>({id,count:counts[id]})).sort((a,b)=>b.count-a.count);
  }

  /* ================= TREE VIEW ================= */
  const CAP={ grand:4, focus:3, children:6 };
  function xspread(n){ if(n<=0) return []; if(n===1) return [50]; const lo=15,hi=85,a=[]; for(let i=0;i<n;i++) a.push(lo+(hi-lo)*i/(n-1)); return a; }

  function buildTreeNodes(F){
    const rtl=L().dir==='rtl'; const mx=v=>rtl?100-v:v;
    const nodes=[]; nodePos={};
    const push=(o)=>{ nodePos[o.id]={x:o.x,y:o.y}; nodes.push(o); };
    const realF=!!people[F];
    const P=parentsOf(F).slice(0,2);
    const Sp=coParentsOf(F);
    let S=siblingsOf(F); let sTrunc=Math.max(0,S.length-CAP.focus); S=S.slice(0,CAP.focus);
    let Ch=childrenOf(F); let cTrunc=Math.max(0,Ch.length-CAP.children); Ch=Ch.slice(0,CAP.children);

    // grandparent row: known grandparents of shown parents, else a hole above a root parent
    let grand=[];
    P.forEach(pid=>{ const gp=parentsOf(pid); if(gp.length){ gp.forEach(g=>grand.push({type:'person',id:g,anchor:pid})); }
      else { grand.push({type:'hole', id:'hole-g-'+pid, anchor:pid, label:L().unknownParents }); } });
    let gTrunc=Math.max(0,grand.length-CAP.grand); grand=grand.slice(0,CAP.grand);

    // parent row: always two slots for a real focus — holes are the point
    const parentSlots=[]; P.forEach(pid=>parentSlots.push({type:'person',id:pid}));
    if(realF){ let hi=0; while(parentSlots.length<2){ parentSlots.push({type:'hole', id:'hole-p'+(hi++), label:L().unknownParents}); } }

    // focus row: siblings, focus, spouses
    const focusRow=[]; S.forEach(id=>focusRow.push({type:'person',id})); focusRow.push({type:'focus',id:F}); Sp.forEach(id=>focusRow.push({type:'person',id}));

    const rows=[ {y:8,arr:grand}, {y:27,arr:parentSlots}, {y:50,arr:focusRow}, {y:74,arr:Ch.map(id=>({type:'person',id}))} ];
    rows.forEach(row=>{ const xs=xspread(row.arr.length); row.arr.forEach((it,i)=>{ it.x=mx(xs[i]); it.y=row.y; }); });

    // emit nodes
    grand.forEach(it=>push(mkNode(it,F)));
    parentSlots.forEach(it=>push(mkNode(it,F)));
    focusRow.forEach(it=>push(mkNode(it,F)));
    rows[3].arr.forEach(it=>push(mkNode(it,F)));

    // pending suggested kin near the focus (violet) — sits to the side of the focus row
    pendingKin.filter(k=>k.person_id===F).slice(0,2).forEach((k,i)=>{
      const it={ type:'pending', id:'pend-'+k.id, x:mx(6), y:38+i*20, label:pendKinLabel(k), waitchip:pendKinChip(k) };
      push(mkNode(it,F));
    });

    return { nodes, F, sTrunc, cTrunc, gTrunc };
  }
  function pendKinLabel(k){ try{ const v=JSON.parse(k.value); return v.name||v.label||L().suggested; }catch(e){ return (k.value||'').slice(0,18)||L().suggested; } }
  function pendKinChip(k){ try{ const v=JSON.parse(k.value); return (v.rel?esc(v.rel)+'? · ':'')+ (k.creatorName?'':''); }catch(e){} return L().suggested; }

  function mkNode(it,F){
    if(it.type==='hole'){ return { id:it.id, cls:'hole', x:it.x, y:it.y, html:
      '<div class="tface"><span class="q">?</span></div><div class="tname">'+esc(it.label||L().unknownParents)+'</div>' }; }
    if(it.type==='pending'){ return { id:it.id, cls:'pending', x:it.x, y:it.y, html:
      '<div class="tface"></div><div class="tname">'+esc(it.label)+'</div><span class="waitchip">'+esc(it.waitchip)+'</span>', pid:null }; }
    const id=it.id; const isYou=(viewerPersonId&&id===viewerPersonId);
    const isFocus=(it.type==='focus'); let cls=isYou?'you':''; if(!isYou&&sexOf(id)==='') cls+=''; if(!isYou && !isFocus && people[id] && !people[id].primary_asset) cls+=' cool';
    const yr=people[id]&&people[id].birth_year; const sub= isYou? esc(L().legYou) : (yr?esc(fmt(L().bYear,{y:yr})):'');
    return { id:'p-'+id, cls:cls.trim(), x:it.x, y:it.y, pid:id, faceEl:true,
      html:'<div class="tface" data-face="'+esc(id)+'"></div><div class="tname">'+esc(nm(id))+'</div>'+(sub?'<div class="tsub">'+sub+'</div>':'') }; }

  function renderTree(){
    focusId = FOCUS_PARAM || viewerPersonId || rootTrunk();
    const built=buildTreeNodes(focusId);
    const l=L();
    $('#tbEye').textContent=l.treeEye; $('#tbName').textContent=l.treeName;

    // links between rendered kin
    let lines='';
    edges.forEach(e=>{ const a=nodePos['p-'+e.from], b=nodePos['p-'+e.to]; if(a&&b){ lines+=line(a,b,'rgba(143,214,160,.32)',0.45); } });
    // hole → child (a hole in the parent row connects down to the focus; grand hole connects to its anchor parent)
    built.nodes.forEach(n=>{ if(n.cls==='hole'){ const pos=nodePos[n.id];
      // parent-row hole links to focus; grand hole links to anchor
      if(n.id.indexOf('hole-p')===0){ const f=nodePos['p-'+focusId]; if(f&&pos) lines+=line(pos,f,'rgba(157,176,204,.35)',0.4,true); }
      if(n.id.indexOf('hole-g-')===0){ const anchor=n.id.slice('hole-g-'.length); const ap=nodePos['p-'+anchor]; if(ap&&pos) lines+=line(pos,ap,'rgba(157,176,204,.35)',0.4,true); }
    }});
    // pending link (violet) from suggestion to focus
    built.nodes.forEach(n=>{ if(n.cls==='pending'){ const pos=nodePos[n.id]; const f=nodePos['p-'+focusId]; if(pos&&f) lines+=line(pos,f,'rgba(201,162,255,.55)',0.5,true); }});

    let nodesHtml=''; built.nodes.forEach(n=>{ if(n.html===undefined) return;
      nodesHtml+='<div class="tnode '+n.cls+'" data-node="'+esc(n.id)+'"'+(n.pid?' data-pid="'+esc(n.pid)+'"':'')+' style="left:'+n.x+'%;top:'+n.y+'%">'+n.html+'</div>'; });

    let trunc=''; const tp=[]; if(built.gTrunc) tp.push(fmt(l.more,{n:built.gTrunc})); if(built.sTrunc||built.cTrunc) tp.push(fmt(l.more,{n:(built.sTrunc+built.cTrunc)}));

    const canThread = !!viewerPersonId;
    $('#pad').innerHTML =
      lensBar('tree') +
      '<div class="treewrap"><svg class="links" viewBox="0 0 100 100" preserveAspectRatio="none">'+lines+
        '<defs><linearGradient id="thread" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe6ad"/><stop offset="1" stop-color="#8fd6a0"/></linearGradient></defs></svg>'+
        nodesHtml+'</div>'+
      '<div class="legend">'+
        '<span class="li"><span class="sw g"></span>'+esc(l.legYou)+'</span>'+
        '<span class="li"><span class="sw h"></span>'+esc(l.legHole)+'</span>'+
        '<span class="li"><span class="sw p"></span>'+esc(l.legPending)+'</span>'+
      '</div>'+
      '<button class="homebtn" id="homeBtn"'+(canThread?'':' disabled')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg> '+esc(l.lightThread)+'</button>'+
      (canThread?'':'<div class="note-empty">'+esc(l.noYou)+'</div>')+
      '<div class="foot"><div class="l" id="footL">'+esc(l.footTree)+'</div></div>';

    // faces
    built.nodes.forEach(n=>{ if(n.pid){ const el=$('.tnode[data-node="'+cssq(n.id)+'"] .tface'); if(el){ const p=people[n.pid];
      el.innerHTML=placeholderFor(n.pid); if(p&&p.primary_asset){ faceInto(el,p.primary_asset,(p.metadata&&p.metadata.face_box)||null); } } }});

    // interactions
    $$('.tnode[data-pid]').forEach(el=>{ el.onclick=()=>openNodeSheet(el.getAttribute('data-pid')); });
    const hb=$('#homeBtn'); if(hb&&canThread) hb.onclick=()=>lightThread(focusId, viewerPersonId);
    wireChrome();
  }

  function line(a,b,color,w,dash){ return '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+color+'" stroke-width="'+w+'"'+(dash?' stroke-dasharray="1.5 1.4"':'')+'/>'; }
  function cssq(s){ return String(s).replace(/"/g,'\\"'); }

  function lensBar(cur){ const l=L();
    return '<div class="lens">'+
      '<button data-lens="sky"'+(cur==='sky'?' class="on"':'')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M6 6l1.5 1.5M16.5 16.5L18 18"/><circle cx="12" cy="12" r="3"/></svg> '+esc(l.lensSky)+'</button>'+
      '<button data-lens="globe"'+(cur==='globe'?' class="on"':'')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg> '+esc(l.lensGlobe)+'</button>'+
      '<button data-lens="tree"'+(cur==='tree'?' class="on"':'')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-7M12 14L7 9M12 11l5-4M9 5a2.5 2.5 0 105 0 2.5 2.5 0 10-5 0M4.5 10a2 2 0 104 0 2 2 0 10-4 0M15.5 8a2 2 0 104 0 2 2 0 10-4 0"/></svg> '+esc(l.lensTree)+'</button>'+
    '</div>'; }

  /* ---------- thread home ---------- */
  function lightThread(fromId, viewer){ const l=L();
    if(!viewer){ toast(l.noYou); return; }
    const path=kinPath(viewer, fromId);
    // dim all, then light path members that are rendered
    $$('.tnode').forEach(n=>{ n.classList.add('dimmed'); n.classList.remove('lit'); });
    // remove old thread lines
    $$('.links line.thread').forEach(x=>x.remove());
    const svg=$('.links'); let litAny=false;
    if(path){ path.forEach(id=>{ const el=$('.tnode[data-node="p-'+cssq(id)+'"]'); if(el){ el.classList.remove('dimmed'); el.classList.add('lit'); litAny=true; } });
      // draw gold thread between consecutive rendered path members
      for(let i=0;i<path.length-1;i++){ const a=nodePos['p-'+path[i]], b=nodePos['p-'+path[i+1]]; if(a&&b&&svg){ const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',a.x); ln.setAttribute('y1',a.y); ln.setAttribute('x2',b.x); ln.setAttribute('y2',b.y);
        ln.setAttribute('stroke','url(#thread)'); ln.setAttribute('stroke-width','1'); ln.setAttribute('stroke-linecap','round');
        ln.setAttribute('class','thread flow'); svg.appendChild(ln); } }
    }
    // the viewer node always stays visible
    const you=$('.tnode[data-node="p-'+cssq(viewer)+'"]'); if(you){ you.classList.remove('dimmed'); you.classList.add('lit'); }
    // legend + header
    const foot=$('#footL'); if(foot) foot.textContent=l.footThreadHome;
    const leg=$('.legend'); if(leg){
      if(path && fromId!==viewer){ const rel=relTerm(path, fromId); let via='';
        if(path.length===3){ via=fmt(l.threadVia,{n:firstName(path[1])}); }
        leg.innerHTML='<span class="li"><span class="sw t"></span>'+esc(fmt(l.threadLine,{rel:fmt(l.relOf,{name:firstName(fromId),rel:rel}),via:via}))+'</span>';
      } else if(fromId===viewer){ leg.innerHTML='<span class="li"><span class="sw t"></span>'+esc(l.legYou)+'</span>';
      } else { leg.innerHTML='<span class="li"><span class="sw h"></span>'+esc(l.noPath)+'</span>'; }
    }
    $('#tbEye').textContent=fmt(l.threadEye,{n:firstName(fromId),k:(path?(path.length-1===1?l.oneStep:fmt(l.steps,{n:path.length-1})):'—')});
    $('#tbName').textContent=l.threadName;
    if(!litAny && path){ toast(l.noPath); }
  }

  /* ---------- node action sheet ---------- */

    const rtl=l.dir==='rtl';
    const sheet=$('#sheet'); sheet.setAttribute('dir',l.dir);
    const arrow='<span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
    sheet.innerHTML='<div class="grip"></div><h3>'+esc(nm(pid))+'</h3><div class="ssub">'+esc(l.actSub)+'</div>'+
      (viewerPersonId&&pid!==viewerPersonId?actOpt('thread','M12 21s-7-5.2-7-11a7 7 0 0114 0c0 5.8-7 11-7 11z', l.actThread, l.actThreadSub):'')+
      actOpt('center','M12 3v18M3 12h18', l.actCenter, l.actCenterSub)+
      actOpt('who','M17 21v-2a4 4 0 00-3-3.87M9 21v-2a4 4 0 013-3.87M12 7a3 3 0 100 6 3 3 0 000-6', l.actWho, l.actWhoSub)+
      actOpt('open','M4 5h16v14H4zM4 9h16', l.actOpen, l.actOpenSub);
    function actOpt(key,d,t,s){ return '<button class="act-opt" data-act="'+key+'"><span class="ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="'+d+'"/></svg></span><span><span class="at">'+esc(t)+'</span><span class="as">'+esc(s)+'</span></span>'+arrow+'</button>'; }

  /* ================= WHO-THEY-KNEW VIEW ================= */
  function renderWho(){
    const X = FOCUS_PARAM || viewerPersonId || rootTrunk();
    const l=L(); const p=people[X];
    $('#tbEye').textContent=l.whoEye+' '+(p?firstName(X):''); $('#tbName').textContent=fmt(l.whoName,{n:p?firstName(X):''});
    if(!p){ $('#pad').innerHTML='<div class="note-empty">'+esc(l.noPath)+'</div>'; wireChrome(); return; }

    const spouses=coParentsOf(X), kids=childrenOf(X), pars=parentsOf(X);
    const kinIds=new Set([X,...spouses,...kids,...pars]);
    const bonds=coPhotoBonds(X).filter(b=>!kinIds.has(b.id));
    const circleCount=spouses.length+kids.length+pars.length+bonds.length;
    const pk=pendingKin.filter(k=>k.person_id===X);

    let html='';
    // hero
    html+='<div class="whohero"><div class="wf" data-face="'+esc(X)+'"></div><div class="wt"><div class="wn">'+esc(nm(X))+'</div><div class="ws">'+
      (circleCount>0? '<b>'+esc(circleCount===1?l.onePerson:fmt(l.peopleWord,{n:circleCount}))+'</b> '+esc(fmt(l.stoodIn,{n:'',who:firstName(X)})).replace(/\s+/g,' ').trim()
        : esc(l.onlyName))+'</div></div></div>';

    // married
    if(spouses.length){ html+=grp(l.married, spouses.map(id=>kcard(id, roleLabel(id,'spouse',X), 'gold', l.toldFam)).join('')); }
    // raised (children)
    if(kids.length){ html+=grp(l.raised, kids.map(id=>kcard(id, roleLabel(id,'child',X), 'gold', l.toldFam)).join('')); }
    // who raised them (parents)
    if(pars.length){ html+=grp(l.raisedBy, pars.map(id=>kcard(id, roleLabel(id,'parent',X), 'gold', l.toldFam)).join('')); }
    // pending kin (violet, keeper-gated)
    if(pk.length){ html+=grp(l.raisedBy, pk.map(k=>pendCard(k)).join('')); }
    // photo co-appearance (cool)
    if(bonds.length){ html+='<div class="grp"><div class="gh">'+esc(l.beside)+' <span class="line"></span></div>'+
      bonds.slice(0,6).map(b=>photoCard(b)).join('')+'</div>'; }
    // sparse invitation
    if(circleCount===0 && pk.length===0){ html+='<div class="sparse"><div class="sw2">'+esc(fmt(l.sparse,{who:firstName(X)}))+'</div>'+
      '<span class="cta" data-cta="add">'+esc(l.addKnew)+' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span></div>'; }

    html+='<div class="foot"><div class="l">'+esc(bonds.length?l.footWho:l.footSparse)+'</div></div>';
    $('#pad').innerHTML=html;

    // faces
    const hero=$('.whohero .wf[data-face]'); if(hero){ hero.innerHTML=placeholderFor(X); if(p.primary_asset) faceInto(hero,p.primary_asset,(p.metadata&&p.metadata.face_box)||null); }
    $$('.kcard[data-pid]').forEach(card=>{ const id=card.getAttribute('data-pid'); const fe=card.querySelector('.kf'); if(fe){ fe.innerHTML=placeholderFor(id); const pp=people[id]; if(pp&&pp.primary_asset) faceInto(fe,pp.primary_asset,(pp.metadata&&pp.metadata.face_box)||null); }
      card.onclick=(e)=>{ if(e.target.closest('.kbtn')) return; location.href='person-real.html?id='+encodeURIComponent(id); }; });
    // keeper actions
    $$('[data-approve]').forEach(b=>b.onclick=async()=>{ await approvePendingKin(b.getAttribute('data-approve'), true); });
    $$('[data-decline]').forEach(b=>b.onclick=async()=>{ await approvePendingKin(b.getAttribute('data-decline'), false); });
    $$('[data-cta]').forEach(b=>b.onclick=()=>{ location.href='person-real.html?id='+encodeURIComponent(X); });
    wireChrome();
  }
  function grp(title, inner){ return '<div class="grp"><div class="gh">'+esc(title)+' <span class="line"></span></div>'+inner+'</div>'; }
  function roleLabel(id, kind, X){ const l=L(); const sx=sexOf(id);
    if(kind==='spouse') return sx==='f'?l.wife:sx==='m'?l.husband:l.partner;
    if(kind==='child') return sx==='f'?l.daughter:sx==='m'?l.son:l.child;
    if(kind==='parent') return sx==='f'?l.mother:sx==='m'?l.father:l.parent;
    return l.relative; }
  function kcard(id, role, prov, provText){ const l=L();
    return '<div class="kcard" data-pid="'+esc(id)+'"><div class="kf"></div><div class="kb"><div class="kh">'+esc(nm(id))+'</div>'+
      '<div class="krel"><span class="prov '+prov+'"><span class="d"></span>'+esc(role)+' · '+esc(provText)+'</span></div></div>'+
      '<span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>'; }
  function photoCard(b){ const l=L(); const cnt=b.count===1?l.onePhoto:fmt(l.nPhotos,{n:b.count});
    return '<div class="kcard photo" data-pid="'+esc(b.id)+'"><div class="kf"></div><div class="kb"><div class="kh">'+esc(nm(b.id))+'</div>'+
      '<div class="note">'+esc(fmt(l.photoNote,{n:cnt}))+'</div>'+
      '<div class="cnt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="width:13px;height:13px"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12" r="3"/></svg> '+esc(fmt(l.photoCount,{n:cnt}))+'</div>'+
      '<div class="keeperbar"><span class="kbtn ok" style="background:rgba(201,162,255,.14);border-color:rgba(201,162,255,.4);color:var(--edit-hi)" data-cta="tell">'+esc(l.tellWho)+'</span></div>'+
      '</div></div>'; }
  function pendCard(k){ const l=L(); const label=pendKinLabel(k); const by=k.creatorName?fmt(l.suggestedBy,{n:firstName_byId(k.created_by)||k.creatorName}):l.suggested;
    const kb=state.keeper? '<div class="keeperbar"><span class="kbtn ok" data-approve="'+esc(k.id)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> '+esc(l.approve)+'</span><span class="kbtn no" data-decline="'+esc(k.id)+'">'+esc(l.decline)+'</span></div>':'';
    return '<div class="kcard pending"><div class="kf" style="display:grid;place-items:center;background:rgba(201,162,255,.1)"><svg viewBox="0 0 24 24" fill="none" stroke="#ddc6ff" stroke-width="1.6" style="width:20px;height:20px"><path d="M12 3a4 4 0 100 8 4 4 0 000-8zM5 21c0-3.9 3.1-6 7-6s7 2.1 7 6"/></svg></div>'+
      '<div class="kb"><div class="kh" style="color:var(--edit-hi)">'+esc(label)+'</div><div class="krel"><span class="prov edit"><span class="d"></span>'+esc(by)+'</span></div>'+kb+'</div></div>'; }
  function firstName_byId(id){ const p=people[id]; return p?firstName(id):''; }

  async function approvePendingKin(id, ok){ const l=L(); if(!user){ toast(l.noYou); return; }
    try{ await sb.from('person_facts').update(ok?{status:'published',reviewed_by:user.id}:{status:'rejected',reviewed_by:user.id}).eq('id',id); }catch(e){}
    toast(ok?l.approved:l.declined); await loadDataSoft(); render(); }
  async function loadDataSoft(){ try{ const {data:pk}=await sb.from('person_facts').select('id,person_id,value,created_by,status').eq('field','kin').neq('status','published'); pendingKin=pk||[]; }catch(e){} }

  /* ---------- chrome (lens, lang, back) ---------- */
  function wireChrome(){
    $$('[data-lens]').forEach(b=>{ b.onclick=()=>{ const t=b.getAttribute('data-lens');
      if(t==='sky') location.href='home-real.html'; else if(t==='globe') location.href='index.html'; else if(t==='tree'){ if(VIEW!=='tree'||FOCUS_PARAM){ location.href='tree-real.html'; } } }; });
  }
  function wireOnce(){
    $('#backBtn').onclick=()=>{ if(VIEW==='who'){ history.length>1?history.back():(location.href='tree-real.html'); } else { history.length>1?history.back():(location.href='index.html'); } };
    $('#langBtn').onclick=openLangSheet;

    $('#screen').setAttribute('dir',l.dir); $('#langBtn').firstChild.textContent=l.code+' '; }

  function showSheet(){ $('#scrim').classList.add('show'); $('#sheet').classList.add('show'); }
  function closeSheet(){ $('#scrim').classList.remove('show'); $('#sheet').classList.remove('show'); }

  let toastT=null; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

  function render(){ applyDir(); if(VIEW==='who') renderWho(); else renderTree(); }

  /* ---------- atmosphere injection (verbatim from the design) ---------- */
  function injectSky(){ const dev=$('#dev');
    const PAL=['#8fd6a0','#ffe6ad','#c9a2ff','#a9d2ee','#f3cd84']; const rnd=(a,b)=>a+Math.random()*(b-a);
    const sky=document.createElement('div'); sky.className='sky';
    sky.innerHTML='<span class="aurora a1"></span><span class="aurora a2"></span><span class="aurora a3"></span><span class="aurora a4"></span><span class="aurora a5"></span>';
    const mf=document.createElement('div'); mf.className='motes';
    for(let i=0;i<15;i++){ const m=document.createElement('span'); m.className='mote'; const c=PAL[Math.floor(Math.random()*PAL.length)];
      m.style.left=rnd(4,96).toFixed(1)+'%'; m.style.top=rnd(12,100).toFixed(1)+'%';
      m.style.setProperty('--s',rnd(3,6).toFixed(1)+'px'); m.style.setProperty('--c',c);
      m.style.setProperty('--dx',rnd(-34,34).toFixed(0)+'px'); m.style.setProperty('--d',rnd(12,22).toFixed(1)+'s');
      m.style.setProperty('--tw',rnd(2.6,4.6).toFixed(1)+'s'); m.style.animationDelay=(-rnd(0,20)).toFixed(1)+'s';
      m.innerHTML='<b></b>'; mf.appendChild(m); }
    sky.appendChild(mf); dev.insertBefore(sky, dev.firstChild);
  }

  /* ---------- boot ---------- */
  async function boot(){
    injectSky(); wireOnce();
    const stored=localStorage.getItem('lf_lang'); if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.href='index.html'; return; }
    user=session.user;
    try{ const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang,person_id').eq('id',user.id).maybeSingle();
      if(pr){ state.keeper=!!pr.is_keeper; if(pr.person_id) viewerPersonId=pr.person_id; if(pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; }
