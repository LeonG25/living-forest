<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Tree — The Living Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff; --leaf:#8fd6a0;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    background:radial-gradient(150% 100% at 50% -6%, #12233c 0%, #0a1526 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; overflow:hidden; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .mono{ font-family:'Azeret Mono',monospace; }
  [dir="rtl"] .serif, [dir="rtl"] .inp{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* one living device — full-bleed on phones, bezelled on desktop */
  .device{ position:relative; width:100vw; height:100dvh; overflow:hidden; background:#04070e; }
  @media (min-width:520px){
    body{ display:flex; align-items:center; justify-content:center; }
    .device{ width:412px; height:860px; max-height:97dvh; border-radius:42px;
      box-shadow:0 40px 120px -50px #000, 0 0 0 9px #14141b, 0 0 0 10px #2b2b34; }
  }

  .atmo{ position:absolute; inset:0; z-index:0; width:100%; height:100%; display:block; }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 60% at 50% 3%, rgba(143,214,160,.05), transparent 44%),
      radial-gradient(120% 96% at 50% 100%, rgba(4,7,14,.62), transparent 48%); }

  /* top bar */
  .topbar{ position:absolute; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:calc(13px + env(safe-area-inset-top)) 16px 12px; background:linear-gradient(to bottom, rgba(5,9,17,.92), rgba(5,9,17,.5) 66%, transparent);
    backdrop-filter:blur(7px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer;
    border:1px solid var(--hair); background:rgba(10,20,34,.55); color:var(--cream); transition:border-color .2s,background .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .ibtn svg{ width:18px; height:18px; }
  [dir="rtl"] .ibtn.back svg{ transform:scaleX(-1); }
  .ttl{ flex:1; min-width:0; text-align:center; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }
  .lang{ font-family:'Azeret Mono',monospace; font-size:11px; letter-spacing:.06em; color:var(--muted); }

  /* viewport / world */
  .viewport{ position:absolute; inset:0; z-index:2; overflow:hidden; touch-action:none; cursor:grab; }
  .viewport.drag{ cursor:grabbing; }
  .world{ position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
  .links{ position:absolute; top:0; left:0; overflow:visible; pointer-events:none; z-index:1; }

  /* person card */
  .pcard{ position:absolute; width:132px; z-index:3; display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:11px 10px 12px; border-radius:18px; cursor:pointer; text-align:center;
    background:linear-gradient(180deg, rgba(15,27,45,.9), rgba(9,17,29,.92)); border:1px solid var(--hair);
    box-shadow:0 18px 40px -26px #000; transition:border-color .2s, transform .2s, box-shadow .2s; }
  .pcard:hover{ transform:translateY(-2px); border-color:rgba(243,205,132,.45); box-shadow:0 22px 46px -24px #000, 0 0 26px -12px rgba(243,205,132,.4); }
  .pcard .por{ width:66px; height:66px; border-radius:50%; overflow:hidden; position:relative; flex:0 0 auto;
    border:1px solid rgba(255,244,214,.85); box-shadow:0 0 20px -3px rgba(255,232,180,.4); }
  .pcard .por svg, .pcard .por img, .pcard .por canvas{ width:100%; height:100%; object-fit:cover; display:block; }
  .pcard.nophoto .por{ border:1px dashed rgba(157,176,204,.5); box-shadow:none; background:rgba(12,22,38,.7); }
  .pcard .pnm{ font-family:'Newsreader',serif; font-size:16px; color:#fbf5e8; line-height:1.12; }
  .pcard .phint{ font-size:9.5px; color:var(--muted); line-height:1.25; }
  .pcard.you{ border-color:rgba(143,214,160,.6); box-shadow:0 0 0 1px rgba(143,214,160,.4), 0 22px 46px -24px #000, 0 0 30px -8px rgba(143,214,160,.45); }
  .pcard.you .por{ border-color:rgba(143,214,160,.9); box-shadow:0 0 22px -2px rgba(143,214,160,.55); }
  .pcard.sel{ border-color:rgba(169,210,238,.7); box-shadow:0 0 0 1px rgba(169,210,238,.5), 0 22px 46px -20px #000, 0 0 34px -8px rgba(127,180,216,.5); }
  .pcard.dim{ opacity:.32; }
  .pcard .youtag{ position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-family:'Azeret Mono',monospace;
    font-size:8px; letter-spacing:.16em; text-transform:uppercase; color:#0c1220; background:linear-gradient(180deg,#a9e6ba,var(--leaf));
    padding:2px 8px; border-radius:99px; white-space:nowrap; }
  .pcard .conn{ position:absolute; bottom:-11px; right:-11px; width:30px; height:30px; border-radius:50%; z-index:6;
    display:grid; place-items:center; cursor:pointer; color:#1a0f2e; border:2px solid #04070e;
    background:linear-gradient(180deg,var(--edit-hi),var(--edit)); box-shadow:0 4px 12px -2px #000; transition:transform .18s; }
  .pcard .conn:hover{ transform:scale(1.12); }
  [dir="rtl"] .pcard .conn{ right:auto; left:-11px; }
  .pcard .conn svg{ width:15px; height:15px; }
  .pcard .opic{ position:absolute; top:-9px; left:-9px; width:27px; height:27px; border-radius:50%; z-index:6;
    display:grid; place-items:center; cursor:pointer; color:#1a0f2e; border:2px solid #04070e;
    background:linear-gradient(180deg,#f7dfa4,var(--gold,#f3cd84)); box-shadow:0 4px 12px -2px #000; transition:transform .18s; }
  .pcard .opic:hover{ transform:scale(1.12); }
  [dir="rtl"] .pcard .opic{ left:auto; right:-9px; }
  .pcard .opic svg{ width:14px; height:14px; }
  .pcard .pendpin{ position:absolute; top:-6px; right:-6px; width:17px; height:17px; border-radius:50%; z-index:5;
    background:var(--edit); border:2px solid #04070e; display:grid; place-items:center; }
  [dir="rtl"] .pcard .pendpin{ right:auto; left:-6px; }
  .pcard .pendpin svg{ width:10px; height:10px; color:#1a0f2e; }

  /* controls dock */
  .dock{ position:absolute; z-index:16; inset-inline-end:14px; bottom:calc(20px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:9px; align-items:stretch; }
  .dbtn{ width:44px; height:44px; border-radius:13px; display:grid; place-items:center; cursor:pointer;
    border:1px solid var(--hair); background:rgba(10,20,34,.82); backdrop-filter:blur(8px); color:var(--cream); transition:border-color .2s, color .2s, background .2s; }
  .dbtn:hover{ border-color:rgba(127,180,216,.55); color:var(--cool-hi); }
  .dbtn svg{ width:19px; height:19px; }
  .dbtn.me{ color:var(--leaf); border-color:rgba(143,214,160,.4); }
  .dbtn.me:hover{ border-color:rgba(143,214,160,.7); }
  .dbtn.trace.on{ color:var(--cool-hi); border-color:rgba(127,180,216,.8); background:rgba(127,180,216,.18); }
  .zoomgrp{ display:flex; flex-direction:column; align-items:stretch; border-radius:14px; overflow:hidden;
    border:1px solid rgba(127,180,216,.28); background:rgba(10,20,34,.82); backdrop-filter:blur(8px); box-shadow:0 10px 26px -18px #000; }
  .zoomgrp .dbtn{ border:none; background:transparent; border-radius:0; backdrop-filter:none; height:42px; }
  .zoomgrp .dbtn:hover{ background:rgba(127,180,216,.14); }
  .zlvl{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.02em; color:var(--cool-hi); text-align:center;
    padding:5px 0; border-top:1px solid var(--hair); border-bottom:1px solid var(--hair); cursor:pointer; user-select:none; background:rgba(127,180,216,.08); }
  .zlvl:hover{ background:rgba(127,180,216,.18); }
  .dbtn.fit{ color:var(--cool-hi); border-color:rgba(127,180,216,.4); }
  .dbtn.fit:hover{ border-color:rgba(127,180,216,.75); }

  /* ---- bottom pills: two small, humble controls resting at the reading-start corner.
     They never overlap each other or the zoom dock (which sits inset-inline-end). Tapping one
     opens its sheet ABOVE the pills; opening one closes the other. ---- */
  .pills{ position:absolute; z-index:15; inset-inline-start:14px; bottom:calc(18px + env(safe-area-inset-bottom));
    display:flex; gap:9px; align-items:flex-end; flex-wrap:wrap; max-width:calc(100% - 78px); }
  .pill{ display:inline-flex; align-items:center; gap:7px; padding:9px 13px; border-radius:99px; cursor:pointer; white-space:nowrap;
    font-family:'Hanken Grotesk',sans-serif; font-size:12px; color:var(--cream);
    background:rgba(10,20,34,.82); backdrop-filter:blur(8px); border:1px solid var(--hair); box-shadow:0 10px 26px -18px #000; transition:border-color .2s, background .2s; }
  .pill:hover{ border-color:rgba(255,255,255,.32); }
  .pill .ic{ width:16px; height:16px; display:grid; place-items:center; flex:0 0 auto; }
  .pill .ic svg{ width:15px; height:15px; }
  .pill.legendpill.on{ border-color:rgba(127,180,216,.6); background:rgba(127,180,216,.14); color:var(--cool-hi); }
  .pill.unpill{ color:var(--edit-hi); border-color:rgba(201,162,255,.34); }
  .pill.unpill .ic svg{ color:var(--edit-hi); }
  .pill.unpill.on{ border-color:rgba(201,162,255,.7); background:rgba(201,162,255,.16); }
  .pill.unpill .cnt{ font-family:'Azeret Mono',monospace; font-size:11px; color:#1a0f2e; background:linear-gradient(180deg,var(--edit-hi),var(--edit));
    border-radius:99px; padding:1px 8px; flex:0 0 auto; }
  .pill.hidden{ display:none; }

  /* pop-up sheets that rise ABOVE the pills — dismissible, never covering the dock or ⊕ */
  .pop{ position:absolute; z-index:16; inset-inline-start:14px; bottom:calc(64px + env(safe-area-inset-bottom));
    border-radius:16px; background:rgba(8,14,26,.94); backdrop-filter:blur(12px); border:1px solid var(--hair); box-shadow:0 26px 64px -28px #000;
    opacity:0; transform:translateY(10px) scale(.98); transform-origin:bottom left; pointer-events:none;
    transition:opacity .24s ease, transform .24s cubic-bezier(.16,.8,.28,1); }
  [dir="rtl"] .pop{ transform-origin:bottom right; }
  .pop.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .pophd{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .pophd b{ font-family:'Newsreader',serif; font-size:15px; color:#fbf5e8; font-weight:400; }
  .pophd small{ display:block; font-size:10px; color:var(--muted); margin-top:1px; }
  .pophd .x{ width:26px; height:26px; border-radius:8px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer;
    border:1px solid var(--hair); background:rgba(255,255,255,.04); color:var(--muted); }
  .pophd .x svg{ width:14px; height:14px; }

  /* legend pop */
  #legendPop{ width:224px; padding:13px 14px; }
  #legendPop .lgbody{ margin-top:11px; display:flex; flex-direction:column; gap:8px; }
  .lgrow{ display:flex; align-items:center; gap:10px; font-size:11px; color:var(--cream); }
  .lgrow .swz{ width:34px; height:16px; flex:0 0 auto; }
  .lgrow .lt{ line-height:1.2; } .lgrow .lt small{ display:block; color:var(--muted); font-size:9.5px; }
  .lgsep{ height:1px; background:var(--hair); margin:2px 0; }

  /* unlinked pop — a clean, scrollable row of complete avatars (nothing clipped) */
  #unlinkedPop{ inset-inline-end:70px; max-width:472px; padding:13px 6px 13px 14px; }
  [dir="rtl"] #unlinkedPop{ padding:13px 14px 13px 6px; }
  #unlinkedPop .pophd{ padding-inline-end:8px; }
  .ubody{ margin-top:11px; padding-bottom:2px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; }
  .ubody::-webkit-scrollbar{ display:none; }
  .ubody .empty{ font-size:12px; color:var(--muted); font-style:italic; padding:6px 4px; }
  .ucard{ flex:0 0 auto; width:96px; display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 8px; border-radius:14px; cursor:pointer;
    background:rgba(201,162,255,.05); border:1px solid rgba(201,162,255,.28); text-align:center; transition:border-color .18s; }
  .ucard:hover{ border-color:rgba(201,162,255,.6); }
  .ucard .por{ width:54px; height:54px; border-radius:50%; overflow:hidden; flex:0 0 auto; border:1px solid rgba(157,176,204,.5); background:rgba(12,22,38,.7); display:grid; place-items:center; }
  .ucard .por svg, .ucard .por canvas, .ucard .por img{ width:100%; height:100%; object-fit:cover; display:block; }
  .ucard .un{ font-family:'Newsreader',serif; font-size:14px; color:#efe6ff; line-height:1.1; }
  .ucard .place{ font-size:9.5px; color:var(--muted); }
  .ucard .plink{ font-family:'Azeret Mono',monospace; font-size:8px; letter-spacing:.08em; text-transform:uppercase; color:var(--edit-hi);
    display:inline-flex; align-items:center; gap:3px; margin-top:1px; }
  .ucard .plink svg{ width:10px; height:10px; }

  /* scrim + connect sheet */
  .scrim{ position:absolute; inset:0; z-index:30; background:rgba(4,7,14,.7); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; z-index:31; left:0; right:0; bottom:0; height:92%; display:flex; flex-direction:column;
    background:linear-gradient(180deg,#101f35,#070f1c); border:1px solid var(--hair); border-bottom:none; border-radius:22px 22px 0 0;
    transform:translateY(103%); transition:transform .36s cubic-bezier(.16,.8,.28,1); box-shadow:0 -24px 70px -30px #000; overflow:hidden; }
  .sheet.show{ transform:translateY(0); }
  .shead{ padding:10px 20px 12px; border-bottom:1px solid var(--hair); }
  .grip{ width:40px; height:4px; border-radius:99px; background:rgba(255,255,255,.2); margin:6px auto 12px; }
  .steps{ display:flex; align-items:center; gap:6px; justify-content:center; margin-bottom:11px; }
  .steps .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.16); transition:background .3s, box-shadow .3s; }
  .steps .dot.on{ background:var(--edit); box-shadow:0 0 10px 1px rgba(201,162,255,.6); }
  .steps .dot.done{ background:var(--leaf); }
  .steps .bar{ width:20px; height:2px; background:rgba(255,255,255,.14); }
  .shrow{ display:flex; align-items:center; gap:10px; }
  .shrow .back{ width:36px; height:36px; border-radius:10px; display:grid; place-items:center; cursor:pointer; flex:0 0 auto;
    border:1px solid var(--hair); background:rgba(10,20,34,.55); color:var(--cream); }
  .shrow .back svg{ width:17px; height:17px; }
  [dir="rtl"] .shrow .back svg{ transform:scaleX(-1); }
  .shrow h3{ font-family:'Newsreader',serif; font-weight:400; font-size:20px; color:#fbf5e8; flex:1; }
  .sbody{ flex:1; overflow-y:auto; scrollbar-width:none; padding:16px 20px; }
  .sbody::-webkit-scrollbar{ display:none; }
  .sfoot{ padding:14px 20px calc(18px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:rgba(7,15,28,.6); }

  .connlaunch{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:15px; margin-bottom:15px;
    background:rgba(201,162,255,.08); border:1px solid rgba(201,162,255,.3); }
  .connlaunch .por{ width:48px; height:48px; border-radius:50%; overflow:hidden; flex:0 0 auto; border:1px solid rgba(255,244,214,.7); }
  .connlaunch .por svg, .connlaunch .por canvas, .connlaunch .por img{ width:100%; height:100%; object-fit:cover; }
  .connlaunch .ct{ flex:1; min-width:0; } .connlaunch .ct b{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; font-weight:400; }
  .connlaunch .ct small{ display:block; font-size:11.5px; color:#cbbce6; margin-top:2px; }

  .search{ position:relative; margin-bottom:14px; }
  .search svg{ position:absolute; top:50%; inset-inline-start:13px; transform:translateY(-50%); width:17px; height:17px; color:var(--muted); }
  .search input{ width:100%; padding:13px 14px 13px 40px; border-radius:13px; background:rgba(8,16,28,.7); border:1px solid var(--hair);
    color:var(--cream); font-family:'Hanken Grotesk',sans-serif; font-size:15px; }
  [dir="rtl"] .search input{ padding:13px 40px 13px 14px; }
  .search input:focus{ outline:none; border-color:rgba(201,162,255,.5); }
  .filterrow{ display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .fchip{ font-size:11px; color:var(--muted); border:1px solid var(--hair); border-radius:99px; padding:6px 11px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; background:var(--panel); }
  .fchip.on{ border-color:rgba(201,162,255,.5); color:var(--edit-hi); background:rgba(201,162,255,.1); }
  .fchip .bx{ width:12px; height:12px; border-radius:3px; border:1px solid currentColor; display:grid; place-items:center; }
  .fchip .bx svg{ width:10px; height:10px; }

  .plist{ display:flex; flex-direction:column; gap:8px; }
  .prow{ display:flex; align-items:center; gap:12px; width:100%; padding:11px 12px; border-radius:14px; cursor:pointer; text-align:start;
    background:rgba(9,17,29,.55); border:1px solid var(--hair); color:var(--cream); transition:border-color .18s, background .18s; }
  .prow:hover{ border-color:rgba(201,162,255,.45); }
  .prow.on{ border-color:rgba(201,162,255,.7); background:rgba(201,162,255,.1); }
  .prow .por{ width:46px; height:46px; border-radius:50%; overflow:hidden; flex:0 0 auto; border:1px solid rgba(255,244,214,.75); }
  .prow.nophoto .por{ border:1px dashed rgba(157,176,204,.5); background:rgba(12,22,38,.7); display:grid; place-items:center; }
  .prow .por svg, .prow .por canvas, .prow .por img{ width:100%; height:100%; object-fit:cover; }
  .prow .pt{ flex:1; min-width:0; }
  .prow .pt .nm{ font-family:'Newsreader',serif; font-size:16px; color:#fbf5e8; }
  .prow .pt .det{ font-size:11px; color:var(--muted); margin-top:1px; line-height:1.3; }
  .prow .pt .det b{ color:var(--cool-hi); font-weight:500; }
  .prow .link{ font-family:'Azeret Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold);
    border:1px solid rgba(243,205,132,.35); border-radius:99px; padding:4px 8px; flex:0 0 auto; }
  .prow .tick{ width:22px; height:22px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; color:var(--edit); opacity:0; }
  .prow.on .tick{ opacity:1; } .prow.on .link{ display:none; }
  .prow .tick svg{ width:20px; height:20px; }
  .nomatch{ text-align:center; padding:26px 10px; color:var(--muted); font-size:13px; }

  .sentence{ text-align:center; font-family:'Newsreader',serif; font-size:21px; line-height:1.4; color:#fbf5e8; margin:2px 4px 16px; }
  .sentence .other{ color:var(--gold-hi); } .sentence .cur{ color:var(--gold-hi); }
  .sentence .slot{ color:var(--edit-hi); border-bottom:2px dashed rgba(201,162,255,.5); padding:0 6px; }
  .sentence .slot.filled{ border-bottom-color:transparent; color:var(--edit-hi); font-style:italic; }
  .relgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
  .rel{ display:flex; flex-direction:column; align-items:center; gap:7px; padding:16px 10px; border-radius:15px; cursor:pointer;
    background:rgba(9,17,29,.55); border:1px solid var(--hair); color:var(--cream); transition:border-color .18s, background .18s, transform .18s; }
  .rel:hover{ transform:translateY(-1px); border-color:rgba(201,162,255,.45); }
  .rel.on{ border-color:rgba(201,162,255,.75); background:rgba(201,162,255,.12); box-shadow:0 0 24px -10px rgba(201,162,255,.6); }
  .rel .ic{ width:34px; height:34px; display:grid; place-items:center; color:var(--edit-hi); }
  .rel .ic svg{ width:26px; height:26px; }
  .rel .rl{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; }
  .rel .sub{ font-size:10.5px; color:var(--muted); text-align:center; line-height:1.25; }

/* Russian given-name genitive (best-effort, first name only) */
function ruGen(name){
  const parts=String(name||'').trim().split(/\s+/); let w=parts[0]||''; if(!w) return name||'';
  const rest=parts.length>1?' '+parts.slice(1).join(' '):'';
  const last=w.slice(-1), last2=w.slice(-2);
  const hush='гкхжшчщ';
  if(last2==='ий'){ return w.slice(0,-2)+'ия'+rest; }
  if(last==='й'){ return w.slice(0,-1)+'я'+rest; }
  if(last==='ь'){ return w.slice(0,-1)+'я'+rest; }
  if(last==='а'){ const p=w.slice(-2,-1); return w.slice(0,-1)+(hush.indexOf(p)>=0?'и':'ы')+rest; }
  if(last==='я'){ return w.slice(0,-1)+'и'+rest; }
  if('оеуюыэ'.indexOf(last)>=0){ return w+rest; }
  if(/[а-яё]/i.test(last)){ return w+'а'+rest; }

}

const FCOL=['#c9a878','#8fa6b8','#b58a5c','#9fb0a0','#c08a70','#8a92b0','#a88f6e','#7f97ab'];

// Signed URL. When `width` is given, ask Supabase Storage's render endpoint for a

// callers retry without a transform if the render feature is unavailable on the project.
async function signedUrl(path,width){ if(!path) return ''; try{
    const opts = width ? { transform:{ width:width, resize:'contain' } } : undefined;
    const r=await sb.storage.from('family').createSignedUrl(path,3600,opts); return (r.data&&r.data.signedUrl)||'';
  }catch(e){ return ''; } }

/* ---- cropped-face cache (IndexedDB): store the finished 160×160 crop as a dataURL,
   keyed by personId|storagePath|box. On next load the crop is served instantly and the
   full-size download + client crop is skipped entirely. Key changes ⇒ auto-invalidated. */
const FaceCache=(function(){ let dbp=null;
  function open(){ if(dbp) return dbp; dbp=new Promise(res=>{ try{ const r=indexedDB.open('lf-tree-faces',1);
    r.onupgradeneeded=()=>{ try{ r.result.createObjectStore('crops'); }catch(e){} };
    r.onsuccess=()=>res(r.result); r.onerror=()=>res(null); }catch(e){ res(null); } }); return dbp; }
  return {
    async get(k){ const d=await open(); if(!d) return null; return new Promise(res=>{ try{ const rq=d.transaction('crops','readonly').objectStore('crops').get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }catch(e){ res(null); } }); },
    async put(k,v){ const d=await open(); if(!d) return; try{ d.transaction('crops','readwrite').objectStore('crops').put(v,k); }catch(e){} }
  };
})();
function boxKey(box){ if(!box) return 'full'; return [box.x,box.y,box.w,box.h].map(n=>Math.round((+n||0)*1000)).join('_'); }
function faceKey(id,path,box){ return id+'|'+path+'|'+boxKey(box); }

/* concurrency-capped loader — viewport-first (priority tasks jump the queue) so the
   visible cards fill in before the rest; the cap keeps the network from thrashing. */
const faceQ={ tasks:[], active:0, cap:5 };
function faceEnqueue(task,priority){ if(priority) faceQ.tasks.unshift(task); else faceQ.tasks.push(task); facePump(); }
function facePump(){ while(faceQ.active<faceQ.cap && faceQ.tasks.length){ const t=faceQ.tasks.shift(); faceQ.active++;
    Promise.resolve().then(t).catch(()=>{}).then(()=>{ faceQ.active--; facePump(); }); } }

// download (resized) source → crop the face into a 160×160 canvas → dataURL for caching.
// Resolves {dataUrl, canvas}: dataUrl is null only if the canvas is tainted (still shows the canvas).
function cropImage(u,box){ return new Promise(resolve=>{ if(!u){ resolve(null); return; }
  const img=new Image(); img.crossOrigin='anonymous'; img.onerror=()=>resolve(null);
  img.onload=()=>{ const c=document.createElement('canvas'); c.width=c.height=160; const g=c.getContext('2d');
    if(box&&box.w>0&&box.h>0){
      // box is NORMALISED (fractions of the image). Convert to pixels PER-AXIS — w is a
      // fraction of WIDTH, h a fraction of HEIGHT; they must not share one dimension.
      const bw=box.w*img.naturalWidth;                 // face width in px
      const bh=box.h*img.naturalHeight;                // face height in px
      const cx=(box.x+box.w/2)*img.naturalWidth;       // face centre px
      const cy=(box.y+box.h/2)*img.naturalHeight;
      const pad=0.35;                                   // keep some head-room
      let side=Math.max(bw,bh)*(1+2*pad);               // square crop around the face
      side=Math.min(side,img.naturalWidth,img.naturalHeight); // never exceed the image
      let sx=cx-side/2, sy=cy-side/2;                   // clamp into bounds
      sx=Math.max(0,Math.min(img.naturalWidth-side,sx));
      sy=Math.max(0,Math.min(img.naturalHeight-side,sy));
      g.drawImage(img,sx,sy,side,side,0,0,160,160);
    } else { const s=Math.min(img.naturalWidth,img.naturalHeight); g.drawImage(img,(img.naturalWidth-s)/2,(img.naturalHeight-s)/2,s,s,0,0,160,160); }
    let dataUrl=null; try{ dataUrl=c.toDataURL('image/jpeg',0.85); }catch(e){ dataUrl=null; }
    resolve({dataUrl, canvas:c}); };

async function loadFaceCrop(path,box){ const u=await signedUrl(path,900); let r=await cropImage(u,box);
  if(!r){ const u2=await signedUrl(path); if(u2&&u2!==u) r=await cropImage(u2,box); } // render endpoint off ⇒ plain source
  return r; }
function setFaceEl(el,dataUrl){ const im=new Image(); im.decoding='async'; im.onload=()=>{ el.innerHTML=''; el.appendChild(im); }; im.src=dataUrl; }

function faceArt(id){ const p=people[id]; if(p&&p.primary_asset&&artByPath[p.primary_asset]) return artByPath[p.primary_asset]; const fb=faceFallback[id]; return (fb&&fb.art)||''; }

function inViewport(id){ if(!pos[id]) return false; const s=state.scale;
  const sx=CX(id)*s+state.tx, sy=CTOP(id)*s+state.ty, mx=CW*s, my=CH*s;

  const p=people[id]; let path=null, box=null;
  if(p&&p.primary_asset){ path=p.primary_asset; box=(p.metadata&&p.metadata.face_box)||null; }
  else { const fb=faceFallback[id]; if(fb){ path=fb.path; box=fb.box; } }

/* ---------- graph helpers ---------- */
function isParentEdge(e){ return e.kind==='parent'||e.kind==null||e.kind===''; }
function parentsOf(x){ return edges.filter(e=>isParentEdge(e)&&e.to===x).map(e=>e.from).filter(id=>people[id]); }
function childrenOf(x){ return edges.filter(e=>isParentEdge(e)&&e.from===x).map(e=>e.to).filter(id=>people[id]); }
function spousesOf(x){ const out=new Set();
  edges.forEach(e=>{ if(e.kind==='spouse'){ if(e.from===x&&people[e.to]) out.add(e.to); if(e.to===x&&people[e.from]) out.add(e.from); } });

/* explicit sibling edges only (implied siblings — people sharing a parent — are already
   adjacent through the parent bus and don't need a separate tie). */
function siblingsOf(x){ const out=new Set();
  edges.forEach(e=>{ if(e.kind==='sibling'){ if(e.from===x&&people[e.to]) out.add(e.to); if(e.to===x&&people[e.from]) out.add(e.from); } });
  return [...out]; }
/* every relationship a person has, of any kind — the test for "belongs in the tree". */
function hasAnyRel(x){ return parentsOf(x).length>0 || childrenOf(x).length>0 || spousesOf(x).length>0 || siblingsOf(x).length>0; }

/* Generation numbers via fixed-point iteration over THREE constraints, alternated to

  const dedupe=list=>{ const seen=new Set(), out=[]; list.forEach(([a,b])=>{ if(!inSet.has(a)||!inSet.has(b)) return; const k=a<b?a+'|'+b:b+'|'+a; if(seen.has(k)) return; seen.add(k); out.push([a,b]); }); return out; };
  const siblingPairs=dedupe([].concat(...placed.map(id=>siblingsOf(id).map(s=>[id,s]))));
  const spousePairs =dedupe([].concat(...placed.map(id=>spousesOf(id).map(s=>[id,s]))));
  const pc=[]; edges.forEach(e=>{ if(isParentEdge(e)&&inSet.has(e.from)&&inSet.has(e.to)) pc.push([e.from,e.to]); });
  const pull=(a,b)=>{ const m=Math.max(tier[a],tier[b]); let ch=false; if(tier[a]!==m){tier[a]=m;ch=true;} if(tier[b]!==m){tier[b]=m;ch=true;} return ch; };
  const cap=placed.length+8;                  // monotonic increase ⇒ converges well inside this
  for(let it=0; it<cap; it++){ let ch=false;
    siblingPairs.forEach(([a,b])=>{ if(pull(a,b)) ch=true; });                                  // (1) blood
    spousePairs.forEach(([a,b])=>{ if(anchored[a]&&anchored[b]) return; if(pull(a,b)) ch=true; }); // (2) conditional
    pc.forEach(([p,c])=>{ if(tier[c]<tier[p]+1){ tier[c]=tier[p]+1; ch=true; } });              // (3) child below parent
    if(!ch) break; }
  return tier;
}
/* self-test: assert every child is strictly below both parents (uses final pos[].tier). */
function selfTestGenerations(){
  const pe=edges.filter(isParentEdge); const viol=[];
  pe.forEach(e=>{ const p=e.from,c=e.to; if(!pos[p]||!pos[c]) return;
    if(!(pos[c].tier>pos[p].tier)) viol.push(nm(p)+' (gen '+pos[p].tier+') → '+nm(c)+' (gen '+pos[c].tier+')'); });
  const byName=n=>Object.keys(people).find(id=>String((people[id]&&people[id].display_name)||'').toLowerCase().includes(n.toLowerCase()));
  const probe=(pn,cn)=>{ const p=byName(pn),c=byName(cn); if(!p||!c) return pn+'→'+cn+': n/a (not in data)';
    const pt=pos[p]?pos[p].tier:'?', ct=pos[c]?pos[c].tier:'?';
    return pn+'→'+cn+': '+((pos[p]&&pos[c]&&pos[c].tier>pos[p].tier)?'OK':'FAIL')+'  (parent gen '+pt+', child gen '+ct+')'; };
  console.log('[tree] generation self-test — parent edges:',pe.length,'| placed:',placedSet.size,'| violations:',viol.length);
  if(viol.length) console.warn('[tree] GENERATION VIOLATIONS:\n  '+viol.join('\n  ')); else console.log('[tree] ✓ every child is strictly below both parents');
  [['Dudi','Leeya'],['Dudi','Karni'],['Efim','Leonid'],['Leonid','Jonathan']].forEach(pr=>console.log('[tree]   '+probe(pr[0],pr[1])));
  return viol.length;
}
/* self-test: connector sprawl. Sums every drawn edge's length and counts the ones whose
   HORIZONTAL span exceeds ~3 card widths (those are the "strange lines" across the tree).
   Reports named probes (Chaya / Sofia) so the far-apart edges are visible in the console. */
function selfTestOrdering(){
  const THRESH=3*CW; let total=0, long=0, n=0;
  const drawn=edges.filter(e=>pos[e.from]&&pos[e.to]);
  drawn.forEach(e=>{ const dx=CX(e.from)-CX(e.to), dy=CTOP(e.from)-CTOP(e.to); total+=Math.hypot(dx,dy); n++; if(Math.abs(dx)>THRESH) long++; });
  const byName=n=>Object.keys(people).find(id=>String((people[id]&&people[id].display_name)||'').toLowerCase().includes(n.toLowerCase()));
  const spansOf=nm=>{ const id=byName(nm); if(!id) return nm+': n/a'; const es=drawn.filter(e=>e.from===id||e.to===id);
    if(!es.length) return nm+': no drawn edges'; const mx=Math.max(...es.map(e=>Math.abs(CX(e.from)-CX(e.to))));
    return nm+': max |span| '+Math.round(mx)+'px ('+ (mx/CW).toFixed(1) +' card-widths) over '+es.length+' edge(s)'; };
  console.log('[tree] ordering self-test — edges:',n,'| total connector length:',Math.round(total)+'px',
    '| long-span (> '+THRESH+'px = 3 card widths):',long);
  console.log('[tree]   '+spansOf('Chaya'));
  console.log('[tree]   '+spansOf('Sofia'));
  return {total:Math.round(total), long, edges:n};
}

/* collision/compaction: after ordering + x-placement, GUARANTEE no two cards in a generation
   overlap — using the BADGE-INCLUSIVE box (CWX), not the bare 132px rect, so the connect "+"
   and moment badge that hang OUTSIDE the card can never touch a neighbour. Walk each row
   left→right; if a card's badge box would collide with its left neighbour's, push it right to
   keep the minimum centre pitch (CWX + GUT = COLW). Couple/cluster members already sit exactly
   COLW apart, so they never trip this. Then re-centre the row so it stays under its parents. */
function compactRows(){ const MINPITCH=CWX+GUT; const rows={};   // = COLW; badge boxes stay ≥ GUT apart
  Object.keys(pos).forEach(id=>{ const t=pos[id].tier; (rows[t]=rows[t]||[]).push(id); });
  Object.keys(rows).forEach(t=>{ const row=rows[t].sort((a,b)=>pos[a].x-pos[b].x);
    const mean0=row.reduce((a,id)=>a+pos[id].x,0)/row.length;
    for(let i=1;i<row.length;i++){ const minx=pos[row[i-1]].x + MINPITCH;
      if(pos[row[i]].x < minx) pos[row[i]].x = minx; }
    const mean1=row.reduce((a,id)=>a+pos[id].x,0)/row.length; const d=mean0-mean1;
    if(d) row.forEach(id=>{ pos[id].x += d; }); });
}
/* self-test: assert no two BADGE-INCLUSIVE card boxes intersect in any generation. This is the
   real fix's guarantee — a plain-rect test passed while badges still overlapped. Prints 0. */
function selfTestOverlap(){ const rows={}; let overlaps=0; const ex=[];
  Object.keys(pos).forEach(id=>{ const t=pos[id].tier; (rows[t]=rows[t]||[]).push(id); });
  Object.keys(rows).forEach(t=>{ const row=rows[t].sort((a,b)=>pos[a].x-pos[b].x);
    for(let i=1;i<row.length;i++){ const a=row[i-1],b=row[i]; const aR=pos[a].x+CWX/2, bL=pos[b].x-CWX/2;
      if(bL<aR-0.5){ overlaps++; if(ex.length<6) ex.push(nm(a)+' ∩ '+nm(b)+' (gen '+t+', badge boxes by '+Math.round(aR-bL)+'px)'); } } });
  console.log('[tree] overlap self-test (badge-inclusive, box='+CWX+'px) — generations:',Object.keys(rows).length,'| overlapping card pairs:',overlaps);
  if(overlaps) console.warn('[tree] CARD/BADGE OVERLAPS:\n  '+ex.join('\n  ')); else console.log('[tree] ✓ no two cards’ badge-inclusive boxes overlap in any generation');
  return overlaps;
}
/* self-test: the drawer must hold EXACTLY the people with zero relationships — nobody who
   has a spouse/sibling/parent/child tie should be dumped there. */
function selfTestPlacement(){ const ids=Object.keys(people);
  const zero=ids.filter(id=>!hasAnyRel(id));
  const ok = unplaced.length===zero.length && unplaced.every(id=>!hasAnyRel(id));
  console.log('[tree] placement self-test — people:',ids.length,'| placed (≥1 tie):',placedSet.size,'| zero-tie:',zero.length,'| drawer shows:',unplaced.length);
  console.log('[tree]   '+(ok?'✓ drawer holds exactly the '+zero.length+' people with no relationships':'✗ MISMATCH: drawer='+unplaced.length+' vs '+zero.length+' truly unlinked'));
  return {drawer:unplaced.length, zero:zero.length, ok};
}
/* self-test: sibling contiguity — the HARD constraint. For EVERY sibling group in every
   generation, its members must occupy a CONTIGUOUS range of x-positions with NO non-member
   between them (a member's own married-in spouse, sitting inside the block, is allowed — Leon:
   "separated only by their own siblings/spouses"). Two kinds of group are checked: children
   that share an exact placed parent-set, and connected components of explicit sibling edges.
   Prints the number of violations (must be 0). */
function selfTestSiblingContiguity(){
  const rows={}; Object.keys(pos).forEach(id=>{ const t=pos[id].tier; (rows[t]=rows[t]||[]).push(id); });
  Object.keys(rows).forEach(t=> rows[t].sort((a,b)=>pos[a].x-pos[b].x));
  const groups=[];
  // (a) children grouped by their exact placed parent-set
  const byPar={};
  Object.keys(pos).forEach(c=>{ const par=parentsOf(c).filter(p=>pos[p]).slice().sort(); if(!par.length) return;
    const k=par.join('|'); (byPar[k]=byPar[k]||new Set()).add(c); });
  Object.keys(byPar).forEach(k=>{ if(byPar[k].size>1) groups.push([...byPar[k]]); });
  // (b) connected components of explicit sibling edges
  const sibAdj={}; const add=(a,b)=>{ (sibAdj[a]=sibAdj[a]||new Set()).add(b); };
  edges.forEach(e=>{ if(e.kind==='sibling'&&pos[e.from]&&pos[e.to]){ add(e.from,e.to); add(e.to,e.from); } });
  const seen=new Set();
  Object.keys(sibAdj).forEach(s=>{ if(seen.has(s)) return; const comp=[],st=[s]; seen.add(s);
    while(st.length){ const x=st.pop(); comp.push(x); [...sibAdj[x]].forEach(y=>{ if(!seen.has(y)){ seen.add(y); st.push(y); } }); }
    if(comp.length>1) groups.push(comp); });
  let viol=0; const ex=[];
  const spousesPlaced=id=>spousesOf(id).filter(s=>pos[s]);
  groups.forEach(G=>{
    // check within each generation the group touches (near-always one)
    const tiers=[...new Set(G.map(id=>pos[id].tier))];
    tiers.forEach(t=>{ const members=G.filter(id=>pos[id].tier===t); if(members.length<2) return;
      const allowed=new Set(members); members.forEach(m=>spousesPlaced(m).forEach(sp=>{ if(pos[sp].tier===t) allowed.add(sp); }));
      const row=rows[t]; const idxs=members.map(id=>row.indexOf(id)); const lo=Math.min(...idxs), hi=Math.max(...idxs);
      for(let i=lo+1;i<hi;i++){ if(!allowed.has(row[i])){ viol++; if(ex.length<8) ex.push(nm(row[i])+' sits between siblings '+members.map(nm).join(' & ')+' (gen '+t+')'); } } }); });
  console.log('[tree] sibling-contiguity self-test — sibling groups:',groups.length,'| violations:',viol);
  if(viol) console.warn('[tree] SIBLING CONTIGUITY VIOLATIONS:\n  '+ex.join('\n  ')); else console.log('[tree] ✓ every sibling group is contiguous — no unrelated person between siblings');
  return viol;
}

/* Order a same-tier marriage cluster (a connected component of the same-level spouse graph)
   into a single left→right line. A simple couple is [a,b]; a serial marriage (one hub married
   to several partners, all on the same level) becomes hub-flanked/-followed by its partners so
   every partner sits ON the hub's level, to the side — exactly Leon's rule. Deterministic: walk
   from a min-degree endpoint, always stepping to the neighbour with the fewest remaining links
   (id tie-break), so chains close cleanly and the same order forms on every load. */
function orderCluster(comp, adj){ const sortId=(a,b)=> a<b?-1:(a>b?1:0);
  if(comp.length===1) return comp.slice();
  const deg=x=>adj[x].size;
  const start=comp.slice().sort((a,b)=>(deg(a)-deg(b))||sortId(a,b))[0];
  const out=[], used=new Set(); let cur=start;
  while(out.length<comp.length){ out.push(cur); used.add(cur);
    const free=[...adj[cur]].filter(n=>!used.has(n));
    if(free.length){ cur=free.sort((a,b)=>{ const fa=[...adj[a]].filter(n=>!used.has(n)).length, fb=[...adj[b]].filter(n=>!used.has(n)).length; return (fa-fb)||sortId(a,b); })[0]; }
    else { const rest=comp.filter(x=>!used.has(x)); if(!rest.length) break; cur=rest.sort(sortId)[0]; } }
  return out;
}

/* ================= LAYOUT ================= */
function computeLayout(){
  pos={}; placedSet=new Set(); unplaced=[];
  const ids=Object.keys(people);
  // A person belongs in the tree if they have ANY relationship — parent, child, spouse OR
  // sibling. (Previously only parent-child-connected people, plus their spouses, were placed,
  // so spouse-only and sibling-only relatives were wrongly dumped in the "not yet placed"
  // drawer even though they ARE connected. Only people with ZERO ties belong in the drawer.)
  ids.forEach(id=>{ if(hasAnyRel(id)) placedSet.add(id); });
  unplaced=ids.filter(id=>!placedSet.has(id));
  const placed=[...placedSet];
  if(!placed.length){ return; }
  // ---- generation assignment: iterate to a FIXED POINT so that, after spouses share a
  // row, EVERY child still lands strictly below BOTH parents. The old code tiered children
  // from their parents' FIRST estimate, then pulled a parentless spouse down to their
  // partner — but never re-propagated, so a child of that spouse (e.g. Dudi→Leeya) could end
  // up on or ABOVE the parent's final row. Alternating the two constraints to convergence
  // removes that inversion.  gen only ever increases ⇒ the loop always settles.
  const tier=genAssign(placed);
  // re-pack: drop empty generations, keep order (so gaps from the max() pushes don't show)
  { const used=[...new Set(placed.map(id=>tier[id]))].sort((a,b)=>a-b); const remap={}; used.forEach((g,i)=>remap[g]=i); placed.forEach(id=>tier[id]=remap[tier[id]]); }

  // ---- MARRIAGE CLUSTERS as layout units (Leon's rule: every spouse on the partner's level,
  // to the side — INCLUDING serial/multiple marriages, all on that same level). A unit is a
  // connected component of the SAME-TIER spouse graph, laid out as one contiguous line. Spouses
  // that landed on a DIFFERENT tier (the related-spouse edge case kept on their blood level) are
  // deliberately NOT in the cluster — their marriage is drawn later as a cross-level connector.
  // Deterministic: a stable id sort seeds every step, so the same clusters form on every load.
  const sortId=(a,b)=> a<b?-1:(a>b?1:0);
  const sortedPlaced=placed.slice().sort(sortId);
  const spAdj={}; sortedPlaced.forEach(id=>spAdj[id]=new Set());
  sortedPlaced.forEach(id=>spousesOf(id).forEach(s=>{ if(placedSet.has(s)&&s!==id&&tier[s]===tier[id]){ spAdj[id].add(s); spAdj[s].add(id); } }));

  const maxTier=Math.max(...placed.map(id=>tier[id]));
  const unitsByTier={}; for(let t=0;t<=maxTier;t++) unitsByTier[t]=[];
  const unitOf={}; const seen=new Set();
  sortedPlaced.forEach(start=>{ if(seen.has(start)) return;
    // gather the same-tier spouse component (marriage cluster) containing `start`
    const comp=[], stack=[start], inC=new Set([start]);
    while(stack.length){ const x=stack.pop(); comp.push(x); [...spAdj[x]].sort(sortId).forEach(y=>{ if(!inC.has(y)){ inC.add(y); stack.push(y); } }); }
    comp.forEach(x=>seen.add(x));
    let mem=orderCluster(comp, spAdj);
    if(mem.length===2 && sexOf(mem[1])==='m' && sexOf(mem[0])!=='m') mem=[mem[1],mem[0]];   // simple couple: m to the left
    const t=tier[start];
    const u={ mem, tier:t, uid:mem.slice().sort(sortId).join('|'), minId:mem.slice().sort(sortId)[0] };
    mem.forEach(m=>unitOf[m]=u); unitsByTier[t].push(u); });
  const allUnits=[]; for(let t=0;t<=maxTier;t++) allUnits.push(...unitsByTier[t]);
  // parent-/child-/sibling-unit adjacency (a couple counts as ONE unit for all).
  // A member with no parents of their own borrows their sibling's parents as a LAYOUT-ONLY
  // pull (never drawn) so a parentless sibling gravitates beneath the same couple; explicit
  // sibling units keep parentless siblings contiguous with each other.
  allUnits.forEach(u=>{ const ps=new Set(), cs=new Set(), ss=new Set();
    u.mem.forEach(m=>{ let mp=parentsOf(m);
      if(!mp.length){ const bp=[]; siblingsOf(m).forEach(sib=>parentsOf(sib).forEach(p=>bp.push(p))); mp=bp; }
      mp.forEach(p=>{ if(unitOf[p]&&unitOf[p]!==u) ps.add(unitOf[p]); });
      childrenOf(m).forEach(c=>{ if(unitOf[c]&&unitOf[c]!==u) cs.add(unitOf[c]); });
      siblingsOf(m).forEach(sib=>{ if(unitOf[sib]&&unitOf[sib]!==u) ss.add(unitOf[sib]); }); });
    u.parentUnits=[...ps]; u.childUnits=[...cs]; u.siblingUnits=[...ss]; });

  // ---- SIBLING BLOCKS: a sibling group is an ATOMIC block that unrelated people may NEVER
  // split (Leon's bug: Vera's children Lia & Berenika, interrupted by Amma's child Ida + her
  // married-in spouse Grisha). Group the units of each tier into blocks: two units join the
  // same block when they share a parentUnit (⇒ the SAME parent-set — true siblings) OR are
  // tied by an explicit sibling edge. A married-in spouse rides inside their partner's UNIT,
  // so a couple (Ida+Grisha) is ONE unit and lands in Ida's sibling block, beside Ida's own
  // siblings — never inside another family's block. Blocks are the atoms the row-ordering
  // sweep may reorder; the order of units WITHIN a block is FIXED (parent-set, then birth
  // order, then id), so nothing outside the block can ever be placed between two siblings.
  const blockOf={}; const blocksByTier={};
  for(let t=0;t<=maxTier;t++){ blocksByTier[t]=[]; const us=unitsByTier[t]||[]; if(!us.length) continue;
    const uf={}; us.forEach(u=>uf[u.uid]=u.uid);
    const find=x=>{ while(uf[x]!==x){ uf[x]=uf[uf[x]]; x=uf[x]; } return x; };
    const join=(a,b)=>{ const ra=find(a),rb=find(b); if(ra!==rb) uf[ra]=rb; };
    const byParent={};                                   // units sharing a parentUnit = full siblings
    us.forEach(u=>u.parentUnits.forEach(p=>{ (byParent[p.uid]=byParent[p.uid]||[]).push(u); }));
    Object.keys(byParent).forEach(k=>{ const l=byParent[k]; for(let i=1;i<l.length;i++) join(l[0].uid,l[i].uid); });
    us.forEach(u=>u.siblingUnits.forEach(sb=>{ if(sb.tier===t&&uf[sb.uid]!=null) join(u.uid,sb.uid); }));  // explicit sibling ties
    const comps={}; us.forEach(u=>{ const r=find(u.uid); (comps[r]=comps[r]||[]).push(u); });
    // fixed internal order: keep each exact parent-set contiguous (sort by parent-set key),
    // then birth order (earliest first), then id — deterministic, identical on every load.
    // Key by the exact PARENT PERSONS (not parentUnits): under a serial marriage (one parent
    // married to several) full- and half-siblings share a parentUnit but differ here, so each
    // exact parent-set stays contiguous and half-siblings never interleave full siblings.
    const pkey=u=>{ const ps=new Set(); u.mem.forEach(m=>parentsOf(m).forEach(p=>{ if(placedSet.has(p)) ps.add(p); })); return [...ps].sort(sortId).join(','); };
    const byr=u=>{ const ys=u.mem.map(m=>parseInt((people[m]&&people[m].birth_year),10)).filter(y=>y>0); return ys.length?Math.min(...ys):1e9; };
    Object.keys(comps).forEach(r=>{ const list=comps[r];
      list.sort((a,b)=> (pkey(a)<pkey(b)?-1:pkey(a)>pkey(b)?1:0) || (byr(a)-byr(b)) || sortId(a.minId,b.minId));
      const mem=[]; list.forEach(u=>mem.push(...u.mem));
      const minId=list.map(u=>u.minId).sort(sortId)[0];
      const blk={ tier:t, units:list, mem, minId, uid:'B'+t+'#'+minId };
      list.forEach(u=>blockOf[u.uid]=blk); blocksByTier[t].push(blk); }); }
  const allBlocks=[]; for(let t=0;t<=maxTier;t++) allBlocks.push(...blocksByTier[t]);
  // block-level parent/child adjacency, lifted from the per-unit adjacency (a couple = one unit)
  allBlocks.forEach(b=>{ const ps=new Set(), cs=new Set();
    b.units.forEach(u=>{ u.parentUnits.forEach(p=>{ const pb=blockOf[p.uid]; if(pb&&pb!==b) ps.add(pb); });
      u.childUnits.forEach(c=>{ const cb=blockOf[c.uid]; if(cb&&cb!==b) cs.add(cb); }); });
    b.parentBlocks=[...ps]; b.childBlocks=[...cs]; });

  // ---- ORDER THE BLOCKS per tier (Sugiyama-style). DFS from the roots so each family's
  // descendants start contiguous; then sweep barycentres down/up to pull children under their
  // parents and cut crossings. Every step is a STABLE sort with an id tie-break, so the layout
  // is deterministic and never jumps between loads. Reordering acts on whole BLOCKS, so a
  // sibling group moves as one and can never be split.
  const border={}; for(let t=0;t<=maxTier;t++) border[t]=[];
  const vis=new Set();
  const dfs=b=>{ if(vis.has(b.uid)) return; vis.add(b.uid); border[b.tier].push(b);
    b.childBlocks.slice().sort((x,y)=>sortId(x.minId,y.minId)).forEach(dfs); };
  allBlocks.filter(b=>!b.parentBlocks.length).sort((a,b)=>(a.tier-b.tier)||sortId(a.minId,b.minId)).forEach(dfs);
  allBlocks.slice().sort((a,b)=>(a.tier-b.tier)||sortId(a.minId,b.minId)).forEach(b=>{ if(!vis.has(b.uid)){ vis.add(b.uid); border[b.tier].push(b); } });
  for(let t=0;t<=maxTier;t++) border[t].forEach((b,i)=>b.idx=i);
  const meanIdx=arr=>arr.reduce((a,b)=>a+b.idx,0)/arr.length;
  const reorder=(t,key)=>{ const list=border[t]; if(list.length<2) return;
    list.forEach(b=>{ const ns=b[key]; b._bc = ns.length? meanIdx(ns) : b.idx; });
    list.sort((a,b)=> (a._bc-b._bc) || sortId(a.minId,b.minId));
    list.forEach((b,i)=>b.idx=i); };
  for(let pass=0; pass<8; pass++){
    for(let t=1;t<=maxTier;t++) reorder(t,'parentBlocks');       // down: settle under parents
    for(let t=maxTier-1;t>=0;t--) reorder(t,'childBlocks');      // up: settle over children
  }
  // expand blocks → a FIXED unit order per tier (blocks stay contiguous, internal order frozen)
  const order={}; for(let t=0;t<=maxTier;t++){ order[t]=[]; border[t].forEach(b=>b.units.forEach(u=>order[t].push(u))); order[t].forEach((u,i)=>u.idx=i); }

  // ---- X-POSITION with the row order FIXED. Pool-adjacent-violators keeps the min gap
  // between neighbours while centring each unit as close to its barycentre as possible, so a
  // family's children land directly beneath the couple. Alternate down/up to a compromise.
  const uw=u=>u.mem.length*COLW;
  const pav=(targets,weights)=>{ const bm=[],bw=[],bc=[];
    for(let i=0;i<targets.length;i++){ let m=targets[i], w=weights[i], c=1;
      while(bm.length && bm[bm.length-1]>=m){ const j=bm.length-1; m=(bm[j]*bw[j]+m*w)/(bw[j]+w); w=bw[j]+w; c+=bc[j]; bm.pop();bw.pop();bc.pop(); }
      bm.push(m);bw.push(w);bc.push(c); }
    const out=[]; for(let k=0;k<bm.length;k++) for(let j=0;j<bc[k];j++) out.push(bm[k]); return out; };
  const placeRow=list=>{ if(!list.length) return; const S=[]; let acc=0;
    for(let i=0;i<list.length;i++){ if(i>0) acc += uw(list[i-1])/2 + uw(list[i])/2 + GAP; S.push(acc); }
    const tg=list.map((u,i)=> (u._tx==null?S[i]:u._tx) - S[i]);
    const q=pav(tg, list.map(u=>u._w||1)); list.forEach((u,i)=> u.cx=q[i]+S[i]); };
  for(let t=0;t<=maxTier;t++){ order[t].forEach(u=>{u._tx=null;u._w=1;}); placeRow(order[t]); }  // sequential seed
  for(let pass=0; pass<10; pass++){
    for(let t=0;t<=maxTier;t++){ order[t].forEach(u=>{ if(u.parentUnits.length){ u._tx=u.parentUnits.reduce((a,p)=>a+p.cx,0)/u.parentUnits.length; u._w=u.parentUnits.length; } else { u._tx=u.cx; u._w=1; } }); placeRow(order[t]); }
    for(let t=maxTier;t>=0;t--){ order[t].forEach(u=>{ if(u.childUnits.length){ u._tx=u.childUnits.reduce((a,c)=>a+c.cx,0)/u.childUnits.length; u._w=u.childUnits.length; } else { u._tx=u.cx; u._w=1; } }); placeRow(order[t]); }
  }
  for(let t=0;t<=maxTier;t++){ order[t].forEach(u=>{ const left=u.cx-uw(u)/2; u.mem.forEach((id,i)=>{ pos[id]={ x:left+(i+0.5)*COLW, tier:t }; }); }); }
  compactRows();   // hard guarantee: no two cards overlap within a generation
  // normalise so min x = PADX + CW/2
  const xs=placed.map(id=>pos[id].x); const minx=Math.min(...xs);
  const shift=(PADX+CW/2)-minx; placed.forEach(id=>{ pos[id].x += shift; });
  // RTL mirror
  if(rtl()){ const mx=Math.max(...placed.map(id=>pos[id].x)); placed.forEach(id=>{ pos[id].x = (PADX+CW/2) + (mx - pos[id].x); }); }
}

/* ================= RENDER ================= */
function worldBBox(){ let maxX=0,maxY=0,minX=1e9,minY=1e9; const placed=[...placedSet];
  if(!placed.length) return {minX:0,minY:0,maxX:600,maxY:600};
  // include the badge overhang so edge cards (and their connect/moment badges) are never clipped
  placed.forEach(id=>{ minX=Math.min(minX,CX(id)-CW/2-OVX); maxX=Math.max(maxX,CX(id)+CW/2+OVX); minY=Math.min(minY,CTOP(id)-OVY_TOP); maxY=Math.max(maxY,CBOT(id)+OVY_BOT); });
  return {minX,minY,maxX,maxY}; }

    world.appendChild(el); });
  $$('.pcard .por[data-face]').forEach(el=>hydrateFace(el, el.getAttribute('data-face')));

function lifeHint(id){ const p=people[id]; if(!p) return '';
  if(p.birth_year&&p.death_year) return p.birth_year+'–'+p.death_year;
  if(p.birth_year) return fmt(L().born,{y:p.birth_year});
  const pr=parentsOf(id); if(pr.length) return fmt(L().child_of,{n:firstName(pr[0])});
  return ''; }

function mkPath(d,cls){ const p=document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d',d); p.setAttribute('class',cls); return p; }
function mkEl(tag,attrs){ const e=document.createElementNS('http://www.w3.org/2000/svg',tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }
function buildLinks(){
  links.innerHTML='';
  // spouse pairs (kind spouse OR co-parents) — draw once
  const drawnSp=new Set();
  edges.forEach(e=>{ if(e.kind==='spouse' && pos[e.from]&&pos[e.to]){ const key=[e.from,e.to].sort().join('|'); if(drawnSp.has(key)) return; drawnSp.add(key); drawSpouse(e.from,e.to); } });
  // families grouped by parent-set
  const fam={};
  edges.forEach(e=>{ if(!isParentEdge(e)) return; if(!pos[e.from]||!pos[e.to]) return;
    // find co-parents of this child that are placed
    const par=parentsOf(e.to).filter(p=>pos[p]); const key=par.slice().sort().join('|');
    (fam[key]=fam[key]||{parents:par, kids:{}}); fam[key].kids[e.to]=e; });
  let famOff=0;
  Object.values(fam).forEach(f=>{ if(!f.parents.length) return;
    // co-parents get a spouse bar too if not already
    if(f.parents.length===2){ const key=f.parents.slice().sort().join('|'); if(!drawnSp.has(key)){ drawnSp.add(key); drawSpouse(f.parents[0],f.parents[1]); } }
    const px = f.parents.reduce((a,b)=>a+CX(b),0)/f.parents.length;
    const py = Math.max(...f.parents.map(CBOT));
    const kidIds=Object.keys(f.kids);
    // bus sits in the empty gap ABOVE the children's row; a small per-family offset keeps
    // two families' buses on one tier from lining up into a single apparent connector.
    const kidTops=kidIds.map(CTOP); const busY=Math.min(...kidTops)-26-(famOff%3)*7; famOff++;
    const certs=kidIds.map(k=>f.kids[k].certainty||'remembered');
    const rep = certs.includes('documented')?'documented':(certs.includes('remembered')?'remembered':'uncertain');
    links.appendChild(mkPath(`M ${px} ${py} V ${busY}`,'ln c-'+rep));
    // horizontal sibling bar spans ONLY this parent-set's real children
    const xs=kidIds.map(CX); const minx=Math.min(...xs), maxx=Math.max(...xs);
    if(kidIds.length>1) links.appendChild(mkPath(`M ${minx} ${busY} H ${maxx}`,'ln c-'+rep));
    kidIds.forEach(k=>{ const c=(f.kids[k].certainty||'remembered'); links.appendChild(mkPath(`M ${CX(k)} ${busY} V ${CTOP(k)}`,'ln c-'+c)); });
  });
  // explicit sibling edges (subtle) when not already sharing a parent bus.
  // Route as a bracket in the gap ABOVE the cards — up from each card top, across, down —
  // so a run between distant siblings never passes THROUGH an unrelated card (the old
  // curve sat at card-mid height and read as a spurious connection). Stagger per edge.
  let sibOff=0;
  edges.forEach(e=>{ if(e.kind!=='sibling'||!pos[e.from]||!pos[e.to]) return;
    const shared=parentsOf(e.from).some(p=>parentsOf(e.to).includes(p)); if(shared) return;
    const ax=CX(e.from), bx=CX(e.to); const busY=Math.min(CTOP(e.from),CTOP(e.to))-16-(sibOff%3)*7; sibOff++;
    links.appendChild(mkPath(`M ${ax} ${CTOP(e.from)} V ${busY} H ${bx} V ${CTOP(e.to)}`,'ln sibling')); });
  // pending (in_review) connections → violet dashed connector, routed in the gap ABOVE the
  // cards (never through an unrelated card), staggered so several don't merge into one line.
  // A request that mirrors an existing published tie (an edit/removal awaiting the keeper) is
  // not re-drawn — that tie already shows solid; the card's pendpin signals it's under review.
  let pendOff=0;
  const drawPend=(a,b)=>{ if(!pos[a]||!pos[b]) return; if(anyTie(a,b)) return;
    const ax=CX(a), bx=CX(b); const busY=Math.min(CTOP(a),CTOP(b))-20-(pendOff%3)*7; pendOff++;
    links.appendChild(mkPath(`M ${ax} ${CTOP(a)} V ${busY} H ${bx} V ${CTOP(b)}`,'ln pend'));
    links.appendChild(mkEl('circle',{cx:(ax+bx)/2, cy:busY, r:8, class:'pendbadge'})); };
  pendingRels.forEach(r=>drawPend(r.from,r.to));
  pendingKin.forEach(k=>{ const v=parseKin(k.value); if(!v||v.op==='remove') return; drawPend(k.person_id,v.other); });
  // trace path (cool)
  if(state.trace && state.sel && viewerPersonId && state.sel!==viewerPersonId){ const chain=tracePath(viewerPersonId,state.sel);
    if(chain){ for(let i=0;i<chain.length-1;i++){ const a=chain[i],b=chain[i+1]; if(pos[a]&&pos[b])
      links.appendChild(mkPath(`M ${CX(a)} ${CMID(a)} C ${CX(a)} ${(CMID(a)+CMID(b))/2}, ${CX(b)} ${(CMID(a)+CMID(b))/2}, ${CX(b)} ${CMID(b)}`,'ln trace'+(reduceMotion?'':' pulse'))); } } }
  sizeLinks();
}
function drawSpouse(a,b){ const y=CMID(a), x1=CX(a), x2=CX(b), mx=(x1+x2)/2;
  const sameTier = pos[a]&&pos[b]&&pos[a].tier===pos[b].tier;
  // Adjacent, same-level partners: a short bar between their edges. Otherwise — distant
  // co-parents, OR the related-spouse edge case where the two partners keep DIFFERENT blood
  // levels — route the marriage line through the gap ABOVE the cards, so it reads as a
  // connector (never crossing an unrelated card) and can span levels without any overlap.
  if(sameTier && Math.abs(x1-x2) <= COLW*1.35){
    links.appendChild(mkPath(`M ${Math.min(x1,x2)+CW/2-6} ${y} H ${Math.max(x1,x2)-CW/2+6}`,'ln spouse'));
    links.appendChild(mkEl('circle',{cx:mx, cy:y, r:4.5, class:'knot'}));
  } else {
    const busY=Math.min(CTOP(a),CTOP(b))-12;
    links.appendChild(mkPath(`M ${x1} ${CTOP(a)} V ${busY} H ${x2} V ${CTOP(b)}`,'ln spouse'));
    links.appendChild(mkEl('circle',{cx:mx, cy:busY, r:4.5, class:'knot'}));
  } }

function sizeLinks(){ const bb=worldBBox(); const w=bb.maxX+PADX, h=bb.maxY+PADY;
  links.setAttribute('width',w); links.setAttribute('height',h); world.style.width=w+'px'; world.style.height=h+'px'; }

/* trace over parent + spouse adjacency */
function tracePath(from,to){ if(!from||!to) return null; if(from===to) return [from];
  const adj={}; const add=(a,b)=>{ (adj[a]=adj[a]||[]).push(b); };
  edges.forEach(e=>{ if(isParentEdge(e)){ add(e.from,e.to); add(e.to,e.from); } if(e.kind==='spouse'){ add(e.from,e.to); add(e.to,e.from); } });
  const q=[[from]], seen=new Set([from]);
  while(q.length){ const path=q.shift(); const last=path[path.length-1]; if(last===to) return path;
    (adj[last]||[]).forEach(nx=>{ if(!seen.has(nx)){ seen.add(nx); q.push([...path,nx]); } }); }
  return null; }

/* ---------- transform ---------- */
function apply(){ world.style.transform=`translate(${state.tx}px,${state.ty}px) scale(${state.scale})`; const z=$('#zlvl'); if(z) z.textContent=Math.round(state.scale*100)+'%'; }
// The SAFE rectangle: the viewport minus the fixed chrome, so the initial fit/centre never
// parks a card permanently under the top bar, the bottom pills, or the zoom dock + ⊕ nav
// button (both at the inline-END corner, ≈120×260px). The canvas can still be PANNED under
// them afterwards — this only biases the resting framing. inset-inline-end mirrors under RTL.
function safeRect(){ const vw=vp.clientWidth, vh=vp.clientHeight;
  const TOP=76, BOT=100, START=14, END=120;                 // topbar / pills row / dock+nav column
  const left = rtl()? END : START, right = rtl()? START : END;
  const w=Math.max(60, vw-left-right), h=Math.max(60, vh-TOP-BOT);
  return { cx:left+w/2, cy:TOP+h/2, w, h }; }
function centerOn(id, sc){ if(!pos[id]) return; const s=sc||state.scale; const R=safeRect();
  state.scale=s; state.tx=R.cx - CX(id)*s; state.ty=R.cy - (CTOP(id)+CH/2)*s;
  world.style.transition='transform .5s cubic-bezier(.16,.8,.28,1)'; apply(); setTimeout(()=>world.style.transition='',520); }
function fitAll(){ const R=safeRect(); const bb=worldBBox(); const pad=30;
  const bw=(bb.maxX-bb.minX)+pad*2, bh=(bb.maxY-bb.minY)+pad*2;
  const s=Math.min(ZMAX,Math.max(ZMIN,Math.min(R.w/bw, R.h/bh)));
  state.scale=s; state.tx=R.cx - ((bb.minX+bb.maxX)/2)*s; state.ty=R.cy - ((bb.minY+bb.maxY)/2)*s;
  world.style.transition='transform .55s cubic-bezier(.16,.8,.28,1)'; apply(); setTimeout(()=>world.style.transition='',560); }

function parseKin(v){ try{ const o=JSON.parse(v); return (o&&o.other)?o:null; }catch(e){ return null; } }
async function loadData(){
  try{ const {data:pp}=await sb.from('people').select('id,display_name,sex,primary_asset,birth_date,death_date,metadata'); (pp||[]).forEach(p=>{
    people[p.id]={ id:p.id, display_name:p.display_name, sex:p.sex, primary_asset:p.primary_asset,
      birth_year:(p.birth_date?String(p.birth_date).slice(0,4):''), death_year:(p.death_date?String(p.death_date).slice(0,4):''), metadata:p.metadata||{} }; });
  }catch(e){ people={}; }
  try{ const {data:nv}=await sb.from('person_names').select('*'); (nv||[]).forEach(r=>{ const id=r.person_id, lg=r.lang||'und'; if(!id) return;
    (nameLoc[id]=nameLoc[id]||{})[lg]={ given:r.given, family:r.family, called:r.called, display:r.display||r.display_name }; });
  }catch(e){ nameLoc={}; }
  // relationships — probe columns gracefully
  let rp=null;
  try{ const r=await sb.from('relationships').select('id,from_person,to_person,kind,certainty,note,status,created_by'); if(r.error) throw r.error; rp=r.data; }catch(e){
    try{ const r=await sb.from('relationships').select('id,from_person,to_person,kind,certainty,note,status'); if(r.error) throw r.error; rp=r.data; }catch(e2){
      try{ const r=await sb.from('relationships').select('id,from_person,to_person,kind,certainty,note'); if(r.error) throw r.error; rp=r.data; }catch(e3){
        try{ const r=await sb.from('relationships').select('id,from_person,to_person,status'); if(r.error) throw r.error; rp=r.data; }catch(e4){
          try{ const r=await sb.from('relationships').select('id,from_person,to_person'); rp=r.data; }catch(e5){ rp=[]; } } } } }
  // published ties build the tree; in_review ties render as violet "waiting for the keeper".
  edges=(rp||[]).filter(r=>r.status==null||r.status==='published').map(r=>({ id:r.id, from:r.from_person, to:r.to_person, kind:r.kind||'parent', certainty:r.certainty||'remembered', note:r.note||'', status:r.status||null }));
  pendingRels=(rp||[]).filter(r=>r.status&&r.status!=='published'&&r.status!=='rejected'&&r.status!=='declined').map(r=>({ id:r.id, from:r.from_person, to:r.to_person, kind:r.kind||'parent', certainty:r.certainty||'remembered', status:r.status, created_by:r.created_by||null }));
  // pending kin suggestions
  try{ const {data:pk}=await sb.from('person_facts').select('id,person_id,value,created_by,status').eq('field','kin').neq('status','published'); pendingKin=pk||[]; }catch(e){ pendingKin=[]; }
  // face fallback: for anyone without a primary_asset, borrow a photo they're TAGGED in.
  // artefact_subjects(person_id, artefact_id, detail{x,y,w,h}) → artefacts(id, storage_path, kind='photo', published). One batch, largest crop wins.
  faceFallback={};
  try{
    const [subsR, artsR] = await Promise.all([
      sb.from('artefact_subjects').select('artefact_id,person_id,detail'),
      sb.from('artefacts').select('id,storage_path').eq('status','published').eq('kind','photo')
    ]);
    const artPath={}; artByPath={}; (artsR.data||[]).forEach(a=>{ if(a.storage_path){ artPath[a.id]=a.storage_path; artByPath[a.storage_path]=a.id; } });
    const bestArea={};
    (subsR.data||[]).forEach(s=>{ const d=s.detail; if(!d||typeof d.x!=='number'||typeof d.w!=='number') return;
      const path=artPath[s.artefact_id]; if(!path) return;
      const area=(d.w||0)*(d.h||0);
      if(faceFallback[s.person_id]==null || area>bestArea[s.person_id]){
        faceFallback[s.person_id]={ path, box:{x:d.x, y:d.y, w:d.w, h:d.h}, art:s.artefact_id }; bestArea[s.person_id]=area; } });
  }catch(e){ faceFallback={}; }
}

/* ================= CONNECT FLOW (reusable — window.LFConnect) ================= */
const CF={ open:false, cur:null, step:1, other:null, rel:null, cert:'remembered', note:'', showOther:false, editing:false, mode:'suggest', existing:null, query:'', hideConn:false };
function openConnect(curId, opts){ opts=opts||{}; if(!people[curId]) return;
  CF.open=true; CF.cur=curId; CF.step=1; CF.other=null; CF.rel=null; CF.cert='remembered'; CF.note=''; CF.showOther=false; CF.editing=false; CF.mode='suggest'; CF.existing=null; CF.query=''; CF.hideConn=false;
  if(opts.other && people[opts.other]){ startEdit(curId, opts.other); return; }
  scrim.classList.add('show'); sheet.classList.add('show'); renderStep(); }
function startEdit(curId, otherId){ const tie=anyTie(curId, otherId); CF.editing=!!tie; CF.mode=tie?'save':'suggest'; CF.other=otherId; CF.existing=tie;
  if(tie){ const rl=relFromEdge(curId,otherId,tie); CF.rel=rl; CF.cert=tie.certainty||'remembered'; CF.note=tie.note||''; }
  else { CF.rel=null; }
  CF.showOther=SECOND.includes(CF.rel); CF.step=2; scrim.classList.add('show'); sheet.classList.add('show'); renderStep(); }
function closeConnect(){ CF.open=false; scrim.classList.remove('show'); sheet.classList.remove('show'); }
function relFromEdge(cur, other, e){ if(isParentEdge(e)){ return e.from===other? 'parent' : 'child'; } return e.kind||'other'; }

function stepsHTML(){ const c=CF.step; const mk=n=>`<span class="dot ${n<c?'done':''} ${n===c?'on':''}"></span>`;
  return `${mk(1)}<span class="bar"></span>${mk(2)}<span class="bar"></span>${mk(3)}`; }
function renderStep(){ const s=L();
  $('#steps').innerHTML = (CF.step===1||CF.step===2||CF.step===3)?stepsHTML():'';

/* map design rel -> (from,to,kind,dir) with cur=A, other=B; parent=from */
function endsFor(a,b,rel){ if(rel==='parent') return {from:b,to:a,kind:'parent',dir:'other_parent'};
  if(rel==='child') return {from:a,to:b,kind:'parent',dir:'other_child'};
  return {from:a,to:b,kind:rel,dir:'other_child'}; }
// supabase-js returns {error} on a DB failure (it does NOT throw), so every write is checked
// and retried without the optional columns before it is allowed to fail — never silently.
async function insertRel(fields){ let r=await sb.from('relationships').insert(fields); if(!r.error) return null;
  const min={from_person:fields.from_person, to_person:fields.to_person, kind:fields.kind, status:fields.status};
  if(fields.created_by) min.created_by=fields.created_by;
  r=await sb.from('relationships').insert(min); if(!r.error) return null;
  delete min.created_by; r=await sb.from('relationships').insert(min); return r.error||null; }

async function commitConnect(){ const a=CF.cur, b=CF.other, rel=CF.rel; if(!a||!b||!rel||!user) return {ok:false};
  const ends=endsFor(a,b,rel);
  if(state.keeper){
    // keeper writes straight to the tree (published). If the write is rejected, fall back to a
    // pending suggestion so nothing is lost — and toast, never fail silently.
    if(CF.editing&&CF.existing){
      let r=await sb.from('relationships').update({from_person:ends.from,to_person:ends.to,kind:ends.kind,certainty:CF.cert,note:CF.note||'',status:'published',reviewed_by:user.id}).eq('id',CF.existing.id);
      if(r.error) r=await sb.from('relationships').update({from_person:ends.from,to_person:ends.to,kind:ends.kind}).eq('id',CF.existing.id);
      if(r.error){ toast(L().sendFail); return {ok:false}; }
      return {ok:true};
    }
    const err=await insertRel({from_person:ends.from,to_person:ends.to,kind:ends.kind,certainty:CF.cert,note:CF.note||'',status:'published',created_by:user.id});
    if(err){ const perr=await insertRel({from_person:ends.from,to_person:ends.to,kind:ends.kind,certainty:CF.cert,note:CF.note||'',status:'in_review',created_by:user.id});
      CF.mode='suggest'; toast(L().savedPending); return {ok:!perr, pending:true}; }
    return {ok:true};
  }
  // non-keeper: a REAL in_review relationship row (not a live write). The "waiting for the
  // keeper" receipt is therefore truthful, and the row surfaces in the keeper's review queue.
  const err=await insertRel({from_person:ends.from,to_person:ends.to,kind:ends.kind,certainty:CF.cert,note:CF.note||'',status:'in_review',created_by:user.id});
  if(err) toast(L().sendFail);
  return {ok:!err, pending:true};
}
async function commitRemove(){ const e=CF.existing; if(!e||!user) return {ok:false};
  if(state.keeper){ const r=await sb.from('relationships').delete().eq('id',e.id); if(r.error) toast(L().sendFail); return {ok:!r.error}; }
  // non-keeper: request removal — a pending row that mirrors the live tie. The keeper's queue
  // reads a pending row matching a published tie as "remove this connection".
  const err=await insertRel({from_person:e.from,to_person:e.to,kind:e.kind||'parent',certainty:e.certainty||'remembered',note:'',status:'in_review',created_by:user.id});
  if(err) toast(L().sendFail);
  return {ok:!err}; }

/* ---------- interactions: pan / pinch / wheel ---------- */
const ptrs=new Map(); let drag=null, pinch=null, inertia=null;
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y)||1; }
function stopInertia(){ if(inertia){ cancelAnimationFrame(inertia); inertia=null; } }
function startInertia(vx,vy){ let fx=vx,fy=vy; (function run(){ fx*=0.92; fy*=0.92; state.tx+=fx; state.ty+=fy; apply();
  if(Math.abs(fx)+Math.abs(fy)>0.4){ inertia=requestAnimationFrame(run); } else inertia=null; })(); }
vp.addEventListener('pointerdown',e=>{ if(e.target.closest('[data-conn]')||e.target.closest('[data-open-moment]')) return; vp.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY}); stopInertia();
  if(ptrs.size===1){ const card=e.target.closest('.pcard'); world.style.transition='';
    drag={x:e.clientX,y:e.clientY,tx:state.tx,ty:state.ty,moved:false,card,vx:0,vy:0,lx:e.clientX,ly:e.clientY}; vp.classList.add('drag'); }
  else if(ptrs.size===2){ drag=null; world.style.transition=''; const p=[...ptrs.values()]; pinch={ d:dist(p[0],p[1]), mx:(p[0].x+p[1].x)/2, my:(p[0].y+p[1].y)/2 }; } });
vp.addEventListener('pointermove',e=>{ if(!ptrs.has(e.pointerId)) return; ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinch && ptrs.size>=2){ const p=[...ptrs.values()]; const nd=dist(p[0],p[1]), nmx=(p[0].x+p[1].x)/2, nmy=(p[0].y+p[1].y)/2;
    state.tx+=nmx-pinch.mx; state.ty+=nmy-pinch.my; zoomAt(nd/pinch.d,nmx,nmy); pinch.d=nd; pinch.mx=nmx; pinch.my=nmy; return; }
  if(drag){ const dx=e.clientX-drag.x, dy=e.clientY-drag.y; if(Math.abs(dx)+Math.abs(dy)>4) drag.moved=true;
    drag.vx=e.clientX-drag.lx; drag.vy=e.clientY-drag.ly; drag.lx=e.clientX; drag.ly=e.clientY; state.tx=drag.tx+dx; state.ty=drag.ty+dy; apply(); } });
function endPtr(e){ if(ptrs.has(e.pointerId)) ptrs.delete(e.pointerId); if(ptrs.size<2) pinch=null;
  if(ptrs.size===0){ if(drag){ vp.classList.remove('drag');
    if(!drag.moved && drag.card){ onCardTap(drag.card.dataset.id); }
    else if(!reduceMotion && (Math.abs(drag.vx)+Math.abs(drag.vy))>3){ startInertia(drag.vx,drag.vy); } drag=null; } }
  else if(ptrs.size===1){ const p=[...ptrs.values()][0]; drag={x:p.x,y:p.y,tx:state.tx,ty:state.ty,moved:true,card:null,vx:0,vy:0,lx:p.x,ly:p.y}; } }
vp.addEventListener('pointerup',endPtr); vp.addEventListener('pointercancel',endPtr);
vp.addEventListener('wheel',e=>{ e.preventDefault(); stopInertia(); zoomAt(e.deltaY<0?1.12:1/1.12, e.clientX, e.clientY); },{passive:false});
function zoomAt(f,cx,cy){ const r=vp.getBoundingClientRect(); const px=(cx-r.left-state.tx)/state.scale, py=(cy-r.top-state.ty)/state.scale;
  const ns=Math.min(ZMAX,Math.max(ZMIN,state.scale*f)); state.tx-=px*(ns-state.scale); state.ty-=py*(ns-state.scale); state.scale=ns; apply(); }
function vpCenter(){ const r=vp.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height/2}; }

function onCardTap(id){ if(state.trace){ state.sel=(state.sel===id?null:id); buildCards(); buildLinks(); if(state.sel&&viewerPersonId&&state.sel!==viewerPersonId) centerOn(state.sel,state.scale); return; }
  location.href='person-real.html?id='+encodeURIComponent(id); }

/* ---------- global click routing ---------- */
document.body.addEventListener('keydown',e=>{ if(e.key!=='Enter'&&e.key!==' ')return; const om=e.target.closest&&e.target.closest('[data-open-moment]'); if(om){ e.preventDefault(); const aid=om.getAttribute('data-open-moment'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); } });
document.body.addEventListener('click',e=>{
  const om=e.target.closest('[data-open-moment]'); if(om){ e.preventDefault(); e.stopPropagation(); const aid=om.getAttribute('data-open-moment'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); return; }
  const conn=e.target.closest('[data-conn]'); if(conn){ e.preventDefault(); openConnect(conn.dataset.conn); return; }
  const pick=e.target.closest('[data-pick]'); if(pick){ CF.other=(CF.other===pick.dataset.pick?null:pick.dataset.pick); renderPick(); return; }
  const rel=e.target.closest('[data-rel]'); if(rel){ CF.rel=rel.dataset.rel; renderRel(); return; }
  const cert=e.target.closest('[data-cert]'); if(cert){ CF.cert=cert.dataset.cert; renderCert(); return; }
  const act=e.target.closest('[data-act]'); if(!act) return; const a=act.dataset.act, s=L();
  if(a==='home'){ goHome(); }
  else if(a==='lang'){ cycleLang(); }
  else if(a==='legend'){ togglePop('legend'); }
  else if(a==='unlinked'){ togglePop('unlinked'); }
  else if(a==='zin'){ stopInertia(); zoomAt(1.14, vpCenter().x, vpCenter().y); }
  else if(a==='zout'){ stopInertia(); zoomAt(1/1.14, vpCenter().x, vpCenter().y); }
  else if(a==='zreset'){ stopInertia(); zoomAt(1/state.scale, vpCenter().x, vpCenter().y); }
  else if(a==='fit'){ stopInertia(); fitAll(); toast(s.fitmsg); }
  else if(a==='me'){ stopInertia(); if(viewerPersonId&&pos[viewerPersonId]){ centerOn(viewerPersonId, Math.max(state.scale,1.0)); } else { toast(s.noYou); } }
  else if(a==='trace'){ state.trace=!state.trace; $('#traceBtn').classList.toggle('on',state.trace);
    if(!state.trace){ state.sel=null; buildCards(); buildLinks(); toast(s.traceoff); }
    else if(!viewerPersonId){ toast(s.noYou); }
    else if(state.sel && state.sel!==viewerPersonId){ buildLinks(); centerOn(state.sel,state.scale); }
    else { toast(s.tracePick); } }
  // connect flow
  else if(a==='hideconn'){ CF.hideConn=!CF.hideConn; if(CF.hideConn&&CF.other&&connectedTo(CF.other)) CF.other=null; renderPick(); }
  else if(a==='toStep2'){ if(!CF.other) return; const tie=connectedTo(CF.other); if(tie){ CF.existing=tie; CF.step='dupe'; } else { CF.step=2; } renderStep(); }
  else if(a==='toggleother'){ CF.showOther=!CF.showOther; renderRel(); }
  else if(a==='toStep3'){ if(!CF.rel) return; CF.step=3; renderStep(); }
  else if(a==='cback'){ if(CF.step===3){ CF.step=2; renderStep(); } else if(CF.step===2){ if(CF.editing){ closeConnect(); } else { CF.step=1; renderStep(); } } else if(CF.step==='dupe'){ CF.step=1; renderStep(); } }
  else if(a==='finish'){ CF.mode=CF.editing?'save':'suggest'; commitConnect().then(afterWrite); CF.step='receipt'; renderStep(); }
  else if(a==='removeTie'){ CF.mode='removed'; commitRemove().then(afterWrite); CF.step='receipt'; renderStep(); toast(s.removedToast); }
  else if(a==='editFromDupe'){ CF.editing=true; CF.mode='save'; const rl=relFromEdge(CF.cur,CF.other,CF.existing); CF.rel=rl; CF.cert=CF.existing.certainty||'remembered'; CF.note=CF.existing.note||''; CF.showOther=SECOND.includes(rl); CF.step=2; renderStep(); }
  else if(a==='backToPick'){ CF.other=null; CF.existing=null; CF.step=1; renderStep(); }
  else if(a==='closeDone'){ closeConnect(); }
});
