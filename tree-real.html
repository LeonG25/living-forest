/* ================= AURORA VINES v2 — living background ================= */
function auroraVines(cv){
  const ctx=cv.getContext('2d'); let W,H,DPR;
  const rnd=(a,b)=>a+Math.random()*(b-a), clamp=(x,a,b)=>x<a?a:x>b?b:x, ease=x=>x<0?0:x>1?1:x*x*(3-2*x); const TAU=Math.PI*2; let t=0;
  const hsla=(h,s,l,a)=>{ h=((h%360)+360)%360; return 'hsla('+h.toFixed(0)+','+s+'%,'+l+'%,'+a+')'; };
  const gh=()=>Math.sin(t*0.0011)*22 + Math.sin(t*0.00042)*10;
  let NV, stars=[], nebulae=[], bokeh=[];
  function seedStatic(){ const n=Math.round(clamp(W/16,40,110));
    stars=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H*0.92,r:rnd(0.4,1.5),ph:rnd(0,TAU),tw:rnd(0.05,0.22),hue:rnd(180,285)}));
    nebulae=[ {x:rnd(0.2,0.4),y:rnd(0.18,0.5),r:rnd(0.5,0.8),hue:270,a:0.11,spd:0.00023,ph:rnd(0,TAU)},
      {x:rnd(0.6,0.85),y:rnd(0.3,0.6),r:rnd(0.5,0.9),hue:190,a:0.10,spd:0.00019,ph:rnd(0,TAU)},
      {x:rnd(0.4,0.7),y:rnd(0.55,0.88),r:rnd(0.6,1.0),hue:150,a:0.08,spd:0.00016,ph:rnd(0,TAU)} ];
    bokeh=Array.from({length:Math.round(clamp(W/34,14,34))},()=>({x:Math.random()*W,y:Math.random()*H,r:rnd(6,26),hue:rnd(160,285),spd:rnd(0.08,0.35),ph:rnd(0,TAU),a:rnd(0.05,0.13)})); }
  const AURH=[270,190,150,215]; let aur=[];
  function seedAur(){ aur=[]; for(let i=0;i<4;i++) aur.push({cx:rnd(0.15,0.85),w:rnd(0.16,0.34),amp:rnd(0.05,0.13),spd:rnd(0.0025,0.006),ph:rnd(0,TAU),hue:AURH[i%AURH.length],a:rnd(0.08,0.16),drift:rnd(0.3,0.6)}); }
  let vines=[], petals=[];
  function makeVine(depth){ depth=depth==null?rnd(0,1):depth; const x0=rnd(W*0.03,W*0.97); const top=rnd(H*0.05,H*0.38);
    const amp=rnd(18,58)*(0.6+0.4*depth); const freq=rnd(0.004,0.009), ph=rnd(0,TAU); const total=H-top;
    const nodes=Math.max(5,Math.round(total/(depth<0.5?66:52))); const leafHue=rnd(150,186); const bloomHue=[45,275,190,330][(Math.random()*4)|0];
    return {x0,top,amp,freq,ph,total,nodes,leafHue,bloomHue,depth, g:0,fold:0,speed:reduceMotion?1:rnd(0.003,0.006),hold:reduceMotion?1e9:rnd(240,440),
      age:0,state:'grow',fullAt:-1,dead:false, blooms:Array.from({length:nodes+1},()=>Math.random()<0.26),shed:{}, sway:rnd(0.6,1.3),swayAmp:rnd(5,11)*(0.5+0.5*depth)}; }
  function vinePt(v,i){ const y=H-(i/v.nodes)*v.total; const swayX=Math.sin(t*0.01*v.sway+v.ph)*v.swayAmp*(1-y/H); const x=v.x0+Math.sin(y*v.freq+v.ph)*v.amp+swayX; return [x,y]; }
  function strokePath(v,steps,reveal){ ctx.beginPath(); for(let s=0;s<=steps;s++){ const i=s/3; if(i>reveal) break; const p=vinePt(v,i); s?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]); } ctx.stroke(); }
  function leaf(p,ang,len,wid,hue,a,near){ const c=Math.cos(ang),s=Math.sin(ang); const tx=p[0]+c*len, ty=p[1]+s*len; const mx=p[0]+c*len*0.5, my=p[1]+s*len*0.5; const nx=-s, ny=c;
    ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.quadraticCurveTo(mx+nx*wid,my+ny*wid,tx,ty); ctx.quadraticCurveTo(mx-nx*wid,my-ny*wid,p[0],p[1]);
    if(near){ const g=ctx.createLinearGradient(p[0],p[1],tx,ty); g.addColorStop(0,hsla(hue,70,66,0.62*a)); g.addColorStop(0.5,hsla(hue+8,80,56,0.42*a)); g.addColorStop(1,hsla(hue+22,84,52,0.10*a)); ctx.fillStyle=g; }
    else ctx.fillStyle=hsla(hue+6,72,56,0.40*a); ctx.fill();
    if(near){ ctx.strokeStyle=hsla(hue+22,88,84,0.30*a); ctx.lineWidth=0.8; ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(tx,ty); ctx.moveTo(mx,my); ctx.lineTo(mx+nx*wid*0.6,my+ny*wid*0.6); ctx.moveTo(mx,my); ctx.lineTo(mx-nx*wid*0.6,my-ny*wid*0.6); ctx.stroke(); } }
  function bloom(p,r,hue,a,rot){ const hg=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r*5); hg.addColorStop(0,hsla(hue,88,72,0.50*a)); hg.addColorStop(0.3,hsla(hue,88,62,0.22*a)); hg.addColorStop(1,hsla(hue,88,60,0));
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(p[0],p[1],r*5,0,TAU); ctx.fill();
    for(let k=0;k<6;k++){ const ang=rot+k/6*TAU; const px=p[0]+Math.cos(ang)*r*0.9, py=p[1]+Math.sin(ang)*r*0.9; ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.fillStyle=hsla(hue,84,66,0.80*a); ctx.beginPath(); ctx.ellipse(0,0,r*0.95,r*0.5,0,0,TAU); ctx.fill(); ctx.restore(); }
    ctx.fillStyle=hsla(hue,55,90,0.95*a); ctx.beginPath(); ctx.arc(p[0],p[1],r*0.7,0,TAU); ctx.fill(); ctx.fillStyle='rgba(255,255,255,'+(0.8*a)+')'; ctx.beginPath(); ctx.arc(p[0],p[1],r*0.3,0,TAU); ctx.fill(); }
  function drawVine(v){ const grow=ease(v.g)*(1-ease(v.fold)); if(grow<=0.002) return; const near=v.depth>=0.5; const dm=0.45+0.55*v.depth; const reveal=grow*v.nodes;
    ctx.globalCompositeOperation='lighter'; ctx.lineCap='round'; ctx.lineJoin='round'; const hue=v.leafHue+gh(); const steps=Math.ceil(reveal*3);
    const sg=ctx.createLinearGradient(0,H,0,v.top); sg.addColorStop(0,hsla(hue-12,55,26,0.55*dm)); sg.addColorStop(0.6,hsla(hue,62,46,0.55*dm)); sg.addColorStop(1,hsla(hue+16,78,66,0.65*dm));
    ctx.strokeStyle=hsla(hue,72,55,0.06*dm); ctx.lineWidth=7*dm; strokePath(v,steps,reveal);
    ctx.strokeStyle=sg; ctx.lineWidth=2.6*dm; strokePath(v,steps,reveal);
    for(let i=1;i<=Math.floor(reveal);i++){ const openAmt=ease((grow-(i/v.nodes))*3.5); if(openAmt<=0.02) continue; const p=vinePt(v,i),pv=vinePt(v,i-0.6); const dir=Math.atan2(p[1]-pv[1],p[0]-pv[0]);
      const breathe=0.7+0.3*Math.sin(t*0.03+i); const open=openAmt*breathe; const len=(24+(near?7:0))*openAmt*dm, wid=(8*open+1.5)*dm; const spread=0.5+(1-open)*0.9;
      leaf(p,dir-spread,len,wid,hue,openAmt*dm,near); leaf(p,dir+spread,len,wid,hue,openAmt*dm,near);
      if(v.blooms[i]&&!v.shed[i]){ const bp=0.55+0.45*Math.sin(t*0.05+i); const br=(3.2+1.6*bp)*openAmt*dm; bloom(p,br,v.bloomHue+gh()*0.5,openAmt*dm,t*0.012+i);
        if(!reduceMotion&&near&&Math.random()<0.004){ v.shed[i]=1; for(let k=0;k<5;k++) petals.push({x:p[0],y:p[1],vx:rnd(-0.4,0.4),vy:rnd(0.3,0.9),rot:rnd(0,TAU),vr:rnd(-0.03,0.03),life:0,max:rnd(240,380),hue:v.bloomHue,sz:rnd(2.5,4.5),ph:rnd(0,TAU)}); } } }
    ctx.globalCompositeOperation='source-over'; }
  function step(){ for(const v of vines){ v.age++;
      if(v.state==='grow'){ if(v.g<1) v.g=Math.min(1,v.g+v.speed); if(v.g>=1&&v.fullAt<0) v.fullAt=v.age; if(v.fullAt>=0&&v.age-v.fullAt>v.hold) v.state='fold'; }
      else { v.fold=Math.min(1,v.fold+v.speed*0.7); if(v.fold>=1) v.dead=true; } }
    vines=vines.filter(v=>!v.dead); while(vines.length<NV) vines.push(makeVine()); vines.sort((a,b)=>a.depth-b.depth);
    for(const p of petals){ p.life++; p.x+=p.vx+0.5*Math.sin(t*0.02+p.ph); p.y+=p.vy; p.rot+=p.vr; p.vy=Math.min(p.vy+0.002,1.1); }
    petals=petals.filter(p=>p.life<p.max&&p.y<H+20); for(const a of aur) a.ph+=a.spd;
    for(const b of bokeh){ b.y-=b.spd; b.x+=Math.sin(t*0.006+b.ph)*0.25; if(b.y<-20){ b.y=H+20; b.x=Math.random()*W; } } }
  function paint(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0718'); g.addColorStop(0.5,'#070611'); g.addColorStop(1,'#05070e'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    for(const n of nebulae){ const cx=(n.x+Math.sin(t*n.spd+n.ph)*0.05)*W, cy=(n.y+Math.cos(t*n.spd*0.8+n.ph)*0.04)*H, r=n.r*Math.max(W,H)*0.6; const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r); rg.addColorStop(0,hsla(n.hue+gh(),70,45,n.a)); rg.addColorStop(1,hsla(n.hue+gh(),70,45,0)); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H); }
    for(const s of stars){ const tw=0.4+0.6*(0.5+0.5*Math.sin(t*s.tw+s.ph)); ctx.fillStyle=hsla(s.hue,60,86,0.5*tw); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill(); }
    for(const a of aur){ const cx=a.cx*W+Math.sin(a.ph)*a.amp*W*a.drift, half=a.w*W*0.5, h=a.hue+gh(); const grad=ctx.createLinearGradient(cx-half,0,cx+half,0); grad.addColorStop(0,hsla(h,80,60,0)); grad.addColorStop(0.5,hsla(h,82,62,a.a)); grad.addColorStop(1,hsla(h,80,60,0)); ctx.fillStyle=grad; ctx.beginPath();
      for(let y=0;y<=H;y+=44){ const off=Math.sin(y*0.005+a.ph*2)*a.amp*W*0.4; ctx.lineTo(cx-half+off,y); } for(let y=H;y>=0;y-=44){ const off=Math.sin(y*0.005+a.ph*2)*a.amp*W*0.4; ctx.lineTo(cx+half+off,y); } ctx.closePath(); ctx.fill(); }
    ctx.globalCompositeOperation='source-over'; let blurred=false;
    for(const v of vines){ if(v.depth<0.5 && !blurred && !reduceMotion){ ctx.filter='blur(1.6px)'; blurred=true; } else if(v.depth>=0.5 && blurred){ ctx.filter='none'; blurred=false; } drawVine(v); }
    if(blurred) ctx.filter='none'; ctx.globalCompositeOperation='lighter';
    for(const p of petals){ const fade=p.life<40?p.life/40:p.life>p.max-70?Math.max(0,(p.max-p.life)/70):1; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=hsla(p.hue+gh(),82,68,0.7*fade); ctx.beginPath(); ctx.ellipse(0,0,p.sz,p.sz*0.5,0,0,TAU); ctx.fill(); ctx.restore(); }
    for(const b of bokeh){ const tw=0.6+0.4*Math.sin(t*0.02+b.ph); const rg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r); rg.addColorStop(0,hsla(b.hue+gh(),78,80,b.a*tw*1.6)); rg.addColorStop(0.4,hsla(b.hue+gh(),78,70,b.a*tw*0.5)); rg.addColorStop(1,hsla(b.hue+gh(),78,70,0)); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill(); }
    ctx.globalCompositeOperation='source-over'; }
  function size(){ const r=cv.getBoundingClientRect(); DPR=Math.min(devicePixelRatio||1,2); W=Math.max(1,r.width); H=Math.max(1,r.height); cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); NV=Math.round(clamp(W/175,4,9)); seedStatic(); }
  size(); seedAur();
  addEventListener('resize',()=>{ size(); while(vines.length<NV) vines.push(makeVine()); if(reduceMotion) paint(); });
  if(reduceMotion){ for(let i=0;i<NV;i++){ const v=makeVine(); v.g=rnd(0.78,1); v.state='grow'; v.fullAt=v.age; vines.push(v); } vines.sort((a,b)=>a.depth-b.depth); paint(); }
  else { (function loop(){ t++; step(); paint(); requestAnimationFrame(loop); })(); }
}

/* ---------- boot ---------- */
async function boot(){
  auroraVines($('#atmo'));
  const stored=localStorage.getItem('lf_lang'); if(stored&&STR[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(STR[dl]) state.lang=dl; }
  applyText(); setIcons(); buildLegend();
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ location.href='index.html'; return; }
  user=session.user;
  try{ const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang,person_id').eq('id',user.id).maybeSingle();
    if(pr){ state.keeper=!!pr.is_keeper; if(pr.person_id) viewerPersonId=pr.person_id; if(pr.preferred_lang&&!stored&&STR[pr.preferred_lang]) state.lang=pr.preferred_lang; }
  }catch(e){ try{ const {data:pr2}=await sb.from('profiles').select('is_keeper,preferred_lang').eq('id',user.id).maybeSingle(); if(pr2){ state.keeper=!!pr2.is_keeper; if(pr2.preferred_lang&&!stored&&STR[pr2.preferred_lang]) state.lang=pr2.preferred_lang; } }catch(e2){} }
  await loadData();
  $('#loading').style.display='none';
  fullRender();
  try{ selfTestGenerations(); }catch(e){}
  try{ selfTestOrdering(); }catch(e){}
  try{ selfTestOverlap(); }catch(e){}
  try{ selfTestPlacement(); }catch(e){}
  try{ selfTestSiblingContiguity(); }catch(e){}
  // initial framing: centre on ?id or the viewer, else fit all
  const focus = (FOCUS_PARAM&&pos[FOCUS_PARAM])?FOCUS_PARAM : ((viewerPersonId&&pos[viewerPersonId])?viewerPersonId:null);
  if(focus){ setTimeout(()=>centerOn(focus, 1.0), 60); }
  else { setTimeout(fitAll, 60); }
}
boot();
})();
