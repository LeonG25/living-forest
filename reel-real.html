<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Living Forest — Story Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff; --leaf:#8fd6a0; --autotr:#9a8bbd; --coral:#ff8a80;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    background:radial-gradient(150% 100% at 50% -6%, #191233 0%, #0b0e22 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .screen[dir="rtl"]{ direction:rtl; }
  .screen[dir="rtl"] .serif,.screen[dir="rtl"] .warm,.screen[dir="rtl"] .telling p,.screen[dir="rtl"] .rname,.screen[dir="rtl"] .endt,.screen[dir="rtl"] .gt2{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* full-viewport single device */
  .device{ position:relative; width:100vw; height:100dvh; overflow:hidden; background:#04070e; }

  /* ===== in-device ambient aurora (signature: drifting colour) ===== */
  .atmo{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .aur{ position:absolute; border-radius:50%; filter:blur(46px); opacity:.5; mix-blend-mode:screen; }
  .aur.a1{ width:300px; height:300px; left:-70px; top:-46px; background:radial-gradient(circle, rgba(201,162,255,.8), transparent 68%); animation:auraDrift 24s ease-in-out infinite; }
  .aur.a2{ width:340px; height:340px; right:-96px; top:150px; background:radial-gradient(circle, rgba(127,180,216,.78), transparent 66%); animation:auraDrift2 29s ease-in-out infinite; }
  .aur.a3{ width:290px; height:290px; left:-44px; bottom:-56px; background:radial-gradient(circle, rgba(243,205,132,.72), transparent 66%); animation:auraDrift 33s ease-in-out infinite reverse; }
  .stars{ position:absolute; inset:0; z-index:0; opacity:.5; animation:twinkle 7s ease-in-out infinite;
    background-image:radial-gradient(1px 1px at 18% 12%, #cfe0ff88, transparent), radial-gradient(1px 1px at 66% 7%, #cfe0ff66, transparent),
      radial-gradient(1px 1px at 84% 26%, #ddc6ff55, transparent), radial-gradient(1px 1px at 30% 40%, #cfe0ff44, transparent),
      radial-gradient(1px 1px at 10% 58%, #cfe0ff44, transparent), radial-gradient(1px 1px at 88% 62%, #cfe0ff44, transparent); }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 70% at 50% 6%, rgba(201,162,255,.05), transparent 42%), radial-gradient(120% 92% at 50% 42%, transparent 26%, rgba(4,7,14,.55) 100%); }
  @keyframes auraDrift{ 0%{transform:translate(0,0) scale(1);} 50%{transform:translate(6%,-4%) scale(1.16);} 100%{transform:translate(0,0) scale(1);} }
  @keyframes auraDrift2{ 0%{transform:translate(0,0) scale(1.05);} 50%{transform:translate(-7%,5%) scale(1.24);} 100%{transform:translate(0,0) scale(1.05);} }
  @keyframes twinkle{ 0%,100%{opacity:.36;} 50%{opacity:.64;} }

  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ max-width:440px; margin:0 auto; padding:0 18px calc(30px + env(safe-area-inset-bottom)); }

  .topbar{ position:sticky; top:0; z-index:14; display:flex; align-items:center; gap:10px; max-width:440px; margin:0 auto;
    padding:15px 16px 11px; background:linear-gradient(to bottom, rgba(7,9,22,.92), rgba(7,9,22,.5) 68%, transparent); backdrop-filter:blur(9px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--cream); transition:border-color .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); } .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; } .ibtn svg{ width:18px; height:18px; }
  .ttl{ flex:1; min-width:0; display:flex; align-items:center; gap:9px; }
  .ttl .tx{ min-width:0; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }
  /* SIGNATURE : the reel spool, slowly turning in the title */
  .spool{ position:relative; width:26px; height:26px; border-radius:50%; flex:0 0 auto;
    border:2px solid rgba(243,205,132,.55); background:radial-gradient(circle, rgba(243,205,132,.14), transparent 70%); animation:spin 9s linear infinite; }
  .spool::before{ content:""; position:absolute; inset:8px; border-radius:50%; background:rgba(243,205,132,.4); }
  .spool i{ position:absolute; width:3.5px; height:3.5px; border-radius:50%; background:rgba(255,230,173,.85); top:2.5px; left:50%; margin-left:-1.75px; box-shadow:0 19px 0 rgba(255,230,173,.85); }
  .spool i.b{ transform:rotate(90deg); transform-origin:1.75px 11px; }
  .langpill{ display:inline-flex; align-items:center; gap:6px; font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:8px 11px; border-radius:99px; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--muted); flex:0 0 auto; }
  .langpill svg{ width:12px; height:12px; }
  /* language popover */
  .langmenu{ position:absolute; top:56px; inset-inline-end:16px; z-index:40; min-width:150px; padding:6px; border-radius:14px;
    background:linear-gradient(180deg,#101d33,#0a1220); border:1px solid var(--hair); box-shadow:0 24px 60px -30px #000; }
  .langmenu[hidden]{ display:none; }
  .langmenu button{ display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; padding:11px 12px; border:none; cursor:pointer;
    background:transparent; color:var(--cream); border-radius:10px; font-family:inherit; font-size:14px; text-align:start; }
  .langmenu button:hover{ background:rgba(255,255,255,.06); }
  .langmenu button .en{ display:block; font-size:11px; color:var(--muted); }
  .langmenu button .tick{ color:var(--gold-hi); opacity:0; } .langmenu button.on .tick{ opacity:1; } .langmenu button .tick svg{ width:16px; height:16px; }

  /* the person being played back */
  .who{ display:flex; align-items:center; gap:12px; margin:6px 2px 4px; }
  .who .av{ width:52px; height:52px; border-radius:50%; overflow:hidden; flex:0 0 auto; border:1.5px solid rgba(243,205,132,.6); box-shadow:0 0 16px -3px rgba(243,205,132,.6); }
  .who .av svg,.who .av img{ width:100%; height:100%; object-fit:cover; display:block; }
  .who .wn{ flex:1; min-width:0; }
  .who .wn .rname{ font-family:'Newsreader',serif; font-size:22px; line-height:1.12; color:#fbf5e8; }
  .who .wn .rname .maiden{ font-size:12px; color:var(--gold); font-style:italic; margin-inline-start:6px; }
  .who .wn .rsub{ font-family:'Azeret Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:5px; }

  /* ===== THE REEL HERO — the SIGNATURE cinematic frame ===== */
  .reelhero{ position:relative; border-radius:18px; overflow:hidden; margin:12px 0 2px; height:300px;
    border:1px solid rgba(255,244,214,.7); box-shadow:0 0 26px -8px rgba(255,232,180,.55), 0 26px 70px -44px #000; }
  .scene{ position:absolute; inset:0; z-index:0; }
  .scene .im{ position:absolute; inset:0; }
  .scene .im svg,.scene .im img{ width:100%; height:100%; object-fit:cover; display:block; }
  .scene.on .im{ animation:kenBurns 22s ease-in-out infinite alternate; will-change:transform; }
  @keyframes kenBurns{ 0%{ transform:scale(1.08) translate(-2%,-1.5%);} 100%{ transform:scale(1.2) translate(3%,2%);} }
  .scene .tint{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,7,26,.15) 0%, transparent 30%, rgba(6,8,20,.5) 78%, rgba(4,7,14,.86) 100%); }
  .leak{ position:absolute; inset:-20% -10%; z-index:1; pointer-events:none; mix-blend-mode:screen;
    background:linear-gradient(100deg, transparent 34%, rgba(255,214,150,.42) 48%, rgba(255,138,128,.18) 54%, transparent 64%);
    transform:translateX(-130%); animation:leak 12s ease-in-out infinite; }
  @keyframes leak{ 0%,70%{ transform:translateX(-130%) skewX(-10deg); opacity:0; } 78%{ opacity:.85; } 92%{ opacity:.7; } 100%{ transform:translateX(150%) skewX(-10deg); opacity:0; } }
  .grain{ position:absolute; inset:0; z-index:2; pointer-events:none; opacity:.09; mix-blend-mode:overlay;
    background-image:radial-gradient(1px 1px at 12% 24%,#fff,transparent),radial-gradient(1px 1px at 47% 62%,#fff,transparent),radial-gradient(1px 1px at 78% 33%,#fff,transparent),radial-gradient(1px 1px at 63% 88%,#fff,transparent),radial-gradient(1px 1px at 28% 71%,#fff,transparent),radial-gradient(1px 1px at 88% 12%,#fff,transparent);
    animation:grainShift .6s steps(2) infinite; }
  @keyframes grainShift{ 0%{transform:translate(0,0);} 50%{transform:translate(-1.5px,1px);} 100%{transform:translate(1px,-1px);} }
  .vig{ position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(120% 96% at 50% 42%, transparent 44%, rgba(4,7,14,.66) 100%); }
  .gate{ position:absolute; left:-24px; right:-24px; height:15px; z-index:3; display:flex; align-items:center; gap:10px; padding:0 8px; overflow:hidden; }
  .gate.top{ top:0; background:linear-gradient(to bottom, rgba(4,6,16,.82), transparent); }
  .gate.bot{ bottom:0; background:linear-gradient(to top, rgba(4,6,16,.82), transparent); }
  .gate i{ width:13px; height:8px; border-radius:2px; flex:0 0 auto; background:rgba(6,10,22,.7); border:1px solid rgba(255,255,255,.16); box-shadow:inset 0 0 4px rgba(0,0,0,.6); }
  .gate.top{ animation:advance 2.6s linear infinite; } .gate.bot{ animation:advance 2.6s linear infinite reverse; }
  @keyframes advance{ from{ transform:translateX(0);} to{ transform:translateX(-23px);} }
  .sceneno{ position:absolute; top:20px; inset-inline-start:16px; z-index:4; display:inline-flex; align-items:center; gap:8px;
    font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#e9dcc0;
    padding:6px 11px; border-radius:99px; background:rgba(6,10,22,.55); backdrop-filter:blur(8px); border:1px solid rgba(243,205,132,.34); }
  .sceneno .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px 1px var(--gold); animation:flick 3.4s ease-in-out infinite; }
  .sceneno.cool{ border-color:rgba(127,180,216,.34); } .sceneno.cool .dot{ background:var(--cool); box-shadow:0 0 8px 1px var(--cool); }
  @keyframes flick{ 0%,100%{opacity:.7; transform:scale(.9);} 45%{opacity:1; transform:scale(1.14);} }
  .rcap{ position:absolute; inset-inline:14px; bottom:14px; z-index:4; }
  .rcap .telling p{ font-family:'Newsreader',serif; font-size:19px; line-height:1.34; color:#f8efdb; text-shadow:0 2px 18px rgba(0,0,0,.7); }
  .rcap .telling p em{ color:var(--gold-hi); font-style:italic; }
  .toldby{ display:inline-flex; align-items:center; gap:8px; margin-top:11px; padding:6px 12px 6px 12px; border-radius:99px; background:rgba(6,10,22,.6); backdrop-filter:blur(8px); border:1px solid rgba(243,205,132,.4); }
  .toldby .flame{ width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 9px 2px rgba(243,205,132,.8); animation:flick 3.4s ease-in-out infinite; }
  .toldby span{ font-size:11.5px; color:var(--gold-hi); } .toldby span b{ font-family:'Newsreader',serif; font-weight:400; color:#fbf5e8; }

  /* provenance mono line under the frame */
  .provline{ display:flex; align-items:center; gap:7px; margin:11px 2px 2px; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
  .provline .lp{ width:6px; height:6px; border-radius:2px; transform:rotate(45deg); flex:0 0 auto; }
  .provline .lp.g{ background:var(--gold); box-shadow:0 0 7px 1px var(--gold); }
  .provline .lp.c{ background:var(--cool); box-shadow:0 0 7px 1px var(--cool); }
  .provline .lp.v{ background:var(--edit); box-shadow:0 0 7px 1px var(--edit); }

  /* ===== the kindle spine — how lit-up this person is ===== */
  .kindle{ margin:16px 0 4px; padding:15px 15px 16px; border-radius:16px; background:rgba(10,12,28,.5); border:1px solid var(--hair); }
  .kindle .kh{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:13px; }
  .kindle .kh .kt{ font-family:'Newsreader',serif; font-size:16px; color:#f6efe0; } .kindle .kh .kt b{ color:var(--gold-hi); font-style:italic; font-weight:400; }
  .kindle .kh .kn{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--muted); }
  .beads{ display:flex; gap:7px; }
  .bead{ position:relative; flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; }
  .bead .b{ width:100%; height:5px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden; }
  .bead.lit .b{ background:linear-gradient(90deg,var(--gold),var(--gold-hi)); box-shadow:0 0 12px -2px rgba(243,205,132,.75); }
  .bead.lit.cool .b{ background:linear-gradient(90deg,var(--cool),var(--cool-hi)); box-shadow:0 0 12px -2px rgba(127,180,216,.7); }
  .bead.wait .b{ background:repeating-linear-gradient(90deg, rgba(201,162,255,.5) 0 5px, transparent 5px 10px); }
  .bead .bl{ font-family:'Azeret Mono',monospace; font-size:7.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); }
  .bead.lit .bl{ color:#d9c9a2; } .bead.wait .bl{ color:var(--edit); }

  /* ===== the scrubber — a filmstrip of scenes ===== */
  .scrub{ display:flex; gap:8px; margin:14px 0 2px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  .scrub::-webkit-scrollbar{ display:none; }
  .thumb{ position:relative; width:70px; height:52px; border-radius:9px; overflow:hidden; flex:0 0 auto; cursor:pointer; border:1px solid var(--hair); opacity:.5; transition:opacity .2s,border-color .2s; }
  .thumb svg,.thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb .tl{ position:absolute; left:0; right:0; bottom:0; font-family:'Azeret Mono',monospace; font-size:7px; letter-spacing:.08em; text-transform:uppercase; color:#f0e6cf; text-align:center; padding:2px 0 3px; background:linear-gradient(to top, rgba(4,7,14,.9), transparent); }
  .thumb:hover{ opacity:.85; }
  .thumb.now{ opacity:1; border-color:rgba(243,205,132,.85); box-shadow:0 0 0 1px rgba(243,205,132,.5), 0 0 16px -4px rgba(243,205,132,.8); }
  .thumb.wait{ display:grid; place-items:center; background:rgba(201,162,255,.08); }
  .thumb.wait .wi{ color:var(--edit); } .thumb.wait .wi svg{ width:20px; height:20px; }
  .thumb.wait .tl{ color:var(--edit-hi); }

  /* transport controls */
  .transport{ display:flex; align-items:center; gap:12px; margin:14px 2px 2px; }
  .tb{ width:42px; height:42px; border-radius:12px; display:grid; place-items:center; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--cream); }
  .tb svg{ width:18px; height:18px; }
  .tb.play{ width:56px; height:56px; border-radius:50%; background:linear-gradient(180deg,var(--gold-hi),var(--gold)); color:#1a1206; border:none; box-shadow:0 10px 30px -12px rgba(243,205,132,.85); }
  .tb.play svg{ width:22px; height:22px; }
  .tprog{ flex:1; min-width:0; }
  .tprog .bar{ height:4px; border-radius:99px; background:rgba(255,255,255,.09); overflow:hidden; }
  .tprog .bar i{ display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--gold),var(--gold-hi)); box-shadow:0 0 12px -2px rgba(243,205,132,.7); transition:width .3s; }
  .tprog .tt{ display:flex; justify-content:space-between; margin-top:6px; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.08em; color:var(--muted); }

  .foot{ margin-top:22px; text-align:center; }
  .foot .l{ font-family:'Newsreader',serif; font-style:italic; font-size:13px; color:rgba(143,214,160,.62); }

  /* ===== the reel END — the payoff card ===== */
  .endwrap{ text-align:center; padding:8px 0 0; }
  .ring{ position:relative; width:150px; height:150px; margin:10px auto 6px; border-radius:50%;
    box-shadow:0 0 44px -10px rgba(243,205,132,.6); animation:ringGlow 5s ease-in-out infinite; }
  @keyframes ringGlow{ 0%,100%{ box-shadow:0 0 36px -14px rgba(243,205,132,.5);} 50%{ box-shadow:0 0 60px -6px rgba(243,205,132,.85);} }
  .ring::before{ content:""; position:absolute; inset:11px; border-radius:50%; background:radial-gradient(circle at 50% 36%, #16112c, #0a0e1e 76%); }
  .ring .rc{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .rc .big{ font-family:'Newsreader',serif; font-size:34px; color:var(--gold-hi); line-height:1; }
  .ring .rc .of{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .ring .spark{ position:absolute; width:10px; height:10px; border-radius:50%; top:6px; left:50%; margin-left:-5px; background:var(--gold-hi); box-shadow:0 0 14px 3px rgba(255,230,173,.9); animation:spin 5s linear infinite; transform-origin:5px 69px; }
  .endt{ font-family:'Newsreader',serif; font-size:25px; line-height:1.22; color:#f6efe0; margin:8px 8px 0; } .endt em{ font-style:italic; color:var(--gold-hi); }
  .ends{ font-size:13px; color:var(--muted); line-height:1.55; margin:10px 12px 0; }
  .facetlist{ margin:20px 0 4px; display:flex; flex-direction:column; gap:2px; border-radius:14px; overflow:hidden; border:1px solid var(--hair); text-align:start; }
  .frow{ display:flex; align-items:center; gap:12px; padding:12px 14px; background:rgba(11,15,32,.5); }
  .frow .fi{ width:32px; height:32px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center; }
  .frow .fi svg{ width:16px; height:16px; }
  .frow.lit .fi{ background:rgba(243,205,132,.12); border:1px solid rgba(243,205,132,.34); color:var(--gold-hi); }
  .frow.litc .fi{ background:rgba(127,180,216,.12); border:1px solid rgba(127,180,216,.32); color:var(--cool-hi); }
  .frow.wait .fi{ background:rgba(201,162,255,.12); border:1px solid rgba(201,162,255,.34); color:var(--edit-hi); }
  .frow .ft{ flex:1; min-width:0; }
  .frow .ft .fl{ font-family:'Newsreader',serif; font-size:16px; color:#f3e7cd; }
  .frow .ft .fs{ font-size:11px; color:var(--muted); margin-top:1px; }
  .frow.wait .ft .fs{ color:var(--edit); }
  .frow .fe{ flex:0 0 auto; } .frow .fe svg{ width:16px; height:16px; }
  .frow.lit .fe,.frow.litc .fe{ color:var(--leaf); }
  .frow.wait .fe{ color:var(--edit); }
  .primary{ display:flex; align-items:center; justify-content:center; gap:9px; width:100%; margin-top:18px; padding:15px; border-radius:14px; cursor:pointer;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold)); color:#1a1206; font-weight:600; font-size:15px; border:none; box-shadow:0 10px 34px -14px rgba(243,205,132,.8); }
  .primary svg{ width:17px; height:17px; }
  .primary.violetbtn{ background:linear-gradient(180deg,var(--edit-hi),var(--edit)); color:#1a0f2e; box-shadow:0 10px 34px -14px rgba(201,162,255,.8); }
  .ghostbtn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:11px; padding:13px; border-radius:13px; cursor:pointer;
    background:transparent; border:1px solid var(--hair); color:var(--muted); font-weight:600; font-size:13.5px; }
  .ghostbtn svg{ width:15px; height:15px; }

  /* ===== still gathering (early / empty) ===== */
  .reelhero.dim .scene .im{ filter:brightness(.5) saturate(.5) blur(1px); }
  .reelhero.dim .tint{ background:linear-gradient(180deg, rgba(10,7,26,.5), rgba(4,7,14,.9)); }
  .gathering{ position:absolute; inset:0; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .gathering .em{ position:relative; width:66px; height:66px; border-radius:50%; display:grid; place-items:center; margin-bottom:14px;
    background:radial-gradient(circle at 42% 34%, rgba(201,162,255,.32), transparent 68%); border:1px solid rgba(201,162,255,.5); color:var(--edit-hi); animation:emGlow 4.4s ease-in-out infinite; }
  .gathering .em svg{ width:30px; height:30px; }

    return disp; }
  function shortName(){ const g=nm('given'); if(g) return g; const disp=fullName(); return disp?disp.split(' ')[0]:''; }
  function nameInitial(){ const s=shortName(); return s?s.slice(0,1):(fullName().slice(0,1)||'•'); }

  /* ---------- what is lit (per-person kindle axis) ---------- */
  function computeLit(){
    const L={};
    const lifeHas = hasv(person.birth_date)||hasv(person.death_date)||hasv(pubNewest('birth','und'))||hasv(pubNewest('death','und'))||hasv(pubNewest('occupation',state.lang))||hasv(pubNewest('occupation','en'))||hasv(person.sex);
    const placesHas = pubList('lived','und').length>0 || hasv(pubNewest('pbirth','und')) || hasv(pubNewest('pbirth','en'));
    const moreHas = facts.some(x=>(x.field==='custom_value'||x.field==='source')&&x.status==='published');
    L.name = hasv(fullName());
    L.face = tagged.length>0;
    L.life = lifeHas;
    L.places = placesHas;
    L.story = memories.length>0;
    L.kin = rels.length>0;
    L.more = moreHas;
    // Reel is lit once three or more content facets are alight — there is a real reel to play.
    const contentLit=['name','face','life','places','story','kin','more'].filter(k=>L[k]).length;
    L.reel = contentLit>=3;
    // waiting (violet) — has pending suggestions but not yet published
    L._wait = {
      name: !L.name && hasPending(['given','family','display','called','maiden','patronymic','honorific']),
      life: !L.life && hasPending(['birth','death','occupation','bio','gender','living']),
      places: !L.places && hasPending(['lived','pbirth']),
      story: !L.story && false,
      kin: !L.kin && false,
      more: !L.more && hasPending(['custom_label','custom_value','source'])
    };
    return L;
  }
  const litCount=()=>FACET_ORDER.filter(k=>LIT[k]).length;

  /* ---------- assemble the reel from real data (engine-driven, Rule 8) ---------- */
  function buildScenes(){
    const L=d(); scenes=[]; const l=state.lang;
    if(LIT.name){ scenes.push({facet:'name', prov:'gold', tile:()=>nameSVG(nameInitial()),
      cap:isFem()?d().capName:d().capNameN }); }
    if(LIT.face){ scenes.push({facet:'face', prov:'gold', photo:(person.primary_asset||(tagged[0]&&tagged[0].storage_path)||''), seed:0,
      artId:(tagged[0]&&tagged[0].artefact_id)||'', cap:d().appearsIn(tagged.length) }); }
    if(LIT.life){
      const parts=[]; const by=person.birth_date?String(person.birth_date).slice(0,4):(pubNewest('birth','und')?String(pubNewest('birth','und')).slice(0,4):'');
      const dy=person.death_date?String(person.death_date).slice(0,4):(pubNewest('death','und')?String(pubNewest('death','und')).slice(0,4):'');
      const occ=pubNewest('occupation',l)||pubNewest('occupation','en');
      const pb=pubNewest('pbirth','und')||pubNewest('pbirth','en');
      if(by) parts.push(d().born+' '+by+(pb?(' · '+pb):'')); if(dy) parts.push(d().died+' '+dy);
      if(occ) parts.push(occ);
      scenes.push({facet:'life', prov:'cool', tile:lifeSVG, cap:parts.join(' · ')||d().facet.life });
    }
    if(LIT.places){ const lived=pubList('lived','und').map(x=>x.value).filter(Boolean);
      const pb=pubNewest('pbirth','und')||pubNewest('pbirth','en');
      const line=(pb?d().pbirth+' '+pb:'')+((pb&&lived.length)?' · ':'')+(lived.length?d().livedIn+' '+lived.join(', '):'');
      scenes.push({facet:'places', prov:'cool', tile:placeSVG, cap:line||d().facet.places }); }
    memories.forEach((m,i)=>{ scenes.push({facet:'story', prov:'gold', photo:m.storage_path, seed:i+1,
      artId:m.id||'', cap:m.cap||'', teller:m.teller }); });
    if(LIT.kin){ scenes.push({facet:'kin', prov:'cool', tile:kinSVG, cap:d().kinLine(rels.length) }); }
    if(state.idx>=scenes.length) state.idx=Math.max(0,scenes.length-1);
  }

  /* ---------- render ---------- */
  function render(){ const L=d();
    document.documentElement.lang=state.lang; document.documentElement.dir=L.dir;
    const scr=$('.screen'); if(scr) scr.setAttribute('dir',L.dir);
    renderTop();
    if(!scenes.length){ state.view='gather'; }
    else if(state.view==='gather'){ state.view='play'; }
    if(state.view==='gather') renderGather();
    else if(state.view==='end') renderEnd();
    else renderPlay();
    fillMedia();
    syncTimer();
  }

  function renderTop(){ const L=d();
    $('.topbar').innerHTML=`
      <button class="ibtn" data-act="back" aria-label="${esc(L.aBack)}">${sv(I.back, L.dir==='rtl'?1.7:1.7)}</button>
      <div class="ttl"><span class="spool"><i></i><i class="b"></i></span><span class="tx"><span class="k">${esc(L.topK)}</span><span class="n serif">${esc(L.topN)}</span></span></div>
      <button class="langpill" data-act="lang" aria-haspopup="true">${state.lang.toUpperCase()} ${sv(I.chev,1.7)}</button>`;
    if(L.dir==='rtl'){ const b=$('.topbar .ibtn svg'); if(b) b.style.transform='scaleX(-1)'; }
  }

  function whoBlock(){ const L=d(); const maiden=nm('maiden');
    const sub=state.view==='play'?`${d().playingBack} · ${d().lightsOf(litCount())}`:`${d().lightsOf(litCount())}`;
    return `<div class="who"><span class="av" id="whoAv">${avSVG()}</span><span class="wn">
      <span class="rname serif">${esc(fullName())}${maiden&&maiden!==nm('family')?`<span class="maiden">${esc(L.nee)} ${esc(maiden)}</span>`:''}</span>
      <span class="rsub">${esc(sub)}</span></span></div>`; }

  function kindleSpine(){ const L=d(); const n=litCount(); const dark=8-n;
    const kt=n===8?`<b>${n}</b> — ${esc(L.allLit)}`:`<b>${n}</b> ${esc(L.ofEight)}`;
    const kn=n===8?'':esc(L.stillDark(dark));
    const beads=FACET_ORDER.map(k=>{ let cls='';
      if(LIT[k]) cls='lit'+(COOL.has(k)?' cool':'');
      else if(LIT._wait&&LIT._wait[k]) cls='wait';
      return `<div class="bead ${cls}"><span class="b"></span><span class="bl">${esc(L.facet[k])}</span></div>`; }).join('');
    return `<div class="kindle"><div class="kh"><div class="kt">${kt}</div><div class="kn">${kn}</div></div><div class="beads">${beads}</div></div>`; }

  function gateHTML(top,bot){ return `<div class="gate ${top} ${bot}"></div>`; }
  function gatesRow(){ let s=''; for(let i=0;i<18;i++) s+='<i></i>'; return s; }

  function renderPlay(){ const L=d(); const s=scenes[state.idx]||scenes[0]; const cool=s.prov==='cool';
    const provCls=s.prov==='gold'?'g':(s.prov==='cool'?'c':'v');
    const provTxt=s.prov==='gold'?L.provGold:(s.prov==='cool'?L.provCool:L.provViolet);
    const told=(s.facet==='story'&&s.teller)?`<span class="toldby"><span class="flame"></span><span>${esc(L.toldBy)} <b>${esc(s.teller)}</b></span></span>`:'';
    const pct=Math.round(((state.idx+1)/scenes.length)*100);
    // scrubber: one thumb per scene, plus violet wait thumbs for un-lit content facets
    let thumbs=scenes.map((sc,i)=>`<div class="thumb ${i===state.idx?'now':''}" data-seek="${i}"><span class="thumbim" data-scene="${i}">${sc.photo?galSVG(sc.seed):sc.tile()}</span><span class="tl">${esc(L.facet[sc.facet])}</span></div>`).join('');
    ['places','more'].forEach(f=>{ if(!LIT[f] && LIT._wait && LIT._wait[f]) thumbs+=`<div class="thumb wait"><span class="wi">${sv(I[f]||I.places,1.6)}</span><span class="tl">${esc(L.facet[f])}</span></div>`; });
    const heroSVG=s.photo?galSVG(s.seed):s.tile();
    const footL=isFem()?L.footPlay:L.footPlayN;
    $('.pad').innerHTML=`
      ${whoBlock()}
      <div class="reelhero">
        <div class="scene on"><div class="im" id="heroIm" data-hero="${state.idx}"${(s.photo&&s.artId)?` data-act="open-moment" data-art="${esc(s.artId)}" role="button" tabindex="0" aria-label="${esc(L.openPhoto)}" style="cursor:pointer"`:''}>${heroSVG}</div><div class="tint"></div></div>
        <div class="leak"></div><div class="grain"></div><div class="vig"></div>
        <div class="gate top">${gatesRow()}</div><div class="gate bot">${gatesRow()}</div>
        <div class="sceneno ${cool?'cool':''}"><span class="dot"></span> ${esc(L.sceneOf(state.idx+1,scenes.length))} · ${esc(L.facet[s.facet])}</div>
        <div class="rcap">
          ${s.cap?`<div class="telling"><p>${esc(s.cap)}</p></div>`:''}
          ${told}
        </div>
      </div>
      <div class="provline"><span class="lp ${provCls}"></span> ${esc(provTxt)}</div>
      ${kindleSpine()}
      <div class="scrub">${thumbs}</div>
      <div class="transport">
        <button class="tb" data-act="prev" aria-label="${esc(L.aPrev)}"><svg viewBox="0 0 24 24" fill="currentColor">${I.prev}</svg></button>
        <button class="tb play" data-act="playpause" aria-label="${esc(state.playing?L.aPause:L.aPlay)}"><svg viewBox="0 0 24 24" fill="currentColor">${state.playing?I.pause:I.play}</svg></button>
        <button class="tb" data-act="next" aria-label="${esc(L.aNext)}"><svg viewBox="0 0 24 24" fill="currentColor">${I.next}</svg></button>
        <span class="tprog"><span class="bar"><i style="width:${pct}%"></i></span><span class="tt"><span>${state.idx+1}</span><span>${scenes.length}</span></span></span>
      </div>
      <div class="foot"><div class="l">${esc(footL)}</div></div>`;
  }

  function facetSummary(f){ const L=d();
    if(f==='name') return fullName();
    if(f==='face') return LIT.face?d().appearsIn(tagged.length):d().untold;
    if(f==='life'){ const by=person.birth_date?String(person.birth_date).slice(0,4):''; const dy=person.death_date?String(person.death_date).slice(0,4):''; const occ=pubNewest('occupation',state.lang)||pubNewest('occupation','en');
      return [by?d().born+' '+by:'',dy?d().died+' '+dy:'',occ].filter(Boolean).join(' · ')||(LIT.life?d().facet.life:d().untold); }
    if(f==='story') return LIT.story?(d().facet.story+' · '+memories.length):d().untold;
    if(f==='kin') return LIT.kin?d().kinLine(rels.length):d().untold;
    if(f==='places'){ if(LIT.places){ const lived=pubList('lived','und').map(x=>x.value); return lived.length?lived.join(', '):(pubNewest('pbirth','und')||pubNewest('pbirth','en')); } return d().placesGathering; }
    if(f==='more') return LIT.more?d().facet.more:d().untold;
    return '';
  }
  function renderEnd(){ const L=d(); const n=litCount(); const turn=(n/8).toFixed(3);
    const rows=['name','face','life','story','kin','places','more'].map(f=>{
      const lit=LIT[f]; const wait=!lit && LIT._wait && LIT._wait[f];
      const cls=lit?(COOL.has(f)?'litc':'lit'):(wait?'wait':'wait');
      const endIcon=lit?sv(I.check,2):sv(I.plus,1.8);
      return `<div class="frow ${cls}"><span class="fi">${sv(I[f])}</span><span class="ft"><span class="fl">${esc(L.facet[f])}</span><span class="fs">${esc(facetSummary(f))}</span></span><span class="fe">${endIcon}</span></div>`; }).join('');
    const firstDark=['places','more','life','kin','story','face'].find(f=>!LIT[f]);
    const ghost=firstDark?`<button class="ghostbtn" data-act="go-add"><span>${sv(I.upload)}</span> ${esc(L.addToLight(L.facet[firstDark]))}</button>`:'';
    const footL=L.footEnd;
    const conic=`background:conic-gradient(from -90deg, var(--gold) 0turn ${turn}turn, rgba(255,255,255,.08) ${turn}turn 1turn)`;
    $('.pad').innerHTML=`
      ${whoBlock()}
      <div class="endwrap">
        <div class="ring" style="${conic}"><span class="spark"></span><div class="rc"><div class="big">${n}</div><div class="of">${esc(L.ringOf)}</div></div></div>
        <div class="endt">${esc(L.endTitle(fullName()))}<em>${esc(L.endAssembled)}</em>.</div>
        <div class="ends">${esc(n===8?L.endSubFull:L.endSub)}</div>
      </div>
      <div class="facetlist">${rows}</div>
      <button class="primary" data-act="replay">${sv(I.replay,1.8)} ${esc(L.watchAgain)}</button>
      ${ghost}
      <div class="foot"><div class="l">${esc(footL)}</div></div>`;
  }

  function renderGather(){ const L=d(); const nm2=shortName()||fullName();
    const footL=isFem()?L.footGather:L.footGatherN;
    $('.pad').innerHTML=`
      ${whoBlock()}
      <div class="reelhero dim">
        <div class="scene"><div class="im" id="heroIm">${tagged[0]?galSVG(0):nameSVG(nameInitial())}</div><div class="tint"></div></div>
        <div class="grain"></div><div class="vig"></div>
        <div class="gate top">${gatesRow()}</div><div class="gate bot">${gatesRow()}</div>
        <div class="gathering">
          <span class="em">${sv(I.spark,1.6)}</span>
          <div class="gt2">${esc(L.gatherTitle(nm2))}<em>${esc(L.gatherStill)}</em>.</div>
          <div class="gs2">${esc(L.gatherSub)}</div>
          <span class="waitchip"><span class="sp"></span><span>${esc(L.waitKeeper)}</span></span>
        </div>
      </div>
      ${kindleSpine()}
      <button class="primary violetbtn" data-act="go-add">${sv(I.plus,1.8)} ${esc(L.addMemory(nm2))}</button>
      <button class="ghostbtn" data-act="go-add">${sv(I.camera,1.8)} ${esc(L.tagPhoto(nm2))}</button>
      <div class="foot"><div class="l">${esc(footL)}</div></div>`;
    if(tagged[0]){ const im=$('#heroIm'); signedUrl(tagged[0].storage_path).then(u=>{ if(u&&im) im.innerHTML=`<img src="${u}" alt="">`; }); }
  }

  /* ---------- fill real photos after render ---------- */
  async function fillMedia(){
    // portrait avatar
    const av=$('#whoAv'); if(av){ const p=person.primary_asset||(tagged[0]&&tagged[0].storage_path); if(p){ const u=await signedUrl(p); if(u&&$('#whoAv')) $('#whoAv').innerHTML=`<img src="${u}" alt="">`; } }
    if(state.view!=='play') return;
    const s=scenes[state.idx]; const im=$('#heroIm');
    if(s&&s.photo&&im){ const u=await signedUrl(s.photo); if(u&&$('#heroIm')) $('#heroIm').innerHTML=`<img src="${u}" alt="">`; }
    // scrubber thumbs
    $$('.thumb .thumbim[data-scene]').forEach(async el=>{ const i=+el.getAttribute('data-scene'); const sc=scenes[i]; if(!sc||!sc.photo) return; const u=await signedUrl(sc.photo); if(u) el.innerHTML=`<img src="${u}" alt="">`; });
  }

  /* ---------- transport / autoplay ---------- */
  function syncTimer(){ if(timer){ clearInterval(timer); timer=null; }
    if(state.view==='play' && state.playing && !reduceMotion && scenes.length>1){
      timer=setInterval(()=>{ advance(1,true); }, 5200);
    } }
  function advance(dir,auto){
    const next=state.idx+dir;
    if(next>=scenes.length){ if(auto||dir>0){ state.view='end'; state.playing=false; render(); return; } }
    if(next<0) return;
    if(next>=scenes.length) return;
    state.idx=next; render();
  }
  function seek(i){ if(i<0||i>=scenes.length) return; state.idx=i; state.view='play'; render(); }

  /* ---------- language ---------- */
  function toggleLang(){ const m=$('.langmenu'); if(!m) return;
    if(!m.hidden){ m.hidden=true; return; }
    const L=d(); m.innerHTML=LANGS.map(k=>`<button data-lang="${k}" class="${k===state.lang?'on':''}"><span><span class="native">${esc(T[k].native)}</span><span class="en">${esc(T[k].label)}</span></span><span class="tick">${sv(I.check,2)}</span></button>`).join('');
    m.hidden=false;
    m.querySelectorAll('[data-lang]').forEach(b=>b.onclick=async()=>{ state.lang=b.dataset.lang; m.hidden=true;
      try{localStorage.setItem('lf_lang',state.lang);}catch(e){}
      if(user){ try{ await sb.from('profiles').update({preferred_lang:state.lang}).eq('id',user.id); }catch(e){} }
      LIT=computeLit(); buildScenes(); render(); });
  }
  window.__lfClose=()=>{ const m=$('.langmenu'); if(m&&!m.hidden){ m.hidden=true; return true; } return false; };

  /* ---------- wiring ---------- */
  function wire(){ const root=$('#dev');
    root.addEventListener('click', e=>{
      const om=e.target.closest('[data-act="open-moment"]'); if(om){ const aid=om.getAttribute('data-art'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); return; }
      const seekEl=e.target.closest('[data-seek]'); if(seekEl){ seek(+seekEl.getAttribute('data-seek')); return; }
      const a=e.target.closest('[data-act]'); if(!a) return; const act=a.dataset.act;
      const m=$('.langmenu'); if(m&&!m.hidden&&act!=='lang') m.hidden=true;
      if(act==='back'){ if(history.length>1) history.back(); else location.href='person-real.html'+(person&&person.id?('?id='+encodeURIComponent(person.id)):''); return; }
      if(act==='lang'){ toggleLang(); return; }
      if(act==='prev'){ advance(-1,false); return; }
      if(act==='next'){ advance(1,false); return; }
      if(act==='playpause'){ state.playing=!state.playing; render(); return; }
      if(act==='replay'){ state.view='play'; state.idx=0; state.playing=!reduceMotion; render(); return; }
      if(act==='go-add'){ location.href='person-real.html'+(person&&person.id?('?id='+encodeURIComponent(person.id)):''); return; }
    });
    document.addEventListener('click', e=>{ const m=$('.langmenu'); if(m&&!m.hidden&&!e.target.closest('.langmenu')&&!e.target.closest('[data-act="lang"]')) m.hidden=true; });
    root.addEventListener('keydown', e=>{ if(e.key!=='Enter'&&e.key!==' ') return; const om=e.target.closest&&e.target.closest('[data-act="open-moment"]'); if(om){ e.preventDefault(); const aid=om.getAttribute('data-art'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); } });
  }

  /* ---------- gate + boot ---------- */
  function showGate(){ const L=d(); let g=$('#gate'); if(!g){ g=document.createElement('div'); g.id='gate'; g.className='gate-auth'; $('#dev').appendChild(g); }
    g.innerHTML=`<div class="box">
      <h3>${esc(L.eyebrow)}</h3>
      <div class="sub">${esc(L.keeper)}</div>
      <input id="gEmail" type="email" placeholder="you@example.com" autocomplete="username">
      <input id="gPass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button id="gBtn" class="primary" style="margin-top:2px">${esc(L.signin)}</button>
      <div id="gErr" class="err"></div></div>`;
    $('#gBtn').onclick=async()=>{ const {error}=await sb.auth.signInWithPassword({email:$('#gEmail').value.trim(),password:$('#gPass').value}); if(error){ $('#gErr').textContent=error.message; return; } g.remove(); boot(); };
  }
  async function boot(){ const {data:{session}}=await sb.auth.getSession();
    const stored=localStorage.getItem('lf_lang'); if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    if(!session){ renderTop(); showGate(); return; }
    user=session.user;
    try{ const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang').eq('id',user.id).maybeSingle();
      if(pr){ state.keeper=!!pr.is_keeper; if(state.keeper){ window.__lfKeeper=true; try{document.dispatchEvent(new Event('lf-keeper-ready'));}catch(e){} }
        if(pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; } }catch(e){}
    await loadData(); buildNames(); LIT=computeLit(); buildScenes(); render();
  }
  wire(); boot();
})();
</script>
<script src="lf-nav.js" data-here="" data-parent="person-real.html"></script>
</body></html>
