<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Living Forest — contribute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff; --leaf:#8fd6a0; --autotr:#9a8bbd; --coral:#ff8a80;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center; gap:40px; padding:34px 20px 90px;
    background:radial-gradient(150% 100% at 50% -6%, #1a1330 0%, #0c0e22 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; flex-wrap:wrap; position:relative; overflow-x:hidden; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .screen[dir="rtl"]{ direction:rtl; }
  .screen[dir="rtl"] .serif,.screen[dir="rtl"] .big,.screen[dir="rtl"] .bigfield input,.screen[dir="rtl"] .gh2{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* ===== ALIVE : page-wide drifting colour behind the device ===== */
  .pageatmo{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .pageatmo span{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; mix-blend-mode:screen; }
  .pageatmo .p1{ width:46vw; height:46vw; left:-8vw; top:-10vh; background:radial-gradient(circle, rgba(243,205,132,.55), transparent 66%); animation:auraDrift 40s ease-in-out infinite; }
  .pageatmo .p2{ width:44vw; height:44vw; right:-10vw; top:8vh; background:radial-gradient(circle, rgba(201,162,255,.6), transparent 66%); animation:auraDrift2 48s ease-in-out infinite; }
  .pageatmo .p3{ width:52vw; height:52vw; left:24vw; bottom:-24vh; background:radial-gradient(circle, rgba(255,138,128,.42), transparent 66%); animation:auraDrift 56s ease-in-out infinite reverse; }
  .stagewrap{ position:relative; z-index:2; }

  .stagewrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .device{ position:relative; width:390px; height:820px; max-height:calc(100dvh - 40px); border-radius:42px; overflow:hidden; flex:0 0 auto;
    background:#04070e; box-shadow:0 40px 120px -50px #000, 0 0 0 9px #14141b, 0 0 0 10px #2b2b34; }

  /* ===== ALIVE : in-device atmosphere — rising candle-glow embers + warm aurora ===== */
  .atmo{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .aur{ position:absolute; border-radius:50%; filter:blur(46px); opacity:.6; mix-blend-mode:screen; }
  .aur.a1{ width:300px; height:300px; left:-70px; top:-46px; background:radial-gradient(circle, rgba(243,205,132,.92), transparent 68%); animation:auraDrift 22s ease-in-out infinite; }
  .aur.a2{ width:340px; height:340px; right:-96px; top:150px; background:radial-gradient(circle, rgba(201,162,255,.9), transparent 66%); animation:auraDrift2 27s ease-in-out infinite; }
  .aur.a3{ width:290px; height:290px; left:-44px; bottom:-56px; background:radial-gradient(circle, rgba(255,138,128,.78), transparent 66%); animation:auraDrift 31s ease-in-out infinite reverse; }
  .embers{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:.9;
    background:
      radial-gradient(1.6px 1.6px at 18% 20%, #ffe6adcc, transparent 60%),
      radial-gradient(2px 2px at 72% 42%, #ffd0a0bb, transparent 60%),
      radial-gradient(1.5px 1.5px at 40% 68%, #ddc6ffcc, transparent 60%),
      radial-gradient(2px 2px at 86% 82%, #ff8a80aa, transparent 60%),
      radial-gradient(1.5px 1.5px at 30% 92%, #ffe6adaa, transparent 60%),
      radial-gradient(1.5px 1.5px at 58% 12%, #cfe0ffaa, transparent 60%),
      radial-gradient(1.4px 1.4px at 8% 54%, #ffe6ad99, transparent 60%);
    background-size:100% 380px; background-repeat:repeat;
    -webkit-mask:linear-gradient(to top, transparent, #000 16%, #000 74%, transparent);
            mask:linear-gradient(to top, transparent, #000 16%, #000 74%, transparent);
    animation:emberScroll 15s linear infinite; }
  .stars{ position:absolute; inset:0; z-index:0; opacity:.55; animation:twinkle 7s ease-in-out infinite;
    background-image:radial-gradient(1px 1px at 18% 12%, #cfe0ff88, transparent), radial-gradient(1px 1px at 66% 7%, #cfe0ff66, transparent),
      radial-gradient(1px 1px at 84% 26%, #ffe6ad55, transparent), radial-gradient(1px 1px at 30% 40%, #cfe0ff44, transparent),
      radial-gradient(1px 1px at 10% 58%, #cfe0ff44, transparent), radial-gradient(1px 1px at 88% 62%, #cfe0ff44, transparent); }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 70% at 50% 6%, rgba(143,214,160,.05), transparent 42%), radial-gradient(120% 92% at 50% 42%, transparent 26%, rgba(4,7,14,.62) 100%); }
  @keyframes auraDrift{ 0%{transform:translate(0,0) scale(1);} 50%{transform:translate(6%,-4%) scale(1.16);} 100%{transform:translate(0,0) scale(1);} }
  @keyframes auraDrift2{ 0%{transform:translate(0,0) scale(1.05);} 50%{transform:translate(-7%,5%) scale(1.24);} 100%{transform:translate(0,0) scale(1.05);} }
  @keyframes emberScroll{ from{ background-position:0 0; } to{ background-position:0 -380px; } }
  @keyframes twinkle{ 0%,100%{opacity:.4;} 50%{opacity:.72;} }

  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ padding:0 18px calc(40px + env(safe-area-inset-bottom)); }

  .topbar{ position:sticky; top:0; z-index:14; display:flex; align-items:center; gap:10px;
    padding:15px 16px 11px; background:linear-gradient(to bottom, rgba(7,9,22,.92), rgba(7,9,22,.5) 68%, transparent); backdrop-filter:blur(9px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--cream); transition:border-color .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); } .ibtn svg{ width:18px; height:18px; }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .screen[dir="rtl"] .ibtn svg{ transform:scaleX(-1); }
  .ttl{ flex:1; min-width:0; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }
  .langpill{ display:inline-flex; align-items:center; gap:6px; font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:8px 11px; border-radius:99px; cursor:pointer; border:1px solid var(--hair); background:rgba(12,16,34,.55); color:var(--muted); flex:0 0 auto; }

  .keeper-note{ display:flex; align-items:center; gap:9px; margin:2px 0 4px; padding:10px 13px; border-radius:12px; background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.3); backdrop-filter:blur(4px); }
  .keeper-note svg{ width:16px; height:16px; color:var(--edit); flex:0 0 auto; }
  .keeper-note span{ font-size:11.5px; color:#cbbce6; line-height:1.35; }

  .warm{ font-family:'Newsreader',serif; font-size:22px; line-height:1.3; color:#f6efe0; margin:12px 2px 4px; }
  .warm em{ font-style:italic; color:var(--gold-hi); }
  .warmsub{ font-size:13px; color:var(--muted); line-height:1.5; margin:0 2px 16px; }

  .ways{ display:flex; flex-direction:column; gap:12px; }
  .way{ display:flex; align-items:center; gap:14px; padding:16px; border-radius:18px; cursor:pointer; width:100%; text-align:start;
    background:rgba(11,15,32,.62); border:1px solid var(--hair); backdrop-filter:blur(6px); transition:border-color .2s, transform .2s; color:inherit; }
  .way:hover{ border-color:rgba(243,205,132,.42); transform:translateY(-1px); }
  .way:focus-visible{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .way .wi{ width:50px; height:50px; border-radius:14px; flex:0 0 auto; display:grid; place-items:center;
    background:rgba(243,205,132,.12); border:1px solid rgba(243,205,132,.3); color:var(--gold-hi); }
  .way .wi svg{ width:24px; height:24px; }
  .way .wt{ flex:1; min-width:0; }
  .way .wt .wn{ font-family:'Newsreader',serif; font-size:19px; color:#fbf5e8; line-height:1.1; }
  .way .wt .ws{ font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.4; }
  .way .arw{ color:var(--dim); flex:0 0 auto; } .way .arw svg{ width:18px; height:18px; }
  .screen[dir="rtl"] .way .arw{ transform:scaleX(-1); }
  .way .done{ font-family:'Azeret Mono',monospace; font-size:8px; letter-spacing:.14em; text-transform:uppercase; color:var(--leaf); padding:3px 8px; border-radius:99px; border:1px solid rgba(143,214,160,.4); background:rgba(143,214,160,.1); }
  .way.voice{ background:linear-gradient(120deg, rgba(201,162,255,.16), rgba(127,180,216,.06)); border-color:rgba(201,162,255,.36); box-shadow:0 0 30px -12px rgba(201,162,255,.6); animation:voiceGlow 4.5s ease-in-out infinite; }
  .way.voice .wi{ background:rgba(201,162,255,.16); border-color:rgba(201,162,255,.4); color:var(--edit-hi); }
  @keyframes voiceGlow{ 0%,100%{ box-shadow:0 0 26px -14px rgba(201,162,255,.5);} 50%{ box-shadow:0 0 42px -6px rgba(201,162,255,.8);} }
  .way .cnt{ font-family:'Azeret Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); padding:3px 8px; border-radius:99px; border:1px solid rgba(243,205,132,.36); background:rgba(243,205,132,.09); }

  .fieldlab{ display:block; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:18px 2px 8px; }
  .bigfield{ display:flex; align-items:center; gap:10px; padding:16px; border-radius:16px; background:rgba(10,12,28,.74); border:1px solid rgba(243,205,132,.5); box-shadow:0 0 26px -14px rgba(243,205,132,.6); }
  .bigfield input{ flex:1; min-width:0; background:none; border:none; outline:none; color:var(--cream); font-family:'Newsreader',serif; font-size:22px; }
  .bigfield input::placeholder{ color:#5f7089; }
  .enough{ display:flex; align-items:flex-start; gap:9px; margin:12px 2px 0; }
  .enough svg{ width:16px; height:16px; color:var(--leaf); flex:0 0 auto; margin-top:1px; }
  .enough p{ font-size:12.5px; color:#bfe0c8; line-height:1.5; } .enough p b{ color:var(--leaf); font-weight:600; }

  .gifts{ margin-top:18px; }
  .gifts .gt{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:0 2px 10px; }
  .gift{ display:flex; align-items:center; gap:12px; width:100%; padding:13px 14px; border-radius:13px; cursor:pointer;
    background:transparent; border:1px dashed var(--hair); color:var(--muted); margin-bottom:9px; text-align:start; }
  .gift:hover{ border-color:rgba(243,205,132,.4); color:var(--cream); }
  .gift.open{ border-style:solid; border-color:rgba(201,162,255,.4); background:rgba(201,162,255,.06); color:var(--cream); }
  .gift .gi{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; flex:0 0 auto; background:rgba(255,255,255,.04); color:var(--dim); }
  .gift .gi svg{ width:16px; height:16px; }
  .gift .gn{ flex:1; font-family:'Newsreader',serif; font-size:15px; color:var(--cream); }
  .gift .plus{ color:var(--dim); } .gift .plus svg{ width:16px; height:16px; }
  .screen[dir="rtl"] .gift.open .plus{ transform:rotate(45deg); }
  .giftin{ margin:-4px 2px 12px; }
  .giftin input{ width:100%; background:rgba(10,12,28,.7); border:1px solid rgba(201,162,255,.34); border-radius:11px; padding:12px 13px;
    color:var(--cream); font-family:'Newsreader',serif; font-size:16px; outline:none; }
  .giftin input::placeholder{ color:#5f7089; }

  .primary{ display:flex; align-items:center; justify-content:center; gap:9px; width:100%; margin-top:20px; padding:15px; border-radius:14px; cursor:pointer;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold)); color:#1a1206; font-weight:600; font-size:15px; border:none; box-shadow:0 10px 34px -14px rgba(243,205,132,.8); }
  .primary:disabled{ opacity:.55; cursor:default; }
  .primary svg{ width:17px; height:17px; }
  .violetbtn{ background:linear-gradient(180deg,var(--edit-hi),var(--edit)); color:#1a0f2e; box-shadow:0 10px 34px -14px rgba(201,162,255,.8); }
  .spin{ width:15px; height:15px; border-radius:50%; border:2px solid rgba(26,18,6,.35); border-top-color:#1a1206; animation:spin 1s linear infinite; }

  .aboutchip{ display:inline-flex; align-items:center; gap:8px; margin:6px 2px 0; padding:8px 13px; border-radius:99px; background:rgba(243,205,132,.09); border:1px solid rgba(243,205,132,.3); }
  .aboutchip .av{ width:24px; height:24px; border-radius:50%; overflow:hidden; flex:0 0 auto; } .aboutchip .av svg{ width:100%; height:100%; }
  .aboutchip .txt{ font-size:12px; color:var(--cream); } .aboutchip .txt b{ font-family:'Newsreader',serif; }
  .prompt{ margin-top:16px; padding:20px; border-radius:18px; background:linear-gradient(160deg, rgba(201,162,255,.16), rgba(11,15,32,.6)); border:1px solid rgba(201,162,255,.3); text-align:center; backdrop-filter:blur(6px); }
  .prompt .pk{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--edit-hi); }
  .prompt .pq{ font-family:'Newsreader',serif; font-style:italic; font-weight:300; font-size:22px; line-height:1.35; color:#f4ead4; margin-top:12px; }
  .prompt .pn{ font-size:12px; color:var(--muted); margin-top:14px; }
  .prompt .pn b{ color:var(--edit-hi); cursor:pointer; font-weight:600; }
  .recwrap{ margin-top:26px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .recbtn{ position:relative; width:96px; height:96px; border-radius:50%; display:grid; place-items:center; cursor:pointer; border:1.5px solid rgba(201,162,255,.55);
    background:radial-gradient(circle at 42% 34%, rgba(201,162,255,.32), rgba(201,162,255,.1));
    animation:recGlow 3.4s ease-in-out infinite; }
  .recbtn::before{ content:""; position:absolute; inset:-16px; border-radius:50%; border:1px solid rgba(201,162,255,.4); animation:recRing 3.4s ease-out infinite; }
  .recbtn .core{ width:34px; height:34px; border-radius:50%; background:linear-gradient(180deg,var(--edit-hi),var(--edit)); box-shadow:0 0 16px rgba(201,162,255,.7); animation:corePulse 3.4s ease-in-out infinite; }
  .recbtn.live{ border-color:rgba(255,138,128,.8); }
  .recbtn.live .core{ width:30px; height:30px; border-radius:7px; background:linear-gradient(180deg,#ffb3ac,var(--coral)); box-shadow:0 0 20px rgba(255,138,128,.8); }
  @keyframes recGlow{ 0%,100%{ box-shadow:0 0 40px -8px rgba(201,162,255,.6);} 50%{ box-shadow:0 0 68px 2px rgba(201,162,255,.9);} }
  @keyframes recRing{ 0%{ transform:scale(.86); opacity:.85;} 100%{ transform:scale(1.35); opacity:0;} }
  @keyframes corePulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.12);} }
  .recwrap .rl{ font-size:13px; color:var(--muted); text-align:center; line-height:1.5; }
  .recwrap .rl b{ color:var(--cream); }
  .recwrap audio{ width:100%; margin-top:4px; }
  .recact{ display:flex; gap:10px; width:100%; }
  .recact button{ flex:1; padding:12px; border-radius:12px; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit;
    background:rgba(12,16,34,.6); border:1px solid var(--hair); color:var(--cream); }
  .recact button.discard{ color:#ff9a8a; border-color:rgba(255,138,128,.3); }
  .reassure{ display:flex; align-items:center; gap:9px; margin-top:8px; padding:11px 14px; border-radius:12px; background:rgba(143,214,160,.07); border:1px solid rgba(143,214,160,.24); }
  .reassure svg{ width:15px; height:15px; color:var(--leaf); flex:0 0 auto; }
  .reassure span{ font-size:11.5px; color:#bfe0c8; line-height:1.4; }

  .gapshead{ font-family:'Newsreader',serif; font-size:19px; line-height:1.35; color:#f4ead4; margin:12px 2px 4px; }
  .gapshead em{ font-style:italic; color:var(--gold-hi); }
  .gapscount{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:0 2px 16px; display:inline-flex; align-items:center; gap:8px; }
  .gap{ display:flex; align-items:flex-start; gap:13px; padding:14px; border-radius:16px; cursor:pointer; margin-bottom:11px; width:100%; text-align:start; color:inherit;
    background:rgba(243,205,132,.05); border:1px dashed rgba(243,205,132,.3); backdrop-filter:blur(4px); transition:border-color .2s, transform .2s; }
  .gap:hover{ border-color:rgba(243,205,132,.55); transform:translateY(-1px); }
  .gap:focus-visible{ outline:2px solid var(--gold-hi); outline-offset:2px; }
  .gap .gt{ width:44px; height:44px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; overflow:hidden; background:rgba(14,18,38,.72); border:1px solid var(--hair); color:var(--gold-hi); }
  .gap .gt svg{ width:20px; height:20px; } .gap .gt .im{ width:100%; height:100%; } .gap .gt .im svg{ width:100%; height:100%; } .gap .gt img{ width:100%; height:100%; object-fit:cover; }
  .gap .gb{ flex:1; min-width:0; }
  .gap .gq{ font-family:'Newsreader',serif; font-size:16px; color:#f3e7cd; line-height:1.32; }
  .gap .gwho{ font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.4; }
  .gap .gwho b{ color:var(--gold); }
  .gap .gact{ display:inline-flex; align-items:center; gap:6px; margin-top:9px; font-size:12px; font-weight:600; color:var(--gold-hi); }
  .gap .gact svg{ width:14px; height:14px; }
  .screen[dir="rtl"] .gap .gact svg{ transform:scaleX(-1); }

  .almost{ margin-top:8px; padding:20px 16px; border-radius:18px; text-align:center; background:linear-gradient(160deg, rgba(143,214,160,.14), rgba(11,15,32,.5)); border:1px solid rgba(143,214,160,.3); }
  .almost .ac{ width:64px; height:64px; margin:0 auto 14px; border-radius:50%; display:grid; place-items:center; background:radial-gradient(circle at 42% 34%, rgba(143,214,160,.24), transparent 68%); border:1px solid rgba(143,214,160,.42); color:var(--leaf); animation:recGlow 5s ease-in-out infinite; }
  .almost .ac svg{ width:28px; height:28px; }
  .almost .at{ font-family:'Newsreader',serif; font-size:19px; line-height:1.35; color:#eaf6ec; }
  .almost .asub{ font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.5; }

  .receipt{ margin-top:20px; padding:22px 18px; border-radius:20px; text-align:center; background:linear-gradient(160deg, rgba(201,162,255,.18), rgba(11,15,32,.55)); border:1px solid rgba(201,162,255,.38); backdrop-filter:blur(6px); }
  .receipt .rc{ width:72px; height:72px; margin:0 auto 16px; border-radius:50%; display:grid; place-items:center; background:radial-gradient(circle at 42% 34%, rgba(201,162,255,.32), transparent 68%); border:1px solid rgba(201,162,255,.55); color:var(--edit-hi); animation:recGlow 4s ease-in-out infinite; }
  .receipt .rc svg{ width:32px; height:32px; }
  .receipt .rt{ font-family:'Newsreader',serif; font-size:23px; line-height:1.25; color:#f4ead4; }
  .receipt .rt em{ font-style:italic; color:var(--edit-hi); }
  .receipt .rsub{ font-size:13px; color:var(--muted); margin-top:10px; line-height:1.55; }
  .waitrow{ display:inline-flex; align-items:center; gap:9px; margin-top:16px; padding:9px 14px; border-radius:99px; background:rgba(201,162,255,.12); border:1px solid rgba(201,162,255,.42); }
  .waitrow .sp{ width:11px; height:11px; border-radius:50%; border:2px solid rgba(201,162,255,.35); border-top-color:var(--edit); animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .waitrow span{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--edit-hi); }
  .whatgave{ margin-top:18px; padding:13px 15px; border-radius:14px; background:rgba(11,15,32,.55); border:1px solid var(--hair); text-align:start; }
  .whatgave .wl{ font-family:'Azeret Mono',monospace; font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); }
  .whatgave .wv{ font-family:'Newsreader',serif; font-size:19px; color:#fbf5e8; margin-top:4px; }

  const t=k=>{ const o=T[state.lang]||T.en; return (o[k]!==undefined?o[k]:T.en[k]); };

  /* ---------- name-language detection ---------- */
  function detectLang(s){ if(/[֐-׿]/.test(s)) return 'he'; if(/[Ѐ-ӿ]/.test(s)) return 'ru'; return 'en'; }

  /* ---------- data ---------- */
  async function loadData(){
    try{ const {data}=await sb.from('people').select('id,display_name,called_name,sex,primary_asset,birth_date,is_living'); state.people=(data||[]).filter(p=>p.display_name); }catch(e){ state.people=[]; }
    try{ const {data}=await sb.from('relationships').select('id,from_person,to_person,kind'); state.rels=data||[]; }catch(e){ state.rels=[]; }
    try{ const {data}=await sb.from('artefacts').select('id,kind,storage_path,metadata,contributor_id,status').eq('status','published'); state.arts=data||[]; }catch(e){ state.arts=[]; }
    buildGaps(); buildPairs();
  }
  const nameOf=id=>{ const p=state.people.find(x=>x.id===id); return p?(p.display_name||t('unnamed')):t('unnamed'); };

  /* ---------- gaps engine (computed from live data — never hard-coded) ---------- */
  function buildGaps(){
    const g=[];
    // 1. people with no portrait
    state.people.filter(p=>!p.primary_asset).slice(0,6).forEach(p=>{
      g.push({ type:'face', pid:p.id, name:p.display_name });
    });
    // 2. published photos with no place recorded
    state.arts.filter(a=>a.kind==='photo'&&a.storage_path&&!(a.metadata&&a.metadata.where)).slice(0,4).forEach(a=>{
      g.push({ type:'where', aid:a.id, when:(a.metadata&&a.metadata.when)||'', path:a.storage_path });
    });
    // 3. artefacts with no teller (contributor_id)
    state.arts.filter(a=>a.storage_path&&!a.contributor_id).slice(0,4).forEach(a=>{
      g.push({ type:'tell', aid:a.id });
    });
    // 4. people with no birth date
    state.people.filter(p=>!p.birth_date).slice(0,4).forEach(p=>{
      g.push({ type:'born', pid:p.id, name:p.display_name });
    });
    state.gaps=g;
  }

  /* ---------- voice-prompt engine (built from real relationships/people) ---------- */
  const Q=[ (a,b)=>a+' — tell me about the first time you met '+b+'.',
            (a,b)=>a+', what do you remember most about '+b+'?',
            (a,b)=>a+' — tell me about '+b+' when they were young.',
            (a,b)=>a+', what would '+b+' always say?',
            (a,b)=>a+' — where were you and '+b+' happiest together?' ];
  const Qru=[ (a,b)=>a+' — расскажите о первой встрече с '+b+'.',
              (a,b)=>a+', что вы помните о '+b+' ярче всего?',
              (a,b)=>a+' — расскажите о '+b+' в молодости.',
              (a,b)=>a+', что всегда говорил(а) '+b+'?',
              (a,b)=>a+' — где вам с '+b+' было счастливее всего?' ];
  const Qhe=[ (a,b)=>a+' — ספרו לי על הפעם הראשונה שפגשתם את '+b+'.',
              (a,b)=>a+', מה אתם זוכרים יותר מכול על '+b+'?',
              (a,b)=>a+' — ספרו על '+b+' כשהיו צעירים.',
              (a,b)=>a+', מה '+b+' תמיד היו אומרים?',
              (a,b)=>a+' — איפה הייתם ו'+b+' המאושרים ביותר יחד?' ];
  function buildPairs(){
    const pairs=[]; const seen=new Set();
    state.rels.forEach(r=>{ const a=state.people.find(x=>x.id===r.from_person), b=state.people.find(x=>x.id===r.to_person);
      if(a&&b){ const k=a.id+'>'+b.id; if(!seen.has(k)){ seen.add(k); pairs.push({teller:a,subject:b}); } } });
    // fallback: any two distinct people so the engine still yields prompts as data grows
    if(pairs.length<3){ const P=state.people.slice(0,8);
      for(let i=0;i<P.length&&pairs.length<8;i++){ for(let j=0;j<P.length&&pairs.length<8;j++){ if(i!==j){ const k=P[i].id+'>'+P[j].id; if(!seen.has(k)){ seen.add(k); pairs.push({teller:P[i],subject:P[j]}); } } } } }
    // shuffle by index rotation (no Math.random needed for correctness)
    state.pairs=pairs; state.pairIdx=0;
  }
  function currentPrompt(){
    if(!state.pairs.length) return null;
    const p=state.pairs[state.pairIdx%state.pairs.length];
    const bank=state.lang==='ru'?Qru:state.lang==='he'?Qhe:Q;
    const q=bank[state.pairIdx%bank.length](p.teller.display_name,p.subject.display_name);
    return { teller:p.teller, subject:p.subject, q };
  }

    else { icon=IC.pindot; q=t('gapBornQ')(g.name); who=t('gapBornW'); act=t('gapBornA'); go='person-real.html?id='+g.pid; }

  function render(){
    const sc=$('#screen'); const o=T[state.lang]||T.en;
    sc.setAttribute('dir',o.dir); document.documentElement.setAttribute('dir',o.dir); document.documentElement.setAttribute('lang',state.lang);
    let html;
    if(state.screen==='receipt') html=screenReceipt();
    else if(state.screen==='propose') html=screenPropose();
    else if(state.screen==='voice') html=screenVoice();
    else if(state.screen==='gaps') html=screenGaps();
    else html=screenHub();
    sc.innerHTML=html; sc.scrollTop=0; wire();
  }

  /* ================= WIRE ================= */
  function go(scr){ state.msg=''; state.screen=scr; if(scr!=='receipt') state.receipt=null; render(); }
  function cycleLang(){ const order=['en','ru','he']; state.lang=order[(order.indexOf(state.lang)+1)%3];
    try{ localStorage.setItem('lf_lang',state.lang); }catch(e){}
    if(user){ sb.from('profiles').update({preferred_lang:state.lang}).eq('id',user.id).then(()=>{},()=>{}); }
    render(); }

  function wire(){
    const back=$('#back'); if(back) back.onclick=()=>{ if(state.screen==='hub'){ if(history.length>1) history.back(); else location.href='index.html'; } else go('hub'); };
    const lang=$('#lang'); if(lang) lang.onclick=cycleLang;
    document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.getAttribute('data-go')));
    document.querySelectorAll('[data-href]').forEach(b=>b.onclick=()=>{ location.href=b.getAttribute('data-href'); });

    if(state.screen==='propose') wirePropose();
    if(state.screen==='voice') wireVoice();
    if(state.screen==='receipt'){ const a=$('#again'); if(a) a.onclick=()=>{ state.propose={name:'',open:{},gifts:{}}; go('hub'); }; }
  }

  function wirePropose(){
    const nameIn=$('#pname');
    if(nameIn){ nameIn.oninput=()=>{ const was=!!state.propose.name.trim(), now=!!nameIn.value.trim();
        state.propose.name=nameIn.value;
        const btn=$('#sendPerson'); if(btn){ btn.disabled=!now; btn.lastChild.textContent=' '+t('sendPerson')(nameIn.value.trim()); }
        if(was!==now){ const pos=nameIn.selectionStart; render(); const ni=$('#pname'); if(ni){ ni.focus(); try{ ni.setSelectionRange(pos,pos); }catch(e){} } }
      };
    }
    document.querySelectorAll('[data-gift]').forEach(b=>b.onclick=()=>{ const k=b.getAttribute('data-gift'); state.propose.open[k]=!state.propose.open[k]; if(state.propose.name.trim()) state.propose.name=$('#pname')?$('#pname').value:state.propose.name; render(); const gi=document.querySelector('[data-giftin="'+k+'"]'); if(gi) gi.focus(); });
    document.querySelectorAll('[data-giftin]').forEach(inp=>inp.oninput=()=>{ state.propose.gifts[inp.getAttribute('data-giftin')]=inp.value; });
    const send=$('#sendPerson'); if(send) send.onclick=submitPerson;
  }

  async function submitPerson(){
    const nm=state.propose.name.trim(); if(!nm||!user) return;
    const btn=$('#sendPerson'); btn.disabled=true; const label=btn.lastChild; const prev=label?label.textContent:'';
    if(label) label.textContent=''; btn.insertBefore(mkSpin(),btn.firstChild);
    state.msg='';
    try{
      const pid=uuid(); const lang=detectLang(nm);
      // gated container: a proposed person waits for the keeper (status in_review)
      const {error:pe}=await sb.from('people').insert({ id:pid, display_name:nm, created_by:user.id, status:'in_review' });
      if(pe) throw pe;
      // per-field suggestions — each its own row, each independently approvable (Rule 3)
      const rows=[{ field:'given', lang, value:nm }];
      const g=state.propose.gifts;
      if(g.alt&&g.alt.trim()) rows.push({ field:'given', lang:detectLang(g.alt.trim()), value:g.alt.trim() });
      if(g.called&&g.called.trim()) rows.push({ field:'called', lang, value:g.called.trim() });
      if(g.when&&g.when.trim()) rows.push({ field:'birth', lang:'und', value:g.when.trim() });
      if(g.kin&&g.kin.trim()) rows.push({ field:'kin', lang:'und', value:g.kin.trim() });
      const facts=rows.map((r,i)=>({ person_id:pid, group_id:uuid(), field:r.field, lang:r.lang, value:r.value, ord:i, status:'in_review', created_by:user.id }));
      const {error:fe}=await sb.from('person_facts').insert(facts);
      if(fe) throw fe;
      const extras=[]; if(g.called&&g.called.trim()) extras.push(g.called.trim()); if(g.kin&&g.kin.trim()) extras.push(g.kin.trim());
      state.receipt={ kind:'person', name:nm, gave:nm+(extras.length?' · '+extras.join(' · '):'') };
      state.propose={ name:'', open:{}, gifts:{} };
      go('receipt');
    }catch(err){ state.msg=t('errSend'); render(); }
  }
  function mkSpin(){ const s=document.createElement('span'); s.className='spin'; return s; }

  /* ---------- voice ---------- */
  function wireVoice(){
    const another=$('#another'); if(another) another.onclick=()=>{ state.pairIdx++; render(); };
    const recbtn=$('#recbtn'); if(recbtn) recbtn.onclick=toggleRec;
    const dis=$('#discard'); if(dis) dis.onclick=resetRec;
    const rr=$('#rerecord'); if(rr) rr.onclick=()=>{ resetRec(); setTimeout(toggleRec,60); };
    const sv=$('#sendVoice'); if(sv) sv.onclick=submitVoice;
  }
  function resetRec(){ const r=state.rec; if(r.url){ try{ URL.revokeObjectURL(r.url); }catch(e){} } state.rec={ status:'idle', blob:null, url:'', rec:null, chunks:[] }; state.msg=''; render(); }
  async function toggleRec(){
    const r=state.rec;
    if(r.status==='recording'){ try{ r.rec.stop(); }catch(e){} return; }
    if(!navigator.mediaDevices||!window.MediaRecorder){ state.msg=t('recPerm'); render(); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream); state.rec.rec=mr; state.rec.chunks=[];
      mr.ondataavailable=e=>{ if(e.data&&e.data.size) state.rec.chunks.push(e.data); };
      mr.onstop=()=>{ stream.getTracks().forEach(tk=>tk.stop());
        const blob=new Blob(state.rec.chunks,{type:mr.mimeType||'audio/webm'});
        state.rec.blob=blob; state.rec.url=URL.createObjectURL(blob); state.rec.status='recorded'; render(); };
      mr.start(); state.rec.status='recording'; state.msg=''; render();
    }catch(e){ state.msg=t('recPerm'); render(); }
  }
  async function submitVoice(){
    const r=state.rec; const pr=currentPrompt(); if(!r.blob||!pr||!user) return;
    state.rec.status='sending'; state.msg=''; render();
    try{
      const ext=(r.blob.type&&r.blob.type.indexOf('ogg')>-1)?'ogg':'webm';
      const path=user.id+'/'+uuid()+'.'+ext;
      const up=await sb.storage.from('family').upload(path,r.blob,{contentType:r.blob.type||'audio/webm'});
      if(up.error) throw up.error;
      const {data:art,error:ae}=await sb.from('artefacts').insert({
        kind:'voice', storage_path:path, body:null,
        contributor_user:user.id,          // who uploaded (account)
        contributor_id:pr.teller.id,        // who told it (person) — Rule 6
        status:'in_review',
        metadata:{ about:pr.subject.display_name, prompt:pr.q }
      }).select('id').single();
      if(ae) throw ae;
      try{ await sb.from('artefact_subjects').insert({ artefact_id:art.id, person_id:pr.subject.id, detail:null }); }catch(e){}
      state.receipt={ kind:'voice', gave:pr.teller.display_name+' → '+pr.subject.display_name };
      resetRecSilent();
      go('receipt');
    }catch(err){ state.rec.status='recorded'; state.msg=t('errSend'); render(); }
  }
  function resetRecSilent(){ const r=state.rec; if(r.url){ try{ URL.revokeObjectURL(r.url); }catch(e){} } state.rec={ status:'idle', blob:null, url:'', rec:null, chunks:[] }; }

  /* ---------- overlay close hook for lf-nav ---------- */
  window.__lfClose=()=>{ if(state.screen!=='hub'){ go('hub'); return true; } return false; };

  /* ================= BOOT ================= */
  async function boot(){
    const stored=(function(){ try{ return localStorage.getItem('lf_lang'); }catch(e){ return null; } })();
    if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.replace('index.html'); return; }
    user=session.user;
    try{ const {data:pr}=await sb.from('profiles').select('preferred_lang').eq('id',user.id).maybeSingle(); if(pr&&pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; }catch(e){}
    await loadData();
    render();
  }
  boot();
})();
</script>
<script src="lf-nav.js" data-here="add" data-parent="index.html"></script>
</body></html>
