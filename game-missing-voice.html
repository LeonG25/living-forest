  /* full-viewport page (drop the mock device frame) */

      lockBody:'Этой игре нужно хотя бы <em>двое</em> людей, рассказавших воспоминание. Сейчас каждое воспоминание здесь несёт один голос.',
      told:n=>`${n} воспоминаний рассказано`, vtag:n=>`${n} голос`,
      record:'Записать воспоминание другим голосом',
      lockFoot:'Как только второй родственник расскажет своё,<br>игра проснётся сама.',
      errK:'Что-то запуталось', errH:'Голоса недоступны', errB:'Игра не смогла собрать воспоминания сейчас. Попробуйте ещё раз.', retry:'Ещё раз',
      langtitle:'Язык', langsub:'Заголовки, вопросы и вся игра — на выбранном языке.' },
    he:{ dir:'rtl', native:'עברית', label:'Hebrew',
      tk:'סיפור · משחק', tn:'הקול החסר',
      listen:'הקשיבו',
      htK:'אדם סיפר את זה', htN:'של מי הקול הזה?',
      qQ:'מי מספר את זה?', qS:'קראו את המילים — ואז בחרו את הקול.',
      hint:'אין דרך שגויה לזכור — יש רק קול שצריך למצוא.',
      revEye:'הקול היה שלו', toldBy:'סופר על־ידי',
      revOne:name=>`אחד הקולות ששומרים את זיכרון המשפחה הזו.`,
      revN:(name,n)=>`סיפר/ה <b>${n}</b> מהזיכרונות השמורים כאן.`,
      next:'הזיכרון הבא', whole:'קראו את כל הסיפור',
      lockK:'המשחק ישן', lockH:'עדיין אין מספיק קולות',
      lockBody:'המשחק הזה צריך לפחות <em>שני</em> אנשים שסיפרו זיכרון. כרגע כל זיכרון כאן נישא בקול אחד בלבד.',
      told:n=>`${n} זיכרונות סופרו`, vtag:n=>`${n} קול`,
      record:'הקליטו זיכרון בקול אחר',
      lockFoot:'ברגע שקרוב שני יספר את שלו,<br>המשחק יתעורר מעצמו.',
      errK:'משהו הסתבך', errH:'הקולות מחוץ להישג', errB:'המשחק לא הצליח לאסוף את הזיכרונות כרגע. נסו שוב בעוד רגע.', retry:'נסו שוב',
      langtitle:'שפה', langsub:'הכותרות, השאלות וכל המשחק — לפי השפה שתבחרו.' }
  };
  const d=()=>T[state.lang];

  const I={
    back:'M15 18l-6-6 6-6', backR:'M9 18l6-6-6-6',
    cal:'<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>',
    pin:'<path d="M12 21s-6-5.7-6-10a6 6 0 1112 0c0 4.3-6 10-6 10z"/><circle cx="12" cy="11" r="2"/>',
    mic:'<path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3z"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4M9 21h6"/>',
    check:'<path d="M20 6L9 17l-5-5"/>', x:'<path d="M6 6l12 12M18 6L6 18"/>',
    warn:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 4.3 2.5 18a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/>'
  };
  const sv=(p,w)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||1.6}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

  /* ---------- state ---------- */
  const state={ lang:'en', seed:null, round:null, voices:[], streak:0, done:false, firstTry:true, streakShown:false };

  /* ---------- data-driven voice census (for the locked state + reveal) ---------- */
  async function loadVoices(){
    try{
      const {data:arts,error}=await sb.from('artefacts').select('id,body,contributor_id,status').eq('status','published');
      if(error||!arts) return [];
      const tally={};
      arts.forEach(a=>{ const body=(a.body!=null?String(a.body).trim():''); if(a.contributor_id && body.length>0) tally[a.contributor_id]=(tally[a.contributor_id]||0)+1; });
      const ids=Object.keys(tally); if(!ids.length) return [];
      let names={};
      try{ const {data:pp}=await sb.from('people').select('id,display_name,called_name').in('id',ids); (pp||[]).forEach(p=>{ names[p.id]=(p.display_name&&p.display_name.trim())||(p.called_name&&p.called_name.trim())||''; }); }catch(e){}
      return ids.map(id=>({ id, name:names[id]||'', count:tally[id] })).sort((a,b)=>b.count-a.count);
    }catch(e){ return []; }
  }
  function voiceCount(id){ const v=state.voices.find(x=>x.id===id); return v?v.count:0; }

  /* ---------- fetch the shown memory's when/where for the meta chips (dynamic) ---------- */
  async function memoryMeta(artefactId){
    if(!artefactId) return {};
    try{ const {data}=await sb.from('artefacts').select('metadata').eq('id',artefactId).maybeSingle();
      const m=(data&&data.metadata)||{}; return { when:m.when!=null?String(m.when).trim():'', where:m.where!=null?String(m.where).trim():'' };
    }catch(e){ return {}; }
  }

  /* ---------- seed ---------- */
  function freshSeed(){ try{ if(window.crypto&&crypto.getRandomValues){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0]>>>0; } }catch(e){} return (Math.floor(Math.random()*0x7fffffff))>>>0; }

  /* ---------- state switching ---------- */
  function show(which){ ['play','locked','error'].forEach(s=>{ $('#'+s).style.display = s===which?'block':'none'; }); }

  /* ---------- chrome (topbar + dir) ---------- */
  function paintChrome(){ const L=d();
    document.documentElement.lang=state.lang; document.documentElement.dir=L.dir;
    $('#screen').setAttribute('dir',L.dir); $('#screen').setAttribute('lang',state.lang);
    $$('[data-t]').forEach(el=>{ el.textContent=L[el.getAttribute('data-t')]; });
    $('.backarrow').setAttribute('d', L.dir==='rtl'?I.backR:I.back);
    const st=$('#streak'); st.hidden=!state.streakShown; $('#streakN').textContent='×'+Math.max(1,state.streak);
  }

  /* ---------- PLAY ---------- */
  function renderPlay(round, meta){
    const L=d();
    const chips=[];
    if(meta&&meta.when) chips.push(`<span class="mchip">${sv(I.cal)}${esc(meta.when)}</span>`);
    if(meta&&meta.where) chips.push(`<span class="mchip">${sv(I.pin)}${esc(meta.where)}</span>`);
    const rows=round.options.map((o,i)=>`
      <button class="teller" type="button" data-i="${i}" data-id="${esc(o.id)}">
        <div class="av ${AV[i%AV.length]}"><i></i></div>
        <div class="tn"><div class="nm serif">${esc(o.label||'—')}</div></div>
        <div class="mk" data-right>${sv(I.check,2.4)}</div>
        <div class="mk" data-wrong>${sv(I.x,2.2)}</div>
      </button>`).join('');
    $('#play').innerHTML=`
      <div class="eye mono">${esc(L.listen)}</div>
      <div class="memwrap">
        <div class="quote">“</div>
        <div class="memcard">
          <div class="words">${esc(round.prompt&&round.prompt.memory_text||'')}</div>
          ${chips.length?`<div class="meta">${chips.join('')}</div>`:''}
        </div>
      </div>
      <div class="hidden-teller">
        <div class="htface"><div class="fog"></div><div class="qm">?</div></div>
        <div class="htt"><div class="k"><span class="flame"></span>${esc(L.htK)}</div><div class="n serif">${esc(L.htN)}</div></div>
      </div>
      <div class="qhead"><div class="q serif">${esc(L.qQ)}</div><div class="qs">${esc(L.qS)}</div></div>
      <div class="tellers" id="tellers">${rows}</div>
      <div class="hintbar">${esc(L.hint)}</div>
      <div class="reveal" id="reveal"></div>`;
    // each option shows only the correct/incorrect mark, never before a guess
    $$('#tellers [data-wrong]').forEach(m=>m.style.display='none');
    $$('#tellers [data-right]').forEach(m=>m.style.display='none');
  }

  function renderReveal(round){
    const L=d();
    const correct=round.options[round.answer_index]||{};
    const n=voiceCount(round.answer_id);
    const line = n>0 ? L.revN(correct.label, n) : L.revOne(correct.label);
    const rev=$('#reveal');
    rev.innerHTML=`
      <div class="eye serif" style="margin-top:24px">${esc(L.revEye)}</div>
      <div class="revface"><i></i></div>
      <div class="revname">
        <div class="rk">${esc(L.toldBy)}</div>
        <div class="rn serif">${esc(correct.label||'—')}</div>
        <div class="rs">${line}</div>
      </div>
      <div class="btnrow">
        <button class="btn ghost" type="button" data-act="next">${esc(L.next)}</button>
        <button class="btn primary" type="button" data-act="whole">${esc(L.whole)}</button>
      </div>`;
    rev.classList.add('show');
    rev.scrollIntoView({behavior:reduceMotion?'auto':'smooth', block:'nearest'});
  }

  function onGuess(btn){
    if(state.done) return; const round=state.round; if(!round) return;
    const i=+btn.getAttribute('data-i');
    if(i===round.answer_index){
      state.done=true;
      $$('#tellers .teller').forEach(el=>{ if(el!==btn) el.classList.add('dim'); });
      btn.classList.remove('wrong'); btn.classList.add('right');
      btn.querySelector('[data-right]').style.display='grid';
      if(state.firstTry){ state.streak++; } state.streakShown=true; paintChrome();
      setTimeout(()=>renderReveal(round), 480);
    } else {
      state.firstTry=false;
      btn.classList.add('wrong');
      const wm=btn.querySelector('[data-wrong]'); wm.style.display='grid';
      setTimeout(()=>{ btn.classList.remove('wrong'); wm.style.display='none'; }, 900);
    }
  }

  /* ---------- LOCKED (not_enough_data) ---------- */
  function renderLocked(res){
    const L=d();
    const voiceRows=state.voices.map((v,i)=>`
      <div class="voice-count">
        <div class="av ${AV[i%AV.length]}"><i></i></div>
        <div class="vt"><div class="n serif">${esc(v.name||'—')}</div><div class="s"><span class="flame"></span>${esc(L.told(v.count))}</div></div>
        <div class="tag">${esc(L.vtag(1))}</div>
      </div>`).join('');
    $('#locked').innerHTML=`
      <div class="locked-hero">
        <div class="tone"></div>
        <div class="waves">
          ${[16,34,52,26,44,14,30].map((h,i)=>`<span style="height:${h}px;animation-delay:${(i*0.18).toFixed(2)}s"></span>`).join('')}
        </div>
        <div class="glyph">${sv(I.mic,1.4)}</div>
      </div>
      <div class="locked-title"><div class="k">${esc(L.lockK)}</div><div class="h serif">${esc(L.lockH)}</div></div>
      <div class="locked-body serif">${L.lockBody}</div>
      ${voiceRows}
      <a class="invite-cta serif" href="contribute-real.html">${sv(I.mic,1.6)}${esc(L.record)}</a>
      <div class="locked-foot serif">${L.lockFoot}</div>`;
  }

  /* ---------- ERROR ---------- */
  function renderError(res){
    const L=d();
    $('#error').innerHTML=`
      <div class="fail">
        <div class="glyph">${sv(I.warn,1.6)}</div>
        <div class="k">${esc(L.errK)}</div>
        <div class="h serif">${esc(L.errH)}</div>
        <div class="b">${esc(L.errB)}</div>
        <button class="btn ghost" type="button" data-act="retry">${esc(L.retry)}</button>
      </div>`;
  }

  /* ---------- load a round ---------- */
  async function loadRound(seed){
    state.seed = seed; state.done=false; state.firstTry=true; state.round=null;
    let res;
    try{ res=await window.LFGames.missingVoice(sb,{ id:PERSON_ID, seed:seed }); }
    catch(e){ res={status:'error', message:(e&&e.message)||String(e)}; }
    if(res && res.status==='ok'){
      state.round=res;
      const meta=await memoryMeta(res.used_rows && res.used_rows.artefacts && res.used_rows.artefacts[0]);
      renderPlay(res, meta); show('play');
    } else if(res && res.status==='not_enough_data'){
      renderLocked(res); show('locked');
    } else {
      renderError(res||{}); show('error');
    }
    paintChrome();
  }

  /* ---------- language sheet ---------- */
  const showSheet=()=>{ $('.scrim').classList.add('show'); $('.sheet[data-sheet="lang"]').classList.add('show'); };
  const hideSheets=()=>{ $('.scrim').classList.remove('show'); $$('.sheet').forEach(s=>s.classList.remove('show')); };
  window.__lfClose=()=>{ if($('.sheet.show')){ hideSheets(); return true; } return false; };
  function openLang(){ const L=d(); const sh=$('.sheet[data-sheet="lang"]');
    sh.innerHTML=`<div class="grip"></div><h3>${esc(L.langtitle)}</h3><div class="sub">${esc(L.langsub)}</div>
      ${LANGS.map(k=>`<button class="lang-opt ${k===state.lang?'on':''}" data-lang="${k}"><span><span class="native">${esc(T[k].native)}</span><span class="en" style="display:block">${esc(T[k].label)}</span></span><span class="tick">${sv(I.check,2)}</span></button>`).join('')}`;
    sh.querySelectorAll('[data-lang]').forEach(b=>b.onclick=async()=>{ await setLang(b.dataset.lang); hideSheets(); });
    showSheet(); }
  async function setLang(lang){ if(!T[lang]||lang===state.lang) return; state.lang=lang;
    try{ localStorage.setItem('lf_lang',lang); }catch(e){}
    try{ const {data:{session}}=await sb.auth.getSession(); if(session&&session.user){ await sb.from('profiles').update({preferred_lang:lang}).eq('id',session.user.id); } }catch(e){}
    paintChrome();
    // rebuild the live panel in the new language — same seed reproduces the same round (Rule 8, deterministic)
    await loadRound(state.seed!=null?state.seed:freshSeed());
  }

  /* ---------- click wiring ---------- */
  function wire(){
    $('#dev').addEventListener('click', e=>{
      const tl=e.target.closest('.teller'); if(tl){ onGuess(tl); return; }
      const a=e.target.closest('[data-act]'); if(!a) return; const act=a.dataset.act;
      if(act==='back'){ if(history.length>1) history.back(); else location.href='index.html'; return; }
      if(act==='lang'){ openLang(); return; }
      if(act==='next'){ loadRound(freshSeed()); return; }
      if(act==='whole'){ const r=state.round; const mid=r&&r.used_rows&&r.used_rows.artefacts&&r.used_rows.artefacts[0]; location.href = mid?('moment-real.html?id='+encodeURIComponent(mid)):'index.html'; return; }
      if(act==='retry'){ loadRound(state.seed||freshSeed()); return; }
    });
    $('.scrim').addEventListener('click', hideSheets);
  }

  /* ---------- signature ambient motion: candle-glow voices ---------- */
  function atmosphere(canvas){ if(!canvas) return; const ctx=canvas.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
    const COL=[[243,205,132],[127,180,216],[201,162,255],[143,214,160]]; let motes=[];
    function build(){ motes=[]; const k=Math.max(10,Math.round(W/34));
      for(let i=0;i<k;i++){ motes.push({ x:Math.random(), y:Math.random(), r:6+Math.random()*16, c:COL[Math.random()*COL.length|0],
        rise:.008+Math.random()*.016, drift:(Math.random()-.5)*.5, tw:Math.random()*6.28, tsp:.6+Math.random()*1.1, a:.12+Math.random()*.2 }); } }
    function resize(){ W=canvas.clientWidth; H=canvas.clientHeight; canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); build(); }
    new ResizeObserver(resize).observe(canvas); resize();
    function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
      motes.forEach(m=>{ if(!reduceMotion){ m.y-=m.rise/60; m.x+=Math.sin(t*.25+m.tw)*.0006*m.drift*10; if(m.y< -0.06){ m.y=1.06; m.x=Math.random(); } }
        const tw=reduceMotion?.7:.45+.55*(.5+.5*Math.sin(t*m.tsp+m.tw));
        const px=m.x*W, py=m.y*H, R=m.r*(reduceMotion?1:(.85+.3*tw));
        const gr=ctx.createRadialGradient(px,py,0,px,py,R); gr.addColorStop(0,`rgba(${m.c[0]},${m.c[1]},${m.c[2]},${m.a*tw})`); gr.addColorStop(1,`rgba(${m.c[0]},${m.c[1]},${m.c[2]},0)`);
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(px,py,R,0,6.283); ctx.fill(); });
      ctx.globalCompositeOperation='source-over'; if(!reduceMotion) requestAnimationFrame(frame); }
    if(!reduceMotion) requestAnimationFrame(frame); else frame(0);
  }

  /* ---------- boot: session gate → load round ---------- */
  async function boot(){
    const stored=(function(){ try{ return localStorage.getItem('lf_lang'); }catch(e){ return null; } })();
    if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    paintChrome();
    let session=null;
    try{ const r=await sb.auth.getSession(); session=r.data&&r.data.session; }catch(e){ session=null; }
    if(!session){ location.replace('index.html'); return; }
    try{ const {data:pr}=await sb.from('profiles').select('preferred_lang').eq('id',session.user.id).maybeSingle(); if(pr&&pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; }catch(e){}
    state.voices=await loadVoices();
    paintChrome();
    await loadRound(START_SEED!=null?START_SEED:freshSeed());
  }

  atmosphere($('#dev .atmo')); wire(); boot();
})();
</script>
