<!DOCTYPE html>
<html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Living Forest — a person</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:#04070e; }
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff18; --panel:#ffffff0b;
    --gold:#f3cd84; --gold-hi:#ffe6ad; --cool:#7fb4d8; --cool-hi:#a9d2ee;
    --edit:#c9a2ff; --edit-hi:#ddc6ff; --edit-soft:#efe6ff; --leaf:#8fd6a0;
  }
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--cream); min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center; gap:40px; padding:34px 20px 90px;
    background:radial-gradient(150% 100% at 50% -6%, #12233c 0%, #0a1526 44%, #04070e 100%);
    -webkit-user-select:none; user-select:none; flex-wrap:wrap; }
  .serif{ font-family:'Newsreader',Georgia,serif; }
  .mono{ font-family:'Azeret Mono',monospace; }
  .screen[dir="rtl"] .serif,
  .screen[dir="rtl"] .inp,
  .screen[dir="rtl"] .name-input{ font-family:'Frank Ruhl Libre','Newsreader',serif; }

  /* ===== device ===== */
  .stagewrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .device{ position:relative; width:390px; height:820px; border-radius:42px; overflow:hidden; flex:0 0 auto;
    background:#04070e; box-shadow:0 40px 120px -50px #000, 0 0 0 9px #14141b, 0 0 0 10px #2b2b34; }

  .atmo{ position:absolute; inset:0; z-index:0; width:100%; height:100%; }
  .atmo-veil{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 70% at 50% 6%, rgba(143,214,160,.07), transparent 42%),
      radial-gradient(120% 92% at 50% 42%, transparent 30%, rgba(4,7,14,.6) 100%); }
  .screen{ position:absolute; inset:0; z-index:2; overflow-y:auto; scrollbar-width:none; }
  .screen::-webkit-scrollbar{ display:none; }
  .pad{ padding:0 20px calc(46px + env(safe-area-inset-bottom)); }

  /* ===== top bar ===== */
  .topbar{ position:sticky; top:0; z-index:14; display:flex; align-items:center; gap:10px;
    padding:15px 18px 11px; background:linear-gradient(to bottom, rgba(5,9,17,.9), rgba(5,9,17,.45) 68%, transparent);
    backdrop-filter:blur(7px); }
  .ibtn{ width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; cursor:pointer;
    border:1px solid var(--hair); background:rgba(10,20,34,.55); color:var(--cream); transition:border-color .2s,background .2s; }
  .ibtn:hover{ border-color:rgba(255,255,255,.34); }
  .ibtn:focus-visible{ outline:2px solid var(--cool-hi); outline-offset:2px; }
  .ibtn svg{ width:18px; height:18px; }
  .ttl{ flex:1; min-width:0; text-align:center; }
  .ttl .k{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .ttl .n{ font-family:'Newsreader',serif; font-size:17px; color:#fbf5e8; margin-top:1px; }

  /* keeper reassurance ribbon */
  .keeper-note{ display:flex; align-items:center; gap:9px; margin:2px 18px 0; padding:9px 13px; border-radius:11px;
    background:rgba(201,162,255,.08); border:1px solid rgba(201,162,255,.26); }
  .keeper-note svg{ width:15px; height:15px; color:var(--edit); flex:0 0 auto; }
  .keeper-note span{ font-size:11.5px; color:#cbbce6; line-height:1.35; }

  /* ===== HERO (variant A: face + ring anchor-map) ===== */
  .hero{ position:relative; margin:30px auto 6px; width:308px; height:308px; }
  .ring-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; z-index:1; pointer-events:none; }
  .facewrap{ position:absolute; inset:84px; z-index:3; border-radius:50%; }
  .face{ width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative;
    border:1px solid rgba(255,244,214,.9);
    box-shadow:0 0 28px -2px rgba(255,232,180,.6), 0 0 78px -14px rgba(243,205,132,.45), inset 0 0 0 4px rgba(4,7,14,.6); }
  .face svg, .face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .face .changef{ position:absolute; inset-inline-end:8px; inset-block-end:8px; z-index:4; width:38px; height:38px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer; color:#1a0f2e; border:2px solid #04070e;
    background:linear-gradient(180deg,var(--edit-hi),var(--edit)); box-shadow:0 4px 12px -2px #000; }
  .face .changef svg{ width:18px; height:18px; }
  .hero .who{ position:absolute; z-index:4; inset-inline:0; bottom:-30px; text-align:center; pointer-events:none; }
  .hero .who .nm{ font-family:'Newsreader',serif; font-size:26px; color:#fbf5e8; }
  .hero .who .nm em{ font-style:italic; }

  /* ring beads = the 8 facet icons */
  .cat{ position:absolute; z-index:5; width:56px; transform:translate(-50%,-50%); text-align:center; cursor:pointer;
    background:none; border:none; color:inherit; }
  .cat .bead{ width:48px; height:48px; margin:0 auto; border-radius:50%; display:grid; place-items:center; position:relative;
    background:rgba(12,22,38,.72); border:1px solid var(--hair); backdrop-filter:blur(4px);
    transition:transform .22s cubic-bezier(.16,.8,.28,1), border-color .22s, box-shadow .22s; }
  .cat .bead svg{ width:21px; height:21px; color:var(--gold-hi); position:relative; z-index:2; }
  .cat.cool .bead svg{ color:var(--cool-hi); }
  .cat .lab{ font-family:'Azeret Mono',monospace; font-size:8px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); margin-top:6px; line-height:1.1; }
  /* kindling glow driven by --k (0..1) */
  .cat .bead::after{ content:""; position:absolute; inset:-3px; border-radius:50%; opacity:calc(var(--k) * .95);
    box-shadow:0 0 calc(6px + var(--k)*16px) calc(var(--k)*3px) rgba(243,205,132,.55); }
  .cat.cool .bead::after{ box-shadow:0 0 calc(6px + var(--k)*16px) calc(var(--k)*3px) rgba(127,180,216,.55); }
  .cat .bead{ border-color:rgba(243,205,132,calc(.18 + var(--k)*.5)); }
  .cat.cool .bead{ border-color:rgba(127,180,216,calc(.18 + var(--k)*.5)); }
  .cat:hover .bead, .cat.on .bead{ transform:scale(1.1); }
  .cat.on .bead{ background:rgba(243,205,132,.18); }
  .cat.cool.on .bead{ background:rgba(127,180,216,.18); }
  .cat:focus-visible .bead{ outline:2px solid var(--gold-hi); outline-offset:3px; }
  /* play marker for facets that hold a game */
  .cat .play{ position:absolute; bottom:-2px; inset-inline-end:-1px; width:16px; height:16px; border-radius:50%; z-index:3;
    display:grid; place-items:center; background:linear-gradient(180deg,#101d31,#0a1420); border:1px solid rgba(243,205,132,.55); }
  .cat .play svg{ width:8px; height:8px; color:var(--gold-hi); }
  /* pending violet pin */
  .cat .pin{ position:absolute; top:-1px; inset-inline-start:0; width:13px; height:13px; border-radius:50%; z-index:3;
    background:var(--edit); border:2px solid #04070e; }

  /* ===== facet card (shared) ===== */
  .facets{ margin-top:34px; display:flex; flex-direction:column; gap:16px; }
  .facet{ border:1px solid var(--hair); border-radius:18px; background:rgba(9,17,29,.5); overflow:hidden;
    scroll-margin-top:14px; }
  .facet.b{ border:none; border-radius:16px; background:rgba(9,17,29,.44); }
  .fhead{ display:flex; align-items:center; gap:11px; padding:15px 16px 12px; }
  .fhead .fic{ width:36px; height:36px; border-radius:11px; display:grid; place-items:center; flex:0 0 auto;
    background:rgba(243,205,132,.12); border:1px solid rgba(243,205,132,.3); }
  .fhead .fic svg{ width:18px; height:18px; color:var(--gold-hi); }
  .fhead.cool .fic{ background:rgba(127,180,216,.12); border-color:rgba(127,180,216,.3); }
  .fhead.cool .fic svg{ color:var(--cool-hi); }
  .fhead .ft{ flex:1; min-width:0; }
  .fhead .ft .h{ font-family:'Newsreader',serif; font-size:20px; color:#fbf5e8; line-height:1.1; }
  .fhead .ft .s{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); margin-top:2px; }
  .fhead .ft .s .src-dot{ width:6px; height:6px; border-radius:50%; }
  .fbody{ padding:0 16px 17px; }

  /* fields */
  .field{ margin-bottom:13px; }
  .field > label{ display:block; font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:7px; }
  .inp{ width:100%; background:rgba(8,16,28,.66); border:1px solid var(--hair); border-radius:12px; padding:12px 13px;
    color:var(--cream); font-family:'Newsreader',serif; font-size:16px; transition:border-color .2s; }
  .inp:focus{ outline:none; border-color:rgba(243,205,132,.55); }
  .inp::placeholder{ color:#5f7089; }
  textarea.inp{ resize:vertical; line-height:1.5; min-height:78px; }
  .empty-inp{ border-style:dashed; border-color:rgba(243,205,132,.3); color:#8fa0ba; }

  .mlrow{ display:flex; align-items:center; gap:8px; }
  .mlrow .inp{ flex:1; }
  .mladd{ flex:0 0 auto; height:44px; padding:0 11px; border-radius:11px; cursor:pointer; display:flex; align-items:center; gap:6px;
    background:rgba(243,205,132,.1); border:1px solid rgba(243,205,132,.32); color:var(--gold-hi);
    font-family:'Azeret Mono',monospace; font-size:11px; }
  .mladd svg{ width:15px; height:15px; }
  .mlvars{ margin-top:9px; display:none; flex-direction:column; gap:8px; padding-inline-start:12px;
    border-inline-start:2px solid rgba(243,205,132,.25); }
  .mlvars.open{ display:flex; }
  .mlvar{ display:flex; align-items:center; gap:9px; }
  .mlvar .tag{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--gold);
    width:24px; flex:0 0 auto; text-transform:uppercase; }
  .mlvar .inp{ font-size:14px; padding:9px 11px; }
  .mlvar.rtl .inp{ direction:rtl; text-align:right; }
  .autotr{ display:inline-flex; align-items:center; gap:6px; margin-top:7px; font-size:10.5px; color:#9a8bbd;
    font-family:'Azeret Mono',monospace; letter-spacing:.04em; }
  .autotr svg{ width:12px; height:12px; }
  .autotr b{ color:var(--gold); font-weight:500; cursor:pointer; }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:99px;
    background:rgba(243,205,132,.09); border:1px solid rgba(243,205,132,.3); font-size:13.5px; color:var(--cream);
    font-family:'Newsreader',serif; }
  .chip .x{ width:15px; height:15px; color:var(--muted); cursor:pointer; }
  .chip.add{ background:transparent; border-style:dashed; border-color:var(--hair); color:var(--muted); cursor:pointer; font-family:'Hanken Grotesk',sans-serif; font-size:12.5px; }
  .chip.add:hover{ border-color:rgba(243,205,132,.5); color:var(--gold-hi); }
  .chip.cool{ background:rgba(127,180,216,.09); border-color:rgba(127,180,216,.3); }
  .chip.pending{ background:rgba(201,162,255,.1); border-color:rgba(201,162,255,.4); color:var(--edit-hi); }
  .chip .ord{ font-family:'Azeret Mono',monospace; font-size:9px; color:var(--cool); }

  .row2{ display:flex; gap:10px; } .row2 > *{ flex:1; }
  .seg{ display:flex; gap:5px; background:rgba(8,16,28,.6); border:1px solid var(--hair); border-radius:11px; padding:4px; }
  .seg button{ flex:1; border:none; background:transparent; color:var(--muted); cursor:pointer; padding:8px 4px; border-radius:8px;
    font-family:'Hanken Grotesk',sans-serif; font-size:11px; transition:background .18s,color .18s; }
  .seg button.on{ background:rgba(127,180,216,.18); color:var(--cool-hi); }
  .seg.gold button.on{ background:rgba(243,205,132,.18); color:var(--gold-hi); }
  .toggle{ display:flex; align-items:center; gap:10px; }
  .sw{ width:42px; height:24px; border-radius:99px; background:rgba(255,255,255,.12); position:relative; cursor:pointer; transition:background .2s; flex:0 0 auto; }
  .sw::after{ content:""; position:absolute; top:2px; inset-inline-start:2px; width:20px; height:20px; border-radius:50%; background:#dfe7f2; transition:transform .2s; }
  .sw.on{ background:rgba(127,180,216,.5); } .sw.on::after{ transform:translateX(18px); }
  .screen[dir="rtl"] .sw.on::after{ transform:translateX(-18px); }
  .hint{ font-size:11.5px; color:var(--muted); margin-top:8px; line-height:1.45; }

  /* pending + keeper */
  .pending{ display:inline-flex; align-items:center; gap:8px; margin-top:11px; padding:8px 12px; border-radius:11px;
    background:rgba(201,162,255,.1); border:1px solid rgba(201,162,255,.34); font-size:11.5px; color:var(--edit-hi); }
  .pending .sp{ width:11px; height:11px; border-radius:50%; border:2px solid rgba(201,162,255,.35); border-top-color:var(--edit); animation:spin 1s linear infinite; flex:0 0 auto; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .keeperbar{ display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .kbtn{ display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:9px; cursor:pointer; font-size:12px; font-weight:600;
    font-family:'Hanken Grotesk',sans-serif; border:1px solid transparent; }
  .kbtn.ok{ background:rgba(143,214,160,.16); border-color:rgba(143,214,160,.4); color:#a9e6ba; }
  .kbtn.no{ background:transparent; border-color:var(--hair); color:var(--muted); }
  .kbtn svg{ width:13px; height:13px; }
  .pendrow{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:8px 0; }

  /* story memories */
  .memory{ padding:13px 14px; border-radius:14px; background:rgba(243,205,132,.05); border:1px solid rgba(243,205,132,.16); margin-bottom:10px; }
  .memory .words{ font-family:'Newsreader',serif; font-style:italic; font-weight:300; font-size:15px; line-height:1.5; color:#f6ecd7; }
  .memory .told{ margin-top:10px; display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--gold); }
  .memory .told .flame{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px 1px var(--gold); }
  .memory .told b{ font-weight:600; }
  .invite{ padding:14px; border-radius:14px; border:1px dashed rgba(243,205,132,.32); background:rgba(243,205,132,.04); }
  .invite .words{ font-family:'Newsreader',serif; font-style:italic; font-size:14px; line-height:1.5; color:#efe0c2; }
  .invite .cta{ margin-top:9px; font-size:12px; color:var(--gold); font-weight:600; display:inline-flex; align-items:center; gap:6px; cursor:pointer; }

  /* cool app-assembled note */
  .appfact{ margin-top:12px; border-top:1px solid var(--hair); padding-top:12px; display:flex; align-items:flex-start; gap:11px; }
  .appfact .mark{ width:22px; height:22px; border-radius:6px; flex:0 0 auto; display:grid; place-items:center;
    background:rgba(127,180,216,.12); border:1px solid rgba(127,180,216,.3); }
  .appfact .mark svg{ width:12px; height:12px; color:var(--cool); }
  .appfact .body{ font-size:12.5px; line-height:1.5; color:var(--cool); }
  .appfact .body .src{ display:block; margin-top:4px; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:rgba(127,180,216,.55); font-family:'Azeret Mono',monospace; }

  /* game strip */
  .games{ margin-top:13px; display:flex; flex-direction:column; gap:9px; }
  .game{ display:flex; align-items:center; gap:12px; padding:12px 13px; border-radius:14px; cursor:pointer;
    background:linear-gradient(120deg, rgba(243,205,132,.1), rgba(127,180,216,.05)); border:1px solid rgba(243,205,132,.26);
    transition:border-color .2s, transform .2s; }
  .game:hover{ border-color:rgba(243,205,132,.5); transform:translateY(-1px); }
  .game .gic{ width:38px; height:38px; border-radius:11px; flex:0 0 auto; display:grid; place-items:center;
    background:rgba(4,7,14,.5); border:1px solid rgba(243,205,132,.3); color:var(--gold-hi); }
  .game .gic svg{ width:18px; height:18px; }
  .game .gt{ flex:1; min-width:0; }
  .game .gt .gn{ font-family:'Newsreader',serif; font-size:16px; color:#fbf5e8; }
  .game .gt .gs{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .game .go{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#0c1220;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold)); padding:8px 11px; border-radius:99px; font-weight:600; flex:0 0 auto; }
  .game.locked{ background:rgba(255,255,255,.03); border-color:var(--hair); border-style:dashed; cursor:default; }
  .game.locked:hover{ transform:none; border-color:var(--hair); }
  .game.locked .gic{ color:var(--muted); border-color:var(--hair); }
  .game.locked .gt .gn{ color:var(--muted); }
  .game.locked .go{ background:transparent; color:var(--muted); border:1px solid var(--hair); }

  /* face facet gallery */
  .tagstrip{ display:flex; gap:9px; overflow-x:auto; margin:0 -16px; padding:2px 16px 8px; scrollbar-width:none; }
  .tagstrip::-webkit-scrollbar{ display:none; }
  .tagshot{ flex:0 0 auto; width:88px; }
  .tagshot .im{ width:88px; height:88px; border-radius:12px; overflow:hidden; border:1px solid var(--hair); position:relative; }
  .tagshot .im svg, .tagshot .im img{ width:100%; height:100%; object-fit:cover; }
  .tagshot .im .box{ position:absolute; border:1.5px solid var(--gold-hi); border-radius:4px; }
  .tagshot .cap2{ font-size:10.5px; color:var(--muted); margin-top:5px; text-align:center; font-family:'Newsreader',serif; }

  /* reel reward */
  .reel{ position:relative; padding:16px; border-radius:16px; overflow:hidden;
    background:linear-gradient(120deg, rgba(127,180,216,.1), rgba(243,205,132,.06)); border:1px solid rgba(127,180,216,.3); }
  .reel .rrow{ display:flex; align-items:center; gap:14px; }
  .reel .rimg{ width:58px; height:58px; border-radius:14px; overflow:hidden; flex:0 0 auto; border:1px solid var(--hair); }
  .reel .rimg svg{ width:100%; height:100%; }
  .reel .rt{ flex:1; } .reel .rt .rn{ font-family:'Newsreader',serif; font-size:18px; color:#fbf5e8; }
  .reel .rt .rs{ font-size:12px; color:var(--muted); margin-top:2px; line-height:1.4; }
  .reel .rgo{ font-family:'Azeret Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#0c1220;
    background:linear-gradient(180deg,#a9d0ec,#7fb4d8); padding:9px 12px; border-radius:99px; font-weight:600; flex:0 0 auto; }
  .reel .bar{ margin-top:13px; height:6px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden; }
  .reel .bar i{ display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--gold),var(--cool)); }
  .reel .barlab{ margin-top:8px; font-size:11px; color:var(--muted); }

  .adddetail{ margin-top:6px; }
  .adddetail .plus{ width:100%; display:flex; align-items:center; justify-content:center; gap:9px; padding:13px; border-radius:14px;
    background:rgba(201,162,255,.07); border:1px dashed rgba(201,162,255,.4); color:var(--edit-hi); cursor:pointer;
    font-family:'Newsreader',serif; font-size:15px; }
  .adddetail .plus svg{ width:18px; height:18px; }
  .detailrow{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:12px 13px; border-radius:12px;
    background:rgba(243,205,132,.07); border:1px solid rgba(243,205,132,.24); margin-bottom:9px; }
  .detailrow .dl{ font-family:'Azeret Mono',monospace; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
  .detailrow .dv{ font-family:'Newsreader',serif; font-size:16px; color:var(--cream); margin-top:3px; }
  .detailrow .x{ width:15px; height:15px; color:var(--muted); cursor:pointer; flex:0 0 auto; }

  .foot{ margin-top:26px; text-align:center; }
  .foot .l{ font-family:'Newsreader',serif; font-style:italic; font-size:13.5px; color:rgba(143,214,160,.6); }

  /* ===== overlays ===== */
  .scrim{ position:absolute; inset:0; z-index:30; background:rgba(4,7,14,.66); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; z-index:31; inset-inline:0; bottom:0; background:linear-gradient(180deg,#0f1e33,#081120);
    border:1px solid var(--hair); border-bottom:none; border-radius:22px 22px 0 0; padding:10px 20px calc(22px + env(safe-area-inset-bottom));

  function groupCustom(pub){ const groups={}; facts.filter(x=>(x.field==='custom_label'||x.field==='custom_value')&&(pub?x.status==='published':x.status!=='published')).forEach(x=>{ (groups[x.group_id]=groups[x.group_id]||{label:{},value:{}}); groups[x.group_id][x.field==='custom_label'?'label':'value'][x.lang]=x.value; });
    return Object.keys(groups).map(gid=>({group_id:gid,...groups[gid]})); }
  function buildNames(){
    const NF=['display','given','called','family','maiden','patronymic','honorific'];
    NAME={}; PEND={}; NAMEROW={};
    NF.forEach(f=>{ NAME[f]={}; PEND[f]={}; NAMEROW[f]={}; LANGS.forEach(l=>{ const r=pubRow(f,l); NAMEROW[f][l]=r; NAME[f][l]=r?r.value:''; const p=pendList(f,l)[0]; PEND[f][l]=p?p.value:''; }); });
    LANGS.forEach(l=>{ const vp=NV.find(v=>v.lang===l&&v.status==='published'); if(vp){ if(!NAME.given[l]&&vp.given) NAME.given[l]=vp.given; if(!NAME.family[l]&&vp.family) NAME.family[l]=vp.family; }
      const vpe=NV.find(v=>v.lang===l&&v.status!=='published'); if(vpe){ if(!PEND.given[l]&&vpe.given) PEND.given[l]=vpe.given; if(!PEND.family[l]&&vpe.family) PEND.family[l]=vpe.family; } });
    LANGS.forEach(l=>{ if(!NAME.display[l]){ const dn=[NAME.given[l],NAME.family[l]].filter(Boolean).join(' '); if(dn) NAME.display[l]=dn; } });
    if(!NAME.display.en && person.display_name) NAME.display.en=person.display_name;
    if(!NAME.called.en && person.called_name) NAME.called.en=person.called_name;
    NICKS={en:[],ru:[],he:[]}; PENDNICKS={en:[],ru:[],he:[]};
    LANGS.forEach(l=>{ NICKS[l]=facts.filter(x=>x.field==='nickname'&&x.lang===l&&x.status==='published').sort((a,b)=>(a.ord||0)-(b.ord||0)).map(x=>({id:x.id,value:x.value}));
      PENDNICKS[l]=facts.filter(x=>x.field==='nickname'&&x.lang===l&&x.status!=='published').map(x=>({id:x.id,value:x.value})); });
  }
  function seed(){
    buildNames();
    const perLang=f=>{ const o={}; LANGS.forEach(l=>o[l]=pubNewest(f,l)); return o; };
    S={
      life:{ bio:perLang('bio'), occupation:perLang('occupation'), birth:person.birth_date||'', death:person.death_date||'',
        birth_prec:person.birth_certainty||'', living:!!person.is_living, gender:person.sex||'', langspoken:pubList('langspoken','und') },
      places:{ pbirth:pubNewest('pbirth','und')||pubNewest('pbirth','en')||'', lived:pubList('lived','und'), country:perLang('country') },
      kin:pubList('kin','und'),
      more:{ custom:groupCustom(true), sources:pubList('source','und') }
    };
  }

  /* ---------- kindle + pending + game gates ---------- */
  const hasv=v=>v&&String(v).trim()!=='';
  function facetK(fid){
    let k=0.12;
    if(fid==='name') k=(hasv(NAME.given[state.lang])||hasv(NAME.given.en)||hasv(NAME.display.en))?1:0.4;
    else if(fid==='face') k=tagged.length?Math.min(1,0.3+tagged.length*0.18):0.15;
    else if(fid==='life'){ const p=[S.life.bio[state.lang]||S.life.bio.en,S.life.occupation[state.lang]||S.life.occupation.en,S.life.birth,S.life.gender]; k=Math.max(0.12,p.filter(hasv).length/p.length); }
    else if(fid==='places'){ const c=(hasv(S.places.pbirth)?1:0)+(S.places.lived.length?1:0)+(hasv(S.places.country[state.lang]||S.places.country.en)?1:0); k=Math.max(0.12,c/3); }
    else if(fid==='story') k=memories.length?Math.min(1,0.3+memories.length*0.2):0.12;
    else if(fid==='kin'){ const c=rels.length+S.kin.length; k=c?Math.min(1,0.3+c*0.18):0.12; }
    else if(fid==='reel') k=overallFill();
    else if(fid==='more') k=(S.more.custom.length+S.more.sources.length)?0.5:0.12;
    return Math.max(0.12,Math.min(1,k));
  }
  function overallFill(){ const ids=['name','face','life','places','story','kin','more']; const s=ids.reduce((a,id)=>a+facetK(id),0); return s/ids.length; }
  function catPending(fid){ const fs=FACETFIELDS[fid]||[];
    if(fid==='name' && NV.some(v=>v.status!=='published')) return true;
    return facts.some(x=>fs.includes(x.field)&&x.status!=='published');
  }
  function gameLocked(gid){
    if(gid==='whoiswho'||gid==='crowd') return tagged.length<1;
    if(gid==='order') return !(hasv(S.life.birth)||hasv(S.life.death));
    if(gid==='wherewas'||gid==='thread') return !(hasv(S.places.pbirth)||S.places.lived.length);
    if(gid==='whosememory'||gid==='voice') return memories.filter(m=>!m.pending).length<1;
    return false;
  }

  /* ---------- shared view builders ---------- */
  function keeperInline(id,kind){ const L=d(); return `<div class="keeperbar"><button class="kbtn ok" data-approve="${kind}:${id}">${sv(I.check,2)} ${L.approve}</button><button class="kbtn no" data-decline="${kind}:${id}">${L.decline}</button></div>`; }
  function chipAddBox(field,label){ const L=d(); return `<div class="chipadd" data-for="${field}" style="display:none;margin-top:8px"><input class="inp" placeholder="${esc(label||'')}"><div class="btnrow" style="margin-top:8px"><button class="btn ghost" data-cadd-cancel>${L.cancel}</button><button class="btn violet" data-cadd-ok="${field}">${L.send}</button></div></div>`; }
  function chipsField(field,addLabel,cool){ const L=d(); const pubs=pubList(field,'und'); const pends=pendList(field,'und');
    const pubc=pubs.map(r=>`<span class="chip ${cool?'cool':''}">${(cool&&r.ord!=null)?`<span class="ord">${String((r.ord||0)+1).padStart(2,'0')}</span>`:''}${esc(r.value)}<span class="x" data-del="${r.id}">${sv(I.x,2)}</span></span>`).join('');
    const addbtn=`<button class="chip add" data-addchip="${field}">${sv(I.plus,2)} ${esc(addLabel||'')}</button>`;
    let pend='';
    if(pends.length){ pend=pends.map(r=>`<div class="pendrow"><span class="chip ${cool?'cool':''} pending">${esc(r.value)} <span class="mono" style="font-size:9px;opacity:.8">· ${L.pendingChip}</span></span>${state.keeper?keeperInline(r.id,'fact'):''}</div>`).join('');
      if(!state.keeper) pend+=`<div class="pending" style="margin-top:6px"><span class="sp"></span>${L.bothpending}</div>`; }
    return `<div class="chips">${pubc}${addbtn}</div>${chipAddBox(field,addLabel)}${pend}`;
  }
  function mlEdit(label,field,vals,listId){ const L=d(); const lang=state.lang; const cur=vals[lang]||''; const others=LANGS.filter(l=>l!==lang);
    const lst=listId?`list="${listId}"`:'';
    const rows=others.map(l=>`<div class="mlvar ${l==='he'?'rtl':''}"><span class="tag">${l}</span><input class="inp" ${lst} data-field="${field}" data-lang="${l}" value="${esc(vals[l]||'')}" placeholder="${esc(L.addfield)}"></div>`).join('');
    return `<div class="field"><label>${esc(label)}</label>
      <div class="mlrow"><input class="inp name-input" ${lst} data-field="${field}" data-lang="${lang}" value="${esc(cur)}" ${lang==='he'?'style="direction:rtl;text-align:right"':''}>
        <button class="mladd" data-act="ml">${sv(I.globe2,1.5)} ${esc(L.addlang)}</button></div>
      <div class="mlvars">${rows}</div></div>`; }
  function facetSend(fid){ const L=d(); return `<div class="btnrow" style="margin-top:16px"><button class="btn ghost" data-act="revert">${L.cancel}</button><button class="btn violet" data-act="send" data-facet="${fid}">${L.send}</button></div>`; }
  function fhead(f){ const L=d(); const cool=f.kind==='cool'; const srcTxt=cool?L.assembled:L.toldby;
    const dot=cool?'background:var(--cool);box-shadow:0 0 7px 1px var(--cool)':'background:var(--gold);box-shadow:0 0 7px 1px var(--gold)';
    return `<div class="fhead ${cool?'cool':''}"><span class="fic">${sv(I[f.id])}</span><div class="ft"><div class="h">${esc(L.facet[f.id])}</div><div class="s"><span class="src-dot" style="${dot}"></span>${esc(srcTxt)}</div></div></div>`; }
  function gamesHTML(f){ if(!f.games.length) return ''; const L=d();
    const rows=f.games.map(gid=>{ const g=GAMES[gid], locked=gameLocked(gid);
      return `<div class="game ${locked?'locked':''}" ${locked?'':`data-act="game" data-game="${gid}"`}>
        <span class="gic">${sv(I[g.icon])}</span>
        <div class="gt"><div class="gn">${esc(L.gameNames[gid])}</div><div class="gs">${locked?esc(L.gameLocked):esc(L.gameSubs[gid])}</div></div>
        <span class="go">${locked?sv(I.lock,1.7):esc(L.playCta)}</span></div>`; }).join('');
    return `<div class="games">${rows}</div>`; }
  function bead(f,x,y){ const L=d(); const cool=f.kind==='cool'; const play=f.games.length?`<span class="play">${sv(I.play,0)}</span>`:''; const pin=catPending(f.id)?`<span class="pin"></span>`:'';
    const sel=state.facet===f.id;
    return `<button class="cat ${cool?'cool':''} ${sel?'sel':''}" data-jump="${f.id}" style="--k:${facetK(f.id)};left:${x}px;top:${y}px" aria-label="${esc(L.facet[f.id])}" aria-pressed="${sel?'true':'false'}" aria-controls="facet-${f.id}"><span class="bead">${sv(I[f.id])}${play}${pin}</span><span class="lab">${esc(L.facet[f.id])}</span></button>`; }
  function facetCard(f){ const on=state.facet===f.id;
    return `<div class="facet${on?' enter':''}" id="facet-${f.id}" data-facet="${f.id}"${on?'':' hidden'}>${fhead(f)}<div class="fbody">${bodyFor(f)}</div></div>`; }
  function portraitArtId(){ if(person&&person.primary_asset){ const t=tagged.find(x=>x.storage_path===person.primary_asset); if(t) return t.artefact_id; } return (tagged[0]&&tagged[0].artefact_id)||''; }
  function ringShell(){ const L=d(); const cx=154,cy=154,R=126;
    const portArt=portraitArtId();
    const portAttr=portArt?` data-open-moment="${esc(portArt)}" role="button" tabindex="0" aria-label="${esc(L.openPhoto)}" style="position:absolute;inset:0;cursor:pointer"`:` style="position:absolute;inset:0"`;
    const beads=FACETS.map((f,i)=>{ const a=-Math.PI/2+i*(Math.PI*2/8); const x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
      return bead(f,x,y); }).join('');
    const cards=FACETS.map(f=>facetCard(f)).join('');
    const g0=NAME.given[state.lang]||(NAME.display[state.lang]||'').split(' ')[0]||NAME.display.en||'';
    const f0=NAME.family[state.lang]||(NAME.display[state.lang]||'').split(' ').slice(1).join(' ')||'';
    return `<div class="hero">
      <svg class="ring-svg" viewBox="0 0 308 308"><circle cx="154" cy="154" r="126" fill="none" stroke="rgba(243,205,132,.12)" stroke-width="1"/><circle cx="154" cy="154" r="126" fill="none" stroke="rgba(243,205,132,.34)" stroke-width="2" stroke-dasharray="1 13" stroke-linecap="round"/></svg>
      <div class="facewrap"><div class="face"><div id="faceHost"${portAttr}>${faceSVG()}</div><button class="changef" data-act="changeface" aria-label="${esc(L.changeface)}">${sv(I.camera,1.6)}</button></div></div>
      ${beads}
      <div class="who"><div class="nm serif">${esc(g0)} <em>${esc(f0)}</em></div></div>
    </div>
    <div class="facets" style="margin-top:52px">${cards}</div>
    <div class="foot"><div class="l">${esc(L.foot)}</div></div>`;
  }

  /* ---------- name facet ---------- */
  function namePendRef(k,l){ const f=facts.find(x=>x.field===k&&x.lang===l&&x.status!=='published'); if(f) return {kind:'fact',id:f.id,value:f.value};
    if(k==='given'||k==='family'){ const v=NV.find(x=>x.lang===l&&x.status!=='published'&&x[k]); if(v) return {kind:'nv',id:v.id,value:v[k]}; } return null; }
  /* every published name part gets edit + delete (or "ask to remove") */
  function partCtls(k){ const L=d(); const lang=state.lang; const row=(NAMEROW[k]||{})[lang];
    let del=delCtl(row);
    if(!del&&(k==='given'||k==='family')){ const v=NV.find(x=>x.lang===lang&&x.status==='published'&&x[k]);
      if(v&&state.keeper) del=`<button class="np-ctl" data-delnv="${v.id}:${k}">${sv(I.trash,1.7)} ${esc(L.remove)}</button>`; }
    return `<div class="rowctl"><button class="np-ctl" data-editpart="${k}">${sv(I.pen,1.7)} ${esc(L.edit)}</button>${del}</div>`; }
  function namePartBlock(k,v){ const L=d(); return `<div class="namepart"><div class="np-lab">${esc(L[k]||k)}</div><div class="np-val serif">${esc(v)}</div>${partCtls(k)}</div>`; }
  function nameBody(){ const L=d(); const lang=state.lang;
    const has=k=>NAME[k]&&NAME[k][lang]?NAME[k][lang]:'';
    const NF=['given','called','family','maiden','patronymic','honorific'];
    let out='';
    if(has('display')) out+=`<div class="namepart"><div class="np-lab">${L.display}</div><div class="np-val serif">${esc(has('display'))}</div>${partCtls('display')}</div>`;
    if(has('given')||has('called')){ out+=`<div class="nameblock">`;
      if(has('given')) out+=`<div class="np-lab">${L.given}</div><div class="np-given serif">${esc(has('given'))}</div>${partCtls('given')}`;
      if(has('called')) out+=`<div class="np-called serif">${esc(has('called'))}<span class="np-tag">${L.called} · ${L.calledHint}</span></div>${partCtls('called')}`;
      out+=`</div>`; }
    if(has('family')) out+=namePartBlock('family',has('family'));
    if(has('maiden')) out+=namePartBlock('maiden',has('maiden'));
    ['patronymic','honorific'].forEach(k=>{ if(has(k)) out+=namePartBlock(k,has(k)); });
    NF.forEach(k=>{ if(!has(k)){ const ref=namePendRef(k,lang); if(ref){ out+=`<div class="namepart np-suggested"><div class="np-lab">${esc(L[k]||k)}</div><div class="np-val serif">${esc(ref.value)}</div>${state.keeper?keeperInline(ref.id,ref.kind):`<div class="pending"><span class="sp"></span>${L.bothpending}</div>`}</div>`; } } });
    /* nicknames are a name part like any other — displayed here, added via "+ add a name part" */
    if((NICKS[lang]||[]).length||(PENDNICKS[lang]||[]).length){
      out+=`<div class="namepart"><div class="np-lab">${L.nicks}</div><div class="chips">
        ${(NICKS[lang]||[]).map(n=>`<span class="chip">${esc(n.value)}<span class="x" data-del="${n.id}">${sv(I.x,2)}</span></span>`).join('')}
        ${(PENDNICKS[lang]||[]).map(n=>`<span class="chip pending">${esc(n.value)}<span class="mono" style="font-size:9px;opacity:.8">· ${L.pendingChip}</span></span>`).join('')}</div>
        ${(PENDNICKS[lang]||[]).length?(state.keeper?(PENDNICKS[lang]||[]).map(n=>`<div class="pendrow"><span style="font-size:12px;color:var(--edit-hi)">${esc(n.value)}</span>${keeperInline(n.id,'fact')}</div>`).join(''):`<div class="pending" style="margin-top:6px"><span class="sp"></span>${L.bothpending}</div>`):''}</div>`; }
    /* nickname is always addable (a person may have several) */
    const unset=NF.filter(k=>!has(k)&&!namePendRef(k,lang)).concat('nickname');
    const addBtn=unset.length?`<button class="np-ctl add" data-act="nmadd">${sv(I.plus,2)} ${L.addpart}</button>`:'';
    out+=`<div class="np-foot"><button class="np-ctl" data-act="nmlang">${sv(I.globe2,1.5)} ${L.otherlangs}</button>${addBtn}</div>`;
    const editable=['display','given','called','family','maiden','patronymic','honorific'];
    out+=`<div class="np-langs" hidden>${editable.map(k=>`<div class="mlgrp"><div class="np-lab">${esc(L[k]||k)}</div>
        ${LANGS.map(l=>`<div class="mlvar ${l==='he'?'rtl':''}"><span class="tag">${l}</span><input class="inp" data-field="${k}" data-lang="${l}" value="${esc((NAME[k]&&NAME[k][l])||'')}" placeholder="${L.addfield}"></div>`).join('')}
        ${k==='given'?`<button type="button" class="np-ctl" data-samedisplay style="margin-top:8px">${sv(I.plus,1.7)} ${esc(L.sameDisplay)}</button>`:''}
      </div>`).join('')}<div class="btnrow" style="margin-top:4px"><button class="btn ghost" data-act="revert">${L.cancel}</button><button class="btn violet" data-act="nmsend">${L.send}</button></div></div>`;
    out+=`<div class="np-addmenu" hidden>${unset.map(k=>`<button class="add-opt" data-addpart="${k}"><span class="ic">${sv(I.plus,1.8)}</span><span><span class="nm">${esc(L[k]||k)}</span><span class="ds">${L.addpartHint}</span></span></button>`).join('')}</div>`;
    out+=chipAddBox('nickname',L.nickname);
    return out;
  }

  /* ---------- per-facet bodies ---------- */
  /* place typeahead: reuse a canonical value instead of re-typing a variant.
     Normalise (lowercase, strip spacing/punctuation) so "Tel Aviv"/"Tel-Aviv"/"tel aviv"
     collapse to ONE suggestion — but never rewrite what the user chose/typed. Free text is
     always allowed (a <datalist> suggests but does not constrain), so historical places that
     no longer exist — USSR, Yugoslavia, the Ottoman Empire — are first-class. */
  const normPlace=s=>String(s==null?'':s).toLowerCase().replace(/[\s\-'’.,·]+/g,'');
  function placeSuggestions(){ const vals=[];
    (PLACEVALS||[]).forEach(v=>{ if(hasv(v)) vals.push(v); });
    facts.filter(x=>['pbirth','born','lived','home','country'].includes(x.field)&&hasv(x.value)).forEach(x=>vals.push(x.value));
    const seen={}, out=[];
    vals.forEach(v=>{ const k=normPlace(v); if(k&&!seen[k]){ seen[k]=1; out.push(String(v)); } });
    out.sort((a,b)=>a.localeCompare(b)); return out; }
  function placeDatalist(){ return `<datalist id="placelist">${placeSuggestions().map(s=>`<option value="${esc(s)}"></option>`).join('')}</datalist>`; }
  function placesAppLine(n){ const t={ en:`Tied to ${n} place${n===1?'':'s'}; the route between them is drawn by the app.`, ru:`Связана с ${n} мест${n===1?'ом':'ами'}; маршрут строит приложение.`, he:`קשורה ל-${n} מקומות; המסלול משורטט על ידי האפליקציה.` }; return t[state.lang]||t.en; }
  /* "add a home": the home place AND a country field (Item D), each a place typeahead (Item E) */
  function livedBlock(){ const L=d(); const pubs=pubList('lived','und'); const pends=pendList('lived','und');
    const pubc=pubs.map(r=>`<span class="chip cool"><span class="ord">${String((r.ord||0)+1).padStart(2,'0')}</span>${esc(r.value)}<span class="x" data-del="${r.id}">${sv(I.x,2)}</span></span>`).join('');
    const addbtn=`<button class="chip add" data-act="addhome">${sv(I.plus,2)} ${esc(L.addplace)}</button>`;
    let pend='';
    if(pends.length){ pend=pends.map(r=>`<div class="pendrow"><span class="chip cool pending">${esc(r.value)} <span class="mono" style="font-size:9px;opacity:.8">· ${L.pendingChip}</span></span>${state.keeper?keeperInline(r.id,'fact'):''}</div>`).join('');
      if(!state.keeper) pend+=`<div class="pending" style="margin-top:6px"><span class="sp"></span>${L.bothpending}</div>`; }
    const form=`<div class="homeadd" data-homeadd style="display:none;margin-top:10px;padding-inline-start:12px;border-inline-start:2px solid rgba(127,180,216,.25)">
        <div class="field"><label>${esc(L.addplace)}</label><input class="inp" list="placelist" data-newhome placeholder="${esc(L.lived)}" ${state.lang==='he'?'style="direction:rtl;text-align:right"':''}></div>
        <div class="field"><label>${esc(L.country)}</label><input class="inp" list="placelist" data-newcountry placeholder="${esc(L.addcountry)}" ${state.lang==='he'?'style="direction:rtl;text-align:right"':''}></div>
        <div class="btnrow"><button class="btn ghost" data-act="homecancel">${L.cancel}</button><button class="btn violet" data-act="homesend">${L.send}</button></div></div>`;
    return `<div class="chips">${pubc}${addbtn}</div>${form}${pend}`; }
  function pendingCustomRows(){ const L=d(); return groupCustom(false).map(c=>{ const lab=c.label[state.lang]||c.label.en||Object.values(c.label)[0]||''; const val=c.value[state.lang]||c.value.en||Object.values(c.value)[0]||'';
      return `<div class="detailrow" style="border-color:rgba(201,162,255,.34);background:rgba(201,162,255,.06)"><div><div class="dl">${esc(lab)}</div><div class="dv">${esc(val)}</div>${state.keeper?keeperInline(c.group_id,'group'):`<div class="pending" style="margin-top:6px"><span class="sp"></span>${L.bothpending}</div>`}</div>${state.keeper?`<span class="x" data-delgroup="${c.group_id}">${sv(I.x,2)}</span>`:''}</div>`; }).join(''); }
  function bodyFor(f){ const L=d(); const id=f.id, lang=state.lang;
    if(id==='name') return nameBody();
    if(id==='face'){ const shots=tagged.map((t,i)=>`<div class="tagshot"><div class="im" data-thumb="${i}"${t.artefact_id?` data-open-moment="${esc(t.artefact_id)}" role="button" tabindex="0" aria-label="${esc(L.openPhoto)}" style="cursor:pointer"`:''}>${galSVG(i)}</div><div class="cap2">${esc([t.meta&&t.meta.when,t.meta&&t.meta.where].filter(Boolean).join(' · '))}</div></div>`).join('');
      return `<div class="hint" style="margin-top:0;margin-bottom:12px">${L.faceLine}</div>
        ${tagged.length?`<div class="tagstrip">${shots}</div>`:`<div class="hint">${L.noFace}</div>`}
        <div class="chips" style="margin-top:10px"><button class="chip add" data-act="addmemory">${sv(I.plus,2)} ${L.addmemory}</button></div>
        ${gamesHTML(f)}`; }
    if(id==='life'){
      const rowctl=h=>h?`<div class="rowctl">${h}</div>`:'';
      return mlEdit(L.about,'bio',S.life.bio) + rowctl(delCtl(pubRow('bio',lang)))
        + `<div class="field"><label>${L.occupation}</label><input class="inp ${hasv(S.life.occupation[lang])?'':'empty-inp'}" data-field="occupation" data-lang="${lang}" value="${esc(S.life.occupation[lang]||'')}" placeholder="${esc(L.addoccupation)}">${rowctl(delCtl(pubRow('occupation',lang)))}</div>`
        + `<div class="row2"><div class="field"><label>${L.born}</label><input class="inp" type="date" data-field="birth" value="${/^\d{4}-\d{2}-\d{2}$/.test(S.life.birth)?esc(S.life.birth):''}">${rowctl(clearCtl('birth_date'))}</div>

        <div class="field"><label>${L.langspoken}</label>${chipsField('langspoken',L.langspoken,false)}</div>

    if(id==='places'){ const placed=(hasv(S.places.pbirth)?1:0)+S.places.lived.length+(hasv(S.places.country[lang]||S.places.country.en)?1:0);

      return `${placeDatalist()}
        <div class="field"><label>${L.pbirth}</label><input class="inp" list="placelist" data-field="pbirth" value="${esc(S.places.pbirth)}" placeholder="${esc(L.pbirth)}">${pctl(pubRow('pbirth','und'))}</div>
        ${mlEdit(L.country,'country',S.places.country,'placelist')}${pctl(pubRow('country',lang))}

        ${placed>0?`<div class="appfact"><span class="mark">${sv(I.chart,2)}</span><div class="body">${esc(placesAppLine(placed))}<span class="src">${L.assembled}</span></div></div>`:''}
        ${facetSend('places')}${gamesHTML(f)}`; }
    if(id==='story'){ let h='';
      if(memories.length) h+=memories.map(m=>`<div class="memory"><div class="words">${m.cap?('“'+esc(m.cap)+'”'):esc(L.noStory)}</div>${m.teller?`<div class="told"><span class="flame"></span><b>${esc(m.teller)}</b></div>`:''}</div>`).join('');
      else h+=`<div class="invite"><div class="words">${L.noStory}</div><div class="cta" data-act="addmemory">${L.askSomeone}</div></div>`;
      h+=`<div class="chips" style="margin-top:10px"><button class="chip add" data-act="addmemory">${sv(I.plus,2)} ${L.addmemory}</button></div>`;
      return h+gamesHTML(f); }
    if(id==='kin'){
      /* a real connection: kind, direction, certainty, note — each editable and removable */
      const live=rels.map(r=>`<div class="relrow"><div>
          <div class="rk">${esc(kindText(r))}</div><div class="rn">${esc(r.name)}</div>
          <div class="rc">${esc(L.certs[r.certainty]||r.certainty)}${r.note?' · '+esc(r.note):''}</div>
          <div class="rowctl"><button class="np-ctl" data-reledit="${r.id}">${sv(I.pen,1.7)} ${L.edit}</button>
            <button class="np-ctl warn" data-reldel="${r.id}">${sv(I.trash,1.7)} ${esc(state.keeper?L.remove:L.askremove)}</button></div>
        </div></div>`).join('');
      /* free-text kin rows written before connections were typed */
      const legacy=pubList('kin','und').filter(r=>!parseKin(r.value)).map(r=>`<div class="relrow"><div>
          <div class="rk">${esc(L.relations)}</div><div class="rn">${esc(r.value)}</div>
          <div class="rowctl">${delCtl(r)}</div></div></div>`).join('');
      const kinPend=pendList('kin','und');
      const pendRows=kinPend.map(r=>{ const p=parseKin(r.value);
        const head=p?`${esc(L.relkinds[p.kind]||p.kind)}${p.op==='remove'?' · '+esc(L.remove):''}`:esc(L.addkin);
        const body=p?esc(p.other_name||''):esc(r.value);
        const meta=p?esc([L.certs[p.certainty]||p.certainty,p.note].filter(Boolean).join(' · ')):'';
        return `<div class="relrow pend"><div><div class="rk">${head} · ${L.pendingChip}</div><div class="rn">${body}</div>
          ${meta?`<div class="rc">${meta}</div>`:''}
          ${state.keeper?keeperInline(r.id,'fact'):`<div class="pending"><span class="sp"></span>${L.bothpending}</div>`}</div></div>`; }).join('');
      return `${live||''}${legacy}${pendRows}
        <div class="chips" style="margin-top:4px"><button class="chip add" data-act="addconn">${sv(I.plus,2)} ${L.addkin}</button></div>
        ${rels.length?`<div class="appfact"><span class="mark">${sv(I.chart,2)}</span><div class="body">${L.kinApp}<span class="src">${L.assembled}</span></div></div>`:''}
        <button class="chip add" data-act="howrelated" style="margin-top:12px;border-color:rgba(127,180,216,.4);color:var(--cool-hi)">${sv(I.kin,1.7)} ${L.howrelated}</button>`; }
    if(id==='reel'){ const fill=Math.round(overallFill()*100); const kindled=FACETS.filter(x=>x.id!=='reel').filter(x=>facetK(x.id)>=0.5).length;
      const g0=NAME.given[state.lang]||NAME.called[state.lang]||(NAME.display[state.lang]||'').split(' ')[0]||NAME.display.en||'';
      const reelName={ en:`${g0}’s reel`, ru:`Плёнка · ${g0}`, he:`הסרט של ${g0}` }[state.lang]||`${g0}`;
      return `<div class="reel"><div class="rrow"><div class="rimg"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#0a1422"/><path d="M36 36 L64 50 L36 64 Z" fill="#ffe6ad"/><circle cx="50" cy="50" r="30" fill="none" stroke="#7fb4d8" stroke-width="2" opacity=".5"/></svg></div>
        <div class="rt"><div class="rn">${esc(reelName)}</div><div class="rs">${L.reelSub}</div></div><span class="rgo" data-act="watch">${L.watch}</span></div>
        <div class="bar"><i style="width:${fill}%"></i></div><div class="barlab">${kindled} / 8 ${L.reelBar}</div></div>`; }
    /* more */
    let h=S.more.custom.map(c=>`<div class="detailrow"><div><div class="dl">${esc(c.label[lang]||c.label.en||c.label.ru||c.label.he||'')}</div><div class="dv">${esc(c.value[lang]||c.value.en||c.value.ru||c.value.he||'')}</div>
        <div class="rowctl"><button class="np-ctl" data-editgroup="${c.group_id}">${sv(I.pen,1.7)} ${L.edit}</button>
          <button class="np-ctl warn" data-delgroup="${c.group_id}">${sv(I.trash,1.7)} ${esc(state.keeper?L.remove:L.askremove)}</button></div></div></div>`).join('');
    h+=pendingCustomRows();
    h+=`<div class="adddetail"><button class="plus" data-act="adddetail">${sv(I.plus,1.8)} ${L.adddetail}</button></div>`;
    h+=`<div class="field" style="margin-top:14px"><label>${L.source}</label>${chipsField('source',L.source,true)}</div>`;
    return h;
  }

  /* ---------- render ---------- */
  function render(){ const L=d(); document.documentElement.lang=state.lang; document.documentElement.dir=L.dir;
    const screen=$('.screen'); if(screen) screen.setAttribute('dir',L.dir);
    $('.topbar').innerHTML=`<button class="ibtn" data-act="back" aria-label="Back">${sv(I.back)}</button>

      <button class="ibtn" data-act="lang" aria-label="${esc(L.langtitle)}">${sv(I.globe,1.5)}</button>`;
    const kn=$('.keeper-note'); if(state.keeper){ kn.style.display='flex'; kn.innerHTML=`${sv(I.keeper,1.5)}<span>${esc(L.keeper)}</span>`; } else { kn.style.display='none'; kn.innerHTML=''; }
    $('.pad').innerHTML=ringShell();
    fillFaces();

  async function fillFaces(){ const fh=$('#faceHost'); if(fh){ if(person.primary_asset){ faceInto(fh,person.primary_asset,(person.metadata&&person.metadata.face_box)||null); } else if(tagged[0]){ faceInto(fh,tagged[0].storage_path,tagged[0].box); } }
    $$('.tagshot .im[data-thumb]').forEach(async el=>{ const i=+el.getAttribute('data-thumb'); const t=tagged[i]; if(!t) return; const u=await signedUrl(t.storage_path); if(u) el.innerHTML=`<img src="${u}" alt="">`; }); }
  /* the beads ARE the navigation: one facet on screen at a time */
  function selectFacet(fid){ if(!FACETS.some(f=>f.id===fid)) return;
    state.facet=fid;
    $$('.cat[data-jump]').forEach(b=>{ const on=b.dataset.jump===fid; b.classList.toggle('sel',on); b.setAttribute('aria-pressed',on?'true':'false'); });
    $$('.facet[data-facet]').forEach(c=>{ const on=c.dataset.facet===fid; c.hidden=!on; c.classList.remove('enter'); if(on&&!reduceMotion){ void c.offsetWidth; c.classList.add('enter'); } });
    const screen=$('.screen'), card=$(`.facet[data-facet="${fid}"]`);
    if(screen&&card){ const top=card.getBoundingClientRect().top-screen.getBoundingClientRect().top+screen.scrollTop-12;
      screen.scrollTo({ top:Math.max(0,top), behavior:reduceMotion?'auto':'smooth' }); } }

  /* ---------- overlays ---------- */
  const showSheet=name=>{ $('.scrim').classList.add('show'); $(`.sheet[data-sheet="${name}"]`).classList.add('show'); };
  const hideSheets=()=>{ $('.scrim').classList.remove('show'); $$('.sheet').forEach(s=>s.classList.remove('show')); };
  window.__lfClose=()=>{ if($('.sheet.show')){ hideSheets(); return true; } return false; };
  function toast(m){ $('.toastmsg').textContent=m; const el=$('.toast'); el.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),2600); }

  function openLang(){ const L=d(); const sh=$('.sheet[data-sheet="lang"]');
    sh.innerHTML=`<div class="grip"></div><h3>${L.langtitle}</h3><div class="sub">${L.langsub}</div>
      ${Object.keys(T).map(k=>`<button class="lang-opt ${k===state.lang?'on':''}" data-lang="${k}"><span><span class="native">${esc(T[k].native)}</span><span class="en" style="display:block">${esc(T[k].label)}</span></span><span class="tick">${sv(I.check,2)}</span></button>`).join('')}`;
    sh.querySelectorAll('[data-lang]').forEach(b=>b.onclick=async()=>{ state.lang=b.dataset.lang; hideSheets(); try{localStorage.setItem('lf_lang',state.lang);}catch(e){} if(user){ try{ await sb.from('profiles').update({preferred_lang:state.lang}).eq('id',user.id); }catch(e){} } render(); });
    showSheet('lang'); }

  async function openFace(){ const L=d(); const sh=$('.sheet[data-sheet="face"]');
    const gal=await Promise.all(tagged.map(async(t,i)=>({i,url:await signedUrl(t.storage_path),box:t.box})));
    const gals=gal.map(g=>`<div class="g" data-g="${g.i}">${g.url?`<img src="${g.url}" alt="">`:galSVG(g.i)}</div>`).join('');
    sh.innerHTML=`<div class="grip"></div><h3>${L.changeface}</h3><div class="sub">${L.changefaceSub}</div>
      <div class="gal">${gals||`<div class="sub">${L.noFace}</div>`}</div>
      <div class="cropstage" data-crop><div class="cimg"></div><div class="cmask"></div><div class="cring"></div></div>
      <div class="zoomrow">${sv(I.zoomout,1.6)}<input type="range" min="100" max="260" value="145" data-zoom>${sv(I.zoomin,1.6)}</div>
      <div class="btnrow"><button class="btn ghost" data-act="close">${L.cancel}</button><button class="btn violet" data-act="facesave">${L.send}</button></div>`;
    let z=145,px=50,py=44,drag=false,sx,sy,bx,by,chosen=null; const img=sh.querySelector('.cimg'), st=sh.querySelector('[data-crop]');
    const apply=()=>{ img.style.cssText=`position:absolute;left:${px}%;top:${py}%;width:100%;height:100%;transform:translate(-50%,-50%) scale(${z/100});transform-origin:center`; };
    const setImg=g=>{ chosen=g; img.innerHTML=g.url?`<img src="${g.url}" alt="">`:galSVG(g.i); apply(); };
    if(gal[0]) setImg(gal[0]);
    sh.querySelector('[data-zoom]').oninput=e=>{ z=+e.target.value; apply(); };
    st.addEventListener('pointerdown',e=>{ drag=true; sx=e.clientX; sy=e.clientY; bx=px; by=py; st.setPointerCapture(e.pointerId); });
    st.addEventListener('pointermove',e=>{ if(!drag)return; px=bx+(e.clientX-sx)/st.clientWidth*100; py=by+(e.clientY-sy)/st.clientHeight*100; apply(); });
    st.addEventListener('pointerup',()=>drag=false);
    sh.querySelectorAll('[data-g]').forEach(el=>el.onclick=()=>{ sh.querySelectorAll('.g').forEach(x=>x.classList.remove('on')); el.classList.add('on'); setImg(gal[+el.dataset.g]); });
    sh._faceSave=async()=>{ let ok=true; if(chosen){ const t=tagged[chosen.i]; if(t&&await insFact('face','und',JSON.stringify({artefact_id:t.artefact_id,storage_path:t.storage_path,zoom:z,px:px,py:py}))===false) ok=false; } hideSheets(); await reload(); if(ok) toast(L.sent); };
    showSheet('face'); }

      <label>${L.detailValue} (${state.lang})</label><input class="inp" data-add-value placeholder="${L.detailValue}" value="${esc(val0)}"></div>

      <div class="btnrow"><button class="btn ghost" data-act="close">${L.cancel}</button><button class="btn primary" data-act="close">${L.playCta}</button></div>`;
