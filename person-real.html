  /* ---------- connections: the real relationships row ----------
     mode 'add'    — connect this person to someone already in the forest
     mode 'edit'   — change kind / certainty / note on an existing row
     mode 'me'     — "How are you related?": the viewer's own node → this person   */
  function openKin(mode,relId){ const L=d(); const sh=$('.sheet[data-sheet="kin"]');
    const existing=relId?rels.find(r=>r.id===relId):null;
    const st={ mode, relId:relId||null,
      other:existing?existing.other:(mode==='me'?(localStorage.getItem('lf_me')||''):''),
      kind:existing?existing.kind:'parent', dir:existing?existing.dir:'other_parent',
      certainty:existing?existing.certainty:'remembered', note:existing?existing.note:'', propose:'' };
    const nameOf=id=>{ const p=PEOPLE.find(x=>x.id===id); return p?p.display_name:''; };
    const title=mode==='edit'?L.editconn:(mode==='me'?L.howrelated:L.addconn);
    const sub=mode==='me'?L.meHint:(mode==='edit'?'':L.kinApp);

    function pickerHTML(){
      if(mode==='edit') return `<div class="field"><label>${L.pickperson}</label><div class="np-val serif">${esc(existing?existing.name:'')}</div></div>`;
      const q=(st.q||'').toLowerCase();
      const list=PEOPLE.filter(p=>!q||String(p.display_name||'').toLowerCase().includes(q)).slice(0,200);
      return `<div class="field"><label>${mode==='me'?L.meAsk:L.pickperson}</label>
        <input class="inp" data-kinsearch placeholder="${esc(L.searchppl)}" value="${esc(st.q||'')}" style="margin-bottom:9px">
        <div class="picker">${list.length?list.map(p=>`<button data-kinpick="${esc(p.id)}" class="${st.other===p.id?'on':''}">${esc(p.display_name||'—')}</button>`).join(''):`<div class="sub" style="padding:12px">${L.nopeople}</div>`}</div>
        ${mode==='me'?'':`<label>${L.proposenew}</label>
        <input class="inp" data-kinpropose placeholder="${esc(L.proposename)}" value="${esc(st.propose||'')}">
        <div class="hint">${L.proposehint}</div>`}</div>`; }

    function draw(){
      const dirLine=st.kind==='parent'?`<div class="field"><label>${L.dirq}</label><div class="segwrap" data-kingroup="dir">
          ${[['other_parent',L.dirTheirParent],['other_child',L.dirTheirChild]].map(([v,t])=>`<button data-kinset="dir:${v}" class="${st.dir===v?'on':''}">${esc(t)}</button>`).join('')}</div></div>`:'';
      const canRemove=mode==='edit';
      sh.innerHTML=`<div class="grip"></div><h3>${esc(title)}</h3>${sub?`<div class="sub">${esc(sub)}</div>`:''}
        ${pickerHTML()}
        <div class="field"><label>${L.relkind}</label><div class="segwrap" data-kingroup="kind">
          ${REL_KINDS.map(k=>`<button data-kinset="kind:${k}" class="${st.kind===k?'on':''}">${esc(L.relkinds[k])}</button>`).join('')}</div></div>
        ${dirLine}
        <div class="field"><label>${L.certainty}</label><div class="segwrap" data-kingroup="certainty">
          ${REL_CERTS.map(c=>`<button data-kinset="certainty:${c}" class="${st.certainty===c?'on':''}">${esc(L.certs[c])}</button>`).join('')}</div></div>
        <div class="field"><label>${L.relnote}</label><input class="inp" data-kinnote value="${esc(st.note||'')}" placeholder="${esc(L.relnote)}"></div>
        ${state.keeper?'':`<div class="hint" style="display:flex;gap:9px">${sv(I.info,1.7)}<span>${esc(L.keeper)}</span></div>`}
        <div class="btnrow"><button class="btn ghost" data-act="close">${L.cancel}</button>
          <button class="btn ${state.keeper?'primary':'violet'}" data-act="kinsave">${state.keeper?L.save:L.send}</button></div>
        ${canRemove?`<div class="btnrow"><button class="btn ghost" data-act="kinremove" style="color:var(--edit-hi);border-color:rgba(201,162,255,.4)">${sv(I.trash,1.7)} ${esc(L.removeconn)}</button></div>`:''}`;
      const s=sh.querySelector('[data-kinsearch]'); if(s) s.oninput=e=>{ st.q=e.target.value; draw(); const n=sh.querySelector('[data-kinsearch]'); if(n){ n.focus(); n.setSelectionRange(n.value.length,n.value.length); } };
      const np=sh.querySelector('[data-kinnote]'); if(np) np.oninput=e=>{ st.note=e.target.value; };
      const pp=sh.querySelector('[data-kinpropose]'); if(pp) pp.oninput=e=>{ st.propose=e.target.value; };
      sh.querySelectorAll('[data-kinpick]').forEach(b=>b.onclick=()=>{ st.other=b.getAttribute('data-kinpick'); st.propose=''; draw(); });
      sh.querySelectorAll('[data-kinset]').forEach(b=>b.onclick=()=>{ const [k,v]=b.getAttribute('data-kinset').split(':'); st[k]=v; draw(); });
    }
    sh._kinSave=async()=>{
      if(mode!=='edit'&&!st.other&&!String(st.propose||'').trim()){ toast(L.pickfirst); return; }
      if(mode==='me'&&st.other) { try{ localStorage.setItem('lf_me',st.other); }catch(e){} }
      await saveRel({ relId:st.relId, other:st.other, other_name:st.other?nameOf(st.other):String(st.propose||'').trim(),
        propose:st.other?'':String(st.propose||'').trim(), kind:st.kind, dir:st.dir, certainty:st.certainty, note:st.note, mode });
      hideSheets(); await reload(); selectFacet('kin'); toast(state.keeper?L.saved:L.sent); };
    sh._kinRemove=async()=>{ await removeRel(st.relId); hideSheets(); await reload(); selectFacet('kin'); toast(state.keeper?L.saved:L.sent); };
    draw(); showSheet('kin'); }

  function relEnds(other,kind,dir){
    /* from_person = PARENT, to_person = CHILD; other kinds keep this person as from_person */
    if(kind==='parent'&&dir==='other_parent') return {from:other,to:PERSON_ID};
    return {from:PERSON_ID,to:other}; }

  async function saveRel(p){ if(!user) return; const L=d();
    /* a proposed person is never invented here — it waits for the keeper, even if the keeper wrote it */
    if(!state.keeper||p.propose){
      const payload=JSON.stringify({ op:p.relId?'edit':'add', rel_id:p.relId||null, other:p.other||null,
        other_name:p.other_name||'', propose:p.propose||'', kind:p.kind, dir:p.dir, certainty:p.certainty, note:p.note||'', from:p.mode==='me'?'viewer':'facet' });
      try{ await sb.from('person_facts').insert({person_id:PERSON_ID,group_id:uuid(),field:'kin',lang:'und',value:payload,ord:0,status:'in_review',created_by:user.id}); }catch(e){}
      return; }
    const ends=relEnds(p.other,p.kind,p.dir);
    const row={ kind:p.kind, certainty:p.certainty, note:p.note||'' };
    try{
      if(p.relId) await sb.from('relationships').update({...row,from_person:ends.from,to_person:ends.to}).eq('id',p.relId);
      else await sb.from('relationships').insert({from_person:ends.from,to_person:ends.to,...row});
    }catch(e){ /* older schema without kind/certainty/note */
      try{ if(p.relId) await sb.from('relationships').update({from_person:ends.from,to_person:ends.to}).eq('id',p.relId);
        else await sb.from('relationships').insert({from_person:ends.from,to_person:ends.to}); }catch(e2){} } }

  async function removeRel(relId){ if(!relId||!user) return; const r=rels.find(x=>x.id===relId);
    if(state.keeper){ try{ await sb.from('relationships').delete().eq('id',relId); }catch(e){} return; }
    const payload=JSON.stringify({ op:'remove', rel_id:relId, other:r?r.other:null, other_name:r?r.name:'',
      kind:r?r.kind:'other', dir:r?r.dir:'other_child', certainty:r?r.certainty:'remembered', note:'' });
    try{ await sb.from('person_facts').insert({person_id:PERSON_ID,group_id:uuid(),field:'kin',lang:'und',value:payload,ord:0,status:'in_review',created_by:user.id}); }catch(e){} }

  /* keeper approving a kin suggestion materialises the real relationships row */
  async function applyKinPayload(p){
    if(p.op==='remove'&&p.rel_id){ try{ await sb.from('relationships').delete().eq('id',p.rel_id); }catch(e){} return true; }
    if(!p.other) return false;               /* a proposed new person is Leon's to create, not ours */
    const ends=relEnds(p.other,p.kind,p.dir); const row={ kind:p.kind, certainty:p.certainty, note:p.note||'' };
    try{ if(p.op==='edit'&&p.rel_id) await sb.from('relationships').update({...row,from_person:ends.from,to_person:ends.to}).eq('id',p.rel_id);
      else await sb.from('relationships').insert({from_person:ends.from,to_person:ends.to,...row}); }
    catch(e){ try{ if(p.op==='edit'&&p.rel_id) await sb.from('relationships').update({from_person:ends.from,to_person:ends.to}).eq('id',p.rel_id);
      else await sb.from('relationships').insert({from_person:ends.from,to_person:ends.to}); }catch(e2){ return false; } }
    return true; }

  function openAddPart(part){ selectFacet('name'); const card=$('.facet[data-facet="name"]'); if(!card) return;
    const langs=card.querySelector('.np-langs'); const menu=card.querySelector('.np-addmenu'); if(menu) menu.hidden=true;
    /* nickname is a repeatable per-language row, not a single field — use the chip box */
    if(part==='nickname'){ if(langs) langs.hidden=true;
      const box=card.querySelector('.chipadd[data-for="nickname"]');
      if(box){ box.style.display='block'; const i=box.querySelector('input'); if(i){ i.value=''; i.focus(); } } return; }
    if(langs) langs.hidden=false;
    const inp=card.querySelector(`.np-langs [data-field="${part}"][data-lang="${state.lang}"]`); if(inp) inp.focus(); }

  /* ---------- submit ---------- */
  async function submitFacet(fid){ if(!user) return; const card=$(`.facet[data-facet="${fid}"]`); if(!card) return;
    const read=(f,lg)=>{ const el=card.querySelector(`[data-field="${f}"]${lg?`[data-lang="${lg}"]`:''}`); return el?el.value:null; };
    let ok=true; const put=async(...a)=>{ if(await insFact(...a)===false) ok=false; };
    if(fid==='life'){
      for(const l of LANGS){ const v=read('bio',l); if(v!=null&&v.trim()!=='') await put('bio',l,v.trim()); const o=read('occupation',l); if(o!=null&&o.trim()!=='') await put('occupation',l,o.trim()); }
      const b=read('birth'); if(b!=null&&b!=='') await put('birth','und',b);
      const de=read('death'); if(de!=null&&de!=='') await put('death','und',de);
      const seg=card.querySelector('.seg[data-field="birth_prec"] .on'); if(seg) await put('birth_prec','und',seg.getAttribute('data-v'));
      const liv=card.querySelector('.sw[data-field="living"]'); if(liv) await put('living','und',liv.classList.contains('on')?'1':'0');
      const gseg=card.querySelector('.seg[data-field="gender"] .on'); if(gseg) await put('gender','und',gseg.getAttribute('data-v')||'');
    } else if(fid==='places'){ const pb=read('pbirth'); if(pb!=null&&pb!=='') await put('pbirth','und',pb);
      for(const l of LANGS){ const c=read('country',l); if(c!=null&&c.trim()!=='') await put('country',l,c.trim()); } }
    await reload(); if(ok) toast(d().sent); }
  async function submitName(){ if(!user) return; const card=$('.facet[data-facet="name"]'); if(!card) return;
    const read=(f,l)=>{ const el=card.querySelector(`.np-langs [data-field="${f}"][data-lang="${l}"]`); return el?el.value.trim():null; };
    let ok=true;
    /* name parts are person_facts ROWS — name_variants is retiring, do not write to it */
    for(const f of ['display','given','family','called','maiden','patronymic','honorific']){
      for(const l of LANGS){ const v=read(f,l); if(v&&v!==((NAME[f]||{})[l]||'')){ if(await insFact(f,l,v)===false) ok=false; } } }
    await reload(); if(ok) toast(d().sent); }

  /* ---------- keeper: per-field approve / decline (Rule 3) ---------- */
  async function approveRef(ref){ if(!user) return; const [kind,id]=ref.split(':'); const now=new Date().toISOString();
    if(kind==='remreq'){ const req=facts.find(x=>x.id===id);
      if(req){ try{ await sb.from('person_facts').delete().eq('id',req.value); }catch(e){}
        try{ await sb.from('person_facts').delete().eq('id',id); }catch(e){} }
      await reload(); toast(d().approve+' ✓'); return; }
    if(kind==='fact'){ const f=facts.find(x=>x.id===id);
      if(f&&f.field==='kin'){ const p=parseKin(f.value);
        if(p){ await applyKinPayload(p); try{ await sb.from('person_facts').delete().eq('id',id); }catch(e){}
          await reload(); toast(d().approve+' ✓'); return; } }
      if(f){ const patch={};
        if(f.field==='birth')patch.birth_date=f.value||null; if(f.field==='death')patch.death_date=f.value||null;
        if(f.field==='birth_prec')patch.birth_certainty=f.value||null; if(f.field==='living')patch.is_living=(f.value==='1');
        if(f.field==='gender')patch.sex=f.value||null; if(f.field==='face'){ try{ patch.primary_asset=JSON.parse(f.value).storage_path; }catch(e){} }
        if(Object.keys(patch).length){ try{ await sb.from('people').update(patch).eq('id',PERSON_ID); }catch(e){} }
        /* one published part per (person,lang,field): supersede the old one BEFORE publishing this,
           else person_facts_one_published_name_part rejects the update. Keeper DELETE is allowed by RLS;
           the new value is already safely stored, so this cannot lose data. */
        const NAMEPARTS=['given','family','patronymic','maiden','called','honorific'];
        if(NAMEPARTS.includes(f.field)){ try{ await sb.from('person_facts').delete().eq('person_id',PERSON_ID).eq('lang',f.lang).eq('field',f.field).eq('status','published'); }catch(e){} }
        try{ await sb.from('person_facts').update({status:'published',reviewed_by:user.id,published_at:now}).eq('id',id); }catch(e){} } }
    else if(kind==='nv'){ try{ await sb.from('name_variants').update({status:'published',reviewed_by:user.id,published_at:now}).eq('id',id); }catch(e){} }
    else if(kind==='group'){ for(const ff of facts.filter(x=>x.group_id===id&&x.status!=='published')) { try{ await sb.from('person_facts').update({status:'published',reviewed_by:user.id,published_at:now}).eq('id',ff.id); }catch(e){} } }
    else if(kind==='artefact'){ try{ await sb.from('artefacts').update({pub_status:'published',reviewed_by:user.id}).eq('id',id); }catch(e){} }
    await reload(); toast(d().approve+' ✓'); }
  async function declineRef(ref){ const [kind,id]=ref.split(':');
    if(kind==='fact'||kind==='remreq') try{ await sb.from('person_facts').delete().eq('id',id); }catch(e){}
    else if(kind==='nv') try{ await sb.from('name_variants').delete().eq('id',id); }catch(e){}
    else if(kind==='group'){ for(const ff of facts.filter(x=>x.group_id===id&&x.status!=='published')){ try{ await sb.from('person_facts').delete().eq('id',ff.id); }catch(e){} } }
    else if(kind==='artefact') try{ await sb.from('artefacts').update({pub_status:'rejected'}).eq('id',id); }catch(e){}
    await reload(); toast(d().decline); }

  /* ---------- wiring (delegated once) ---------- */
  function wireOnce(){ const root=$('#dev');
    root.addEventListener('keydown', e=>{ if(e.key!=='Enter'&&e.key!==' ')return; const om=e.target.closest&&e.target.closest('[data-open-moment]'); if(om){ e.preventDefault(); const aid=om.getAttribute('data-open-moment'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); } });
    root.addEventListener('click', async e=>{
      const L=d();
      const om=e.target.closest('[data-open-moment]'); if(om){ const aid=om.getAttribute('data-open-moment'); if(aid) location.href='moment-real.html?id='+encodeURIComponent(aid); return; }
      const jt=e.target.closest('[data-jump]'); if(jt){ selectFacet(jt.dataset.jump); return; }
      const ap=e.target.closest('[data-approve]'); if(ap){ await approveRef(ap.getAttribute('data-approve')); return; }
      const dc=e.target.closest('[data-decline]'); if(dc){ await declineRef(dc.getAttribute('data-decline')); return; }
      const del=e.target.closest('[data-del]'); if(del){ await removeRow(del.getAttribute('data-del')); return; }
      const rd=e.target.closest('[data-rowdel]'); if(rd){ await removeRow(rd.getAttribute('data-rowdel')); return; }
      const dnv=e.target.closest('[data-delnv]'); if(dnv){ const [nid,part]=dnv.getAttribute('data-delnv').split(':');
        if(state.keeper){ const v=NV.find(x=>x.id===nid); if(v){ const rest=part==='given'?{given:'',family:v.family}:{given:v.given,family:null};
          try{ if(!rest.given&&!rest.family) await sb.from('name_variants').delete().eq('id',nid);
            else await sb.from('name_variants').update(rest).eq('id',nid); }catch(er){} } await reload(); }
        return; }
      const dg=e.target.closest('[data-delgroup]'); if(dg){ const gid=dg.getAttribute('data-delgroup');
        const rows=facts.filter(x=>x.group_id===gid);
        if(state.keeper||rows.every(canDelete)){ for(const ff of rows) await delFact(ff.id); }
        else { let ok=true; for(const ff of rows) if(!removalReq(ff.id)&&await insFact('remove_request','und',ff.id)===false) ok=false; if(ok) toast(L.removeAsked); }
        await reload(); return; }
      const eg=e.target.closest('[data-editgroup]'); if(eg){ openAdd(eg.getAttribute('data-editgroup')); return; }
      const ep=e.target.closest('[data-editpart]'); if(ep){ openAddPart(ep.getAttribute('data-editpart')); return; }
      const re=e.target.closest('[data-reledit]'); if(re){ openKin('edit',re.getAttribute('data-reledit')); return; }
      const rdel=e.target.closest('[data-reldel]'); if(rdel){ await removeRel(rdel.getAttribute('data-reldel')); await reload(); selectFacet('kin'); toast(state.keeper?L.saved:L.sent); return; }
      const cp=e.target.closest('[data-clearperson]'); if(cp&&state.keeper){ const col=cp.getAttribute('data-clearperson');
        try{ await sb.from('people').update({[col]:null}).eq('id',PERSON_ID); }catch(er){} await reload(); return; }
      const sd=e.target.closest('[data-samedisplay]'); if(sd){ const card=$('.facet[data-facet="name"]');
        const inp=card&&card.querySelector(`.np-langs [data-field="given"][data-lang="${state.lang}"]`);
        if(inp){ inp.value=(NAME.display[state.lang]||NAME.display.en||(person&&person.display_name)||''); inp.focus(); } return; }
      const apart=e.target.closest('[data-addpart]'); if(apart){ openAddPart(apart.getAttribute('data-addpart')); return; }
      const addc=e.target.closest('[data-addchip]'); if(addc){ const box=$(`.chipadd[data-for="${addc.getAttribute('data-addchip')}"]`); if(box){ box.style.display='block'; const i=box.querySelector('input'); if(i) i.focus(); } return; }
      const cc=e.target.closest('[data-cadd-cancel]'); if(cc){ const box=cc.closest('.chipadd'); if(box) box.style.display='none'; return; }
      const co=e.target.closest('[data-cadd-ok]'); if(co){ const field=co.getAttribute('data-cadd-ok'); const box=co.closest('.chipadd'); const val=box.querySelector('input').value.trim();
        if(val){ const perLang=(field==='nickname'); const ord=(field==='lived'?pubList('lived','und').length:field==='source'?pubList('source','und').length:0); await insFact(field, perLang?state.lang:'und', val, ord); } await reload(); return; }
      const a=e.target.closest('[data-act]'); if(!a) return; const act=a.dataset.act;
      if(act==='back'){ if(history.length>1) history.back(); else location.href='index.html'; return; }
      if(act==='lang') return openLang();
      if(act==='changeface') return openFace();
      if(act==='adddetail') return openAdd();
      if(act==='game') return openGame(a.dataset.game);
      if(act==='close'){ hideSheets(); return; }
      if(act==='facesave'){ const sh=$('.sheet[data-sheet="face"]'); if(sh&&sh._faceSave) return sh._faceSave(); return; }
      if(act==='addsend'){ const sh=$('.sheet[data-sheet="add"]'); const lab=sh.querySelector('[data-add-label]').value.trim(), val=sh.querySelector('[data-add-value]').value.trim();
        const grp=sh.dataset.group||''; let okAdd=true;
        if(lab||val){
          if(grp&&state.keeper){ /* keeper edits publish in place, per row */
            const now=new Date().toISOString();
            for(const ff of facts.filter(x=>x.group_id===grp&&(x.field==='custom_label'||x.field==='custom_value')&&x.lang===state.lang)){
              try{ await sb.from('person_facts').update({value:ff.field==='custom_label'?lab:val,reviewed_by:user.id,published_at:now}).eq('id',ff.id); }catch(er){} }
          } else { const gid=grp||uuid(); const a1=await insFact('custom_label',state.lang,lab,0,gid); const a2=await insFact('custom_value',state.lang,val,0,gid); if(a1===false||a2===false) okAdd=false; } }
        hideSheets(); await reload(); if(okAdd) toast(state.keeper&&grp?L.saved:L.sent); return; }
      if(act==='ml'){ const v=a.parentElement.parentElement.querySelector('.mlvars'); if(v) v.classList.toggle('open'); return; }
      if(act==='nmlang'){ const b=a.closest('.fbody').querySelector('.np-langs'); if(b) b.hidden=!b.hidden; a.classList.toggle('on'); return; }
      if(act==='nmadd'){ const b=a.closest('.fbody').querySelector('.np-addmenu'); if(b) b.hidden=!b.hidden; a.classList.toggle('on'); return; }
      if(act==='sw'){ a.classList.toggle('on'); return; }
      if(act==='seg'){ [...a.parentElement.children].forEach(x=>x.classList.remove('on')); a.classList.add('on'); return; }
      if(act==='send'){ await submitFacet(a.dataset.facet); return; }
      if(act==='nmsend'){ await submitName(); return; }
      if(act==='revert'){ seed(); render(); return; }
      if(act==='watch'){ const q=(person&&person.id)?('?id='+encodeURIComponent(person.id)):''; location.href='reel-real.html'+q; return; }
      if(act==='addmemory'){ location.href='contribute-add-real.html'; return; }
      if(act==='addhome'){ const card=$('.facet[data-facet="places"]'); const box=card&&card.querySelector('[data-homeadd]');
        if(box){ box.style.display='block'; const i=box.querySelector('[data-newhome]'); if(i) i.focus(); } return; }
      if(act==='homecancel'){ const box=$('.facet[data-facet="places"] [data-homeadd]'); if(box) box.style.display='none'; return; }
      if(act==='homesend'){ const card=$('.facet[data-facet="places"]'); if(!card) return;
        const hi=card.querySelector('[data-newhome]'), ci=card.querySelector('[data-newcountry]');
        const home=hi?hi.value.trim():'', country=ci?ci.value.trim():''; if(!home&&!country) return;
        let ok=true;
        if(home&&await insFact('lived','und',home,pubList('lived','und').length)===false) ok=false;
        if(country&&await insFact('country',state.lang,country)===false) ok=false;
        await reload(); if(ok) toast(L.sent); return; }
      if(act==='addconn'){ return openKin('add'); }
      if(act==='howrelated'){ return openKin('me'); }
      if(act==='kinsave'){ const sh=$('.sheet[data-sheet="kin"]'); if(sh&&sh._kinSave) return sh._kinSave(); return; }
      if(act==='kinremove'){ const sh=$('.sheet[data-sheet="kin"]'); if(sh&&sh._kinRemove) return sh._kinRemove(); return; }
    });
    $('.scrim').addEventListener('click', hideSheets);
  }

  /* ---------- atmosphere (growing vines) ---------- */
  function atmosphere(canvas){ const ctx=canvas.getContext('2d'); let W,H,DPR=Math.min(2,window.devicePixelRatio||1);
    const COL=[[143,214,160],[243,205,132],[127,180,216],[201,162,255]]; let items=[];
    function build(){ items=[]; const k=Math.max(3,Math.round(W/120));
      for(let i=0;i<k;i++){ const pts=[]; let x=(i+.5)/k+(Math.random()-.5)*.12, y=1.05, ang=-Math.PI/2+(Math.random()-.5)*.4; const n=(Math.random()*5|0)+7;
        for(let j=0;j<n;j++){ pts.push({x,y}); ang+=(Math.random()-.5)*.6; const st=.07+Math.random()*.05; x+=Math.cos(ang)*st*.5; y+=Math.sin(ang)*st; }
        items.push({pts, c:COL[Math.random()*COL.length|0], grow:0, gspd:.0009+Math.random()*.0008, sway:Math.random()*6.28, buds:pts.map(()=>Math.random()>.55)}); } }
    function resize(){ W=canvas.clientWidth; H=canvas.clientHeight; canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); build(); }
    new ResizeObserver(resize).observe(canvas); resize();
    function frame(now){ const t=(now||0)/1000; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
      items.forEach(v=>{ if(!reduceMotion&&v.grow<1) v.grow+=v.gspd; const g=reduceMotion?1:v.grow, seg=(v.pts.length-1)*g, last=Math.floor(seg), frac=seg-last;
        const P=k=>({x:(v.pts[k].x+(reduceMotion?0:Math.sin(t*.2+k*.5+v.sway)*.006*(k/v.pts.length)))*W, y:v.pts[k].y*H});
        ctx.strokeStyle=`rgba(${v.c[0]},${v.c[1]},${v.c[2]},.16)`; ctx.lineWidth=1.4; ctx.beginPath();
        for(let i=0;i<=last;i++){ const p=P(i); i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y); }
        if(last<v.pts.length-1){ const a=P(last),b=P(last+1); ctx.lineTo(a.x+(b.x-a.x)*frac,a.y+(b.y-a.y)*frac); } ctx.stroke();
        for(let i=0;i<=last;i++){ if(!v.buds[i])continue; const p=P(i); const tw=reduceMotion?.7:.4+.6*(.5+.5*Math.sin(t*1.2+i+v.sway)); const R=6+(i===v.pts.length-1?4:0);
          const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R); gr.addColorStop(0,`rgba(${v.c[0]},${v.c[1]},${v.c[2]},${.5*tw})`); gr.addColorStop(1,`rgba(${v.c[0]},${v.c[1]},${v.c[2]},0)`);
          ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(p.x,p.y,R,0,6.283); ctx.fill();
          ctx.fillStyle=`rgba(255,250,236,${.7*tw})`; ctx.beginPath(); ctx.arc(p.x,p.y,1.3,0,6.283); ctx.fill(); } });
      ctx.globalCompositeOperation='source-over'; if(!reduceMotion) requestAnimationFrame(frame); }
    if(!reduceMotion) requestAnimationFrame(frame); else frame(0);
  }

  /* ---------- reload + gate + boot ---------- */
  async function reload(){ await loadData(); seed(); render(); }
  function showGate(){ const L=d(); let g=$('#gate'); if(!g){ g=document.createElement('div'); g.id='gate'; $('#dev').appendChild(g); }
    g.setAttribute('style','position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,7,14,.9);backdrop-filter:blur(6px)');
    g.innerHTML=`<div style="width:100%;max-width:320px;background:linear-gradient(180deg,#0e1c31,#081120);border:1px solid var(--hair);border-radius:20px;padding:24px;text-align:center">
      <h3 style="font-family:'Newsreader',serif;font-weight:400;font-size:22px;color:#fbf5e8">${esc(L.eyebrow)}</h3>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 16px">${esc(L.keeper)}</div>
      <input id="gEmail" type="email" placeholder="you@example.com" style="width:100%;margin-bottom:10px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px">
      <input id="gPass" type="password" placeholder="••••••••" style="width:100%;margin-bottom:12px;background:rgba(6,14,26,.7);border:1px solid var(--hair);border-radius:12px;padding:12px;color:var(--cream);font-family:inherit;font-size:14px">
      <button id="gBtn" class="btn violet" style="width:100%">${esc(L.signin)}</button>
      <div id="gErr" style="color:#ff9a8a;font-size:12px;min-height:16px;margin-top:8px"></div></div>`;
    $('#gBtn').onclick=async()=>{ const {error}=await sb.auth.signInWithPassword({email:$('#gEmail').value.trim(),password:$('#gPass').value}); if(error){ $('#gErr').textContent=error.message; return; } g.remove(); boot(); };
  }
  async function boot(){ const {data:{session}}=await sb.auth.getSession();
    const stored=localStorage.getItem('lf_lang'); if(stored&&T[stored]) state.lang=stored; else { const dl=(navigator.language||'en').slice(0,2); if(T[dl]) state.lang=dl; }
    if(!session){ render(); showGate(); return; }
    user=session.user;
    try{ const {data:pr}=await sb.from('profiles').select('is_keeper,preferred_lang').eq('id',user.id).maybeSingle(); if(pr){ state.keeper=!!pr.is_keeper; if(state.keeper){ window.__lfKeeper=true; try{document.dispatchEvent(new Event('lf-keeper-ready'));}catch(e){} } if(pr.preferred_lang&&!stored&&T[pr.preferred_lang]) state.lang=pr.preferred_lang; } }catch(e){}
    await loadData(); seed(); render();
  }
  atmosphere($('#dev .atmo')); wireOnce(); boot();
})();
