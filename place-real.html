<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#04070e" />
<title>The Living Forest — a place on the globe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Azeret+Mono:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --cream:#f4ecdb; --muted:#9db0cc; --dim:#6f83a3; --hair:#ffffff1f; --panel:#ffffff0d;
    --gold:#f3cd84; --gold-hi:#ffe6ad;         /* a human told us */
    --cool:#7fb4d8; --cool-hi:#a9d2ee;         /* the app worked it out (house-rules canonical) */
    --edit:#c9a2ff; --edit-hi:#ddc6ff;         /* waiting for the keeper */
    --autotr:#9a8bbd;                          /* machine-translated */
    --leaf:#8fd6a0;
    --steel:157,176,204;                       /* neutral chrome */
    --serif:'Newsreader',Georgia,serif;
  }
  html,body{margin:0;background:#04070e;
    font-family:'Hanken Grotesk',system-ui,sans-serif;color:#e8eef8;
    user-select:none;-webkit-user-select:none;overscroll-behavior-x:none;}
  html{height:100%;}
  body{min-height:100dvh;overflow-x:hidden;}
  body[dir=rtl]{--serif:'Frank Ruhl Libre','Newsreader',serif;font-family:'Frank Ruhl Libre','Hanken Grotesk',sans-serif;}
  /* #stage carries NO z-index on purpose: position:fixed already forms a stacking
     context, so its children (#dial, #card z6, #gate z20) must compete at root level
     with the root-level .phone (z5) — giving z-index:0 here would trap them below it. */
  #stage{position:fixed;inset:0;background:radial-gradient(120% 120% at 62% 30%, #0d1a2f 0%, #081120 46%, #04070e 100%);}
  #mount{position:fixed;inset:0;z-index:1;}
  .mono{font-family:'Azeret Mono',ui-monospace,monospace;}
  .serif{font-family:var(--serif);}
  .he-text{font-family:'Frank Ruhl Libre',serif;}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 60% at 62% 20%, rgba(var(--steel),.10), transparent 46%);}

  #label{position:fixed;z-index:3;left:0;top:0;transform:translate(-50%,-140%);pointer-events:none;opacity:0;transition:opacity .18s ease;white-space:nowrap;display:flex;flex-direction:column;gap:1px;align-items:center;}
  #label .n{font-family:'Newsreader',serif;font-size:15px;color:#fbf1dc;text-shadow:0 1px 8px rgba(0,0,0,.85);}
  #label .m{font-size:10px;letter-spacing:.08em;color:rgba(190,210,235,.8);text-shadow:0 1px 6px rgba(0,0,0,.9);}

  #dial{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:opacity .3s ease;}
  #dial svg{width:min(110vh,110vw);height:min(110vh,110vw);overflow:visible;}

  /* the generic-globe HUD panels are not shown on a place page (kept in DOM so the
     globe script's textContent writes never hit null) */
  #tl,#bl,#br{display:none !important;}
  .hud{position:fixed;z-index:4;padding:clamp(20px,4vw,34px) clamp(22px,4vw,38px);pointer-events:none;transition:opacity .3s ease;}
  #tr{right:0;top:max(52px,calc(env(safe-area-inset-top) + 44px));text-align:right;}
  #tr .k{font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(150,180,214,.6);}
  #tr .v{font-family:'Newsreader',serif;font-weight:300;font-size:clamp(40px,9vw,52px);line-height:.9;color:#f6efe0;margin-top:6px;}
  #tr .note{font-size:12px;color:rgba(206,221,240,.55);margin-top:8px;max-width:210px;margin-left:auto;}
  body[dir=rtl] #tr{right:auto;left:0;text-align:left;}
  body[dir=rtl] #tr .note{margin-left:0;margin-right:auto;}

  /* person card (click a family light on the globe) */
  #card{position:fixed;z-index:6;left:50%;bottom:6%;transform:translateX(-50%) translateY(12px);width:min(430px,92vw);opacity:0;pointer-events:none;transition:opacity .32s ease,transform .32s ease;}
  #card.show{opacity:1;transform:translateX(-50%);pointer-events:auto;}
  #card .panel{position:relative;display:flex;flex-direction:column;background:rgba(10,18,34,.86);border:1px solid rgba(180,205,235,.16);border-radius:20px;backdrop-filter:blur(18px);box-shadow:0 30px 70px -24px rgba(0,0,0,.8);padding:22px 24px;max-height:86dvh;overflow:hidden;}
  #card .x{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(210,222,244,.28);background:rgba(10,18,34,.7);display:flex;align-items:center;justify-content:center;color:rgba(230,238,250,.9);font-size:17px;cursor:pointer;z-index:2;}
  #card .top{display:flex;gap:16px;align-items:center;flex:0 0 auto;padding-right:30px;}
  #card .cbody{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-right:4px;}
  #card .disc{position:relative;width:64px;height:64px;flex:none;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 50% 42%, rgba(255,231,180,.35) 0%, rgba(210,150,60,.18) 55%, rgba(16,24,42,.85) 100%);box-shadow:0 0 22px 4px rgba(255,206,120,.28), inset 0 0 0 1px rgba(255,220,150,.4);display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-style:italic;font-size:10px;color:rgba(255,238,205,.6);text-align:center;line-height:1.15;}
  #card .disc canvas,#card .disc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #card .nm{font-family:'Newsreader',serif;font-size:22px;color:#f4ecdb;line-height:1.12;}
  #card .line{font-family:'Azeret Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:rgba(190,210,235,.7);margin-top:4px;}
  #card .rel{font-size:12px;color:rgba(206,221,240,.6);margin-top:3px;}
  #card .story{margin-top:15px;padding-top:14px;border-top:1px solid rgba(180,205,235,.12);font-size:13px;line-height:1.55;color:#e9eff9;}
  #card .prov{margin-top:10px;font-size:11.5px;line-height:1.5;color:#f3cd84;}
  #card .prov .app{color:rgba(150,180,214,.7);}
  #card .grid{display:flex;gap:22px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(180,205,235,.12);}
  #card .grid .k{font-family:'Azeret Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(150,180,214,.6);}
  #card .grid .val{font-size:12.5px;color:#e6eefb;margin-top:3px;}
  #card .grid .val.mono{font-family:'Azeret Mono',monospace;font-size:11.5px;}

  /* status / sign-in overlay */
  #gate{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(4,7,14,.72);backdrop-filter:blur(6px);padding:24px;}
  #gate .box{width:min(380px,92vw);background:rgba(10,18,34,.9);border:1px solid rgba(180,205,235,.16);border-radius:20px;padding:26px 26px 24px;text-align:center;}
  #gate h2{font-family:'Newsreader',serif;font-weight:300;font-size:24px;margin:6px 0 6px;color:#f4ecdb;}
  #gate p{font-size:13px;color:rgba(206,221,240,.65);line-height:1.5;margin:0 0 16px;}
  #gate input{width:100%;background:#0a1220;border:1px solid rgba(180,205,235,.2);border-radius:12px;color:#eef2fb;padding:12px 13px;font-size:15px;font-family:inherit;margin-top:8px;outline:none;}
  #gate input:focus{border-color:#f3cd84;}
  #gate button{width:100%;margin-top:14px;background:linear-gradient(180deg,#ffe6ad,#f3cd84);color:#3a2a05;font-weight:700;font-family:inherit;font-size:15px;padding:13px;border:none;border-radius:13px;cursor:pointer;}
  #gate .msg{margin-top:12px;font-size:12.5px;color:#ff9a8f;min-height:16px;}
  #gate .spin{display:inline-block;width:34px;height:34px;border:3px solid rgba(243,205,132,.25);border-top-color:#f3cd84;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ===== place hero HUD (design v3) ===== */
  #pHud{position:fixed;inset:0;z-index:4;pointer-events:none;transition:opacity .3s ease;}
  #pHud>*{position:absolute;}
  .appvoice{font-family:'Azeret Mono',monospace;letter-spacing:.24em;text-transform:uppercase;font-size:10px;color:var(--cool);}
  .p-topbar{top:max(12px,env(safe-area-inset-top));left:0;right:0;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .icon-btn{pointer-events:auto;width:40px;height:40px;border-radius:12px;border:1px solid rgba(var(--steel),.32);background:rgba(6,20,30,.5);backdrop-filter:blur(8px);color:var(--cream);display:grid;place-items:center;cursor:pointer;}
  .icon-btn svg{width:18px;height:18px;}
  body[dir=rtl] .icon-btn svg{transform:scaleX(-1);}
  .livechip{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:99px;background:rgba(6,20,30,.5);border:1px solid rgba(127,180,216,.32);backdrop-filter:blur(8px);}
  .livechip .blip{width:7px;height:7px;border-radius:50%;background:var(--cool);box-shadow:0 0 10px 2px var(--cool);animation:blip 1.6s ease-in-out infinite;}
  .livechip .appvoice{color:var(--cool);letter-spacing:.18em;}
  @keyframes blip{0%,100%{opacity:.4;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
  .langset{pointer-events:auto;display:flex;gap:3px;padding:4px;border-radius:99px;background:rgba(6,20,30,.5);border:1px solid rgba(var(--steel),.3);backdrop-filter:blur(8px);}
  .langset button{-webkit-appearance:none;appearance:none;border:none;cursor:pointer;font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);background:transparent;padding:6px 9px;border-radius:99px;}
  .langset button.on{color:#eaf1fb;background:rgba(255,255,255,.14);font-weight:600;}

  #pHud .stats{left:18px;top:44%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;}
  body[dir=rtl] #pHud .stats{left:auto;right:18px;text-align:right;}
  #pHud .stat .num{font-family:var(--serif);font-weight:300;font-size:38px;line-height:.9;color:#f3f6fc;display:block;text-shadow:0 2px 20px rgba(0,0,0,.6);}
  #pHud .stat .lab{font-family:'Azeret Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(150,180,214,.7);margin-top:5px;display:block;}

  .placehead{left:18px;right:18px;bottom:15vh;max-width:340px;}
  body[dir=rtl] .placehead{text-align:right;margin-left:auto;}
  .region{display:flex;align-items:center;gap:10px;}
  body[dir=rtl] .region{flex-direction:row-reverse;justify-content:flex-start;}
  .region .flagline{height:2px;width:30px;background:linear-gradient(90deg,var(--cool),transparent);}
  .placename{font-family:var(--serif);font-weight:300;font-size:clamp(40px,13vw,56px);line-height:.92;letter-spacing:-.02em;margin-top:8px;color:#fbf5e8;text-shadow:0 4px 30px rgba(0,0,0,.7);}
  .coords{margin-top:11px;font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(150,180,214,.75);}
  .heroprov{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px 14px;}
  body[dir=rtl] .heroprov{justify-content:flex-start;}
  .scrollcue{left:0;right:0;bottom:calc(22px + env(safe-area-inset-bottom));text-align:center;pointer-events:auto;cursor:pointer;font-family:'Azeret Mono',monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:rgba(150,180,214,.5);}
  .scrollcue .arr{display:block;margin:8px auto 0;width:16px;height:16px;color:rgba(150,180,214,.5);animation:cue 2.2s ease-in-out infinite;}
  @keyframes cue{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(5px);opacity:1;}}

  /* ===== provenance chips — colour ALWAYS carries a word ===== */
  .pv{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.01em;line-height:1.2;}
  .pv .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
  .pv b{font-weight:600;}
  .pv-gold{color:var(--gold);} .pv-gold .dot{background:var(--gold);box-shadow:0 0 8px 1px var(--gold);}
  .pv-cool{color:var(--cool);} .pv-cool .dot{background:var(--cool);box-shadow:0 0 8px 1px var(--cool);}
  .pv-edit{color:var(--edit);} .pv-edit .dot{background:var(--edit);box-shadow:0 0 8px 1px var(--edit);}
  .pv-autotr{color:var(--autotr);} .pv-autotr .dot{background:var(--autotr);box-shadow:0 0 8px 1px var(--autotr);}

  /* ===== scroll panel over the globe (the v3 dial fix) =====
     .phone is pointer-events:none so the transparent hero region passes taps
     through to the globe canvas and the time-dial #hitring beneath it; only the
     scrolled-in .content re-enables pointer events. */
  .phone{position:relative;z-index:5;width:100%;max-width:430px;margin:0 auto;pointer-events:none;}
  .herospace{height:100dvh;}
  .content{position:relative;padding:0 20px calc(90px + env(safe-area-inset-bottom));background:linear-gradient(to bottom, transparent 0, #04070e 22vh, #04070e 100%);pointer-events:auto;}
  .content::before{content:"";position:absolute;left:0;right:0;top:-1px;height:22vh;background:linear-gradient(to bottom, transparent, #04070e);pointer-events:none;}
  body[dir=rtl] .content{direction:rtl;}

  .sec{margin-top:40px;}
  .sec:first-child{padding-top:8vh;}
  .sec-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .sec-h .t{font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px;}
  .sec-h .t .lp{width:8px;height:8px;border-radius:2px;transform:rotate(45deg);flex:0 0 auto;background:var(--gold);box-shadow:0 0 8px 1px var(--gold);}
  .sec-h .meta{font-family:'Azeret Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;white-space:nowrap;}

  /* MOMENTS */
  .moment{position:relative;border-radius:18px;overflow:hidden;margin-bottom:18px;background:rgba(10,22,28,.6);backdrop-filter:blur(10px);border:1px solid var(--hair);box-shadow:0 24px 60px -34px #000;cursor:pointer;}
  .moment .img{position:relative;aspect-ratio:16/10;background:#0b0e14;}
  .moment .img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .moment .img .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(190,210,235,.4);font-family:var(--serif);font-style:italic;font-size:14px;}
  .moment .img::after{content:"";position:absolute;inset:0;background:linear-gradient(to top, rgba(6,16,20,.92), transparent 48%);}
  .moment .frame{position:absolute;inset:9px;z-index:2;pointer-events:none;}
  .moment .frame span{position:absolute;width:16px;height:16px;border:1.5px solid rgba(var(--steel),.6);}
  .moment .frame .tl{left:0;top:0;border-right:0;border-bottom:0;}
  .moment .frame .tr{right:0;top:0;border-left:0;border-bottom:0;}
  .moment .frame .bl{left:0;bottom:0;border-right:0;border-top:0;}
  .moment .frame .br{right:0;bottom:0;border-left:0;border-top:0;}
  .moment .stamp{position:absolute;left:15px;right:15px;bottom:12px;z-index:3;display:flex;align-items:center;gap:10px;}
  body[dir=rtl] .moment .stamp{flex-direction:row-reverse;}
  .moment .stamp .yr{font-family:'Azeret Mono',monospace;font-size:12px;color:var(--gold-hi);letter-spacing:.14em;padding:3px 8px;border-radius:6px;background:rgba(243,205,132,.12);border:1px solid rgba(243,205,132,.3);white-space:nowrap;}
  .moment .stamp .ppl{font-size:11.5px;color:#e7d6c2;}
  .moment .body{padding:15px 17px 17px;}
  .moment .words{font-family:var(--serif);font-style:italic;font-weight:300;font-size:16px;line-height:1.5;color:#f6ecd7;}
  .moment .told{margin-top:12px;}
  .invite{padding:16px;border-radius:14px;border:1px dashed rgba(243,205,132,.4);background:rgba(243,205,132,.06);}
  .invite .words{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.5;color:#efe0c2;}
  .invite .cta{margin-top:10px;font-size:12px;color:var(--gold);font-weight:600;}
  .soft{padding:16px;border-radius:14px;border:1px dashed rgba(243,205,132,.35);background:rgba(243,205,132,.05);font-family:var(--serif);font-style:italic;font-size:14px;color:#efe0c2;}

  /* SEEN HERE */
  .faces{display:flex;gap:16px;overflow-x:auto;margin:0 -20px;padding:4px 20px 8px;}
  .faces::-webkit-scrollbar{display:none;}
  .face{flex:0 0 auto;width:76px;text-align:center;cursor:pointer;}
  .face .node{position:relative;width:68px;height:68px;margin:0 auto;}
  .face .crop{position:absolute;inset:4px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(243,205,132,.55);box-shadow:0 0 18px -2px rgba(243,205,132,.5);}
  .face .crop svg,.face .crop img,.face .crop canvas{width:100%;height:100%;object-fit:cover;display:block;}
  .face .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(var(--steel),.35);animation:spin 9s linear infinite;}
  .face .ring::before{content:"";position:absolute;top:-2px;left:50%;width:4px;height:4px;border-radius:50%;background:rgba(var(--steel),1);box-shadow:0 0 8px 1px rgba(var(--steel),.9);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .face .fn{font-family:var(--serif);font-size:13px;margin-top:9px;color:var(--cream);line-height:1.12;}
  .face.more .crop{display:grid;place-items:center;background:rgba(var(--steel),.12);border-color:rgba(var(--steel),.45);box-shadow:none;}
  .face.more .cnt{font-family:'Azeret Mono',monospace;font-size:16px;color:var(--muted);}

  /* NAMES OF THIS PLACE */
  .names{display:flex;flex-direction:column;gap:10px;}
  .nrow{border-radius:16px;background:var(--panel);border:1px solid var(--hair);padding:13px 15px;}
  .nrow.sug{border-color:rgba(201,162,255,.42);background:rgba(201,162,255,.07);}
  .nrow .ntop{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .nrow .lang{font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
  .nval{font-family:var(--serif);font-size:23px;color:var(--cream);line-height:1.1;margin-top:3px;}
  .nmeta{margin-top:9px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .waitchip{font-family:'Azeret Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--edit);border:1px solid rgba(201,162,255,.42);border-radius:99px;padding:3px 9px;}
  .kact{display:flex;gap:8px;margin-top:12px;align-items:center;}
  .kbtn{font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;border-radius:10px;padding:8px 14px;border:1px solid transparent;}
  .kbtn.ok{color:#08130b;background:linear-gradient(180deg,#a9e6ba,var(--leaf));}
  .kbtn.no{color:var(--muted);background:transparent;border-color:var(--hair);}
  .kbtn.no:active{border-color:#e6907f;color:#f0b3a6;}

  /* DOORS — neutral navigation, no provenance colour */
  .doors{display:flex;flex-direction:column;gap:11px;}
  .door{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:16px;position:relative;overflow:hidden;background:rgba(10,22,28,.55);backdrop-filter:blur(10px);border:1px solid var(--hair);cursor:pointer;transition:border-color .25s ease;}
  .door::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(var(--steel),.55);}
  body[dir=rtl] .door::before{left:auto;right:0;}
  .door:active{border-color:rgba(var(--steel),.5);}
  .door .di{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;background:rgba(var(--steel),.12);color:var(--muted);}
  .door .di svg{width:19px;height:19px;}
  .door .dt{flex:1;min-width:0;}
  .door .dt .l{font-family:var(--serif);font-size:17px;color:var(--cream);}
  .door .dt .s{font-size:12px;color:var(--muted);margin-top:2px;}
  .door .chev svg{width:16px;height:16px;color:var(--muted);}
  body[dir=rtl] .door .chev svg{transform:scaleX(-1);}

  .foot{margin-top:44px;text-align:center;}
  .foot .leaf{font-family:var(--serif);font-style:italic;font-size:14px;color:rgba(var(--steel),.85);}

  /* lightbox: full moment view */
  #lightbox{position:fixed;inset:0;z-index:16;background:rgba(2,4,9,.95);display:none;flex-direction:column;padding:calc(14px + env(safe-area-inset-top)) 18px calc(22px + env(safe-area-inset-bottom));}
  #lightbox.show{display:flex;}

<script>
/* =========================================================================
   THE LIVING GLOBE — real data. Reads the live Supabase forest on your login
   (shared session, same origin as the app). Place & time come from the photos
   people appear in — real facts a contributor entered, never invented.
   ========================================================================= */
const $ = s => document.querySelector(s);
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

const SUPABASE_URL = 'https://oabcdrktuikifbormjip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MnuwKTP5JaUy-P8-bKWsgA_f98esOXC';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---- known place coordinates (real places from your photos) ---- */
const GEO = {
  'tel-aviv jaffo, israel':[32.0663,34.7778], 'tel aviv jaffo, israel':[32.0663,34.7778],
  'new york':[40.7128,-74.0060], 'holon, israel':[32.0111,34.7722],
  'rybinsk, russia':[58.0446,38.8426], 'pardes hana, israel':[32.4753,34.9714],
  'yavne, israel':[31.8776,34.7396], 'rishon le-tsion':[31.9730,34.7925],
  'rishon le-tsion, israel':[31.9730,34.7925], 'morschach, switzerland':[46.9722,8.5850],
  'hamashot 14, yavne':[31.8776,34.7396],
};
const geoCache = {};
async function geocode(place){
  if(!place) return null;
  const key = place.trim().toLowerCase().replace(/\s+/g,' ');
  if(GEO[key]) return GEO[key];
  if(geoCache[key]!==undefined) return geoCache[key];
  // best-effort fallback for any place not in the table
  try{
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(place));
    const j = await r.json();
    const hit = j && j[0] ? [parseFloat(j[0].lat), parseFloat(j[0].lon)] : null;
    geoCache[key]=hit; return hit;
  }catch(e){ geoCache[key]=null; return null; }
}
function parseYear(s){ if(s==null) return null; const m=String(s).match(/(19|20)\d{2}/); return m?+m[0]:null; }

/* ---- three basics (init immediately) ---- */
const R=100, mount=$('#mount');
    /* ---- Place mode: same globe, current place highlighted ---- */
    const PLACE = new URLSearchParams(location.search).get('place');

let W=mount.clientWidth, H=mount.clientHeight;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(32, W/H, 1, 4000); camera.position.set(0,0,320);
const renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(2, devicePixelRatio||1)); renderer.setSize(W,H);
mount.appendChild(renderer.domElement);
const globe=new THREE.Group(); scene.add(globe); globe.rotation.set(0.35,-1.2,0);
let homeX=0.35;

function ll2v(lat,lng,r){ const phi=(90-lat)*Math.PI/180, th=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(th)); }
function smooth(a,b,x){ const t=Math.min(1,Math.max(0,(x-a)/(b-a))); return t*t*(3-2*t); }

globe.add(new THREE.Mesh(new THREE.SphereGeometry(R*0.997,64,64), new THREE.MeshBasicMaterial({color:0x0a1526})));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.16,64,64), new THREE.ShaderMaterial({
  transparent:true, side:THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false,
  uniforms:{c:{value:new THREE.Color(0x2f77b0)}},
  vertexShader:'varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} ',
  fragmentShader:'varying vec3 vN; uniform vec3 c; void main(){ float i=pow(0.62-dot(vN,vec3(0.0,0.0,1.0)),3.0); gl_FragColor=vec4(c,1.0)*clamp(i,0.0,1.0)*0.9; }'
})));
const gmat=new THREE.LineBasicMaterial({color:0x2a5470, transparent:true, opacity:0.32});
for(let lat=-60;lat<=60;lat+=30){ const p=[]; for(let l=-180;l<=180;l+=4) p.push(ll2v(lat,l,R*1.001)); globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(p), gmat)); }
for(let lng=-180;lng<180;lng+=30){ const p=[]; for(let a=-88;a<=88;a+=4) p.push(ll2v(a,lng,R*1.001)); globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(p), gmat)); }
fetch('https://unpkg.com/world-atlas@2/countries-110m.json').then(r=>r.json()).then(topo=>{
  const geo=topojson.feature(topo, topo.objects.countries); const seg=[];
  const addRing=ring=>{ for(let i=0;i<ring.length-1;i++){ const a=ll2v(ring[i][1],ring[i][0],R*1.002), b=ll2v(ring[i+1][1],ring[i+1][0],R*1.002); seg.push(a.x,a.y,a.z,b.x,b.y,b.z);} };
  geo.features.forEach(f=>{ const g=f.geometry; if(!g)return; if(g.type==='Polygon') g.coordinates.forEach(addRing); else if(g.type==='MultiPolygon') g.coordinates.forEach(poly=>poly.forEach(addRing)); });
  const bg=new THREE.BufferGeometry(); bg.setAttribute('position', new THREE.Float32BufferAttribute(seg,3));
  globe.add(new THREE.LineSegments(bg, new THREE.LineBasicMaterial({color:0x4d86a0, transparent:true, opacity:0.55})));
}).catch(e=>console.warn('coastlines unavailable', e));

/* textures */
function glowTex(){ const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');const rg=g.createRadialGradient(64,64,0,64,64,64);rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(.25,'rgba(255,255,255,.85)');rg.addColorStop(.5,'rgba(255,255,255,.28)');rg.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=rg;g.fillRect(0,0,128,128);return new THREE.CanvasTexture(c); }
function spikeTex(){ const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');g.translate(64,64);for(let k=0;k<2;k++){const grd=g.createLinearGradient(-64,0,64,0);grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(.5,'rgba(255,255,255,.9)');grd.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=grd;g.fillRect(-64,-1,128,2);g.rotate(Math.PI/2);}return new THREE.CanvasTexture(c); }
function ringTex(){ const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');g.strokeStyle='rgba(255,255,255,.9)';g.lineWidth=2.5;g.beginPath();g.arc(64,64,52,0,Math.PI*2);g.stroke();return new THREE.CanvasTexture(c); }
const glow=glowTex(), spike=spikeTex(), ringT=ringTex();
const GOLD=0xffcf7e, CORE=0xfff2d0, COOL=0x7fb4d8;
function spr(tex,size,col,op){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,color:col,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false})); s.scale.set(size,size,1); return s; }

/* ---- runtime state ---- */
let PEOPLE=[], TIES=[], Y_MIN=2000, Y_MAX=2025, YEAR=2025;
const pickables=[]; const pointsGroup=new THREE.Group(); globe.add(pointsGroup);
const tiesGroup=new THREE.Group(); globe.add(tiesGroup); const flow=[];
const dialSvg=$('#dial svg'), handleEl=$('#handle'), ticksEl=$('#ticks');

/* ---- load real data ---- */
async function load(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ showSignIn(); return; }
  try{
    const [ppl, rels, arts, subs] = await Promise.all([
      sb.from('people').select('id,display_name,called_name'),
      sb.from('relationships').select('from_person,to_person,kind'),
      sb.from('artefacts').select('id,body,certainty,metadata,storage_path,contributor_id').eq('status','published'),
      sb.from('artefact_subjects').select('artefact_id,person_id,detail'),
    ]);
    if(ppl.error) throw ppl.error;
    // the teller is a person (contributor_id), never the uploading account
    const provName = {}; (ppl.data||[]).forEach(p=> provName[p.id]=p.display_name);
    const artById = {}; (arts.data||[]).forEach(a=>{ a._year=parseYear(a.metadata&&a.metadata.when); a._where=(a.metadata&&a.metadata.where)||''; artById[a.id]=a; });
    // subjects per person and per artefact
    const perPerson = {}; // id -> [{art, box}]
    (subs.data||[]).forEach(s=>{ const a=artById[s.artefact_id]; if(!a) return;
      (perPerson[s.person_id]=perPerson[s.person_id]||[]).push({art:a, box:s.detail}); });
    // geocode every distinct place first
    const places = [...new Set((arts.data||[]).map(a=>a._where).filter(Boolean))];
    const coords = {}; for(const pl of places){ coords[pl] = await geocode(pl); }
    // generations from parent graph (from_person = parent -> to_person = child)
    const children = {}; (rels.data||[]).forEach(r=>{ if(r.kind==='parent'){ (children[r.from_person]=children[r.from_person]||[]).push(r.to_person); } });
    const genMemo={}; function gen(id,seen){ if(genMemo[id]!==undefined) return genMemo[id]; seen=seen||{}; if(seen[id]) return 0; seen[id]=1; const ch=children[id]||[]; let g=0; ch.forEach(c=>{ g=Math.max(g,1+gen(c,seen)); }); return genMemo[id]=g; }

    // build PEOPLE
    let ymin=9999, ymax=0;
    const built=[];
    (ppl.data||[]).forEach(p=>{
      const recs=(perPerson[p.id]||[]).filter(r=>r.art._where && coords[r.art._where]);
      const name = p.called_name || p.display_name || 'Someone';
      const memoryCount=(perPerson[p.id]||[]).length;
      if(!recs.length){ built.push({id:p.id,name,waiting:true,memoryCount,gen:gen(p.id),lat:0,lng:0,born:null}); return; }
      // (year, place) points sorted by year
      const pts=recs.map(r=>({y:r.art._year||null, place:r.art._where, lat:coords[r.art._where][0], lng:coords[r.art._where][1], art:r.art, box:r.box}))
                    .filter(x=>x.y!=null).sort((a,b)=>a.y-b.y);
      const usable = pts.length?pts:recs.map(r=>({y:null,place:r.art._where,lat:coords[r.art._where][0],lng:coords[r.art._where][1],art:r.art,box:r.box}));
      const born = pts.length? pts[0].y : (ymax||2000);
      const last = usable[usable.length-1];
      const path=usable.map(x=>({y:x.y, lat:x.lat, lng:x.lng}));
      if(pts.length) { ymin=Math.min(ymin,pts[0].y); ymax=Math.max(ymax,pts[pts.length-1].y); }
      built.push({ id:p.id, name, gen:gen(p.id), memoryCount, waiting:false,
        born, lat:last.lat, lng:last.lng, place:last.place, _pk:last.lat.toFixed(3)+','+last.lng.toFixed(3),
        path: path.length>1?path:null, records:usable });
    });
    // fan co-located people apart (phyllotaxis) so a crowded city separates when you zoom
    const _fg={}; built.forEach(q=>{ if(q.waiting) return; (_fg[q._pk]=_fg[q._pk]||[]).push(q); });
    Object.values(_fg).forEach(g=>{ if(g.length<2) return; const spread=0.7;
      g.forEach((q,i)=>{ const a=i*2.399963, rad=spread*Math.sqrt(i+0.5);
        const dlat=rad*Math.cos(a), dlng=rad*Math.sin(a)/Math.max(0.2,Math.cos(q.lat*Math.PI/180));
        q.lat+=dlat; q.lng+=dlng; if(q.path) q.path.forEach(pt=>{ pt.lat+=dlat; pt.lng+=dlng; }); }); });
    if(ymin>ymax){ ymin=2000; ymax=2025; }
    Y_MIN=ymin; Y_MAX=ymax;
    PEOPLE = built;
    // ties from relationships (both endpoints placed)
    const byId={}; PEOPLE.forEach(p=>byId[p.id]=p);
    TIES = (rels.data||[]).filter(r=>byId[r.from_person] && byId[r.to_person] && !byId[r.from_person].waiting && !byId[r.to_person].waiting)
      .map(r=>({a:r.from_person, b:r.to_person, kind:r.kind,
        fy: Math.max(byId[r.from_person].born||Y_MIN, byId[r.to_person].born||Y_MIN)}));
    PEOPLE._prov=provName;
    buildScene();
    if(PLACE && coords[PLACE]) focusPlace(coords[PLACE][0], coords[PLACE][1], PLACE);
    $('#gate').style.display='none';
  }catch(err){ gateError(err.message||'Could not read the forest.'); }
}

/* ---- build scene from PEOPLE/TIES ---- */
function rarity(p){ if(p.waiting) return {core:1.7,halo:5.0,spikes:false,ring:false,cool:true};
  const m=Math.min(4, (p.memoryCount||1)); const g=Math.min(4,p.gen||0);
  const size=Math.max(m, g*0.9);
  return {core:2.0+size*0.7, halo:3.2+size*0.5, spikes:g>=2||m>=3, ring:g>=3, cool:false}; }

function buildScene(){
  const byId={}; PEOPLE.forEach(p=>byId[p.id]=p);
  PEOPLE.forEach(p=>{
    const r=rarity(p); const grp=new THREE.Group();
    const halo=spr(glow, r.halo*2.2, r.cool?COOL:GOLD, r.cool?0.5:0.6); grp.add(halo);
    const core=spr(glow, r.core*1.5, r.cool?0xbfe0f4:CORE, 0.95); grp.add(core);
    let spikeS=null, ringS=null;
    if(r.spikes){ spikeS=spr(spike, r.halo*3.0, 0xffe6b0, 0.55); grp.add(spikeS); }
    if(r.ring){ ringS=spr(ringT, r.halo*2.4, 0xffdd9a, 0.5); grp.add(ringS); }
    const hit=new THREE.Mesh(new THREE.SphereGeometry(6,8,8), new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
    grp.add(hit); hit.userData={p}; pickables.push(hit);
    grp.userData={p,r,halo,core,spikeS,ringS};
    if(p.waiting){ grp.visible=false; }  // waiting people have no place to sit yet
    pointsGroup.add(grp); p._grp=grp;
  });
  // ties
  function arcCurve(a,b,r){ const va=a.clone().normalize(), vb=b.clone().normalize(); const ang=Math.max(1e-4,va.angleTo(vb)); const lift=r*(0.05+0.2*Math.min(1,ang/Math.PI)); const pts=[]; for(let i=0;i<=48;i++){ const t=i/48; const s=Math.sin((1-t)*ang)/Math.sin(ang), e=Math.sin(t*ang)/Math.sin(ang); const pp=va.clone().multiplyScalar(s).add(vb.clone().multiplyScalar(e)).normalize(); pp.multiplyScalar(r+Math.sin(Math.PI*t)*lift); pts.push(pp);} return new THREE.CatmullRomCurve3(pts); }
  TIES.forEach(t=>{ const A=byId[t.a], B=byId[t.b]; if(!A||!B) return;
    const va=ll2v(A.lat,A.lng,R), vb=ll2v(B.lat,B.lng,R);

    }catch(e){} }
  /* deterministic placeholder portrait when no cropped face exists yet */
  const SKIN=['#e6c49b','#d9b083','#e0b98d','#eac6a0','#dcb58c'], HAIRC=['#8a6a4a','#3a3a3a','#4a3a2a','#b8b0a4','#2b2320','#cfc7bb','#5a4030'], BGC=['#3a2a1e','#2a3446','#243449','#2c2a1e','#243a30'];
  function hash(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return Math.abs(h); }
  function facePortrait(name){ const h=hash(name||'x'), skin=SKIN[h%SKIN.length], hair=HAIRC[(h>>3)%HAIRC.length], bg=BGC[(h>>5)%BGC.length], gray=(h>>7)%3===0;
    return '<svg viewBox="0 0 100 100"><rect width="100" height="100" fill="'+bg+'"/><ellipse cx="50" cy="47" rx="23" ry="26" fill="'+skin+'"/><path d="M50 96 Q50 70 27 66 Q31 42 50 42 Q69 42 73 66 Q50 70 50 96Z" fill="'+hair+'"/><path d="M27 44 Q31 23 50 23 Q69 23 73 44 Q61 33 50 33 Q39 33 27 44Z" fill="'+(gray?'#cfc7bb':hair)+'"/></svg>'; }
  const pv=(kind,word)=>'<span class="pv pv-'+kind+'"><span class="dot"></span>'+word+'</span>';

  /* =============== NAMES (single language, keeper-gated suggestions) ===============
     No place-name store exists yet (CLAUDE.md §9: place_facts is unbuilt), so the
     data is: the one located name of this place. The render path below ALSO handles
     a still-pending name suggestion — violet + "Suggested by …" + waiting chip,
     shown in FAMILY view per Leon's 2026-07-18 ruling, with Approve/Decline surfaced
     only to the keeper. With no store, `suggestion` is always null today; the empty
     structure + engine stand ready for Leon to fill on review (§1). */
  function nameRow(langOfValue, value, prov, suggestion){
    const t=T[lang]; const sug = !!suggestion;
    const shownVal = sug ? suggestion.value : value;
    const shownProv = sug ? 'edit' : prov;
    const heCls = langOfValue==='he' ? ' he-text' : '';
    let h='<div class="nrow'+(sug?' sug':'')+'">';
    h+='<div class="ntop"><span class="lang">'+t.lang[langOfValue]+'</span></div>';
    h+='<div class="nval'+heCls+'">'+esc(shownVal)+'</div>';
    h+='<div class="nmeta">'+pv(shownProv, shownProv==='gold'?t.told:(shownProv==='edit'?t.waitingkeeper:t.locatedapp));
    if(sug) h+='<span class="pv pv-edit" style="gap:5px">'+t.suggestedby+' <b>'+esc(suggestion.by||t.you)+'</b></span>';
    h+='</div>';
    if(sug){
      if(isKeeper) h+='<div class="kact"><button class="kbtn ok" data-nact="approve">'+t.approve+'</button><button class="kbtn no" data-nact="decline">'+t.decline+'</button></div>';
      else h+='<div class="kact"><span class="waitchip mono">'+t.waiting+'</span></div>';
    }
    h+='</div>';
    return h;
  }

  /* =============== the whole content panel =============== */
  function render(){
    if(!model) return;
    const t=T[lang], m=model;
    document.documentElement.lang=lang; document.documentElement.dir=isHe()?'rtl':'ltr'; document.body.dir=isHe()?'rtl':'ltr';

    /* hero */
    $('pOnglobe').textContent=t.onglobe;
    $('pRegion').textContent=m.region||t.region;
    $('pName').innerHTML='<span class="'+(isHe()?'he-text':'')+'">'+esc(m.name)+'</span>';
    $('pCoords').innerHTML=m.coords||'';
    // the app geocoded/located this place → cool "Located by the app" (honest provenance)
    $('pPlacement').innerHTML=pv('cool', t.locatedapp);
    $('pLeaf').textContent=t.leaf;
    $('tNames').textContent=t.names; $('tMoments').textContent=t.moments; $('tSeen').textContent=t.seen; $('tWays').textContent=t.ways;
    document.querySelector('#pScrollcue').childNodes[0].nodeValue=t.story+' ';

    /* side stats (real counts) */
    const yrs=m.years.length?(Math.max.apply(null,m.years)-Math.min.apply(null,m.years)||1):0;
    const stats=[[m.nPhotos, m.nPhotos===1?t.photograph:t.photographs],[m.nPeople, m.nPeople===1?t.person:t.people]];
    if(yrs) stats.push([yrs+1, t.years]);
    $('pStats').innerHTML=stats.map(s=>'<div class="stat"><span class="num serif">'+s[0]+'</span><span class="lab">'+s[1]+'</span></div>').join('');

    /* language switch active state */
    document.querySelectorAll('#pLang button').forEach(b=>b.classList.toggle('on', b.dataset.lang===lang));

    /* names — one language, keeper-gated suggestion path (no store → no suggestion yet) */
    $('names').innerHTML=nameRow(lang, m.name, m.nameProv, m.nameSuggestion&&m.nameSuggestion[lang]);

    /* moments */
    $('mMeta').textContent=m.nPhotos+' '+(m.nPhotos===1?t.photograph:t.photographs);
    if(m.moments.length){
      $('moments').innerHTML=m.moments.map((mo,i)=>{
        const img = mo.path ? '<img data-msrc="'+i+'" alt="">' : '<div class="ph">'+t.photograph+'</div>';
        const body = mo.body
          ? '<div class="words">“'+esc(mo.body)+'”</div>'+(mo.teller?'<div class="told">'+pv('gold', t.toldby+' <b>'+esc(mo.teller)+'</b>')+'</div>':'')
          : '<div class="invite"><div class="words">'+t.emptyw+'</div><div class="cta">'+t.emptyc+'</div></div>';
        return '<div class="moment" data-m="'+i+'"><div class="img">'+img+
          '<span class="frame"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></span>'+
          '<div class="stamp"><span class="yr mono">'+esc(mo.yr)+'</span>'+(mo.ppl?'<span class="ppl">'+esc(mo.ppl)+'</span>':'')+'</div></div>'+
          '<div class="body">'+body+'</div></div>';
      }).join('');
    } else $('moments').innerHTML='<div class="soft">'+t.nomoments+'</div>';

    /* faces */
    $('fMeta').textContent=m.nPeople+' '+(m.nPeople===1?t.person:t.people);
    if(m.faces.length){
      let fh=m.faces.map(f=>'<div class="face" data-id="'+esc(f.id)+'"><div class="node"><span class="ring"></span><div class="crop" data-face="'+esc(f.id)+'">'+facePortrait(f.name)+'</div></div><div class="fn'+(isHe()?' he-text':'')+'">'+esc(firstName(f.name))+'</div></div>').join('');
      if(m.moreFaces>0) fh+='<div class="face more"><div class="node"><div class="crop"><span class="cnt mono">+'+m.moreFaces+'</span></div></div><div class="fn">'+t.more+'</div></div>';
      $('faces').innerHTML=fh;
    } else $('faces').innerHTML='<div class="soft">'+t.noseen+'</div>';

    /* doors */
    const door=(path,l,s,go,circle)=>'<div class="door" data-go="'+go+'"><div class="di">'+(circle?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="'+path+'"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="'+path+'"/></svg>')+'</div><div class="dt"><div class="l">'+l+'</div><div class="s">'+s+'</div></div><div class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div></div>';
    $('doors').innerHTML=
      door('M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18', t.dGlobe, t.dGlobeS, 'globe', true)+
      door('M9 9m-3 0a3 3 0 106 0a3 3 0 10-6 0M3 20c0-3 2.7-5 6-5s6 2 6 5M16 6a3 3 0 010 6M21 20c0-2.4-1.6-4.2-4-4.8', t.dSeen, t.dSeenS, 'faces', false)+
      door('M4 5h16v11H8l-4 4z', t.dMoments, t.dMomentsS, 'moments', false);

    /* fill real photos after DOM exists */
    document.querySelectorAll('#faces .crop[data-face]').forEach(el=>{ const id=el.getAttribute('data-face'); const f=m.faceAsset[id]; if(f&&f.path) faceInto(el,f.path,f.box); });
    document.querySelectorAll('#moments .img img[data-msrc]').forEach(async el=>{ const mo=m.moments[+el.getAttribute('data-msrc')]; if(mo&&mo.path){ const u=await signedUrl(mo.path); if(u) el.src=u; } });
  }

  /* ---- lightbox (full moment) ---- */
  const lb=$('lightbox');
  function closeLb(){ if(lb) lb.classList.remove('show'); }
  if(lb){ const x=lb.querySelector('.lx-x'); if(x) x.addEventListener('click',closeLb); lb.addEventListener('click',e=>{ if(e.target===lb) closeLb(); }); }
  async function openLb(mo){ if(!lb||!mo) return; const t=T[lang];
    lb.querySelector('.lx-img').innerHTML = mo.path ? '<img alt="">' : '<div class="none">'+t.emptyw+'</div>';
    lb.querySelector('.lx-yr').textContent = mo.yr || '';
    lb.querySelector('.lx-ppl').innerHTML = (mo.pplList||[]).map(n=>'<span class="tag">'+esc(n)+'</span>').join('');
    lb.querySelector('.lx-story').innerHTML = mo.body ? '“'+esc(mo.body)+'”' : '<span style="color:rgba(205,191,164,.85);font-style:italic">'+t.emptyw+'</span>';
    lb.querySelector('.lx-told').innerHTML = (mo.body && mo.teller) ? (t.toldby+' <b>'+esc(mo.teller)+'</b>') : '';
    const nEl=$('lxNote'); if(nEl) nEl.innerHTML = mo.id ? '<a href="moment-real.html?id='+encodeURIComponent(mo.id)+'" style="color:#f3cd84;text-decoration:none;font-weight:600;font-size:13.5px;">Open the full moment →</a>' : '';
    lb.classList.add('show');
    if(mo.path){ const u=await signedUrl(mo.path); const im=lb.querySelector('.lx-img img'); if(im&&u) im.src=u; }
  }

  /* ---- static event wiring (once) ---- */
  $('pBack').addEventListener('click', ()=>{ try{history.back();}catch(e){ location.href='index.html'; } });
  $('pScrollcue').addEventListener('click', ()=>{ const c=document.querySelector('.content'); if(c) c.scrollIntoView({behavior:'smooth',block:'start'}); });
  $('pLang').addEventListener('click', async e=>{ const b=e.target.closest('button'); if(!b) return; const nl=b.dataset.lang; if(!T[nl]||nl===lang) return;
    lang=nl; try{localStorage.setItem('lf_lang',nl);}catch(_){}
    try{ const s=(await sb2.auth.getSession()).data.session; if(s) sb2.from('profiles').update({preferred_lang:nl}).eq('id',s.user.id); }catch(_){}
    render(); });
  document.querySelector('.content').addEventListener('click', e=>{
    const mEl=e.target.closest('.moment[data-m]'); if(mEl){ openLb(model.moments[+mEl.getAttribute('data-m')]); return; }
    const fEl=e.target.closest('.face[data-id]'); if(fEl){ const id=fEl.getAttribute('data-id'); if(id) location.href='person-real.html?id='+encodeURIComponent(id); return; }
    const dEl=e.target.closest('.door[data-go]'); if(dEl){ const go=dEl.getAttribute('data-go');
      if(go==='globe'){ location.href='index.html'; } else { const target=go==='faces'?$('faces'):$('moments'); if(target) target.scrollIntoView({behavior:'smooth',block:'start'}); } return; }
    const na=e.target.closest('[data-nact]'); if(na){ /* keeper approve/decline of a place-name suggestion — reserved for the place_facts store (§9); no data today */ return; }
  });

  /* ---- hero fade on scroll (fixed globe + dial dim as the story rises) ---- */
  const pHud=$('pHud'), dial=$('dial'), tr=$('tr');
  function onScroll(){ const y=window.scrollY||window.pageYOffset||0, f=Math.max(0,1-y/(window.innerHeight*0.6));
    [pHud,dial,tr].forEach(el=>{ if(!el) return; el.style.opacity=f; el.style.pointerEvents=f<0.1?'none':''; }); }
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  /* ---- build the model from the live forest ---- */
  async function build(){
    if(!PL) return;                                   /* no ?place= → just the globe */
    let sess=null; try{ sess=(await sb2.auth.getSession()).data.session; }catch(e){}
    if(!sess){ setTimeout(build, 700); return; }       /* wait for the sign-in gate */
    try{ const {data:pr}=await sb2.from('profiles').select('is_keeper,preferred_lang').eq('id',sess.user.id).maybeSingle();
      if(pr){ isKeeper=!!pr.is_keeper; if(pr.preferred_lang && !localStorage.getItem('lf_lang') && T[pr.preferred_lang]) lang=pr.preferred_lang; } }catch(e){}

    const [geoR,artsR,peopleR]=await Promise.all([
      sb2.from('place_geo').select('name,lat,lng,label').eq('name',PL).maybeSingle(),
      sb2.from('artefacts').select('id,kind,body,metadata,storage_path,contributor_id').eq('status','published').eq('metadata->>where',PL),
      sb2.from('people').select('id,display_name,called_name,primary_asset')
    ]);
    const geo=geoR.data||null, arts=artsR.data||[];
    const pById={}; (peopleR.data||[]).forEach(p=>pById[p.id]=p);
    const nameOf=id=>{const p=pById[id];return p?(p.called_name||p.display_name||'Someone'):'Someone';};
    // the teller is a person (contributor_id), never the uploading account (Rule 6)
    const prov={}; (peopleR.data||[]).forEach(p=>prov[p.id]=p.display_name);
    const tellerOf=a=>(a.contributor_id&&prov[a.contributor_id])||'';

    const artById={}; arts.forEach(a=>artById[a.id]=a);
    const byArt={}, seen=[], seenSet={}, faceAsset={};
    if(arts.length){ const subs=await sb2.from('artefact_subjects').select('artefact_id,person_id,detail').in('artefact_id',arts.map(a=>a.id));
      (subs.data||[]).forEach(s=>{ (byArt[s.artefact_id]=byArt[s.artefact_id]||[]).push(s.person_id);
        if(s.person_id&&!seenSet[s.person_id]){seenSet[s.person_id]=1;seen.push(s.person_id);}
        if(s.person_id){ const a=artById[s.artefact_id]; if(a&&a.storage_path){ const cur=faceAsset[s.person_id]; if(!cur||(!cur.box&&s.detail)) faceAsset[s.person_id]={path:a.storage_path,box:s.detail||null}; } } }); }
    arts.sort((x,y)=>{const a=py(x.metadata&&x.metadata.when),b=py(y.metadata&&y.metadata.when);return (isNaN(a)?9999:a)-(isNaN(b)?9999:b);});

    // hero name: the located, canonical place name (app-resolved → cool provenance)
    const head=((geo&&geo.label)||PL||'').split(',')[0].trim() || PL;
    const label=(geo&&geo.label)||PL||'', parts=label.split(',').map(x=>x.trim()).filter(Boolean);
    const region=parts.length>1?parts.slice(1).join(' · '):'';
    const coords = geo && geo.lat!=null && geo.lng!=null
      ? Math.abs(geo.lat).toFixed(2)+'&deg;'+(geo.lat>=0?'N':'S')+' &nbsp; '+Math.abs(geo.lng).toFixed(2)+'&deg;'+(geo.lng>=0?'E':'W') : '';

    const years=arts.map(a=>py(a.metadata&&a.metadata.when)).filter(y=>!isNaN(y));
    const moments=arts.map(a=>{ const md=a.metadata||{}, yr=py(md.when); const pplNames=(byArt[a.id]||[]).map(id=>firstName(nameOf(id)));
      const isImg=(a.kind==='photo'||a.kind==='object')&&a.storage_path;
      return { id:a.id, path:isImg?a.storage_path:'', yr:isNaN(yr)?String(md.when||''):String(yr),
        ppl:joinNames(pplNames), pplList:pplNames, body:a.body||'', teller:tellerOf(a) }; });

    const FACE_CAP=8;
    const faces=seen.slice(0,FACE_CAP).map(id=>({id, name:nameOf(id)}));

    model={
      name:head, region, coords,
      nameProv:(geo&&geo.label)?'cool':'gold',   /* app-canonical label → cool; else the family-typed string → gold */
      nameSuggestion:null,                        /* place_facts store not built yet (§9) */
      years, nPhotos:arts.length, nPeople:seen.length,
      moments, faces, moreFaces:Math.max(0, seen.length-faces.length), faceAsset
    };
    render();
  }
  build();
})();
</script>
</body>
