<!DOCTYPE html>

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#04070e;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#e8eef8;user-select:none;-webkit-user-select:none;touch-action:none;}
  #stage{position:fixed;inset:0;}
  #sky{position:absolute;inset:0;display:block;}
  .serif{font-family:'Newsreader',serif;} .mono{font-family:'Azeret Mono',ui-monospace,monospace;}

  #center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;text-align:center;}
  #center .n{font-family:'Newsreader',serif;font-size:17px;color:#fbf1dc;text-shadow:0 1px 12px rgba(0,0,0,.95);opacity:0;transition:opacity .18s ease;}
  #reticle{position:absolute;left:50%;top:50%;width:34px;height:34px;transform:translate(-50%,-50%);z-index:2;pointer-events:none;opacity:.0;transition:opacity .2s ease;}
  #reticle:before,#reticle:after{content:"";position:absolute;background:rgba(243,205,132,.5);}
  #reticle:before{left:50%;top:0;width:1px;height:10px;transform:translateX(-50%);}
  #reticle:after{left:50%;bottom:0;width:1px;height:10px;transform:translateX(-50%);}

  .chev{position:absolute;top:50%;transform:translateY(-50%);z-index:3;font-size:26px;color:rgba(243,205,132,.55);pointer-events:none;opacity:0;transition:opacity .25s ease;text-shadow:0 0 12px rgba(0,0,0,.8);}
  #chevL{left:12px;} #chevR{right:12px;}

  .hud{position:absolute;z-index:4;padding:clamp(18px,4vw,32px) clamp(20px,4.4vw,38px);pointer-events:none;}
  #tl{left:0;top:0;max-width:80vw;}
  #tl .k{font-family:'Azeret Mono',monospace;font-size:10.5px;letter-spacing:.36em;text-transform:uppercase;color:rgba(150,180,214,.6);margin-bottom:14px;}
  #tl h1{font-family:'Newsreader',serif;font-weight:300;font-size:clamp(28px,7vw,42px);line-height:1.0;margin:0;color:#f3f6fc;letter-spacing:-.01em;}
  #tl h1 em{font-style:italic;color:#f3cd84;}
  #tl p{font-size:13px;line-height:1.55;color:rgba(206,221,240,.58);margin:12px 0 0;max-width:240px;}
  #tr{right:0;top:0;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  #tr a,#tr button{pointer-events:auto;text-decoration:none;font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(206,221,240,.72);border:1px solid rgba(180,205,235,.22);border-radius:999px;padding:8px 14px;background:rgba(10,18,34,.5);backdrop-filter:blur(6px);cursor:pointer;}
  #tr a:active,#tr button:active{color:#f3cd84;border-color:rgba(243,205,132,.5);}
  #bl{left:0;bottom:0;display:flex;align-items:baseline;gap:20px;}
  #bl .stat .v{font-family:'Newsreader',serif;font-weight:300;font-size:26px;color:#f3f6fc;}
  #bl .stat .l{font-family:'Azeret Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(150,180,214,.62);margin-left:7px;}
  #br{right:0;bottom:0;text-align:right;}
  #br .readout{font-family:'Azeret Mono',monospace;font-size:10.5px;line-height:1.7;color:rgba(190,210,235,.55);}
  @media (max-width:560px){ #tl p{display:none;} #br{display:none;} }

  #card{position:absolute;z-index:6;left:50%;bottom:6%;transform:translateX(-50%) translateY(12px);width:min(430px,92vw);opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;}
  #card.show{opacity:1;transform:translateX(-50%);pointer-events:auto;}
  #card .panel{position:relative;display:flex;flex-direction:column;background:rgba(10,18,34,.9);border:1px solid rgba(180,205,235,.16);border-radius:20px;backdrop-filter:blur(18px);box-shadow:0 30px 70px -24px rgba(0,0,0,.8);padding:22px 24px;max-height:86dvh;overflow:hidden;}
  #card .x{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(210,222,244,.28);background:rgba(10,18,34,.7);display:flex;align-items:center;justify-content:center;color:rgba(230,238,250,.9);font-size:17px;cursor:pointer;z-index:2;}
  #card .top{display:flex;gap:16px;align-items:center;flex:0 0 auto;padding-right:30px;}
  #card .cbody{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-right:4px;}
  #card .disc{position:relative;width:64px;height:64px;flex:none;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 50% 42%, rgba(255,231,180,.35) 0%, rgba(210,150,60,.18) 55%, rgba(16,24,42,.85) 100%);box-shadow:0 0 22px 4px rgba(255,206,120,.28), inset 0 0 0 1px rgba(255,220,150,.4);display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-style:italic;font-size:10px;color:rgba(255,238,205,.6);}
  #card .disc canvas,#card .disc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #card .nm{font-family:'Newsreader',serif;font-size:22px;color:#f4ecdb;line-height:1.12;}

  #card .meet{display:inline-block;margin-top:10px;font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:.08em;color:#f3cd84;text-decoration:none;border:1px solid rgba(243,205,132,.4);border-radius:999px;padding:6px 12px;}
  #card .story{margin-top:15px;padding-top:14px;border-top:1px solid rgba(180,205,235,.12);font-size:13px;line-height:1.55;color:#e9eff9;}

  #gate{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(4,7,14,.74);backdrop-filter:blur(6px);padding:24px;}

  #gate h2{font-family:'Newsreader',serif;font-weight:300;font-size:24px;margin:6px 0;color:#f4ecdb;}
  #gate p{font-size:13px;color:rgba(206,221,240,.65);line-height:1.5;margin:0 0 16px;}
  #gate input{width:100%;background:#0a1220;border:1px solid rgba(180,205,235,.2);border-radius:12px;color:#eef2fb;padding:12px 13px;font-size:15px;font-family:inherit;margin-top:8px;outline:none;}
  #gate input:focus{border-color:#f3cd84;}
  #gate button{width:100%;margin-top:14px;background:linear-gradient(180deg,#ffe6ad,#f3cd84);color:#3a2a05;font-weight:700;font-family:inherit;font-size:15px;padding:13px;border:none;border-radius:13px;cursor:pointer;}
  #gate .msg{margin-top:12px;font-size:12.5px;color:#ff9a8f;min-height:16px;}
  #gate .spin{display:inline-block;width:34px;height:34px;border:3px solid rgba(243,205,132,.25);border-top-color:#f3cd84;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>

<body>
<div id="stage">
  <canvas id="sky"></canvas>
  <div id="reticle"></div>

  <div class="chev" id="chevL">‹</div>
  <div class="chev" id="chevR">›</div>

  <div class="hud" id="tl">
    <div class="k">The Living Forest</div>
    <h1 class="serif">The whole<br><em>sky.</em></h1>

  </div>

    <button id="recenter">⌖ recentre</button>

    <div class="stat"><span class="v serif" id="stPeople">—</span><span class="l">people</span></div>

    <div class="x" id="cardX">&times;</div>

      <div class="disc" id="cDisc">photo</div>

<script>
/* =========================================================================
   THE LIVING FOREST — HOME (the sky), from the inside. You stand at the centre;
   your family surrounds you on a sphere in every direction. Drag to look around
   (360° wrap, gentle tilt), pinch as a telescope (clamped to your data), and a
   full turn returns you where you began. Real data on your login. Nothing invented.
   ========================================================================= */
const $ = s => document.querySelector(s);
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const SUPABASE_URL='https://oabcdrktuikifbormjip.supabase.co';
const SUPABASE_KEY='sb_publishable_MnuwKTP5JaUy-P8-bKWsgA_f98esOXC';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GEO = {
  'tel-aviv jaffo, israel':[32.0663,34.7778],'tel aviv jaffo, israel':[32.0663,34.7778],
  'new york':[40.7128,-74.0060],'holon, israel':[32.0111,34.7722],'rybinsk, russia':[58.0446,38.8426],
  'pardes hana, israel':[32.4753,34.9714],'yavne, israel':[31.8776,34.7396],'rishon le-tsion':[31.9730,34.7925],
  'rishon le-tsion, israel':[31.9730,34.7925],'morschach, switzerland':[46.9722,8.5850],'hamashot 14, yavne':[31.8776,34.7396],
};
const geoCache={};
async function geocode(place){ if(!place) return null; const key=place.trim().toLowerCase().replace(/\s+/g,' ');
  if(GEO[key]) return GEO[key]; if(geoCache[key]!==undefined) return geoCache[key];
  try{ const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(place));
    const j=await r.json(); const hit=j&&j[0]?[parseFloat(j[0].lat),parseFloat(j[0].lon)]:null; geoCache[key]=hit; return hit; }
  catch(e){ geoCache[key]=null; return null; } }
function parseYear(s){ if(s==null) return null; const m=String(s).match(/(19|20)\d{2}/); return m?+m[0]:null; }
function hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

const R=100, TAU=Math.PI*2;
const cv=$('#sky');
const renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
const scene=new THREE.Scene();
let W=innerWidth,H=innerHeight;
const camera=new THREE.PerspectiveCamera(62, W/H, 0.1, 1000);
camera.position.set(0,0,0);
const FOV_MIN=16, FOV_MAX=94;
function resize(){ W=innerWidth; H=innerHeight; renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix(); }
resize(); addEventListener('resize', resize);

/* look-around state */
let yaw=0, pitch=0, fov=62, vyaw=0, vpitch=0, homeYaw=0, homePitch=0;
let recentering=false;
const PITCH_LIMIT=1.13;

let NODES=[], prov={};
const glowTex=makeGlow();
function makeGlow(){ const c=document.createElement('canvas'); c.width=c.height=64; const g=c.getContext('2d');
  const gr=g.createRadialGradient(32,32,0,32,32,32); gr.addColorStop(0,'rgba(255,255,255,1)'); gr.addColorStop(0.25,'rgba(255,255,255,.85)');
  gr.addColorStop(0.55,'rgba(255,255,255,.25)'); gr.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=gr; g.fillRect(0,0,64,64);
  const t=new THREE.CanvasTexture(c); return t; }

async function load(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ showSignIn(); return; }
  try{
    const [ppl, rels, arts, subs] = await Promise.all([
      sb.from('people').select('id,display_name,called_name'),
      sb.from('relationships').select('from_person,to_person,kind'),
      sb.from('artefacts').select('id,body,certainty,metadata,storage_path,contributor_id').eq('status','published'),
      sb.from('artefact_subjects').select('artefact_id,person_id,detail'),
    ]);
    if(ppl.error) throw ppl.error;
    // the teller is a person (contributor_id), never the uploading account
    (ppl.data||[]).forEach(p=> prov[p.id]=p.display_name);
    const artById={}; (arts.data||[]).forEach(a=>{ a._year=parseYear(a.metadata&&a.metadata.when); a._where=(a.metadata&&a.metadata.where)||''; artById[a.id]=a; });
    const perPerson={}; (subs.data||[]).forEach(s=>{ const a=artById[s.artefact_id]; if(!a) return; (perPerson[s.person_id]=perPerson[s.person_id]||[]).push({art:a,box:s.detail}); });
    const places=[...new Set((arts.data||[]).map(a=>a._where).filter(Boolean))]; const coords={};
    for(const pl of places){ coords[pl]=await geocode(pl); }
    const children={}; (rels.data||[]).forEach(r=>{ if(r.kind==='parent') (children[r.from_person]=children[r.from_person]||[]).push(r.to_person); });
    const gm={}; function gen(id,seen){ if(gm[id]!==undefined) return gm[id]; seen=seen||{}; if(seen[id]) return 0; seen[id]=1; let g=0; (children[id]||[]).forEach(c=>g=Math.max(g,1+gen(c,seen))); return gm[id]=g; }

    const byId={};
    NODES=(ppl.data||[]).map(p=>{
      const recs=perPerson[p.id]||[]; const memoryCount=recs.length;
      const located=recs.filter(r=>r.art._where && coords[r.art._where]);
      const withYear=located.map(r=>({y:r.art._year||0, place:r.art._where, art:r.art, box:r.box})).sort((a,b)=>a.y-b.y);
      const last=withYear.length?withYear[withYear.length-1]:null;
      const nd={ id:p.id, name:p.called_name||p.display_name||'Someone', memoryCount, remembered:memoryCount>0,
        gen:gen(p.id), records:located.length?located:recs,
        place:last?last.place:null, lat:last?coords[last.place][0]:null, lng:last?coords[last.place][1]:null,
        tw:(hash(p.id)%628)/100, v:new THREE.Vector3() };
      byId[p.id]=nd; return nd;
    });
    const EDGES=(rels.data||[]).filter(r=>byId[r.from_person]&&byId[r.to_person]).map(r=>({a:byId[r.from_person], b:byId[r.to_person], kind:r.kind}));

    sphereLayout(NODES, EDGES);
    buildSprites(NODES);
    buildArcs(EDGES);
    setHome(NODES, EDGES, byId, children);

    $('#stPeople').textContent=NODES.length;
    $('#stTies').textContent=EDGES.length;
    $('#gate').style.display='none';
    yaw=homeYaw; pitch=homePitch; fov=62;
    requestAnimationFrame(tick);
  }catch(err){ gateError(err.message||'Could not read the forest.'); }
}

/* even coverage (Fibonacci) then gentle family clustering, always on the sphere */
function sphereLayout(nodes, edges){
  const n=nodes.length; if(!n) return;
  const off=2/n, inc=Math.PI*(3-Math.sqrt(5));
  nodes.forEach((nd,i)=>{ const y=(i*off-1+off/2)*0.82; const r=Math.sqrt(Math.max(0,1-y*y)); const phi=i*inc;
    nd.v.set(Math.cos(phi)*r, y, Math.sin(phi)*r).normalize(); });
  const tmp=new THREE.Vector3(), mid=new THREE.Vector3();
  for(let it=0; it<150; it++){
    nodes.forEach(nd=>{ nd._d=new THREE.Vector3(); });
    // gentle attraction: pull each edge's ends toward their midpoint on the sphere
    edges.forEach(e=>{ mid.copy(e.a.v).add(e.b.v); if(mid.lengthSq()<1e-6) return; mid.normalize();
      e.a._d.addScaledVector(tmp.copy(mid).sub(e.a.v), 0.14);
      e.b._d.addScaledVector(tmp.copy(mid).sub(e.b.v), 0.14); });
    // short-range repulsion so nobody overlaps and coverage stays open
    for(let i=0;i<n;i++){ for(let j=i+1;j<n;j++){ const d=nodes[i].v.distanceTo(nodes[j].v);
      if(d<0.22){ tmp.copy(nodes[i].v).sub(nodes[j].v); if(tmp.lengthSq()<1e-9) tmp.set(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5);
        tmp.normalize().multiplyScalar((0.22-d)*0.5); nodes[i]._d.add(tmp); nodes[j]._d.sub(tmp); } } }
    nodes.forEach(nd=>{ nd.v.addScaledVector(nd._d,1).normalize(); });
  }
  const YB=0.82; nodes.forEach(nd=>{ if(Math.abs(nd.v.y)>YB){ const sgn=nd.v.y<0?-1:1; nd.v.y=YB*sgn; const sc=Math.sqrt(Math.max(0,(1-YB*YB))/(nd.v.x*nd.v.x+nd.v.z*nd.v.z||1e-6)); nd.v.x*=sc; nd.v.z*=sc; nd.v.normalize(); } });
  nodes.forEach(nd=>{ nd.pos=nd.v.clone().multiplyScalar(R); });
}

function starSize(nd){ return R*(0.030 + Math.min(6,nd.memoryCount)*0.010 + Math.min(3,nd.gen)*0.004); }
function buildSprites(nodes){
  nodes.forEach(nd=>{
    const col = nd.remembered? new THREE.Color(1.0,0.82,0.49) : new THREE.Color(0.5,0.71,0.85);
    const mat=new THREE.SpriteMaterial({map:glowTex, color:col, transparent:true, blending:THREE.AdditiveBlending, depthTest:false, depthWrite:false, opacity:1});
    const sp=new THREE.Sprite(mat); sp.position.copy(nd.pos); const s=starSize(nd)*2.6; sp.scale.set(s,s,1);
    sp.renderOrder=2; scene.add(sp); nd.sprite=sp; nd._base=s;
    // a crisp core
    const cm=new THREE.SpriteMaterial({map:glowTex, color:nd.remembered?0xfff6df:0xd6ecfb, transparent:true, blending:THREE.AdditiveBlending, depthTest:false, depthWrite:false});
    const core=new THREE.Sprite(cm); core.position.copy(nd.pos); const cs=starSize(nd)*0.9; core.scale.set(cs,cs,1); core.renderOrder=3; scene.add(core); nd.core=core;
  });
}
function buildArcs(edges){
  if(!edges.length) return;
  const pos=[], colarr=[]; const A=new THREE.Vector3(), B=new THREE.Vector3(), P=new THREE.Vector3();
  const colOf=k=> k==='spouse'?[0.95,0.80,0.52]:(k==='sibling'?[0.62,0.85,0.75]:[0.5,0.71,0.85]);
  edges.forEach(e=>{ A.copy(e.a.v); B.copy(e.b.v); const c=colOf(e.kind); const SEG=14; let prev=null;
    for(let s=0;s<=SEG;s++){ const t=s/SEG; P.copy(A).multiplyScalar(1-t).addScaledVector(B,t).normalize().multiplyScalar(R*0.985);
      const cur=[P.x,P.y,P.z]; if(prev){ pos.push(prev[0],prev[1],prev[2], cur[0],cur[1],cur[2]); colarr.push(c[0],c[1],c[2], c[0],c[1],c[2]); } prev=cur; } });
  const g=new THREE.BufferGeometry(); g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(colarr,3));
  const m=new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.28, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending});
  const lines=new THREE.LineSegments(g,m); lines.renderOrder=1; scene.add(lines);
}
/* home = direction of the largest family cluster */
function setHome(nodes, edges, byId, children){
  const adj={}; nodes.forEach(n=>adj[n.id]=[]); edges.forEach(e=>{ adj[e.a.id].push(e.b.id); adj[e.b.id].push(e.a.id); });
  const seen={}; let best=[];
  nodes.forEach(n=>{ if(seen[n.id]) return; const comp=[]; const stack=[n.id];
    while(stack.length){ const id=stack.pop(); if(seen[id]) continue; seen[id]=1; comp.push(id); (adj[id]||[]).forEach(x=>{ if(!seen[x]) stack.push(x); }); }
    if(comp.length>best.length) best=comp; });
  const dir=new THREE.Vector3(); (best.length?best:nodes.map(n=>n.id)).forEach(id=>{ dir.add(byId[id].v); });
  if(dir.lengthSq()<1e-6) dir.set(0,0,1); dir.normalize();
  homeYaw=Math.atan2(dir.x, dir.z); homePitch=Math.max(-PITCH_LIMIT,Math.min(PITCH_LIMIT,Math.asin(dir.y)));
}

/* ---- look-around interaction ---- */
const ptrs=new Map(); let dragging=false, px=0,py=0,moved=0,downT=0,pinchD=0,lastTap=0;
function sens(){ return 0.0060*(fov/62); }
cv.addEventListener('pointerdown', e=>{ try{cv.setPointerCapture(e.pointerId);}catch(_){}
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){ dragging=true; px=e.clientX; py=e.clientY; moved=0; downT=Date.now(); vyaw=0; vpitch=0; recentering=false; }
  else if(ptrs.size===2){ dragging=false; const p=[...ptrs.values()]; pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); } });
cv.addEventListener('pointermove', e=>{ if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size>=2){ const p=[...ptrs.values()], d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); if(pinchD){ setFov(fov*(pinchD/d)); } pinchD=d; return; }
  if(dragging){ const dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY; moved+=Math.abs(dx)+Math.abs(dy);
    const s=sens(); vyaw=-dx*s; vpitch=dy*s*0.8; yaw+=vyaw; pitch=clampPitch(pitch+vpitch); if(pitch<=-PITCH_LIMIT||pitch>=PITCH_LIMIT) vpitch=0; } });
function up(e){ const wasTwo=ptrs.size>=2; ptrs.delete(e.pointerId);
  if(ptrs.size>=2){ const p=[...ptrs.values()]; pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); return; }
  if(ptrs.size===1){ const p=[...ptrs.values()][0]; px=p.x; py=p.y; dragging=true; moved=999; pinchD=0; return; }
  if(dragging && moved<7 && Date.now()-downT<330 && !wasTwo){
    const now=Date.now(); if(now-lastTap<320){ recentering=true; lastTap=0; }
    else { lastTap=now; const nd=pickAt(e.clientX,e.clientY); if(nd) openCard(nd); else closeCard(); } }
  dragging=false; pinchD=0; }
cv.addEventListener('pointerup', up); cv.addEventListener('pointercancel', up);
cv.addEventListener('wheel', e=>{ e.preventDefault(); setFov(fov*(e.deltaY<0?0.9:1.11)); }, {passive:false});
$('#recenter').addEventListener('click', ()=>{ recentering=true; });
function setFov(f){ fov=Math.max(FOV_MIN,Math.min(FOV_MAX,f)); }
function clampPitch(p){ return Math.max(-PITCH_LIMIT,Math.min(PITCH_LIMIT,p)); }
function shortAngle(a){ while(a>Math.PI)a-=TAU; while(a<-Math.PI)a+=TAU; return a; }

const _pv=new THREE.Vector3();
function project(pos){ _pv.copy(pos).project(camera); return {x:(_pv.x*0.5+0.5)*W, y:(-_pv.y*0.5+0.5)*H, z:_pv.z}; }
function pickAt(cx,cy){ let best=null,bd=34; for(const nd of NODES){ const pr=project(nd.pos); if(pr.z>1) continue; const d=Math.hypot(pr.x-cx,pr.y-cy); if(d<bd){ bd=d; best=nd; } } return best; }

/* ---- render ---- */
const fwd=new THREE.Vector3();
let t0=performance.now();
function tick(now){
  requestAnimationFrame(tick);
  const t=(now-t0)/1000;
  if(!dragging && !recentering){ vyaw=Math.max(-0.14,Math.min(0.14,vyaw)); yaw+=vyaw; const np=clampPitch(pitch+vpitch); if(np===PITCH_LIMIT||np===-PITCH_LIMIT) vpitch=0; pitch=np; vyaw*=0.95; vpitch*=0.95; if(Math.abs(vyaw)<1e-5)vyaw=0; if(Math.abs(vpitch)<1e-5)vpitch=0; }
  if(recentering){ yaw+=shortAngle(homeYaw-yaw)*0.1; pitch+=(homePitch-pitch)*0.1; fov+=(62-fov)*0.1;
    if(Math.abs(shortAngle(homeYaw-yaw))<0.003 && Math.abs(homePitch-pitch)<0.003 && Math.abs(62-fov)<0.4){ yaw=homeYaw; pitch=homePitch; fov=62; recentering=false; } }
  camera.fov=fov; camera.updateProjectionMatrix();
  const cyp=Math.cos(pitch); fwd.set(Math.sin(yaw)*cyp, Math.sin(pitch), Math.cos(yaw)*cyp); camera.up.set(0,1,0); camera.lookAt(fwd);
  // twinkle
  NODES.forEach(nd=>{ if(!nd.sprite) return; const tw=RM?1:(0.8+0.2*Math.sin(t*1.4+nd.tw)); nd.sprite.material.opacity=tw; if(nd.core) nd.core.material.opacity=Math.min(1,tw*1.1); });
  renderer.render(scene,camera);
  updateOverlays();
}
const _c=new THREE.Vector3();
function updateOverlays(){
  // name the star nearest the centre of view (your telescope target)
  let best=null,bd=1e9; const cx=W/2, cy=H/2;
  for(const nd of NODES){ const pr=project(nd.pos); if(pr.z>1) continue; const d=Math.hypot(pr.x-cx,pr.y-cy); if(d<bd){ bd=d; best=nd; } }
  const lab=$('#center'); const ret=$('#reticle');
  if(best && bd<70){ lab.querySelector('.n').textContent=best.name; lab.querySelector('.n').style.opacity=1; ret.style.opacity=.9; }
  else { lab.querySelector('.n').style.opacity=0; ret.style.opacity=0; }
  // chevrons: which way to turn to find home when it's off to a side
  const dy=shortAngle(homeYaw-yaw); const half=(fov*Math.PI/180)/2*1.1;
  const offHome = recentering? false : Math.abs(dy)>half+0.15;
  $('#chevL').style.opacity = (offHome && dy<0)?0.7:0;
  $('#chevR').style.opacity = (offHome && dy>0)?0.7:0;
}

/* ---- card ---- */
function fmtCoord(lat,lng){ return Math.abs(lat).toFixed(2)+'\u00b0'+(lat>=0?'N':'S')+' \u00b7 '+Math.abs(lng).toFixed(2)+'\u00b0'+(lng>=0?'E':'W'); }
async function faceInto(disc, art, box){ disc.innerHTML='';
  try{ const s=await sb.storage.from('family').createSignedUrl(art.storage_path,3600); const url=s.data&&s.data.signedUrl; if(!url){ disc.textContent='photo'; return; }
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ const cvs=document.createElement('canvas'); cvs.width=cvs.height=128; const g=cvs.getContext('2d');
      if(box&&box.w>0&&box.h>0){ const pad=0.35; let bx=box.x-box.w*pad, by=box.y-box.h*pad, bw=box.w*(1+2*pad), bh=box.h*(1+2*pad); const side=Math.max(bw,bh);
        let ssx=(bx+bw/2-side/2)*img.naturalWidth, ssy=(by+bh/2-side/2)*img.naturalHeight, ss=side*Math.max(img.naturalWidth,img.naturalHeight);
        ssx=Math.max(0,Math.min(img.naturalWidth-ss,ssx)); ssy=Math.max(0,Math.min(img.naturalHeight-ss,ssy)); g.drawImage(img,ssx,ssy,ss,ss,0,0,128,128);
      } else { const side=Math.min(img.naturalWidth,img.naturalHeight); g.drawImage(img,(img.naturalWidth-side)/2,(img.naturalHeight-side)/2,side,side,0,0,128,128); }
      disc.appendChild(cvs); };
    img.onerror=()=>{ disc.textContent='photo'; }; img.src=url;
  }catch(e){ disc.textContent='photo'; } }
function openCard(p){
  $('#cName').textContent=p.name;
  { const mt=document.getElementById('cMeet'); if(mt) mt.href='person-real.html?id='+encodeURIComponent(p.id); }
  $('#cLine').textContent=[p.place].filter(Boolean).join(' \u00b7 ') || 'in your forest';
  $('#cRel').textContent = p.remembered? (p.memoryCount+' '+(p.memoryCount===1?'memory':'memories')) : 'waiting to be remembered';
  $('#cPlace').textContent=p.place||'\u2014';
  $('#cCoords').textContent=(p.lat!=null)?fmtCoord(p.lat,p.lng):'\u2014';
  const recs=p.records||[]; let rec=recs.find(r=>r.art&&r.art.body)||recs[0];
  const cStory=$('#cStory'), cProv=$('#cProv');
  if(rec && rec.art && rec.art.body){ cStory.style.display='block'; cStory.textContent=rec.art.body;
    const who=(rec.art.contributor_id&&prov[rec.art.contributor_id])||''; const cert=rec.art.certainty||'';
    const bits=[who?'told by '+who:'', cert].filter(Boolean).join(' \u00b7 ');
    if(bits){ cProv.style.display='block'; cProv.textContent=bits; } else cProv.style.display='none'; }
  else { cStory.style.display='none'; cProv.style.display='none'; }
  const disc=$('#cDisc'); disc.textContent='photo'; if(rec&&rec.art) faceInto(disc, rec.art, rec.box);
  $('#card').classList.add('show');
  const cb=document.querySelector('#card .cbody'); if(cb) cb.scrollTop=0;
  cardOpen=true;
}
let cardOpen=false;
function closeVisual(){ $('#card').classList.remove('show'); cardOpen=false; }
window.__lfClose=function(){ if(cardOpen){ closeVisual(); return true; } return false; };
function closeCard(){ if(cardOpen){ try{ history.back(); }catch(e){ closeVisual(); } } else closeVisual(); }
$('#cardX').onclick=closeCard;

/* ---- sign-in gate (same origin shares the app session) ---- */
function showSignIn(){ const box=$('#gateBox');
  box.innerHTML='<h2 class="serif">Your forest</h2><p>Sign in to see your family as the sky. New here? You can create an account from the globe.</p>'+
    '<input id="gEmail" type="email" placeholder="you@example.com" autocomplete="email"/>'+
    '<input id="gPw" type="password" placeholder="password" autocomplete="current-password"/>'+
    '<button id="gGo">Sign in</button><div class="msg" id="gMsg"></div>';
  $('#gGo').onclick=async()=>{ const email=$('#gEmail').value.trim(), password=$('#gPw').value; const m=$('#gMsg');
    if(!email||!password){ m.textContent='Enter your email and password.'; return; }
    m.style.color='rgba(206,221,240,.65)'; m.textContent='Signing in…';
    const { error }=await sb.auth.signInWithPassword({email,password});
    if(error){ m.style.color='#ff9a8f'; m.textContent=error.message; }
    else { box.innerHTML='<div class="spin"></div><p style="margin-top:16px">Gathering your forest…</p>'; load(); } }; }
function gateError(msg){ $('#gate').style.display='flex'; $('#gateBox').innerHTML='<h2 class="serif">Hmm</h2><p>'+msg+'</p><button onclick="location.reload()">Try again</button>'; }

load();
