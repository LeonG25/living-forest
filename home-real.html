<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#04070e" />
<title>The Living Forest — the sky</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&family=Hanken+Grotesk:wght@400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#04070e;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#e8eef8;user-select:none;-webkit-user-select:none;touch-action:none;}
  #stage{position:fixed;inset:0;background:radial-gradient(130% 120% at 50% 8%, #0d1a2f 0%, #081120 48%, #04070e 100%);}
  #sky{position:absolute;inset:0;z-index:1;display:block;}
  .mono{font-family:'Azeret Mono',ui-monospace,monospace;}
  .serif{font-family:'Newsreader',serif;}

  #label{position:absolute;z-index:3;left:0;top:0;transform:translate(-50%,-150%);pointer-events:none;opacity:0;transition:opacity .16s ease;white-space:nowrap;}
  #label .n{font-family:'Newsreader',serif;font-size:16px;color:#fbf1dc;text-shadow:0 1px 10px rgba(0,0,0,.9);}

  .hud{position:absolute;z-index:4;padding:clamp(20px,4vw,34px) clamp(22px,4.4vw,40px);pointer-events:none;}
  #tl{left:0;top:0;max-width:78vw;}
  #tl .k{font-family:'Azeret Mono',monospace;font-size:10.5px;letter-spacing:.36em;text-transform:uppercase;color:rgba(150,180,214,.6);margin-bottom:16px;}
  #tl h1{font-family:'Newsreader',serif;font-weight:300;font-size:clamp(30px,7.4vw,44px);line-height:1.0;margin:0;color:#f3f6fc;letter-spacing:-.01em;}
  #tl h1 em{font-style:italic;color:#f3cd84;}
  #tl p{font-size:13.5px;line-height:1.55;color:rgba(206,221,240,.6);margin:14px 0 0;max-width:260px;}
  #tr{right:0;top:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
  #tr a{pointer-events:auto;text-decoration:none;font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(206,221,240,.72);border:1px solid rgba(180,205,235,.22);border-radius:999px;padding:8px 14px;background:rgba(10,18,34,.5);backdrop-filter:blur(6px);}
  #tr a:active{color:#f3cd84;border-color:rgba(243,205,132,.5);}
  #bl{left:0;bottom:0;display:flex;align-items:baseline;gap:22px;}
  #bl .stat .v{font-family:'Newsreader',serif;font-weight:300;font-size:28px;color:#f3f6fc;}
  #bl .stat .l{font-family:'Azeret Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(150,180,214,.62);margin-left:8px;}
  #br{right:0;bottom:0;text-align:right;}
  #br .readout{font-family:'Azeret Mono',monospace;font-size:10.5px;line-height:1.7;color:rgba(190,210,235,.58);}
  @media (max-width:560px){ #tl p{display:none;} #br{display:none;} }

  #card{position:absolute;z-index:6;left:50%;bottom:6%;transform:translateX(-50%) translateY(12px);width:min(430px,92vw);opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;}
  #card.show{opacity:1;transform:translateX(-50%);pointer-events:auto;}
  #card .panel{position:relative;display:flex;flex-direction:column;background:rgba(10,18,34,.88);border:1px solid rgba(180,205,235,.16);border-radius:20px;backdrop-filter:blur(18px);box-shadow:0 30px 70px -24px rgba(0,0,0,.8);padding:22px 24px;max-height:86dvh;overflow:hidden;}
  #card .x{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(210,222,244,.28);background:rgba(10,18,34,.7);display:flex;align-items:center;justify-content:center;color:rgba(230,238,250,.9);font-size:17px;cursor:pointer;z-index:2;}
  #card .top{display:flex;gap:16px;align-items:center;flex:0 0 auto;padding-right:30px;}
  #card .cbody{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-right:4px;}
  #card .disc{position:relative;width:64px;height:64px;flex:none;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 50% 42%, rgba(255,231,180,.35) 0%, rgba(210,150,60,.18) 55%, rgba(16,24,42,.85) 100%);box-shadow:0 0 22px 4px rgba(255,206,120,.28), inset 0 0 0 1px rgba(255,220,150,.4);display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-style:italic;font-size:10px;color:rgba(255,238,205,.6);}
  #card .disc canvas,#card .disc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #card .nm{font-family:'Newsreader',serif;font-size:22px;color:#f4ecdb;line-height:1.12;}
  #card .line{font-family:'Azeret Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:rgba(190,210,235,.7);margin-top:4px;}
  #card .rel{font-size:12px;color:rgba(206,221,240,.6);margin-top:3px;}
  #card .story{margin-top:15px;padding-top:14px;border-top:1px solid rgba(180,205,235,.12);font-size:13px;line-height:1.55;color:#e9eff9;}
  #card .prov{margin-top:10px;font-size:11.5px;line-height:1.5;color:#f3cd84;}
  #card .grid{display:flex;gap:22px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(180,205,235,.12);}
  #card .grid .k{font-family:'Azeret Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(150,180,214,.6);}
  #card .grid .val{font-size:12.5px;color:#e6eefb;margin-top:3px;}
  #card .grid .val.mono{font-family:'Azeret Mono',monospace;font-size:11.5px;}

  #gate{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(4,7,14,.72);backdrop-filter:blur(6px);padding:24px;}
  #gate .box{width:min(380px,92vw);background:rgba(10,18,34,.9);border:1px solid rgba(180,205,235,.16);border-radius:20px;padding:26px;text-align:center;}
  #gate h2{font-family:'Newsreader',serif;font-weight:300;font-size:24px;margin:6px 0;color:#f4ecdb;}
  #gate p{font-size:13px;color:rgba(206,221,240,.65);line-height:1.5;margin:0 0 16px;}
  #gate input{width:100%;background:#0a1220;border:1px solid rgba(180,205,235,.2);border-radius:12px;color:#eef2fb;padding:12px 13px;font-size:15px;font-family:inherit;margin-top:8px;outline:none;}
  #gate input:focus{border-color:#f3cd84;}
  #gate button{width:100%;margin-top:14px;background:linear-gradient(180deg,#ffe6ad,#f3cd84);color:#3a2a05;font-weight:700;font-family:inherit;font-size:15px;padding:13px;border:none;border-radius:13px;cursor:pointer;}
  #gate .msg{margin-top:12px;font-size:12.5px;color:#ff9a8f;min-height:16px;}
  #gate .spin{display:inline-block;width:34px;height:34px;border:3px solid rgba(243,205,132,.25);border-top-color:#f3cd84;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="stage">
  <canvas id="sky"></canvas>
  <div id="label"><span class="n"></span></div>

  <div class="hud" id="tl">
    <div class="k">The Living Forest</div>
    <h1 class="serif">The whole<br><em>sky.</em></h1>
    <p>Everyone gathered here, and the threads between them. Lit where remembered. Tap a light to meet them.</p>
  </div>
  <div class="hud" id="tr">
    <a href="globe-real.html">the map ↗</a>
  </div>
  <div class="hud" id="bl">
    <div class="stat"><span class="v serif" id="stPeople">—</span><span class="l">people</span></div>
    <div class="stat"><span class="v serif" id="stTies">—</span><span class="l">threads</span></div>
  </div>
  <div class="hud" id="br"><div class="readout">tap a light · drag to roam<br>pinch or scroll to zoom</div></div>

  <div id="card"><div class="panel">
    <div class="x" id="cardX">&times;</div>
    <div class="top">
      <div class="disc" id="cDisc">photo</div>
      <div><div class="nm" id="cName"></div><div class="line" id="cLine"></div><div class="rel" id="cRel"></div></div>
    </div>
    <div class="cbody">
      <div class="story" id="cStory" style="display:none"></div>
      <div class="prov" id="cProv" style="display:none"></div>
      <div class="grid">
        <div><div class="k">place</div><div class="val" id="cPlace"></div></div>
        <div><div class="k">coordinates</div><div class="val mono" id="cCoords"></div></div>
      </div>
    </div>
  </div></div>

  <div id="gate"><div class="box" id="gateBox"><div class="spin"></div><p style="margin-top:16px">Gathering your forest…</p></div></div>
</div>

<script>
/* =========================================================================
   THE LIVING FOREST — HOME (the sky). Real data on your login: every person a
   light, every thread a real kinship link, gold where remembered. Same origin
   as the app, so it shares your session. Nothing invented.
   ========================================================================= */
const $ = s => document.querySelector(s);
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const SUPABASE_URL='https://oabcdrktuikifbormjip.supabase.co';
const SUPABASE_KEY='sb_publishable_MnuwKTP5JaUy-P8-bKWsgA_f98esOXC';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GEO = {
  'tel-aviv jaffo, israel':[32.0663,34.7778],'tel aviv jaffo, israel':[32.0663,34.7778],
  'new york':[40.7128,-74.0060],'holon, israel':[32.0111,34.7722],'rybinsk, russia':[58.0446,38.8426],
  'pardes hana, israel':[32.4753,34.9714],'yavne, israel':[31.8776,34.7396],'rishon le-tsion':[31.9730,34.7925],
  'rishon le-tsion, israel':[31.9730,34.7925],'morschach, switzerland':[46.9722,8.5850],'hamashot 14, yavne':[31.8776,34.7396],
};
const geoCache={};
async function geocode(place){ if(!place) return null; const key=place.trim().toLowerCase().replace(/\s+/g,' ');
  if(GEO[key]) return GEO[key]; if(geoCache[key]!==undefined) return geoCache[key];
  try{ const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(place));
    const j=await r.json(); const hit=j&&j[0]?[parseFloat(j[0].lat),parseFloat(j[0].lon)]:null; geoCache[key]=hit; return hit; }
  catch(e){ geoCache[key]=null; return null; } }
function parseYear(s){ if(s==null) return null; const m=String(s).match(/(19|20)\d{2}/); return m?+m[0]:null; }
function hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

const cv=$('#sky'), ctx=cv.getContext('2d'); let W=0,H=0,DPR=Math.min(2,devicePixelRatio||1);
function resize(){ W=innerWidth; H=innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
resize(); addEventListener('resize', ()=>{ resize(); });

let NODES=[], EDGES=[], prov={}, scale=1, panX=0, panY=0;

async function load(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ showSignIn(); return; }
  try{
    const [ppl, rels, arts, subs, profs] = await Promise.all([
      sb.from('people').select('id,display_name,called_name'),
      sb.from('relationships').select('from_person,to_person,kind'),
      sb.from('artefacts').select('id,body,certainty,metadata,storage_path,contributor_user').eq('status','published'),
      sb.from('artefact_subjects').select('artefact_id,person_id,detail'),
      sb.from('profiles').select('id,display_name'),
    ]);
    if(ppl.error) throw ppl.error;
    (profs.data||[]).forEach(p=> prov[p.id]=p.display_name);
    const artById={}; (arts.data||[]).forEach(a=>{ a._year=parseYear(a.metadata&&a.metadata.when); a._where=(a.metadata&&a.metadata.where)||''; artById[a.id]=a; });
    const perPerson={}; (subs.data||[]).forEach(s=>{ const a=artById[s.artefact_id]; if(!a) return; (perPerson[s.person_id]=perPerson[s.person_id]||[]).push({art:a,box:s.detail}); });
    const places=[...new Set((arts.data||[]).map(a=>a._where).filter(Boolean))]; const coords={};
    for(const pl of places){ coords[pl]=await geocode(pl); }
    const children={}; (rels.data||[]).forEach(r=>{ if(r.kind==='parent') (children[r.from_person]=children[r.from_person]||[]).push(r.to_person); });
    const gm={}; function gen(id,seen){ if(gm[id]!==undefined) return gm[id]; seen=seen||{}; if(seen[id]) return 0; seen[id]=1; let g=0; (children[id]||[]).forEach(c=>g=Math.max(g,1+gen(c,seen))); return gm[id]=g; }

    const byId={};
    NODES=(ppl.data||[]).map(p=>{
      const recs=perPerson[p.id]||[]; const memoryCount=recs.length;
      const located=recs.filter(r=>r.art._where && coords[r.art._where]);
      const withYear=located.map(r=>({y:r.art._year||0, place:r.art._where, art:r.art, box:r.box})).sort((a,b)=>a.y-b.y);
      const last=withYear.length?withYear[withYear.length-1]:null;
      const nd={ id:p.id, name:p.called_name||p.display_name||'Someone', memoryCount, remembered:memoryCount>0,
        gen:gen(p.id), records:located.length?located:recs,
        place:last?last.place:null, lat:last?coords[last.place][0]:null, lng:last?coords[last.place][1]:null,
        tw:(hash(p.id)%628)/100, x:0, y:0, dx:0, dy:0 };
      byId[p.id]=nd; return nd;
    });
    EDGES=(rels.data||[]).filter(r=>byId[r.from_person]&&byId[r.to_person]).map(r=>({na:byId[r.from_person], nb:byId[r.to_person], kind:r.kind}));

    layout();
    $('#stPeople').textContent=NODES.length;
    $('#stTies').textContent=EDGES.length;
    $('#gate').style.display='none';
    requestAnimationFrame(tick);
  }catch(err){ gateError(err.message||'Could not read the forest.'); }
}

function layout(){
  const n=NODES.length; if(!n) return;
  NODES.forEach((nd,i)=>{ const h=hash(nd.id); const a=i/n*6.2832;
    nd.x=Math.cos(a)*(220+(h%90)) + ((h>>5)%60-30); nd.y=Math.sin(a)*(220+((h>>9)%90)) + ((h>>3)%60-30); });
  const k=Math.sqrt((1100*1100)/n)*0.92; let temp=260;
  for(let it=0; it<440; it++){
    for(let i=0;i<n;i++){ NODES[i].dx=0; NODES[i].dy=0; }
    for(let i=0;i<n;i++){ for(let j=i+1;j<n;j++){
      let ddx=NODES[i].x-NODES[j].x, ddy=NODES[i].y-NODES[j].y, d=Math.hypot(ddx,ddy)||0.01;
      const f=k*k/d, ux=ddx/d, uy=ddy/d;
      NODES[i].dx+=ux*f; NODES[i].dy+=uy*f; NODES[j].dx-=ux*f; NODES[j].dy-=uy*f; } }
    EDGES.forEach(e=>{ let ddx=e.na.x-e.nb.x, ddy=e.na.y-e.nb.y, d=Math.hypot(ddx,ddy)||0.01;
      const f=d*d/k, ux=ddx/d, uy=ddy/d; e.na.dx-=ux*f; e.na.dy-=uy*f; e.nb.dx+=ux*f; e.nb.dy+=uy*f; });
    for(let i=0;i<n;i++){ let dd=Math.hypot(NODES[i].dx,NODES[i].dy)||0.01, lim=Math.min(dd,temp); NODES[i].x+=NODES[i].dx/dd*lim; NODES[i].y+=NODES[i].dy/dd*lim; }
    temp*=0.986;
  }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  NODES.forEach(nd=>{ minx=Math.min(minx,nd.x); miny=Math.min(miny,nd.y); maxx=Math.max(maxx,nd.x); maxy=Math.max(maxy,nd.y); });
  const cx=(minx+maxx)/2, cy=(miny+maxy)/2; NODES.forEach(nd=>{ nd.x-=cx; nd.y-=cy; });
  const bw=(maxx-minx)||1, bh=(maxy-miny)||1;
  scale=Math.min((W*0.86)/bw, (H*0.72)/bh); scale=Math.max(0.25,Math.min(2.2,scale));
  panX=W/2; panY=H*0.53;
}
function sx(nd){ return nd.x*scale+panX; }
function sy(nd){ return nd.y*scale+panY; }

function nodeRadius(nd){ return 3.0 + Math.min(6,nd.memoryCount)*1.05 + Math.min(3,nd.gen)*0.5; }
let t0=performance.now();
function tick(now){
  requestAnimationFrame(tick);
  const t=(now-t0)/1000;
  ctx.clearRect(0,0,W,H);
  ctx.lineWidth=1;
  EDGES.forEach(e=>{ const col = e.kind==='spouse'?'rgba(243,205,132,':(e.kind==='sibling'?'rgba(159,216,192,':'rgba(127,180,216,');
    ctx.strokeStyle=col+'0.22)'; ctx.beginPath(); ctx.moveTo(sx(e.na),sy(e.na)); ctx.lineTo(sx(e.nb),sy(e.nb)); ctx.stroke(); });
  NODES.forEach(nd=>{ const x=sx(nd), y=sy(nd); const base=nodeRadius(nd);
    const tw = RM?1:(0.82+0.18*Math.sin(t*1.4+nd.tw));
    const R = base*(1.6+(nd===hoverNode?0.6:0));
    const g=ctx.createRadialGradient(x,y,0,x,y,R*3.4);
    if(nd.remembered){ g.addColorStop(0,'rgba(255,244,214,'+(0.95*tw)+')'); g.addColorStop(0.3,'rgba(255,207,126,'+(0.6*tw)+')'); g.addColorStop(1,'rgba(255,207,126,0)'); }
    else { g.addColorStop(0,'rgba(191,224,244,'+(0.6*tw)+')'); g.addColorStop(0.4,'rgba(127,180,216,'+(0.3*tw)+')'); g.addColorStop(1,'rgba(127,180,216,0)'); }
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,R*3.4,0,6.2832); ctx.fill();
    ctx.fillStyle = nd.remembered? 'rgba(255,247,224,'+tw+')' : 'rgba(210,232,247,'+tw+')';
    ctx.beginPath(); ctx.arc(x,y,base*0.7,0,6.2832); ctx.fill();
    if(nd.gen>=3){ ctx.strokeStyle='rgba(255,221,154,'+(0.5*tw)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(x,y,base*2.2,0,6.2832); ctx.stroke(); }
  });
}

let hoverNode=null;
const ptrs=new Map(); let dragging=false, px=0,py=0,moved=0,downT=0,pinchD=0;
function toWorldHit(cx,cy){ let best=null,bd=1e9; for(const nd of NODES){ const dx=sx(nd)-cx, dy=sy(nd)-cy, d=Math.hypot(dx,dy); const rr=nodeRadius(nd)*2.2+10; if(d<rr && d<bd){ bd=d; best=nd; } } return best; }
cv.addEventListener('pointerdown', e=>{ try{cv.setPointerCapture(e.pointerId);}catch(_){}
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){ dragging=true; px=e.clientX; py=e.clientY; moved=0; downT=Date.now(); }
  else if(ptrs.size===2){ dragging=false; const p=[...ptrs.values()]; pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); } });
cv.addEventListener('pointermove', e=>{ if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size>=2){ const p=[...ptrs.values()], d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); if(pinchD){ const f=d/pinchD; zoomAt((p[0].x+p[1].x)/2,(p[0].y+p[1].y)/2,f); } pinchD=d; return; }
  if(dragging){ const dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY; moved+=Math.abs(dx)+Math.abs(dy); panX+=dx; panY+=dy; }
  else { const nd=toWorldHit(e.clientX,e.clientY); hoverNode=nd; const L=$('#label');
    if(nd){ L.querySelector('.n').textContent=nd.name; L.style.left=sx(nd)+'px'; L.style.top=sy(nd)+'px'; L.style.opacity=1; cv.style.cursor='pointer'; }
    else { L.style.opacity=0; cv.style.cursor='grab'; } } });
function up(e){ const wasTwo=ptrs.size>=2; ptrs.delete(e.pointerId);
  if(ptrs.size>=2){ const p=[...ptrs.values()]; pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); return; }
  if(ptrs.size===1){ const p=[...ptrs.values()][0]; px=p.x; py=p.y; dragging=true; moved=999; pinchD=0; return; }
  if(dragging && moved<6 && Date.now()-downT<400 && !wasTwo){ const nd=toWorldHit(e.clientX,e.clientY); if(nd) openCard(nd); else closeCard(); }
  dragging=false; pinchD=0; cv.style.cursor='grab'; }
cv.addEventListener('pointerup', up); cv.addEventListener('pointercancel', up);
cv.style.cursor='grab';
function zoomAt(cx,cy,f){ const nx=(cx-panX), ny=(cy-panY); const ns=Math.max(0.2,Math.min(6,scale*f));
  panX=cx-nx*(ns/scale); panY=cy-ny*(ns/scale); scale=ns; }
cv.addEventListener('wheel', e=>{ e.preventDefault(); zoomAt(e.clientX,e.clientY, e.deltaY<0?1.12:0.89); }, {passive:false});

function fmtCoord(lat,lng){ return Math.abs(lat).toFixed(2)+'\u00b0'+(lat>=0?'N':'S')+' \u00b7 '+Math.abs(lng).toFixed(2)+'\u00b0'+(lng>=0?'E':'W'); }
async function faceInto(disc, art, box){ disc.innerHTML='';
  try{ const s=await sb.storage.from('family').createSignedUrl(art.storage_path,3600); const url=s.data&&s.data.signedUrl; if(!url){ disc.textContent='photo'; return; }
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ const cvs=document.createElement('canvas'); cvs.width=cvs.height=128; const g=cvs.getContext('2d');
      if(box&&box.w>0&&box.h>0){ const pad=0.35; let bx=box.x-box.w*pad, by=box.y-box.h*pad, bw=box.w*(1+2*pad), bh=box.h*(1+2*pad); const side=Math.max(bw,bh);
        let ssx=(bx+bw/2-side/2)*img.naturalWidth, ssy=(by+bh/2-side/2)*img.naturalHeight, ss=side*Math.max(img.naturalWidth,img.naturalHeight);
        ssx=Math.max(0,Math.min(img.naturalWidth-ss,ssx)); ssy=Math.max(0,Math.min(img.naturalHeight-ss,ssy)); g.drawImage(img,ssx,ssy,ss,ss,0,0,128,128);
      } else { const side=Math.min(img.naturalWidth,img.naturalHeight); g.drawImage(img,(img.naturalWidth-side)/2,(img.naturalHeight-side)/2,side,side,0,0,128,128); }
      disc.appendChild(cvs); };
    img.onerror=()=>{ disc.textContent='photo'; }; img.src=url;
  }catch(e){ disc.textContent='photo'; } }
function openCard(p){
  $('#cName').textContent=p.name;
  $('#cLine').textContent=[p.place].filter(Boolean).join(' \u00b7 ') || 'in your forest';
  $('#cRel').textContent = p.remembered? (p.memoryCount+' '+(p.memoryCount===1?'memory':'memories')) : 'waiting to be remembered';
  $('#cPlace').textContent=p.place||'\u2014';
  $('#cCoords').textContent=(p.lat!=null)?fmtCoord(p.lat,p.lng):'\u2014';
  const recs=p.records||[]; let rec=recs.find(r=>r.art&&r.art.body)||recs[0];
  const cStory=$('#cStory'), cProv=$('#cProv');
  if(rec && rec.art && rec.art.body){ cStory.style.display='block'; cStory.textContent=rec.art.body;
    const who=prov[rec.art.contributor_user]||''; const cert=rec.art.certainty||'';
    cProv.style.display='block'; cProv.textContent='told by '+(who||'family')+(cert?' \u00b7 '+cert:''); }
  else { cStory.style.display='none'; cProv.style.display='none'; }
  const disc=$('#cDisc'); disc.textContent='photo'; if(rec&&rec.art) faceInto(disc, rec.art, rec.box);
  $('#card').classList.add('show');
  const cb=document.querySelector('#card .cbody'); if(cb) cb.scrollTop=0;
  if(!cardOpen){ cardOpen=true; try{ history.pushState({lgCard:1},''); }catch(e){} }
}
let cardOpen=false;
function closeVisual(){ $('#card').classList.remove('show'); cardOpen=false; }
function closeCard(){ if(cardOpen){ try{ history.back(); }catch(e){ closeVisual(); } } else closeVisual(); }
window.addEventListener('popstate', ()=>{ if(cardOpen) closeVisual(); });
$('#cardX').onclick=closeCard;

function showSignIn(){ const box=$('#gateBox');
  box.innerHTML='<h2 class="serif">Your forest</h2><p>Sign in with your keeper account to see your family as the sky.</p>'+
    '<input id="gEmail" type="email" placeholder="you@example.com" autocomplete="email"/>'+
    '<input id="gPw" type="password" placeholder="password" autocomplete="current-password"/>'+
    '<button id="gGo">Sign in</button><div class="msg" id="gMsg"></div>';
  $('#gGo').onclick=async()=>{ const email=$('#gEmail').value.trim(), password=$('#gPw').value; const m=$('#gMsg');
    if(!email||!password){ m.textContent='Enter your email and password.'; return; }
    m.style.color='rgba(206,221,240,.65)'; m.textContent='Signing in…';
    const { error }=await sb.auth.signInWithPassword({email,password});
    if(error){ m.style.color='#ff9a8f'; m.textContent=error.message; }
    else { box.innerHTML='<div class="spin"></div><p style="margin-top:16px">Gathering your forest…</p>'; load(); } }; }
function gateError(msg){ $('#gate').style.display='flex'; $('#gateBox').innerHTML='<h2 class="serif">Hmm</h2><p>'+msg+'</p><button onclick="location.reload()">Try again</button>'; }

load();
</script>
